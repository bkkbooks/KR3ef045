body:
  text: 卷之五辨太陽病脈證並治法下此係仲景原文問曰病有結胸有藏結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白苔滑者難治此言結胸病狀與藏結雖相似而各別故仲景設為問答以辨之夫結胸藏結何以云太陽病以二者皆太陽病誤下所致也蓋結胸病始因誤下而傷其上焦之陽陽氣既傷則風寒之邪乘虛而入上結於胸按之則痛者胸中實也寸浮關沉者風與寒氣相結而為實之診也若藏結病則不然其始亦因誤下而傷其中焦之陰陰血既傷則風寒之邪亦乘虛而入內結於藏狀如結胸者以藏氣不平逆於心下故也飲食如故者胸無邪阻而胃中空也時時下利者藏虛邪結不能運化胃中之水穀不泌別不分清因偏滲於大腸而作利也寸浮關沉者結胸脈也今診關脈兼得小細緊者則是藏虛而風寒之邪內結可知舌上白苔者經云丹田有熱胸中有寒今者苔滑則是舌濕潤而冷也此係誤下太過而變成藏寒之證故難治也愚按結胸證其人本胃中挾食下之太早則食不能去外邪反入結於胸中以故按之則痛不能飲食藏結證其人胃中本無食下之太過則藏虛邪入冷積於腸所以狀如結胸按之不痛能飲食時下利舌上苔滑此非真寒證乃過下之誤也結胸證治見下藏結證仲景無治法補亡論常器之云可刺關元穴愚以若用刺不若用艾灸之藏結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也此承上文申明藏結病所以難治之故夫藏結雖系太陽病誤下所致然既下之後已無惡寒發熱之證是無太陽表熱也不往來寒熱是無少陽半表半裡之熱也其人反靜是無陽明裡熱也舌上苔滑是胸中寒而丹田並無熱也惟其無熱故不若結胸證之可攻而難治也愚以藏結本無可下之證成注云於法當下者誤補亡論郭白雲云藏結無陽證不可攻者宜刺關元穴愚以藏結病表裡皆寒無熱可泄若用刺法是為認證不明謬矣故宜用艾灸之附例病脅下素有痞連在臍旁痛引少腹入陰筋者此名藏結死此條乃藏結死證醫人不可不知也素有痞謂其人平素先有痞積伏於脅下又因新得傷寒誤行攻下成注所云邪氣入里與宿積相合使藏真之氣結而不通致連在臍旁痛引少腹入陰筋此為死證病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也此推原結胸病並及於痞病之因也仲景云太陽病當一二日發太陰病當四五日發此病發於陽與發於陰之謂病發於陽邪猶在經為不可下反下之則陽經邪熱入於胸中因作結胸病發於陰邪未入府亦不可下反下之則陰經邪熱入於心下因而作痞痞者氣塞而不通泰也尚論篇云二證皆由下早皆是熱入其不言痞者省文以見意也愚以痞非太陽證然其邪亦由太陽而傳於太陰復因誤下而作痞故併入太陽篇中結胸者項亦強如柔痓狀下之則和宜大陷胸丸此先就結胸之最劇者議其治也夫結胸證至項強則其邪緊結於胸胸中滿實其勢常昂有似反張之狀故云如柔痓也下之則和者言邪實去則胸中和而項自舒之意成注云與大陷胸丸下結泄滿愚按痓有剛柔二證皆頸項強急今則結胸證如其狀故曰亦也或問項強何以不云如剛痓余答云剛痓無汗柔痓有汗結胸證既項強矣若不云如柔痓恐醫人認以為太陽經風寒之邪未解反疑其當用發汗之藥殊不知項雖強表證已解里證甚急治法宜下曰如柔痓狀者蓋言有汗而非外邪之項強也大陷胸丸方大黃半斤葶藶半升熬芒硝半升杏仁半升去皮尖熬黑上四味搗篩二味內杏人芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法成注云大黃芒硝之苦鹹所以下熱葶藶杏人之苦甘所以泄滿甘遂取其直達白蜜取其潤利皆以下泄實滿之物也琥按大陷胸湯止硝黃甘遂三物茲方中更加葶藶杏人白蜜是名雖為丸比湯倍有力焉大抵結胸證水逆於肺喘脹胸滿者宜用之陷胸名義詳下湯方中結胸證其脈浮大者不可下下之則死結胸證寸脈雖浮關脈必沉為邪熱結里裡實所以可下今者其脈浮大浮為在表大為虛是在表之邪猶未盡胸中之結猶未實下之是重虛其里表邪盡入所以主死醫人不可不以此為戒也按此條證仲景既云不可下則是當用何藥補亡論常器之云可與增損理中丸如未效用黃連巴豆搗如泥封臍上灼艾灸熱漸效愚以上證雖未全結終是裡實之證理中丸太補不可用也又灼艾法亦未妥結胸證悉具煩躁者亦死成注云結胸證悉具邪結已深也煩躁者正氣散亂也邪氣勝正氣虛即不下亦主死也或云煩躁者里證急也下之庶有可生之理尚論篇云煩躁為津液已竭胃氣垂絶之徵醫人於此寧莫投藥可免病家之咎太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也太陽中風之脈本浮其兼動數者動為痛數為熱為虛也風熱外盛則頭痛發熱衛氣虛膚腠空疏故睡則盜汗微出也脈動數而汗出似乎表解邪欲傳裡故以惡寒為反也醫人不知表未解反誤下之動數之脈變遲脈遲則表邪乘虛入里已結於胸膈間矣膈內拒痛者膈中之氣與邪氣相拒而作痛也胃中空虛者胃家之真氣因誤下而致虛也客氣者邪氣也短氣者真氣短促也陽氣者即客氣之別名也胃家真氣既虛而短則客邪之氣方盛內動於膈因發躁煩而熱必中懊憹不寧此為陽邪內陷熱蒸成濕濕熱相結而堅實以故心下硬成結胸也治法宜大陷胸湯以下結熱夫曰膈內曰心中曰心下皆胸之分也名曰結胸其邪實陷於胃胃中真氣虛斯陽邪從而陷入於胸作結硬之形也其有邪雖入胃而胸不至結者胃中邪熱不能外泄此為熱不得越但上升於頭而汗出余處無汗劑頸而還劑者分也言至頸則汗分而還於身則無汗也小便不利者胃中邪熱氣蒸濕積而成水思欲下泄而不得也胃屬土其色黃濕熱不得下泄鬱於內必見於外故至發黃也補亡論常器之云發黃者與茵陳蒿湯煎茵陳濃汁調五苓散亦可大陷胸湯方大黃六兩去皮芒硝一升甘遂一錢上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服成氏明理論云結胸由邪在胸中處身之高分邪結於是宜若可汗然所謂結者若繫結之結不能分解者也諸陽受氣於胸中邪氣與陽氣相結不能分解氣不通壅於心下為硬為痛是邪正固結於胸中非虛煩膈實之所同是須攻下之物可理低者舉之高者陷之以平為止結胸為高邪陷下以平之故治結胸曰陷胸湯甘遂味苦寒苦性泄寒勝熱雖曰泄熱而甘遂又若夫間之遂直達之氣陷胸破結非直達者不能透是以甘遂為君芒硝味鹹寒內經曰鹹味下泄為陰又曰咸以軟之氣堅者以咸軟之熱勝者以寒消之是以芒硝為臣大黃味苦寒將軍也蕩滌邪寇除去不平將軍之功也陷胸滌熱是以大黃為使利藥之中此為駛劑傷寒錯惡結胸為甚非此湯則不能通利大而數少取其迅疾分解結邪此奇方之制也琥按上成氏云甘遂若夫間之遂考周禮凡治野夫間有遂注云自一夫至千夫之田為遂溝洫澮所以通水於川遂者通水之道也廣深各三尺曰遂則是甘遂乃通水之要藥陷胸湯中以之為君乃知結胸證非但實熱此係水邪結於心下故也或問水邪從何而來余答云足太陽本寒水之經其邪正盛於表醫人反誤下之邪因內陷斯時水氣即隨經而入況邪熱鬱於胸中其上蒸之氣亦可成水所以陷胸湯丸用甘遂葶藶非究心醫道者不能識其奧義也傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之此言結胸證亦有不因誤下而成者如傷寒六七日邪熱傳裡填實胸中脈沉而緊緊固為傷寒之脈然其脈不浮則知緊非外來之寒矣夫沉為在裡緊為痛為實今心下痛按之其硬如石故脈沉而緊也成注云與大陷胸湯以下結熱或問脈沉緊焉知非寒實結胸余答云胸中者陽氣之所聚也邪熱當胸而結直至心下石硬且痛則脈道不但沉緊甚至有伏而不見者醫人烏可以脈沉緊為非熱也大抵辨結胸之法但當憑證最為有準附後例傷寒十餘日熱結在裡復往來寒熱者云云至此為水結在胸脅也但頭微汗出者大陷胸湯主之此條系少陽證後雖用大陷胸湯要其人水結胸脅胸脅者少陽部分也正文與注俱見後第七卷少陽篇中太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之日晡所句內臺方議作日晡所發義甚通重發汗謂大發汗也晡日加申時也太陽病重發汗而復下之內外津液俱亡邪熱里結以故不大便五六日舌上燥渴日晡潮熱少腹硬滿全是陽明府實之證止日晡時所有潮熱甚小且從心胸之間下至少腹手不可近而痛乃知其病為太陽結胸兼陽明裡實證成注所云一腹之中上下邪氣皆盛是也故與大陷胸湯以下其邪小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之此言結胸證有大小之分也小結胸結在心下不比大結胸之高在心間且下至少腹也按之則痛比大結胸之不按亦痛較輕也大結胸雖有浮脈必兼沉緊此則脈浮而但滑成注云知熱未深結也故與小陷胸湯以滌胸中結熱小陷胸湯方黃連一兩半夏半升洗栝蔞實大者一個上三味以水六升先煮栝蔞取三升云滓內諸藥煮取二升去滓分溫三服琥按成注云苦以泄之辛以散之黃連栝蔞實之苦寒以泄熱半夏之辛以散結三物性味雖平尚論篇稱其泄熱散結亦能突圍而入所以名為小陷胸湯也大抵此湯病人痰熱內結者正宜用之太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也協協同合也太陽病二三日此為表邪正盛之時不能臥但欲起者此邪傳於胸心下熱結氣上壅故不臥欲起也心下熱結似乎可下然脈微弱者此其人本有寒分寒分者痰飲也以痰飲本寒故曰寒分有痰飲則心下雖結熱未全實如反下之則邪熱乘虛必盡入里而利若利止隨作結胸如下之而利不止者醫工不識猶以為邪結未盡至四日復下之則邪熱不能上結下陷於腸胃之間因協熱而作利也愚按若利止作結胸仲景自有陷胸湯主之其脈微弱者本有寒分補亡論常器之云可增損理中丸以其人平素有寒痰故也殊不知有寒痰而復結邪熱理中丸猶為妥復下之作協熱利常氏又云宜白頭翁湯太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血病在太陽總無可下之理如誤下之則脈證之變有不可以一經拘者如下後脈促為陽邪上盛不作結胸其邪反得超越而解散矣脈浮為陽邪壅實必上結於胸可知脈緊為邪傳少陰成注云少陰病脈緊邪客於少陰之絡令人嗌痛不可內食故云必咽痛也脈弦者邪傳少陽成注云尺寸俱弦者少陽受病少陽之脈循脅故云必兩脅拘急也脈細數者邪氣因循而欲傳故太陽之頭痛猶未止也脈沉緊者邪已結實而傳裡陽明氣逆上衝故必欲嘔也脈沉滑者為陽邪陷於陰分故協熱利脈浮滑者為熱氣克爍其血故必下血可見太陽經為四通八達之衢一誤下之其變亂有如此者醫人不可不知戒也王日休云太陽下之以後八證其脈促不結胸者為欲解不必用藥脈浮者必結胸桂枝去芍藥湯愚以此湯仲景治太陽病下之後脈促胸滿者今者脈浮必帶促未成結胸故宜用之脈緊者必咽痛甘草湯愚以與桔梗湯更妙脈弦者兩脅拘急小柴胡湯加桂枝脈細數者頭痛未止當歸四逆湯愚以此湯太辛熱非脈數頭痛所宜補亡論常器之云可蔥須湯然此亦是陽明經頭痛之藥脈沉緊者必欲嘔甘草乾薑湯愚以嘔為太陽經邪熱入胃其脈沉緊與結胸證熱實之脈同也上湯恐不宜用常器之云可七物黃連湯脈沉滑者協熱利白頭翁湯脈浮滑者必下血芍藥甘草湯加秦皮常氏又云可與類要柏皮湯愚以臨證用藥亦當活變古方不宜執也病在陽應以汗解之反以冷水潠之若灌之其熱被劫內臺方作卻卻止也不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽者為邪熱在表也法當汗解之醫反以冷水潠之潠者口含水噴也若灌之灌澆也灌則更甚於潠矣表熱被水止劫則不得去不得去者陽邪無出路也邪無從出其煩熱必更甚於未用水之前矣彌更益者猶言甚之極也水寒之氣客於皮膚則汗孔閉故肉上起粒如粟也意欲飲水不渴者邪熱雖甚反為水寒所制也意欲飲水者先與文蛤散以解其彌甚之煩熱若不瘥者水寒與熱相搏下傳太陽之府與五苓散內以消之外以散之乃表裡兩解之法也其不下傳於府者必上結於胸為寒實結胸以水體本寒故曰寒也究竟水寒之氣與邪熱相搏而結實於胸非真寒結胸中也無熱證者成注云在外無熱言其熱悉收斂於裡也故與黃連半夏栝蔞實三物小陷胸湯以泄熱散結白散亦可服者此言熱結甚用小陷胸湯如熱不甚而結飲多即可用白散之辛溫以開其結下其水也文蛤散方文蛤五兩上一味為散以沸湯和一錢匕服湯用五合琥按成注云文蛤散以散表中寒水之氣夫文蛤鹹寒豈能散表寒又注云咸走腎可以勝水斯言實為定論夫腎與膀胱為表裡其能走腎者即能入膀胱以勝水熱也大抵文蛤散能解煩導水勝熱盡其用矣白散方桔梗三分巴豆一分去皮心熬黑研如脂貝母三分上件二味為末內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水潠之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法琥按成注云辛散而苦泄桔梗貝母之苦辛用以下氣巴豆之辛用以散實夫巴豆乃熱毒之藥腸胃中有水寒結積宜用此以蕩滌之若上方後云身熱不解引衣自覆及以水潠洗益令熱卻當汗不汗而煩者尚宜用五苓散以兩解之也汗出已者非白散能出汗乃承上文而言不瘥者用五苓散得汗後胸中水結不散腹中痛故與白散復加芍藥也琥又按上方後云不利進熱粥利不止進冷粥者以熱能助藥力冷能解藥力也但今人病結胸挾食者多不敢進粥每以沸湯並涼飲代之附後例太陽與少陽並病頭項強痛或眩冒云云至當刺大椎第一間肺俞肝俞慎不可發汗云云至譫語不止當刺期門婦人中風發熱惡寒經水適來云云至此為熱入血室也當刺期門隨其實而瀉之上二條證正文與注俱見後第十四卷刺熱論中附後例婦人中風七八日續得寒熱發作有時云云至故使如瘧狀發作有時小柴胡湯主之婦人傷寒發熱經水適來云云至無犯胃氣及上二焦必自愈傷寒六七日發熱微惡寒云云至外證未去者柴胡加桂枝湯主之傷寒五六日已發汗而復下之胸脅滿云云至此為未解也柴胡桂枝幹薑湯主之柴胡桂枝幹薑湯方傷寒五六日頭汗出微惡寒云云至可與小柴胡湯設不了了者得屎而解上五條證並湯方俱見後第七卷少陽篇中傷寒五六日嘔而發熱者柴胡湯證具云云至此雖已下之不為逆云云至若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯此條證乃少陽病復兼太陰所以柴胡證具而以他藥下之不為逆其成結胸者乃少陽病誤下之所致與太陽病實無與也其成痞者以病兼太陰早下之故成痞也正文與注並半夏瀉心湯方俱見後第七卷少陽篇中太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩並病義見前第四卷太陽中篇太陽病在經者不可下少陽病下之亦所當禁故以下之為反也下之則陽邪乘虛上結於胸則心下硬下入於腸則利不止中傷其胃則水漿不入其人心煩者正氣已虛邪熱躁極也條辨云心下煩疑有脫簡大抵其候為不治之證仲景云結胸證悉具煩躁者亦死況兼下利水漿不下者邪其為不治之證宜矣愚按此條可見少陽病亦有結胸證也脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳濡上演切音輕耎同柔與脈浮而緊若似乎太陽傷寒也復反也復下之緊反入里是脈變為沉緊也脈變沉緊何以不成結胸而作痞蓋此條緊脈系少陰病以其病自太陽經傳來故略帶浮也仲景法少陰病未入於府者不可下若反下之則少陰之邪乘虛入里因而作痞按之自濡者言不比結胸之硬但寒氣鬱而成熱遂痞塞於心下耳此可見少陰病亦有誤下而成痞證者或問緊脈在少陰未必是傳經之邪余答云少陰受太陽寒邪之氣未入於府者脈陰陽俱緊既入於府而後脈沉數也愚按此條病應入少陰篇因其浮緊之脈與太陽相似緣從舊例以發明之又按此條論仲景無治法補亡論常器之云可小陷胸湯生薑瀉心湯郭白雲云宜半夏瀉心湯枳實理中丸愚以痞證按之自濡陷胸湯不宜用也若理中丸得毋以緊脈屬少陰疑其為寒證邪恐用之則太熱而補也惟瀉心湯此本仲景治痞之藥然亦宜加減用之太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之頭痛二字當在發作有時之上太陽中風者表未解也下利嘔逆此腸胃中已責其有水濕之邪必待其表解乃可攻之若其人漐漐汗出漐漐者汗出之貌也頭痛發作有時言有時頭痛有時又止明系濕邪挾熱上升於頭而作痛也心下痞塞堅硬又且脹滿牽引脅下亦痛則是濕熱成飲已填塞於胸脅間矣乾嘔短氣者里未和也汗出不惡寒者表已解也故與十棗湯以下熱逐飲愚按此條直是結胸證因心下痞硬用一痞字實非痞證比也或問直是結胸證何以不用大陷胸湯余答云結胸證熱邪實而水氣少故用陷胸湯以平之此證熱不甚而水氣實故用下湯以攻之也又按尚論篇云結胸證邪結於胸其位高此證邪在心下及脅其位卑斯言亦非確論不觀最前條結胸證云陽氣內陷心下因硬又云脈沉而緊心下痛是兩言謂非與此條證心下痞硬實相合者邪但此條證不因誤下陽邪未曾陷入故無躁煩等候且其人本有水氣充實乎里故必待表解而後以十棗湯攻之可無疑也十棗湯方芫花熬甘遂大戟大棗十枚擘以上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養成注云辛以散之芫花之辛以散飲苦以泄之甘遂大戟之苦以泄水水者腎所主也甘者脾之味也大棗之甘益土而勝水琥按李東壁云十棗湯驅逐里邪使水氣自大小便而泄乃內經所謂潔淨府去陳莝法也芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之取效因捷不可過劑泄人真元也陳無擇三因方以十棗湯藥為末用棗肉和丸以治水氣喘急浮腫之證蓋善變通者也語云傷寒方可用以治雜證者其以湯改丸之義歟琥又按補亡論郭白雲云十棗湯太峻後人未易用當以檳榔湯代之蓋見證未的此等湯世醫寧莫輕投郭云以檳榔湯代之極是太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈太陽病發汗不宜發熱惡寒矣其仍發熱惡寒者此必是中風證誤用麻黃湯徒傷太陽之經而虛其表因復下之更傷太陰之藏而虛其里以故心下作痞虛其里者陰氣竭也虛其表者陽氣竭也是為表裡俱虛陰陽並竭無陽則陰獨者謂痞證為天氣不降地氣不升氣屬陽二氣不能交通故曰無陽中州之土閉塞猶之孟冬之月則純陰用事故曰陰獨也醫人復加燒針以強助其陽病者虛不勝火火氣內攻故致胸煩也面色青黃者脾受克賊之色也人身肌膚脾藏主之肌膚瞤動而不寧則太陰之真氣欲脫故難治也今則面色微黃是無克賊之色手足溫者脾主四肢溫則藏真之氣可回故曰易愈也按此條論仲景無方補亡論郭白雲云此為難治之證須臨時更詳輕重痞甚先瀉心湯發熱惡寒甚則先小柴胡火逆甚則先救逆湯從所重治之愚以小柴胡不宜用發熱惡寒甚乃太陽表證在也仲景法宜更用桂枝湯以解肌又治痞法即詳下二條證中心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之此申言痞病非陰寒並言脈以出其治也脈關上浮者諸陽之脈皆浮也以手按其痞處雖濡純是邪熱壅聚故用大黃黃連瀉心湯以導其熱而下其邪也按成注云虛熱者誤夫中氣雖虛邪熱則聚故仲景以實熱治之若系虛熱則不用大黃黃連矣大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服成注引內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導瀉心下之虛熱但以麻沸湯漬服者取其氣薄而泄虛熱琥按麻沸湯者熟湯也湯將熟時其面沸泡如麻以故云麻痞病者邪熱聚於心下不比結胸之大實大堅故用沸湯漬絞大黃黃連之汁溫服取其氣味皆薄則性緩戀膈能泄心下痞熱之氣此為邪熱稍輕之證大抵非虛熱也附例傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯傷寒大下後復發汗是為汗下顛倒下之徒傷太陰之裡邪熱陷於心下故成痞汗之徒虛太陽之經風寒著於腠理故惡寒是為表裡之邪俱不解也但其時惡寒甚不可攻痞當先與桂枝湯以解表邪表解乃與大黃黃連瀉心湯以攻裡熱可見表裡之治有緩急先後之分不可紊也心下痞而復惡寒汗出者附子瀉心湯主之心下痞者邪熱壅聚也惡寒汗出者表未解也仲景法宜用桂枝湯以解散之今者心下痞則陽盛於裡桂枝不宜用也因以三黃湯瀉其心下之痞加附子以散在表之邪以附子同一辛熱即經云發表不遠熱之義也且也心下熱痞純用苦寒藥以瀉之其氣反凝聚而不散加附子其辛熱之性兼能行三黃之滯令痞氣豁然此湯非神於醫者不敢用也或問前條心下痞惡寒當先解表宜桂枝湯茲則同是心下痞而復惡寒何以不先用桂枝湯余答云前條以惡寒甚故雖心下痞不得驟服瀉心湯因先用桂枝湯以解表此條以心下痞甚故雖惡寒不得仍服桂枝湯只得用三黃瀉心湯加附子以兩解之也附子瀉心湯方此方自原論中第十卷採附於此大黃二兩黃連黃芩各一兩附子一枚泡去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服內臺方議云心下痞者虛熱內伏也又加惡寒汗出者本為表未解當用桂枝湯若脈微弱者加附子今此有痞證故用大黃黃連瀉心湯中加附子去痞以固陽也琥按上議實本成注之意成注以惡寒汗出為陽氣外虛故加附子以固陽要之內伏之熱乃實熱非虛熱也在表之寒乃風寒非真寒也上湯中加附子者乃熱因熱用從治之法也琥又按內臺方附子瀉心湯中無黃芩反云今世本中有黃芩者乃後人不詳其理而誤添之殊不知附子瀉心湯本系攻熱痞之劑只因惡寒汗出不得已而加附子後人恐其辛熱僭上妙在復添黃芩使上下之熱得以通徹則是附子得黃芩之佐實相制而和表助里以成莫大之功雖起仲景於今日亦應首肯其加藥之精而議方者反以為非一何不思之甚歟重出例本以下之故心下痞云云至小便不利者五苓散主之正文與注見前第四卷五苓散方下傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之寒傷於表表病以汗出而得解者胃中以汗出而欠和夫胃為津液之主汗後則津液亡故也胃不和則脾氣困而不運以故心下痞硬痞硬者濕與熱結也噫飽食息也食臭噯餿酸也傷寒初解脾胃尚弱飲食不化以故干噎食臭也脅下有水氣者中州土虛不能滲濕散熱以故成水而旁滲於脅下也腹中雷鳴者脾為陰胃為陽陰陽不和因搏擊有聲也夫陰陽不和則清濁亦不分濕熱下注而為利也故與瀉心湯以開痞清濕熱兼益脾胃之氣可見痞證不皆由誤下而成有汗後津液干脾胃氣虛陰陽不能升降而成痞者醫人不可以不察也生薑瀉心湯方此方自原論中第十卷採附於此生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服琥按上方即半夏瀉心湯中減乾薑二兩加生薑四兩是也成無己明理論於此方無注已於半夏瀉心湯方內言之余因採其論附此以發明上方之義成氏明理論云陷胸者攻結也瀉心者攻痞也氣結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通痞而不分為痞瀉心湯為分解之劑所以謂之瀉心者謂瀉心下之邪也痞與結胸有高下焉結胸者邪結在胸中故治結胸曰陷胸湯痞者邪留在心下故治痞曰瀉心湯黃連黃芩味苦寒內經曰苦先入心以苦泄之瀉心者必以苦為主是以黃連為君黃芩為臣以降陽而升陰也半夏味辛溫乾薑味辛熱內經曰辛走氣辛以散之散痞者必以辛為助故以半夏乾薑為佐以分陰而行陽也甘草味甘平人參大棗味甘溫陰陽不交曰痞上下不通為滿欲通上下交陰陽必和其中所謂中者脾胃是也脾不足者以甘補之故用人參甘草大棗為使以補脾而和中中氣得和上下得通陰陽得位水升火降則痞消熱已而大汗解矣琥又按仲景用半夏瀉心湯治傷寒五六日嘔而發熱乃少陽經有半表半裡之邪誤下成痞故用此湯之苦以泄之辛以散之甘以和之如上成注云痞消熱已而汗解者正此謂也若生薑瀉心湯乃傷寒汗解之後胃中不和心下痞之藥其品味雖相同而治證則大異成氏不另作注誠缺文也或問半夏瀉心湯證為少陽經半表半裡之邪未解何以不用生薑而反用乾薑生薑瀉心湯證為太陽經在表之邪已解何以既留乾薑而反加生薑余答云用乾薑者取其辛熱之性能助芩連挾半夏從中焦以開痞熱使痞熱消則表自和解表之用即在其中也加生薑者取其辛溫之性亦能助芩連挾半夏上以和胃中以開痞橫以散脅下水氣下以平濕熱之利更能同大棗合參草內以補脾且為胃行其津液也方氏條辨注云生薑大棗益胃而健脾黃芩黃連清上而堅下半夏乾薑蠲飲以散痞人參甘草益氣而和中此即上成注云中氣得和上下得通水升火降則痞消熱已而噎臭下利等證自平斯言誠可以補成注之缺略云傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒中風者是互言以見二證之皆不可下也成注云邪氣在表醫反下之虛其腸胃則邪氣內陷其人下利日十數行穀不化腹中雷鳴腸胃裡虛可知心下痞硬而滿乾嘔心煩不安邪熱之氣內陷可知此條痞證硬滿乃下後中氣受傷而作虛硬虛滿醫人不識猶以為熱邪未盡復誤下之氣愈傷則痞益甚此非比結胸之實熱但以胃中虛內陷之客氣上逆客邪之氣聚亦能使心下硬也由是見腹中雷鳴總是虛氣非若前條之有水氣也嘔煩不安雖有客熱亦是虛煩非若前條之干噎食臭也故與瀉心湯以泄痞熱加甘草以去虛邪或問心下痞且硬且滿何以知是胃中虛客邪氣逆余答云其人下利日數十行則胃中之物已盡何由而不為虛況醫復下之而痞益甚愈可知其非實證矣若猶是實證則仲景當日必曰硬而痛不曰硬而滿矣止此滿字而虛實之證瞭然甘草瀉心湯方此方自原論中第十卷採附於此甘草四兩黃芩三兩乾薑三兩半夏半升洗大棗十二枚擘黃連一兩上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服琥按上湯即生薑瀉心湯內去生薑人參倍甘草乾薑也傷寒中風至一再下之胃中既虛脾藏亦受傷矣若多用生薑散之徒耗其中州之元氣驟以人參補之反助其上逆之客邪故用炙甘草大棗之甘溫以和中補虛緩逆氣黃芩黃連之苦寒以清中泄熱止嘔煩乾薑半夏之辛溫以守中散痞滿要之痞滿散而硬亦消矣又合而言之凡辛甘溫之藥皆助陽也陽氣復則能下交於陰苦寒之藥皆助陰也陰氣復則能上交於陽陰陽相交升降如常痞乃成泰復何病之有哉內臺方議問曰瀉心湯中一加生薑一加甘草各立其名何邪答曰發汗後胃虛外傷陽氣致成痞者故加生薑以益陽太下後胃虛內損陰氣致成痞者故加甘草以益陰而緩其中也愚按上論實本成注之義琥又按仲景瀉心湯有五方中皆用黃連成注云苦以瀉心者非也乃瀉心下之痞也海藏老人云瀉心者其實瀉脾實則瀉其子也所以潔古丹溪皆云黃連去中焦濕熱夫中焦者即為中州足太陰經脾藏主之仲景云心下痞謂非中焦病邪所以瀉心湯內用黃連有同大黃共劑者瀉實熱之痞成注云瀉虛熱者誤也有同大黃黃芩復加附子共劑者瀉寒熱交結之痞內臺方議云瀉虛寒者誤也有同黃芩半夏乾生薑大棗人參甘草共劑者瀉濕熱不調虛實相半之痞也可見傷寒痞證與結胸相類而稍輕皆是實熱無所謂虛寒也傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便湯藥者下藥也傷寒誤服下藥下利不止心下痞硬此與上條之證略同服瀉心湯已則心下之痞硬既除其於中焦脾胃之氣已豁然矣醫復以他藥下之其藥直走大腸大腸滑而氣脫利復不止醫以理中丸與之者彼以下藥皆苦寒大傷脾胃之劑故用甘溫以補之也利雖益甚治不為逆蓋理中者但理中焦脾胃虛寒此利在下焦乃大腸滑脫聖濟經云滑則氣脫欲其收也赤石脂禹餘糧湯為澀劑正所以收之若服澀劑復利不止難經云下焦者當膀胱上口主分別清濁下利者水穀不分也當利小便以分清之則利無餘治而愈可必矣按此條論云利其小便仲景無方補亡論常器之云可五苓散赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎以上二味以水六升煮取二升去滓三服成注引本草云澀可去脫石脂之澀以收斂之重可去怯餘糧之重以鎮固之或問重可以去怯之義余答云怯為大腸氣餒餒則不固故利不止餘糧石脂皆重劑一則重而兼能收澀一則重而專於鎮固收澀鎮固此亦治利之一法也傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿成注云傷寒吐下後發汗則表裡之氣俱虛以故內生煩熱脈甚微者正氣內虛也至八九日正氣當復邪氣當罷今者心下痞硬是太陽之邪乘虛而入於中焦也脅下痛者邪侵少陽之裡也氣上衝咽喉目眩而頭冒皆正氣內虛邪氣上逆所致經脈動惕者此因發汗之故表氣虛不能充養於身故也若此者久而成痿痿者四肢緩弱而不舉也愚按此條論仲景云痿者當是肉痿之病推其病因由吐下而心下痞硬既傷其中州之陰復發其汗經脈動惕更泄其肌表之陽脾胃者中州土也其主為肌肉其用在四肢今者陰陽衰虛土失其資生之氣脾胃邪熱壅結其始也邪熱之氣上衝於頭則眩冒其繼也邪熱之氣下還於經則痿弱也尚論篇以痿為兩足先廢此即邪熱之氣下還於足太陽經之義又按此條論仲景無治法補亡論常器之云可茯苓甘草白朮生薑湯郭白雲云當作茯苓桂枝白朮甘草湯成痿者振痿湯傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之傷寒發汗吐下大邪解後而心下痞硬此與前數條瀉心湯之痞證不同成注云胃氣弱而未和虛氣上逆故心下痞硬噫氣不除然此噫氣比前生薑瀉心湯之乾噫不同是雖噫而不至食臭故知其為中氣虛也與旋覆代赭石湯以補虛散痞下逆氣旋覆代赭石湯方旋覆花三兩人參二兩生薑五兩切代赭石一兩大棗十二枚擘甘草三兩炙半夏半升洗上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服成注云硬則氣堅鹹味可以軟之旋覆之咸以軟痞硬怯則氣浮重劑可以鎮之代赭之重以鎮虛逆辛者散也生薑半夏之辛以散虛痞甘者緩也人參甘草大棗之甘以補胃弱琥按上方仲景未嘗云治水氣成注但云胃弱虛氣上逆獨方氏條辨注云伏飲為逆何也推方氏之意以本草經云旋覆花能治結氣除水故以此條之噫氣不除為伏飲為逆耳殊不知仲景此方專以人參甘草薑棗半夏等為補虛散逆氣之劑其用旋覆者雖云軟堅實以下氣也用赭石者以鎮逆也或問前生薑瀉心湯證及甘草瀉心湯證皆心下痞硬二湯中不聞用軟堅之藥今者傷寒解後心下痞硬不過是虛氣作痞而硬反用旋覆花之咸以軟之何也余答云成注云咸以軟堅非正解也夫旋覆花味辛氣溫乃散氣開痞之藥痞氣開散則心下之硬自消前二條證瀉心湯內有芩連以瀉心下之痞硬此湯中藥味與瀉心湯藥味相同因無芩連故以旋覆為君也且也傷寒解後心下已無邪熱所以不用芩連又噫氣不除純系虛氣上逆尚論篇云胃氣全不下行有升無降故用代赭領人參下行以鎮安其逆氣因名為旋覆代赭石湯也重出例下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯正文與注並湯見前第四卷太陽篇中太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之太陽中風外證未除而數下之數下者下非一次也數下則虛其里裡虛則邪熱乘虛而入遂協熱利協合也猶言同也裡虛協合外熱故作利也利下不止知其利非閉塞幾成洞泄之候矣心下雖痞硬此係虛痞虛硬可知不與實熱之證同也表不解是在外之風邪不解里不解是在內之虛寒不解故成注云與桂枝人參湯以和里解表愚按此條論協熱利心下痞硬雖云數下里虛然邪熱業已乘虛而入則是仲景云里不解恐系邪熱未解乃實熱之證非虛寒也桂枝人參湯大都是叔和撰次時傳寫之誤愚於上注雖隨文勉強作解誠恐有誤後人因以其湯表而出之桂枝人參湯方桂枝四兩去皮甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升肉桂更煮取三升去滓溫服一升日再服夜一服成注云表未解者辛以散之里不足者甘以緩之此以裡氣大虛表裡不解故加桂枝甘草於理中湯中也琥按上條證用上湯病者十不得一倘虛證少有未確服之必至殺人蓋太陽病外證未除而用桂枝此必是風邪在表下之早多成結胸只因數下之故不能成結胸熱移於大腸之間邪結於胸膈以下表不解是外有風邪合用桂枝里不解恐內有實熱不當投理中也況仲景法心下痞硬者皆用芩連大黃協熱利復有白頭翁湯學者宜臨證詳審虛實寒熱而相參用之可也重出例傷寒大下後復發汗心下痞云云至攻痞宜大黃黃連瀉心湯正文與注見前大黃黃連瀉心湯方下附後例傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之此條證正文與注並湯見後第七卷少陽篇中病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散此條證乃仲景議吐法也成注云病如桂枝證為發熱汗出惡風此與太陽病中風無異也若頭不痛項不強則邪又不在太陽經中矣寸脈微浮者脈經云寸主射上焦為上部主候從胸以上至頭今者寸脈微浮則風邪當見於上而頭又不痛知其邪在胸中矣此所以胸中痞硬不由誤下而成但因邪蘊於胸其氣必上衝咽喉喘促而不能自布其鼻息此為胸有寒也胸有寒者乃風寒之邪蘊蓄於膈間也仲景法當吐之宜瓜蒂散以吐胸中之邪後條辨云痞硬一證因吐下者為虛不因吐下者為實實邪填塞心胸中下二焦為之阻絶自不得不從上焦為出路所謂在上者因而越之是也愚按傷寒一病吐法不可不講華元化云傷寒至四日在胸宜吐之巢元方云傷寒病三日以上氣浮在上部胸心填塞滿悶當吐之則愈仲景以此條論特出之太陽下篇者以吐不宜遲與太陽汗證相等當於兩三日間審其證而用其法也條辨以胸有寒為痰亦通蓋胸有風寒則其人平素飲食之積必鬱而成熱變而為痰所以瓜蒂散亦湧痰熱之藥也尚論篇以此條證竟列入痰病中誤矣瓜蒂散方瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱一作熟湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散成氏明理論云華陀曰四日在胸則可吐之此迎而奪之之法也千金方曰氣浮上部填塞心胸胸中滿者吐之則愈此隨證治之之法也大約傷寒四五日邪氣客於胸中之時也加之胸中煩滿氣上衝咽喉不得息者則為吐證具乃可投諸吐藥而萬全之功有之矣瓜蒂味苦寒內經曰濕氣在上以苦吐之寒濕之氣留於胸中以苦為主是以瓜蒂為君赤小豆味酸溫內經曰酸苦湧泄為陰分湧膈實必以酸為佐是以赤小豆為臣香豉味苦寒苦以湧泄寒以勝熱去上膈之熱必以苦寒為輔是以香豉為使酸苦相合則胸中痰熱湧吐而出矣其於亡血虛家所以不可與者以瓜蒂散為駛劑重亡津液之藥亡血虛家補養則可更亡津液必不可全用藥君子必偕究焉琥按上方後云煮作稀糜糜粥也又爛也言以湯七合煮香豉如糜粥之爛也方氏條辨以稀糜為另是稀粥乃承載瓜蒂赤小豆香豉三物者之舟航大謬之極夫胸中痞硬煩滿邪實反煮糜粥以調藥吾恐必無是理方氏又云用稀糜為吐虛風虛寒之對藥殊不知仲景法虛家不可與瓜蒂散於上方後言之已明未嘗言虛家用瓜蒂散當另煮稀糜粥以調藥也或問云虛家倘犯上條證不可與瓜蒂散當用何藥余答云仲景方若梔子豉湯可以待之重出例病人脅下素有痞云云至入陰筋者此名藏結死注見前藏結論下附後例傷寒病若吐若下後七八日不解熱結在裡云云至欲飲水數升者白虎加人參湯主之傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之上三條證正文與注並湯俱見後第六卷陽明篇中太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之上條證正文與注見後第十四卷刺熱論中太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之此條證邪在半表半裡雖系太陽病實與表無涉也黃芩湯亦和解半表半裡之藥正文與注並黃芩湯方俱見後第七卷少陽篇中傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之病屬傷寒表不熱而胸中有熱此係寒邪之氣已傳入於裡也胸為陽為上焦故易作鬱熱胃附乎脾脾為陰為中焦以其人胃氣素虛故其中雖有寒邪之氣不能作鬱熱也腹中痛者胃有寒也欲嘔吐者胸有熱也成注云此傷寒邪氣傳裡而為下寒上熱也與黃連湯以升降陰陽之氣又按成注云陰陽不交陰不得升而獨治於下為下寒陽不得降而獨治於上為胸中熱此陰陽者為人身真陰真陽之氣陰陽之氣不能升降而獨治於上下斯其中方挾外來寒熱之邪矣腹中痛欲嘔吐者此正陰陽不和寒熱相拒之證驗也條辨尚論篇皆以風寒二邪分陰陽寒熱殊不知風之初來未必非寒寒之既入亦能成熱不可拘也黃連湯方黃連甘草炙乾薑桂枝去皮各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服成注云上熱者泄之以苦黃連之苦以降陽下寒者散之以辛桂薑半夏之辛以升陰脾欲緩急食甘以緩之人參甘草大棗之甘以益胃按上云益胃則知其人胃氣素虛故其中雖有寒邪之氣不能作鬱熱也琥按上方乃半夏瀉心湯內去黃芩加桂枝也內臺方議云加桂枝者升降陰陽之氣也為下寒腹中痛故去黃芩推許氏議方之意以湯中既有黃連以清上熱故不須用黃芩蓋黃芩之苦寒能走大腸為有礙於寒腹痛也加桂枝而云升降陰陽之氣不足以盡其用夫病本太陽傷寒邪傳入里胃中有寒邪之氣故於麻黃湯中止取桂枝甘草二味辛甘相合以散其寒也邪之所湊其氣必虛故用人參大棗以益胃用半夏者以其能挾黃連清胸中熱止嘔吐也用乾薑者以其能挾桂枝散胃中寒除腹中痛也且也藥分寒熱甘草復有調和相協之義要之此湯病人涉虛者宜用之否則勿輕投也傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之此條云傷寒乃是中寒病寒氣與風濕相搏至八九日經中不作鬱熱故不嘔不渴知其非熱病也正文與注見中寒論中若其人大便硬小便自利者去桂枝加白朮湯主之此即上條病復分其候而出其治也故即以桂枝附子湯加減主之桂枝附子湯方正文與注俱見中寒論中風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之此條病名為風濕實系真寒之證也正文與注並甘草附子湯方俱見中寒論中附後例傷寒脈浮滑此表有熱里有寒白虎湯主之此條系陽明病正文與注並白虎湯方俱見後第六卷陽明篇中傷寒脈結代心動悸炙甘草湯主之結代脈名義詳見下文大抵傷寒之病見此等脈成注所云氣血虛衰不能相續也悸心動也心中動悸則知營血內虛真氣已餒而藏神不自寧也與炙甘草湯以補血氣而散微邪愚按此條傷寒必系發汗過劑汗多亡陽陽亡則氣餒又汗為血液汗多則血虛血虛氣餒以故心動悸而脈結代也夫結者邪氣之結代者正氣之虛所以炙甘草湯成注雖云益虛而散邪之義即在其中矣炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩去皮人參二兩生地黃一斤阿膠二兩麥門冬半斤去心麻子仁半升大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服一名復脈湯成注云補可以去弱人參甘草大棗之甘以補不足之氣桂枝生薑之辛以益正氣聖濟經曰津液耗散為枯五臟痿弱營衛涸流濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心也琥按上注云桂枝生薑之辛以益正氣夫薑桂之辛力能散邪成氏反云益氣誤矣又其引聖濟經云津液耗散為枯夫津液者氣血之所凝聚也今者傷寒至脈結代心動悸則血耗氣散故云津液枯炙甘草湯本甘溫濕潤之劑用之以滋補枯竭則氣血充溢而結代之脈自復故一名復脈湯也方中入清酒者內臺方云以之為引為能通血助氣以復脈故必欲用之以煮藥也脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治此申明上文結代脈之狀也脈以指按之來來者滑伯仁云自骨肉之分而出於皮膚之際氣之升者是也脈來緩時一止即復來者名曰結成注云此為邪氣留結也脈來動而中止更來時脈小數中有一二至反動者此即其既止而還來之脈名曰結陰者是也是為邪氣留結更甚故不比前結脈之緩其脈來時既動且數乃真氣卒不相續而脈見止結也又脈來動而中止不能自還不能自還者言既止之後不能即至故云若不能還因而復動者言既還之時脈乃復動是名曰代陰之脈滑氏云尋之良久乃復強起此善於形容代脈之狀者也成注以代脈為真氣衰極夫真氣衰極亦因邪氣久留所致叔和脈經云脈結者生代者死故云難治或問云仲景既云難治何以復立炙甘草湯余答云代之與結不甚懸絶夫代者結之甚結者代之漸也仲景言傷寒得此等脈為難治非云不治因立炙甘草湯以救之叔和言結脈生代脈死者以此等止歇之脈漸減則邪氣退故生漸增則真氣亡故死又仲景是專指傷寒之脈叔和是兼指雜證之脈不可一例而論琥按以上太陽病脈證並治法仲景分上中下三篇王叔和撰次傷寒論以上篇附傷寒例後為第二卷中篇為第三卷下篇為第四卷其第一卷乃平脈辨脈法也愚今以傷寒論特取六經篇而辨注之以故先述太陽篇例學者誠能取此書而讀之當知仲景立法之備制方之精有是證後用是藥無不效也後醫用其方藥而不盡效者必其見證有未明也且也病家脈證未必條條與仲景立法之意相合則用仲景方者即可以方中藥味分兩加減出入神而明之不惟冬月之正傷寒用其方而大效即三時之類傷寒用其方亦無不效也粗工臨證草率不知通變死執仲景之方用以治三時之類傷寒不見效即用以治冬月之正傷寒亦未見效也列傳中稱仲景為醫中之聖其書為諸方之祖古今治傷寒者未有能出其外者也粗工用其方而少效遂棄其書而不讀所以王宇泰輯傷寒準繩竊笑世之醫有終身目不識仲景書者而猶自負云我傷寒科也善於治傷寒是為欺世而盜虛名殺人以養其身噫抑何昧心之極至歟附昔賢治太陽病方論變法變法者言其與仲景之法不同方論中各有權變也葛稚川云傷寒有數種庸人不能分別今取一藥兼療者若初覺頭痛肉熱脈洪起一二日便作此蔥豉湯肘後蔥豉湯方蔥白一虎口豉一升綿裹上二味以水三升煮取一升頓服取汗若汗不出更作加葛根三兩一方更加升麻三兩水五升煮取二升分溫再服徐徐服亦得必得汗即瘥若不得汗更作加麻黃三兩去節煮服取汗出為效琥按上論云傷寒有數種則知其病不但冬時觸冒嚴寒之氣方謂之傷寒推而廣之凡三時感寒皆得謂之傷寒也又云初覺頭痛肉熱脈洪起則知其外寒不甚純是鬱熱可見傷寒皆熱病也上方雖出太陽例實手足陽明又手太陰經藥也加麻黃始為太陽發汗之的藥學者宜通變用之若上湯者可代仲景論太陽中篇葛根湯方也又療傷寒汗出不歇已三四日胸中惡欲令吐者方豉三升綿裹鹽一兩上二味以水七升煮取二升半去滓內蜜一升又煮三沸頓服一升安臥當吐如不吐更服一升取吐為效琥按上論云汗出不歇不歇者邪未解也言傷寒已三四日曾發汗汗出後邪猶未解胸中惡者心胸懊憹而煩悶也上方即仲景梔子豉湯稍變其制而用之又方苦參三分甘草炙一分瓜蒂赤小豆各二七枚上四味以水一升煮取半升一服之當吐吐不止者作蔥豉粥解之必息琥按上方即仲景瓜蒂散用加減法也孫真人治傷寒溫病千金方有解肌葛根湯千金葛根湯方葛根四兩麻黃三兩黃芩芍藥甘草各二兩大棗十二枚上六味㕮咀以水一斗煮取三升飲一升日三服三四日不解脈浮者宜重服發汗脈沉實者以駃豉丸下之琥按上主治云傷寒溫病可見溫病亦傷寒之類且也溫病為熱傷寒亦非寒也其證當壯熱不解而無汗方可投此湯為辛甘發散之劑湯中用黃芩者以苦寒泄其熱也用芍藥者以酸寒斂其陰也溫熱病為陽氣過旺陰氣已微不用芍藥黃芩勢必至熱甚煩冤而重陽將狂矣大抵此方專主肺胃二經大熱藥也若胃府實者宜去甘草大棗故上方後云發汗脈沉實者宜以駃豉丸下之脈沉實者邪傳裡而胃家實也又按上方即仲景葛根湯方去薑桂而加黃芩也以薑桂性辛熱惟冬月正傷寒宜用故去之黃芩性苦寒大能除四時溫熱故加之又治時氣三四日不解有解肌升麻湯千金升麻湯方升麻芍藥石膏麻黃甘草各一兩杏仁三十枚貝齒三枚一作貝母十八銖上七味㕮咀以水三升煮取一升盡服溫覆發汗便愈琥按上主治云時氣三四日不解此即仲景所云時行之氣四時傷寒者是也上方又即仲景大青龍湯去桂枝薑棗加升麻芍藥貝齒三味藥此必是太陽陽明合病欲汗出不得反加煩躁故用上方以主之又按貝齒乃海中貝子氣味鹹寒本草云解肌散結熱千金用之良有以夫又治傷寒三四日不瘥身體煩毒而熱有葛根龍膽湯千金葛根龍膽湯方葛根八兩龍膽大青各半兩升麻石膏葳蕤各一兩甘草桂心當是桂枝去外薄皮故云桂心考外臺祕要中凡引仲景方用桂枝者皆云桂心亦是此義若認以為肉桂去外粗皮誤矣芍藥黃芩麻黃各二兩生薑三兩上十二味㕮咀以水一斗煮葛根取八升內余藥煮取三升分四服日三夜一琥按上方即仲景葛根湯又大青龍湯二方去大棗杏仁加龍膽大青升麻葳蕤黃芩五味藥也上主療云身體煩毒而熱故加此苦寒辛甘之味以發泄之又按大青李氏綱目云處處有之高二三尺莖圓葉長三四寸面青背淡對節而生採得陰乾莖葉皆用專治時氣頭痛大熱時行毒熱溫疫寒熱諸家本草功用相同今方家罕知之良可慨也又葳蕤本草經名女葳主治中風暴熱不能動搖甄祕書用以治時疾寒熱今傷寒科罕用惟療虛勞方用之又雪煎治傷寒方麻黃十斤大黃一斤十二兩金色者杏人三斗四升上三味㕮咀以雪水五斛漬麻黃於東向灶釜中三宿內大黃攪令調炊以桑薪煮得二斛汁去滓復內釜中搗杏人內汁中復炊之可餘六七斗汁絞去滓置銅器中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈丸有病者以三沸白湯五合研一丸入湯中適寒溫服之立汗出若不愈者復服一丸密盛藥勿令泄氣琥按上方乃治太陽經病兼挾陽明府實為汗下兼施之劑猶之少陽陽明證而用大柴胡湯同一理耳又駃豉丸治傷寒留飲宿食不消方豆豉一升巴豆去油三百枚今用二百枚杏人六十枚黃芩黃連大黃麻黃各四兩芒硝甘遂各三兩上九味為末以蜜和丸如大豆服二丸不得下者增之琥按上方與前方相似但攻下之力多發汗之力少然亦過於迅厲宜量人虛實而後用之琥總按上二方雖治太陽表邪未盡實則陽明府實藥也陳延之療傷寒一二日不解小品方有白薇散小品詔書發汗白薇散方千金方亦集此散白薇二兩麻黃七分去節杏人去皮尖熬貝母各三分上四味搗散酒服方寸匕厚覆臥汗出愈琥按上陳氏云療傷寒一二日不解據內經云傷寒一日巨陽受之二日陽明受之則是上方當是太陽陽明二經之藥即仲景麻黃葛根二湯之變劑也又手太陰肺經風盛熱壅者亦宜斟酌用之又按白薇李氏綱目云古人多用後世罕能知之其根類牛膝而短其性苦寒乃陽明經藥也神農本經主治暴中風身熱肢滿忽忽不知人及溫瘧洗洗髮作有時故活人書治風溫發汗後身灼熱多眠葳蕤湯中亦用之乃知白薇取根本草無毒而能利人何俗醫不知用邪又療冬溫及春月中風傷寒則發熱頭眩痛喉咽干舌強胸內疼心胸痞結滿腰背強小品有葳蕤湯小品葳蕤湯方葳蕤二兩石膏三分末綿裹白薇二兩麻黃二兩去節獨活二兩芎藭二兩杏人二兩去皮尖兩人甘草二兩炙青木香二兩如無可用麝香一分代之上九味切以水八升煮取三升分三服取汗若一寒一熱者加朴硝一分及大黃一二兩下之一方有葛根二兩琥按上主療云春月中風傷寒則知傷寒不但指冬月嚴寒之時矣曰頭眩痛腰背強此太陽病也曰胸內疼心胸痞結滿此兼陽明病也曰喉咽干舌強此兼太陰少陰病也凡此者皆由風寒之邪鬱於肌表邪熱不散內傳陰經未入於府猶為可汗之時故用上湯分三服以取汗若一寒一熱者乃表寒未除裡熱已極也加硝黃以下之與仲景用大柴胡湯同義又按青木香李氏綱目云南木香即今廣木香也斯言大謬之極愚用青木香乃另是一種草根形如烏藥其色微青味苦辛而氣清涼最能發散風熱想梁時陶隱居所云青木香者即此一種藥也陳氏不察而云如無以麝香代之恐非溫熱之證所宜若用麝香是大失制方之義朱奉議云桂枝湯自西北二方居人四時行之無不應驗江淮間惟冬及春可行之自春末及夏至以前桂枝證加黃芩一分謂之陽旦湯夏至後有桂枝證可加知母半兩石膏一兩或加升麻一分若病人素虛寒者正用古方不在加減也活人陽旦湯治中風傷寒脈浮發熱往來汗出惡風項強鼻鳴乾嘔方桂枝芍藥各三兩甘草炙黃芩各二兩上銼如麻豆大每服鈔五錢匕水一盞半棗子一枚生薑三片煎至一盞去滓取八分清汁溫服若脈浮緊發熱無汗者不可與也琥按上論云桂枝湯西北二方居人四時行之無不應驗此必是極北極西之地其氣寒涼故宜行此湯爾余居東南地氣溫暖雖冬月遇中風證桂枝湯亦有不輕用者況於春末及夏至以後邪奉議加黃芩知母等藥可為發仲景未發之義矣又云傷寒熱病藥性須涼不可太溫夏至後用麻黃湯須加知母半兩石膏一兩黃芩一分蓋麻黃湯性熱夏月服之有發黃斑出之失惟冬及春與病人素虛寒者乃用正方不在加減活人麻黃湯方與仲景原方藥味同分兩減半琥按上論云夏至後用麻黃湯須加知母石膏黃芩奉議此言可為深得用藥之旨且也活人書取用麻黃湯自有通變之法本方中加蒼朮治寒濕去桂枝加薏苡仁治風濕去桂枝杏仁加石膏山茵陳蒼朮治濕熱皆太陽經之藥也仲景當日制麻黃湯後之人若云一味不可增損吾不信矣活人麻黃葛根湯治傷寒一日至二日頭項及腰脊拘急疼痛渾身煩熱惡寒方芍藥三兩豆豉一合乾葛四分麻黃三兩去節湯泡一二沸焙乾稱上銼如麻豆大每服四錢蔥白七根水一盞半煮至八分去滓溫服以厚衣蓋覆如人行四五里間再服良久如未得汗更煮蔥粥少少與之熱投以助藥力取汗即愈琥按上方乃仲景葛根湯之變方也此湯能治太陽病項背強𠘧𠘧無汗惡風者又能治太陽陽明合病自下利者但仲景葛根湯方後云不須啜粥此云如未得汗更煮蔥粥少少與之熱投以助藥力此可見前聖後賢取汗之法各不相同醫者當臨證起悟云爾許學士云病人發熱惡寒脈浮而緊者傷寒之候也如病人發熱頭疼脈浮數而尺中遲弱者宜先服黃耆建中湯加當歸以補血卻與麻黃桂枝輩本事黃耆建中加當歸湯方黃耆當歸各一兩半白芍藥桂枝甘草各一兩上㕮咀每服五錢薑三片棗一枚水煎日三夜二服如脈尚沉遲再進一服琥按上方即仲景桂枝湯中加黃耆當歸也大抵稟質素虛之人外傷風寒須以補養為主兼行發散之法所以桂枝湯已屬補虛之劑因病人尺中遲弱復益以黃耆當歸許氏雖云補血實則氣血兼補此惟病人營衛俱弱傷風有汗者宜用之否則勿輕投也韓祗和云病人兩手脈浮數或緊或緩寸脈短反力小於關尺脈者此名陰盛陽虛也素問云陰氣有餘為多汗身寒即可投消陰助陽表劑以治之若立春以後清明以前宜六物麻黃湯主之微旨六物麻黃湯方麻黃去節一兩葛根蒼朮各七錢半人參甘草炙各半兩上㕮咀每服五錢水一盞棗二枚煎七分熱服如三五服後汗未止惡風者加荊芥七錢猶汗者加丁香皮半兩琥按上方即仲景葛根湯中去薑桂芍藥加蒼朮人參也大抵氣虛人病太陽陽明二經傷寒𠘧𠘧無汗者宜服此湯有汗者勿輕用也上論云陰盛陽虛當是陰寒之邪乘其表虛而客於營衛之間病人周身陽氣不能外達法宜用助陽之劑以發表使汗出表和則陽氣回覆而陰邪消退故上湯中用麻黃葛根蒼朮之辛溫以透表而消陰因病人關前之脈短小乃肺脾真氣不足復用人參炙甘草甘溫之品以補中而助陽此制方之變而周者也蓋前方治虛人傷風此方治虛人傷寒同出一揆誰謂傷寒無補法哉琥又按上論引素問云陰氣有餘為多汗身寒此是真陽虛脫陰寒直中之證醫人急投以參耆熟附猶恐陽亡而未及況敢用麻黃葛根等重發其汗之藥乎且韓氏原論中復云自汗出惡風是邪氣在表為陰氣有餘分三時用藥連上共三方方中皆有麻黃彼獨不知仲景法有汗不可服麻黃湯之義邪可見韓氏方論自相矛盾至今微旨一書世無全本蓋其書之不傳由其言之無當也又其方後云汗未止惡風不去麻黃而反加荊芥又云猶汗者加丁香皮吾恐丁香皮辛溫雖與桂枝相似不若竟加桂枝之為妙矣韓氏因時和解法大都莫解故止摘上方以見虛人傷寒自有宜用之藥學者僅取其方毋泥其論可也劉河間治傷寒表實無汗頭項痛腰脊強身熱惡寒肩背拘急手足指末微厥脈浮數而緊者為邪熱在表此仲景麻黃湯證也當以清解散加天水散汗之河間清解散治一切感冒方蒼朮炒荊芥各二兩甘草一兩麻黃一兩半上四味㕮咀每服一兩水二鍾生薑三片蔥白一莖同煎七分去滓微熱服以被蓋覆取汗為度琥按上方乃仲景麻黃湯之變方也麻黃湯專入太陽而治風寒此湯兼入太陰而治風寒與濕學者當隨證用之又按河間此方傷寒準繩中載之余曾細閲宣明病機直格等書無所謂清解散者想準繩必有所本而載之也其天水散方傷寒直格心要中兩見之今録於後河間天水散直格名益元散一名太白散心要名六一散合防風通聖名雙解散滑石六兩白膩好者甘草一兩上為細末每服三錢蜜多許溫水調下暑月冷水亦可解利傷寒發汗每服水一盞蔥白五寸豆豉五十粒煮取汁七分調並三四服以效為度加薄荷尤妙琥按上方乃陽明經解肌藥也與太陽病毫不相涉惟合上清解散能治太陽經風寒邪熱郁甚於表汗不出而煩躁者與仲景大青龍湯實相仿也方名清解必二方交合始稱其名耳又治傷風表虛自汗頭項強痛肢節煩疼鼻鳴乾嘔惡風手足溫脈浮緩者此仲景桂枝湯證也當以通解散或天水散解之或表虛或表實但口乾煩渴者悉宜雙解散汗之河間雙解散一名通氣防風散一名通解散通聖散防風芍藥川芎大黃當歸薄荷葉麻黃石膏連翹黃芩芒硝以上各半兩桔梗各一兩荊芥滑石三兩白朮甘草二兩梔子各二錢半上散七兩天水散七兩上二藥合一處相和名為雙解散攪勻每服五六錢水一大盞半入蔥白五寸生薑三片煎一盞濾汁去滓溫服無時日三四服以效為度常服三錢水一中盞煎六分絞汁溫服不拘時戴人張子和云劉河間自制通聖散加益元散名雙解散千古之下得仲景之旨者一人而已今之議者以為雙解不可攻裡起謗紛紜誠可憾也豈知雙解散煎以蔥須豆豉湧而汗之一劑立雪所苦縱不全瘥亦可小瘳俟六經傳畢微下而已琥按上方氣血兼走汗下齊行乃太陽陽明表裡合病之藥也若云治太陽傷風大誤之極戴人雖稱此方為劉氏獨得仲景之旨要之用藥雜亂此方實為大變仲景之法不足取也都梁鎦氏云通聖散中大黃芒硝麻黃三味須對證旋入自利去大黃芒硝自汗去麻黃後學能如此加減則庶乎其與病相合矣張潔古云經言有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當用桂枝宜黃耆湯以和準繩作和解之秋冬汗孔閉雖無汗不當用麻黃宜川芎湯以和又作和解之春夏有汗脈微而弱惡風惡寒者乃太陽證秋冬之脈也亦宜黃耆湯無汗亦宜川芎湯秋冬有汗脈盛而浮發熱惡熱者乃陽明證春夏之脈也亦宜黃耆湯無汗亦宜川芎湯大抵有汗皆可黃耆湯無汗皆可川芎湯琥按上論云春夏汗孔疏雖有汗不當用桂枝以時當春夏人本有汗故雖遇有汗證亦病之常不當輕用桂枝湯夫桂枝湯者本甘溫辛熱之劑乃秋冬藥也又云秋冬汗孔閉雖無汗不當用麻黃以時值秋冬人本無汗故雖遇無汗證亦病之常不當輕用麻黃湯夫麻黃湯者亦甘溫辛熱之劑潔古云秋冬不當用更於何時可用麻黃湯邪又春之初時猶冬也秋之初時猶夏也此皆上論之不可執看者也琥又按上論云春夏脈微弱猶秋冬之脈秋冬脈盛浮猶春夏之脈闡發四時脈證誠為切當但其雲陽明證發熱惡熱有汗者亦宜黃耆湯臨證不無少誤學者宜活變觀之難知黃耆湯方有汗則能止之黃耆白朮防風各等分上㕮咀水煎五七錢飲清溫若汗多惡風甚者加桂枝一二錢匕琥按上方乃潔古用之以代桂枝湯方者也仲景用桂枝湯雖云主營弱衛強要之風邪並於衛而稱強者是邪氣之強即衛氣之弱也所以成注亦云自汗出則皮膚緩腠理疏故見惡風惡寒之證則是桂枝湯之用雖主營弱實則治衛虛自汗不任風寒之方也內經曰辛甘發散為陽桂枝湯與上黃耆湯皆辛甘之劑但桂枝湯辛甘而熱黃耆湯辛甘而溫惟其熱故惟冬月宜用惟其溫故兼三時皆可用也或問桂枝湯以桂枝為主所以走太陽今黃耆湯中以何藥走太陽余答云防風治風通用雖卒伍卑賤之職善能走太陽療周身百節苦疼故上湯以之等分不可少也要之此方必正氣虛而表邪微者乃可用之否則白朮一味過於溫補亦猶桂枝湯中之有大棗炙甘草不輕用也醫者宜審證投之又川芎湯方無汗則能發之川芎羌活製蒼朮各等分上㕮咀水煎五七錢飲清熱若汗少準繩作無汗惡寒甚者加麻黃一二錢匕琥按上方乃潔古用以代麻黃湯方者也仲景制麻黃湯用以治太陽傷寒之的劑傷寒無汗麻黃湯以麻黃為君專入太陽發皮膚之汗也上湯中有羌活亦能入太陽透發皮膚之汗又寒傷營麻黃湯中有桂枝以和營上湯中有川芎亦營中藥也大抵上湯之用辛甘苦平不若麻桂之甘溫辛熱但宜於冬月者也所以潔古云凡四時無汗證皆可用之琥又按上湯中有蒼朮此與麻黃湯中之杏人則大相反術性燥烈杏人苦潤所以潔古用川芎湯傷寒惟挾濕邪者宜之倘春夏之時有病發熱無汗燥喘者如用川芎湯須減蒼朮加杏人為妥矣醫人撿取古方當臨證活變用之又通解四時傷寒大神術湯方蒼朮四兩制羌活防風川芎各一兩黃芩枳殼一作枳實甘草各半兩白芷一兩半石膏二兩細辛三錢知母七錢上㕮咀石膏為細末入藥水煎欲汗之熱服湯投言於湯中投石膏末而熱服之也春倍防風羌活夏倍黃芩知母季夏淫雨倍術白芷秋加桂五錢冬加至一兩亦可以意消息隨證增損非發熱而渴不可用石膏知母非裡實心下痞不可用枳實也琥按上主療云通解四時傷寒則凡四時之中皆有寒氣傷人皆得謂之傷寒矣上方乃太陽陽明太陰少陰兼入厥陰之劑止無關於少陽所以方後云宜以意消息隨證增損也琥又按上方後云秋加桂五錢此係秋深時故與冬令同治若秋初濕熱或行燥令醫者亦當以意消息隨證增損九味羌活湯易老解利法經云有汗不得服麻黃無汗不得服桂枝若差服則其變不可勝言故立此法使不犯三陽禁忌解表神方此亦潔古方也張潔古諱元素易水人故又稱易老羌活一兩半治太陽肢節痛君主之藥也然非無為主也乃撥亂反正之主故大無不通小無不入關節痛非此不除防風一兩半治一身盡痛乃卒伍卑下之職一聽君命將令而行隨所使所引而至蒼朮一兩半別有雄壯上行之氣能除濕下安太陰使邪氣不內傳於足太陰脾細辛半兩治足少陰腎苦頭痛川芎一兩治厥陰頭痛在腦白芷一兩治陽明頭痛在額生地黃一兩治少陰心熱在內黃芩一兩治太陰肺熱在胸甘草一兩能緩裡急調和諸藥故有國老之稱以上九味雖為一方然亦不可執當視其經絡前後左右之不同從其多少大小輕重之不一增損用之其效如神㕮咀水煎服若急汗準繩作急欲汗熱服以羹粥投之準繩作以熱湯助之若緩汗溫服而不用湯投之也脈浮而不解者先急後緩脈沉而不解者先緩後急此湯不獨解利傷寒治雜病亦神琥按上湯即前大神術湯去枳殼知母石膏而加生地黃也陶氏殺車槌改名羌活沖和湯用之以代桂枝麻黃青龍各半等湯云春可治溫夏可治熱秋可治濕此太陽經之神藥要之此湯用藥氣味不齊陰陽諸經皆走只無礙於少陽所以方後云當視其經絡增損用之其效始如神也陶氏不明斯義竟以此湯治太陽傷寒又即以此湯減蒼朮細辛加白朮黃耆治太陽中風更不説明潔古當日所以制方之義使後學宗之以至六經不明亂投藥劑其為害可勝道邪吾恐醫工用此湯以治病增減若差其變亦猶麻桂之不可勝言若云不犯三陽禁忌竟為解表亂服之方誤之甚矣李東垣云夫傷寒者始自風寒得之故風則傷衛寒則傷營風寒併入營衛俱傷仲景所以處桂枝麻黃大青龍湯此三者皆發表之要藥也然用之當則隨手而愈用之不當則非徒無益而又害之也故仲景有此三者之戒使後人不敢輕用也今採擇諸方之中發表之藥可以代此者如升麻湯敗毒散羌活解肌湯柴胡散葛根湯五積散之類是也可選而用之琥按上論云發表之藥如升麻湯敗毒散柴胡散葛根湯是兼主陽明少陽之劑又五積散乃發表散寒積之雜方治法舉要中皆不載惟載沖和湯一方今録於後舉要沖和湯方桂枝麻黃類用者莫輕易我有一神方不犯三陽忌羌防芍細芷芩草二術地粗末米水煎風寒俱解利羌活防風芍藥細辛白芷黃芩蒼朮白朮生地黃甘草上件一十味等分㕮咀每服米一撮水一大盞煎三沸去滓溫服滓再煎汗已出則止汗不以多少為效上云汗已出則止汗乃知是方實發汗藥也愚以當有汗未出則發汗二句或傳寫時脫簡耳琥按此方即易老九味羌活湯去川芎加白朮芍藥也所入經絡亦與九味羌活湯同但蒼白二術宜照有無汗用又芍藥之用以調營也愚以有汗者宜用芍藥無汗者不如用川芎為穩一內證或內外通身上下並關節痛者宜用芎黃湯舉要芎黃湯方川芎甘草麻黃南枳殼上件等分每服三錢或五錢生薑三片煎三沸熱服最妙其痛立止琥按上主療云內證內字當是外字之誤縱兼內證不過胸中略覺煩悶耳所以是方即仲景麻黃湯之變方其治內證止枳殼一味藥耳海藏神術湯治內傷冷飲外感寒邪無汗者方方見古本東垣十書陰證略例中蒼朮制防風各二兩甘草一兩炙上㕮咀加蔥白三寸生薑一塊水煎服如太陽證發熱惡寒脈浮而緊者加羌活如太陽證脈浮緊中帶弦數者是兼少陽也加柴胡如太陽證脈浮緊中帶洪者是兼陽明也加黃芩愚意云何不加葛根以上三證約量每服加二錢匕不論三陽婦人服者加當歸治吹奶煎成調六一散三五錢如神琥按上方即潔古川芎湯變其制也潔古為東垣師而海藏復師於東垣故下文所用白朮湯又即潔古黃耆湯稍變其制大抵師弟子之相傳前後同一轍耳神術湯六氣加減法太陽寒水司天加桂枝羌活婁全善云餘歲非時變寒亦加冬亦加陽明燥金司天加白芷升麻婁云餘歲非時變涼濕亦加秋亦加愚意云涼則燥濕則或寒或熱大抵秋行燥令居多若但燥而不濕白芷不宜加也以葛根代之甚穩少陽相火司天加黃芩地黃婁云餘歲非時變雨濕亦加夏亦加愚意云司天之氣有常有變變氣誠不可定但既變雨濕又用上藥與病不合太陰濕土司天加白朮藁本婁云餘歲非時變熱濕亦加夏末秋初亦加愚意云非時變熱濕則上所用藥但治濕耳與熱無與當更加黃芩等藥少陰君火司天加細辛獨活婁云餘歲非時變熱亦加春末夏初亦加愚意云上藥亦不合司天及時令之氣也厥陰風木司天加川芎防風婁云餘歲非時變溫和亦加春亦加以上神術湯六氣加減法非止為司天之氣設也至於歲之主氣與月建日時同前應見者皆當隨所見依上例而加減之琥按內經中運氣之説有常有變常氣者即上海藏云司天之氣是也變氣者即上婁氏云非時之氣是也要之氣至無定故上文又云用藥法皆當隨歲月日時所見之氣而加減之蓋天之氣隨時而來人之病因氣而變所以傷寒之病俗名為時氣也上論實與仲景四時八節二十四氣決病法互相發明學者能參合觀之則因時制宜用藥治病之法庶乎其近之矣又白朮湯治內傷冷物外感風邪有汗者方白朮三兩防風二兩甘草一兩炙上㕮咀每服稱三錢水一盞生薑三片同煎至七分去滓溫服無時一日止一二服待二三日漸漸汗少為解婁全善云海藏用神術湯白朮湯發散外寒此皆和解之意不使真氣散失猶之丹溪治傷寒表證用東垣補中益氣湯其意實相同也愚以前潔古所制黃耆湯川芎湯亦同此意琥按此方海藏用以代桂枝湯前方即用以代麻黃湯者也仲景桂枝麻黃湯惟冬月宜用是二方者則四時皆可用之何也夫四時分屬五行寒熱溫涼各一其氣惟土氣化濕寄王於四時之季故凡時氣之傷人必兼濕氣而至所以春病多溫濕夏病多熱濕秋病多涼濕冬病多寒濕觀上二湯皆以術為主專入陽明太陰二經以治濕又海藏復製蒼白朮湯以治傷寒而云上解三陽下安太陰即此義也夫四時之氣從外而來者即八方之風也風從外來故二方中皆佐以防風用甘草生薑者乃辛甘發散之義至於邪氣入於諸經各隨經絡合以歲時照上方加減例而用藥斯其效自如神耳丹溪治第四女冒風冷發熱醫案中有麻黃人參湯醫案麻黃人參四味湯方婁氏綱目亦集此方麻黃人參各五分蒼朮一錢甘草少許上㕮咀水煎熱服琥按上方即仲景麻黃湯變其制也與前韓祗和六物麻黃湯其意相仿大抵體虛人病風寒無汗者宜服之有汗者禁服戴院使治傷寒初得病時頭疼體痛屬太陽經證治要訣有和解散證治和解散方此散本和劑局方制小其服也蒼朮二錢去皮厚朴薑汁炙陳皮甘草藁本桔梗各一錢上為粗末水一盞半薑三片棗二個煎七分不拘時熱服溫覆取汗琥按上主療云太陽經傷寒而方中有藁本者乃手太陽引經藥也此可見傷寒不專病足經矣余藥兼走足陽明太陰二經乃寬中解表散寒濕之劑王宇泰治一刻字工人新婚冬月冒寒表證悉具令以人參紫蘇莖葉各一兩煎湯飲之汗出而愈上按見準繩傷寒發熱例中琥按上主療云冬月冒寒表證悉具則知病家必頭疼惡寒身發熱而無汗據其時其證可謂正傷寒矣仲景法當以麻黃湯汗之然王以刻字匠乃工苦之人又系新婚若發汗過劑恐陽亡而津液不堪重耗因用紫蘇莖葉之辛溫以代麻桂杏仁復用人參之甘溫以代炙甘草乃護虛發表之輕劑也後學如徒讀仲景書用仲景法恐其誤亦不少繆仲淳云太陽病其證發熱惡寒惡風頭痛項強腰脊強遍身骨痛脈浮洪宜先發汗以解表邪其藥以羌活湯為主廣筆記羌活湯方羌活三錢前胡二錢甘草八分葛根二錢生薑三片大棗二枚杏人九粒去皮尖研爛水煎服秋深冬月應用此方亦可量加紫蘇蔥白如冬月天氣嚴寒感邪即病服此藥不得汗本方加麻黃一錢生薑四片共前七片得汗勿再服琥按上論云脈浮而洪則知太陽病當兼陽明經矣所以上湯中用葛根加蔥白也琥又按此方乃仲景麻黃葛根二湯稍變其制而湯中既用前胡復加紫蘇者兼入手太陰經而散風寒下逆氣也誰謂寒邪不兼傷手經者邪學者當由是而起悟則用藥治病庶幾可十全矣琥總按上古今諸名家治太陽病方論雖各不同要皆輔翼仲景者也愚以治傷寒者不讀仲景論則所學不精讀矣復恐其泥於古方也所以不讀諸家書則所見又不廣惟能合而讀之於其方論各別之處必曉暮參究斯一旦豁然貫通知醫道之源實後先祖述其論雖異而皆相通其方雖殊百而皆可用者也余東南人也竊見東南時醫不解仲景之論不識諸家之方徒執陶氏書以治傷寒夫傷寒者大病也彼陶氏一家之説豈足以盡其變邪是為虛竊濟生之名實以害人之生猶之鄉願亂德婁氏所云醫之賊也暗損陰隲神明不佑可不謹哉
