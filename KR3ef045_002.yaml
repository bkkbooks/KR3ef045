body:
  text: 卷之二纂注傷寒例此係仲景原文四時八節二十四氣七十二候決病法立春正月節鬥指艮艮者土木之氣主濕與風位居東北不配臟腑雨水正月中指寅寅為少陽相火之氣主熱配三焦此直格中之說愚謂寅為陽木主風配膽位居於東以其中有丙火之氣故又主熱驚蟄二月節指甲甲屬木主風配膽又兼土化主濕春分二月中指卯卯為陽明燥金之氣配大腸此亦直格中之說愚謂卯為陰木主風配肝位居正東因其與酉金相沖故例從陽明兼主燥氣清明三月節指乙乙屬木主風配肝又兼金化主燥穀雨三月中指辰辰為太陽寒水之氣配小腸此亦直格中之說愚謂辰為陽土主濕配胃以其中兼癸水之氣故又主寒琥按以上春三月人病傷寒當由風濕熱三氣居多況乎地之初氣厥陰風木雖起於大寒節至立春雨水驚蟄正當其令其二之氣少陰君火又當春分清明穀雨之時則是春月之病雖因於寒純是風熱其間有病燥者此係兼化之氣人於二三月時或有之又人於正月初為濕土之交二月節遇濕土之化三月中當濕土之令病濕者亦自不少可見為風為熱為燥為濕多由寒氣中來豈得但認以為寒而誤治之哉今夫以一日之間旦晚每多異氣如能洞悉氣宜則醫之為道庶不遠矣立夏四月節鬥指巽巽屬木主風位居東南不配臟腑小滿四月中指巳巳為厥陰風木之氣配包絡此直格中之說愚謂巳為陽火主熱配小腸位居於南以其與亥水相沖亥中有甲木之氣故亦主風芒種五月節指丙丙屬火主熱配小腸又兼水化主寒夏至五月中指午午屬火主暑氣配心小暑六月節指丁丁屬火主暑氣配心又兼木化主風大暑六月中指未未為太陰濕土之氣配肺此亦直格中之說愚謂未為陰土主濕配脾琥按以上夏三月人病傷寒當由暑熱風濕之氣居多惟五月節鬥指丙丙從辛化而生寒其病者終以寒為標熱為本至於地之二氣少陰君火終於立夏四月節其時之病多風熱三之氣太陰濕土正當小滿芒種夏至小暑之時其時之病多風熱暑濕四之氣少陽相火又起於大暑六月中故其時之病純是濕熱但以寒為名也立秋七月節鬥指坤坤屬土主濕氣位居西南不配臟腑處暑七月中指申申為少陽相火之氣主大熱配膽此直格中之說愚謂申為陽金主燥配大腸位居於西以其與寅相沖寅中有丙火之氣故主大熱白露八月節指庚庚屬金主燥氣配大腸秋分八月中指酉酉為陽明燥金之氣配胃此亦直格中之說愚以酉為陰金主燥配肺位居正西寒露九月節指辛辛屬金主燥氣配肺又兼水化主寒霜降九月中指戌戌為太陽寒水之氣配膀胱此亦直格中之說愚以戌為陽土主濕配胃以其與辰相沖辰中有癸水之氣故又主寒琥按以上秋三月人病傷寒當由燥熱濕三氣居多惟九月中寒氣已甚然其病亦兼燥氣與濕至於地之四氣少陽相火正當立秋處暑白露之時五之氣陽明燥金又當秋分寒露霜降之令乃知秋病多燥熱如認以為寒誤矣立冬十月節鬥指乾乾屬金主燥氣位居西北不配臟腑小雪十月中指亥亥為厥陰風木之氣配肝此直格中之說愚以亥為陽水主寒配膀胱以其中有甲木之氣故又主風大雪十一月節指壬壬屬水主寒氣配膀胱又兼木化主風冬至十一月中指子子為少陰君火之氣主暑配腎此亦直格中之說愚以子為陰水主寒配腎以其衝動午火故又主暑氣小寒十二月節指癸癸屬水主寒氣配腎又從火化故主熱大寒十二月中指醜醜屬土主濕氣配脾琥按以上冬三月人病傷寒當由風寒之氣居多然地之五氣陽明燥金終於立冬十月節其病多燥燥亦風熱從木火也惟地之終氣太陽寒水正當小雪大雪冬至小寒之時其時為正傷寒然細推小雪十月中鬥指亥其兼氣主風大雪十一月節指壬其化氣亦主風冬至十一月中其沖氣主暑小寒十二月節其化氣又主熱乃知其時之病又兼風熱至大寒十二月中厥陰風木之氣復起況斗柄又指醜醜為濕土人病風濕在所不免以是知冬月之正傷寒亦不專於寒也二十四氣節有十二中氣有十二五日為一候氣亦同合有七十二候決病生死此須洞解之也按以上正文今仲景全書中列於陰陽大論云云前傷寒準繩中序之於皆當按鬥歷占之之下諸家注傷寒論遂刪此段正文殊為脫略愚今纂注之於傷寒例首從全書也琥總按上時節氣候決病法此仲景傷寒論一部綱領以故為例之首至王叔和反以脈法列於前者此撰次之僭也推前人立法之意以傷寒一證寒邪之氣自外而傷於人則人在氣交之中同是受寒當分四時之不同蓋春之寒必兼溫氣而至夏之寒必兼暑氣而至秋之寒必兼燥氣而至長夏四季之寒必兼濕氣而至惟冬之寒為正寒正寒之氣其時病者不能即解寒不解則熱愈深三時之寒為暴寒暴寒之氣其時病者易於解散寒易散故其熱有重有輕大抵病兼異氣必因乎時藥有異宜亦因乎時即如一人於冬月患病其初傷大寒之氣既病一二日後寒氣忽解天道大溫則病人之氣亦隨時而異用藥之道不無少差所以傷寒之稱一名時氣知時知氣斯醫之為道可判然於胸中矣陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也按內經有陰陽應象大論其中無春夏秋冬四語想此是仲景自立之論而叔和又參以己意之辭內經本論中語云天有四時五行以生長收藏以生寒暑燥濕風愚以仲景所云溫和者即是風氣其令為春而主生云暑熱者即是暑氣其令為夏而主長云清涼者即是燥氣其令為秋而主收云冷冽者即是寒氣其令為冬而主藏其不言濕氣者已具於四季之中而生長收藏之道備焉故云四時正氣之序此論仲景實本內經之意所以王氏直序為陰陽大論云云也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳此承上文而言冬氣冷冽而為寒則其令主藏養生君子亦宜效萬物而深藏固密者居處周密也處不周密則觸冒嚴寒之氣所以謂之傷寒其傷於四時之氣皆能為病春風夏暑秋燥冬寒此謂四時之氣成注以秋氣為濕誤矣愚以濕氣即具於長夏及四季之中此言四時之氣皆能為病不獨冬時之有傷寒也以傷寒為毒者以其最成殺厲之氣也喻嘉言云入一毒字便開過端殊不知傷寒之人寒盛於外熱深於內發而為斑黃為吐衄為狐惑為口舌糜爛為肺痿嘔膿為發頤腫潰非毒而何最聚也殺厲者寒氣肅殺暴厲謂傷寒之毒純是殺厲之氣聚成也中而即病者名曰傷寒病疾之甚也言有寒疾而甚者名曰傷寒所以仲景辨傷寒凡六經之證皆曰病也下文云不即病者言有寒疾而不甚也王安道以不即病者過時而發於春夏方其受寒之時其人不覺有疾誤矣不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病內經熱論云凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑又生氣通天論陰陽應象論皆云冬傷於寒春必病溫推內經之意以寒自傷於冬至春則寒氣轉而為溫至夏則溫氣又轉而為暑所以同是外來之邪不得仍以正傷寒名之也且考內經上文云春傷於風邪氣留連乃為洞泄則是冬時所傷寒邪之氣亦必著人膚腠肌肉之間留連成疾積久不愈至春令大溫遂變而成溫病內經中不言留連者乃省文也其云至夏變為暑病此與經旨相悖更考內經下文云夏傷於暑秋必痎瘧是瘧者不即病之暑其即病者乃夏時自傷之暑也引經斷論黃帝岐伯皆云暑自夏傷至仲景獨云暑由寒變若云可變將秋時之瘧亦由冬寒變成有是理乎所以方中行起而削之喻嘉言起而非之也暑病者熱極重於溫也夏暑之氣重於春溫若人感其氣而成病則不論溫暑各有輕重不可拘也是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也此承上文君子固密不傷於寒而言是以辛苦之人因冬時不能固密春夏多溫熱病且言其病非時行之氣皆由觸寒所致內經未聞有冬傷於寒夏必病熱之語斯言如出之仲景為可削矣凡時行者春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也大寒補亡論作大涼金剋木也大涼外臺秘要中作大冷水剋火也秋時大熱火剋金也冬時大溫每與濕氣並行土剋水也凡此者皆賊邪之氣故云非其時而有其氣非時之氣感受必同所以一歲之中凡四時之病長幼多相似也愚謂以上時行之氣不過是四時熱病皆傷寒之類春時應暖而反大寒人因其暖不料其寒則為春傷寒既傷之後暖氣仍回同溫病也夏時應熱而反大涼人因其熱不覺其涼涼中即有寒氣則為夏傷寒既傷之後熱氣仍回同暑病也秋時應涼而反大熱人亦因其熱不御其涼則為秋傷寒既傷之後涼郁其熱同燥病也冬時應寒而反大溫人又因其溫反忘其寒則為冬傷寒既傷之後寒包其溫非真寒也巢元方以一歲之中病無長幼率多相似為天行病且以春溫寒疫之證指之即天行溫疫病俗又從疾通名瘟疫昔醫如朱奉議孫真人許學士龐安時常器之輩皆相承其說不覺其非至吳又可始作溫疫論二卷言天地間別有一種異氣觸人乃名溫疫又喻嘉言復作尚論篇詳論溫疫以破大惑乃知仲景所言不過四時所行不正之氣即內經云傷寒之類是也夫欲候知四時正氣為病及時行疫氣之法皆當按鬥歷占之四時正氣即上第三節云四時之氣也時行疫氣即上節云時行之氣也成注既言時行之氣又言溫與疫者誤也溫即冬時應寒而反大溫之溫下文云冬溫是也況此節正文無溫字若言是春溫誤之誤矣疫即三時反寒反涼之氣下文云寒疫是也按此溫疫並非大瘟大疫予於上文已明言之占測也候也成注云占前鬥建審其時候之寒溫察其邪氣之輕重言當按斗柄所指之節氣而測候之也之指下文傷寒冬溫寒疫等證而言又按成注云占前鬥建可見四時八節決病法當在陰陽大論之前九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼成注云此為四時之正氣從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也體中寒傷寒纘論作體虛中寒甚通夫寒為冬月之正氣正氣何能傷人其為寒中者因其人體氣先虛故也中字作傷字解莫認作中寒之中蓋中寒是冷證傷寒是熱證不可混也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也按此節仲景書系正文成氏例改作注故諸家纂仲景書者屢屢削之成注云此為四時正氣中而即病者也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章成注云此為時行之氣即前第九節云冬時應寒而反大溫者是也冬溫雖與傷寒異然亦不過是傷寒之類寒有寒毒則溫有溫毒一句便了其云復有先後更相重沓者明系叔和雜入之語故喻嘉言注云此與仲景之文無涉也喻氏復云證如後章其意蓋指篇後溫瘧風溫溫毒溫疫為言此無識之最者也愚因刪去使無增後學之疑從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於外冬時伏寒變為溫病諸家本皆無外字覺辭意不貫今從準繩傷寒例增入成注云此為溫病也王宇泰云此是外邪喚出內邪乃冬傷於寒所致從春分以後至秋分節前天有暴寒者皆為時行寒疫也此亦時行之氣即前第九節云春時反寒夏時反涼者是也然不曰春寒夏涼病而曰寒疫者此是外寒之氣郁其溫熱故也按前第九節又云秋時反熱此與冬溫病相似其不曰秋熱病而亦曰寒疫者可見秋時之氣亦寒鬱其熱也愚以此等病即是傷寒之類俗云四時傷寒是也成注云此是疫氣夫冬溫獨非疫邪大抵時行之反氣皆是疫何也氣與時反人不及備所以病無長幼率多相似如徭役之役字從殳者乃省文也此非若正氣之傷人必待體虛而後中也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳成注云是數者以明前鬥歷之法占其隨時氣候發病寒熱輕重不同愚按是數者三字此總結上文傷寒冬溫溫病寒疫等證之辭愚又按前第十節云按鬥歷而佔四時正氣為病則是冬月傷寒春月傷風夏月傷暑與濕秋月傷燥皆正氣也正氣為病不但傷寒茲則但言傷寒及時行之氣可見仲景之論非全書矣又按本節云寒疫輕重以三四五六七八月陽氣盛衰立論其言亦不可拘即如十月為純陰陽氣已斂斯時為寒所折其病竟不發熱者邪倘其人病中寒或不發熱若是傷寒吾恐其病熱比之五六月時其勢更盛難言輕矣王宇泰云要在辯其病源寒熱溫三者之異則用藥冷熱之品味判然此指通章之傷寒溫病熱病而言蓋暑病即熱病也十五日得一氣於四時之中一時有六氣四六名為二十四氣也成注云節氣十二中氣十二共二十四氣然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也成注云疑漏或有至而不去一句愚以至而不去即在應至而不至之中蓋謂新氣應至而舊氣不去也夫舊氣不去即是新氣應至而不至是二言何以相別邪當如內經雲氣至而反始明今即就成注所引金匱中言證之冬至之後甲子夜半少陽起少陽之時陽始生天得溫和其言以得甲子而天未溫和者此為應至而不至也其言以未得甲子天得溫和者此為未應至而至也其言以得甲子而天溫如盛夏五六月時者此為至而太過也其言以得甲子而天大寒不解者此為至而不去即至而反是也金匱中不言反者以冬至之交溫氣尚微寒氣得令故雖少陽始生當溫而寒難以言反只得以不去二字代之終不若反字之義更明按內經云至而不至來氣不及也愚謂至而不去即在來氣不及之中未至而至來氣有餘也愚謂至而太過即在來氣有餘之中又云至而和則平至而甚即太過則病至而反者病至而不至者病未至而至者病故曰皆成病氣也但天地動靜陰陽鼓擊者各正一氣耳天之體主動為陽地之形主靜為陰雖有動靜之分然陰陽之氣鼓擊於四時而不息者寒熱溫涼各正一氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒成注云春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也冬至十一月中鬥建子陽生於子冬至之後一陽之氣始生六陰之氣漸斂成注云於卦為復言陰氣已極陽氣得復也爻者交也乃陰陽之氣相交易之義夏至五月中鬥建午陰生於午夏至之後一陰之氣始生六陽之氣漸斂成注云於卦為姤言陽氣已極陰氣得遇也內經云冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下成注引以相證極是愚按冬至以前為純陰純陰者六陰俱升也然已交子月得中氣一陽之氣初升則一陰之氣先降故不曰六而曰一也午為一陰言陰氣至子月而極故先降夏至仿此斯則冬夏二至陰陽合也春秋二分陰陽離也成注云陽生於子陰生於午是陰陽相接故曰合陽退於酉秋分八月中鬥建酉陰退於卯春分二月中鬥建卯是陰陽相背故曰離內經曰氣至之謂至氣分之謂分至則氣同分則氣異即離合之義也愚按上正文云春秋二分為陰陽離成注云是陰陽相背故曰離夫陰陽豈有離背之理但歷家以冬夏二至為日至南至北春秋二分為日離南離北日循黃道而行至春秋分日行中天纏於赤道當黃赤二道之交其時晝夜等分不寒不暑陰陽和平二氣相交而各半言六陰六陽之氣於地之上下各分其三而無偏也若然則是離字之義當作麗乃陰陽各施其半兩相附麗之意此即周子所云陰根陽陽根陰五氣布四時行之謂歟陰陽交易人變病焉天地陰陽之氣既相交錯而春夏秋冬四時於焉更易斯人氣亦隨之而變遷苟不得其養則諸病生焉此君子春夏養陽秋冬養陰順天地之剛柔也成注引內經云春夏養陽以涼以寒秋冬養陰以溫以熱所以然者從其根故也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之嬰加也又觸也疹與疢同疹者善嗜為病可見小人不若君子之善於調養既感外來之邪兼之飲食不節而成暴病夫病既曰暴須知其觸冒四時風寒暑濕當作燥之氣必然毒烈此即四時之傷寒也其有病不甚暴邪氣留連而不愈者當詳取其毒烈之氣留在何經而發何病也是以春傷於風夏必飧泄夏傷於暑秋必痎瘧秋傷於濕濕在夏季之月與暑氣同行按此濕字當作燥冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之春三月風氣用事春傷於風風氣通於肝肝邪有餘來侮脾土留連至夏暑濕之氣相併當為餐泄之證餐泄者水穀不化而完出也夏三月暑氣用事夏傷於暑暑當與汗皆出勿止若夏傷暑而汗不出留連至秋清涼之氣搏其暑熱當為痎瘧之證痎瘧者寒熱往來之久瘧也秋三月燥氣用事秋傷於燥燥亦火之餘氣火乘肺金留連至冬復與外寒相觸當為咳嗽之證冬三月寒氣用事冬傷於寒寒氣通於腎腎失閉藏之令內郁所傷之寒久而成熱留連至春更遇外來之溫氣引出內郁之熱邪因而成溫病也是則觸冒四時之正氣留連致疾勢所必然醫者所當詳審而責治之也傷寒之病逐日淺深以施方治今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依外臺秘要中作知次第而治之則不中病皆宜臨時消息制方無不效也今搜採仲景舊論錄其證候診脈聲色對病真方有神驗者擬防世急也又土地溫涼高下不同物性剛柔餐居亦異是故黃帝與四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也此二節於上下文不相貫外臺秘要中系王叔和之論外臺序諸論傷寒凡八家以仲景為第一家則序陰陽大論云云也其第二家則序王叔和曰傷寒之病逐日淺深云云也又曰夫表和里病下之而愈汗之則死里和表病汗之而愈下之則死云云至安危之變豈可詭哉此亦序王叔和之論也愚按唐時王燾著外臺方論實節取上古諸家之說其因傷寒例雜入叔和之語居多故特序曰王叔和云云也夫叔和當日既云搜採仲景舊論真方其於撰次傷寒論時何不曰此係仲景論此為仲景方也標題不明間附己意以致玉石難分深為可恨凡傷於寒則為病熱熱雖甚不死此承上文春傷於風之節而言推仲景之意以四時之氣皆能傷人其留連不愈者已為餐泄痎瘧咳嗽溫病矣其有病暴而不留連者即為四時傷寒之病故特舉一凡字該之若但論冬月之傷寒則不日凡矣或問於春何以云寒殊不知春風中寒氣偏多所以仲景辯太陽病先言中風條也夏月暑氣大行早晚間時有雷雨陰濕之寒所以潔古論中暑為靜而得之其證頭疼身熱無汗亦傷寒也秋月燥氣固勝早晚間每多霧露清涼之氣五行家以秋屬金金體本涼而其氣亦同寒也至冬月寒水用事不待更解凡此四時之中皆有傷寒之病其實非寒而皆為熱成注引內經云風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為熱病也又引針經云熱多者易已是熱雖甚不死也若兩感於寒而病者必死兩感病見下文其義已注前第一卷熱論中尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經皆受病未入於腑者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經皆受病已入於腑可下而已以上論六經受病與內經熱論中文大同小異熱論云一日二日上卻云一二日二三日其論更覺圓活又熱論云臟上卻云腑熱論無此三經皆受病已入於腑可下而已三句上卻從而補之非仲景孰能引經作論如此其切當邪第其於每經之首必先言脈者此與經旨大悖夫傷寒以識證為先而辯脈次之識證者何如病人頭項痛腰脊強即知其為太陽病也目疼鼻乾即知其為陽明病也胸脅痛耳聾即知其為少陽病也既識其證則某病見某證當顯某脈不宜某脈某脈則吉某脈則凶此為最要之訣今則云尺寸俱浮者太陽受病也夫浮脈豈可以定太陽病邪抑太陽病豈止一浮脈邪愚即就仲景論浮脈一二條言之有云陽明病脈浮無汗而嘔宜發汗則愈宜麻黃湯又云太陰病脈浮者可發汗宜桂枝湯又云少陰中風脈陽微陰浮者為欲愈厥陰中風脈微浮為欲愈不浮為未愈惟少陽病無浮脈然其云三陽合病脈必浮大上關上則少陽亦在其中以是而知陰陽六經皆有浮脈也更即就仲景論太陽病脈一二條言之一云太陽病發熱汗出惡風脈緩者為中風又云太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒又云傷寒一日太陽受之脈若靜者為不傳頗欲吐若煩躁脈數急者為傳也又云太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗又云太陽病身黃脈沉結少腹硬小便不利者為無血也云云又云太陽病下之其脈促不結胸者此為欲解也又云脈緊者為咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉者必欲嘔脈沉滑者協熱利凡此者皆太陽之脈也舉一太陽以概其餘是上文言尺寸俱長俱弦俱沉細俱沉俱微緩與受病之經皆不相合吾恐叔和在當日雖善切脈苟不問病家所苦但據尺寸以測受病之經不無誤矣識者謂傷寒例中凡言脈處皆叔和所增入即如以平脈辯脈法反作第一卷列於傷寒例前亦此意也近醫程子郊倩議叔和云彼見經文上無有脈法遂恣意杜撰不知熱病之脈經文已於後篇評熱論補出脈躁疾三字矣又云熱病為陽其加三陰經以沉微細緩之脈則是陽病見陰脈者死矣經文何以云熱雖甚不死此等處關係豈小且與平脈論自相背謬喻氏尚論及此獨置而不言何其恕也若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則營衛不行腑臟不通則死矣成注云陰陽俱病表裡俱傷者為兩感故其受病則陰陽兩證俱見其傳經亦陰陽兩經俱傳也六日死義詳見前第一卷熱論中愚按上單傳之病先太陰而後少陰此則先少陰而後太陰何也王宇泰云逆傳之說猶未盡善蓋太陽與少陰陽明與太陰少陽與厥陰臟腑相合陰道從陽譬之妯娌但以夫年為次不以己齒為序也其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也上注俱見前第一卷熱論中按內經熱論無更不傳經不加異氣二句喻嘉言云八字系叔和增入推叔和之意欲為下文更感異氣變為溫瘧風溫溫毒溫疫等證章本因添此八個字大亂仲景原論遺旨愚因刪之若過十三日以上不間尺寸陷者大危病少瘥為間此承上文而言傷寒過十三日諸經之病熱猶然不瘥其脈尺寸沉陷者成注云正氣內衰邪氣獨勝故云大危此一節乃仲景以證合脈脈證相參之大法也愚按叔和參論仲景傷寒處輒以脈驗證如最前節云尺寸俱浮尺寸俱長俱弦等脈而云此是太陽陽明少陽等病又如下節云脈陰陽俱盛重感於寒變為溫瘧又云陽脈浮滑陰脈濡弱更遇於風變為風溫等四病反以脈為主而病由脈定以至後世之醫每每自矜神診專以不問病源為奇其乖錯可勝道哉縱使叔和精於診法不宜作此等論以誤後之學者若更感異氣變為他病者當依後壞證病而治之若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說按仲景言壞病止二條有太陽病不解之壞病有本太陽病不解轉入少陽之壞病皆以發汗吐下溫針病仍不解為醫所壞故云壞病然仲景於兩條之下皆云觀其脈證知犯何逆隨證治之豈有更感異氣變為溫瘧風溫溫毒溫疫等病亦與壞病同一治法者邪況仲景論中但言治壞病之法無治壞病之方叔和偏以此四種溫病皆因冬傷於寒所發且云脈之變證方治當如其所言依壞病之法而治之庶起叔和於今日而求仲景治壞病之方彼將何所指也又按上四種溫病喻氏尚論篇已辯其妄且此係叔和杜撰之文愚因起而刪之免致後學於脈上尋此四病又欲於仲景壞病條求治溫之方徒增疑惑耳凡人有疾不時即治隱忍異差以成痼疾小兒女子益以滋甚時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者患人忍之數日乃說邪氣入臟則難可制此為家有患備慮之要凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣若或差遲病即傳變雖欲除治必難為力服藥不如方法縱意違師不須治之上二節喻氏云此巴人下里之音因從刪例凡傷寒之病多從風寒得之始表中風寒入里則不消矣未有溫覆而當不消散者不在證治溫覆而當則在表之風寒已散不至傳入於裡不須再議湯藥故云不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除上言非大滿猶生寒熱是表雖解而未盡解也若但下之則病不除愚意云此是大柴胡湯證成注云非大滿是邪未收斂成實下之則裡虛而邪復不除猶生寒熱斯言誤矣若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也上言四五日不能為禍因醫人於四五日之傷寒每不敢輕用下藥要之下證悉具即用下藥實無所害非云證屬可下復可遲至四五日也愚意云此是大承氣湯證無疑若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣以上系仲景語以下叔和之論居多夫陽盛陰虛外臺秘要中作表和里病汗之則死下之則愈外臺作下之而愈汗之則死陽虛陰盛又作里和表病汗之則又作而愈下之則死按此節外臺中系王叔和之論考其原論雲表里何等徑捷快暢表病宜汗里病宜下汗下合法者愈相反者死自改作陰陽虛盛致令後人千言萬語註釋不明識者云此是成無己以表為陽以里為陰改其正文以見己之善注然亦無從徵也據坊本云陽盛陰虛此是熱邪鬱於里乃里實之證非真陰虛也若果陰虛豈可輕言下乎陽虛陰盛此是寒邪束於表乃表實之證非真陽虛也若果陽虛豈可輕言汗乎又陽盛當作熱甚看裡熱甚故宜下陰盛當作寒甚看表寒甚故宜汗夫如是則神丹安可以誤發甘遂何可以妄攻神丹甘遂想叔和時汗下之藥世醫之所通用故遂舉而作汗下之論耳按千金方有神丹丸見發汗第六第一方虛實外臺作表裡之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛外臺作表和則斃承氣入胃陰盛又作里平以亡此承上文復申言陽盛之病裡熱已極如誤投桂枝湯乃辛熱發表之藥反濟其裡熱之火其人焉得不斃然叔和何不曰麻黃下咽而必曰桂枝也愚以仲景論桂枝證皆系發熱汗出其陽明胃家實之證亦身熱汗自出則是上言陽盛者乃承氣湯證也當用承氣誤投桂枝此以陽明汗多實熱之條錯認作太陽汗出發熱之候所以承氣桂枝彼此多兩相誤服也若麻黃湯乃太陽經無汗之的藥與陽明濈然汗出之證兩不相侔不待智者自能分辯曷由而致誤也又陰盛之病表寒外束發熱如火醫人反認以為裡實熱甚誤投承氣焉得不亡成注引金匱云不當下而強與下之者令人開腸洞泄便溺不禁而死是以陰盛為裡寒之陰證誤矣死生之要在乎須臾視身之盡不暇計日此陰陽外臺作表裡虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞歿自謂其分至今冤魂塞於冥路死屍盈於曠野仁者鑑此豈不痛歟凡兩感病俱作治有先後發表攻裡本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其里言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何遠之有焉上二節辭義冗雜大半可刪凡發汗溫暖湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺病重者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也此一節辭義仲景已明注在桂枝湯下不宜於例中言之凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可複數按上言時氣病即四時傷寒皆是熱病熱病屬火仲景用水法者以水寒能勝火熱故也凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也更平聲厥其也凡得病之人其脈動數者或浮大者服湯藥後其人脈更遲或減小又人於初病時則躁亂服湯藥後得安靜凡此者皆是向愈之證凡治溫病可刺五十九穴人身之穴三百六十有五其三十穴灸之有害七十九穴刺之為災並中髓也按上云溫病即內經云熱病皆系傷寒之類刺熱病之法詳素問刺熱論又靈樞熱病論中愚以二篇經義悉心參閱合成刺熱病法在後第十四卷中凡治傷寒家不可不知此法蓋以熱邪之氣注入經絡一時湯藥不能取效非針則無以泄其熱況仲景亦有刺風池風府期門等法學醫者所當究心上言刺法略舉其端令人無可下手處此必是仲景刺熱遺論叔和偶撰入此脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損愚按傷寒系熱病熱病緣何有損脈此明系叔和增入刪之可也脈盛身寒得之傷寒脈虛身熱得之傷暑考素問刺志論云氣盛身寒得之傷寒氣虛身熱得之傷暑推內經之意以人形氣盛者身宜常溫而今反寒者蓋得之傷寒也此傷寒必是初起之寒乃太陽病未發熱之時也否則身寒二字不可為準抑人形氣虛者身宜常清而今反熱者蓋得之傷暑也此傷暑必是受夏月清涼之氣其人反無汗而身發熱也否則身熱二字亦不可為準愚按此二句辭義與上下文不相貫叔和竟自我作古以氣字改脈字成注亦隨文作解云傷寒者脈盛而身寒傷暑者脈虛而身熱自改脈字後則撰者注者遂相習於非而違經作解使後之學者察脈辯證每見脈盛者身未必寒而多熱脈虛者身未必熱而反涼至有以身寒之中寒為傷寒身熱之傷寒為傷暑世醫執此二語其錯誤將無窮矣況傷寒暑病仲景於傷寒例前言之已明何得更入死脈類中徒起疑端耳脈陰陽俱盛大汗出不解者死汗出後宜解不解者脈仍盛也脈陰陽俱虛熱不止者死是為正氣已虛不勝邪熱故也脈至乍疏乍數者死成注云此天真營衛之氣斷絕也脈至如轉索者其日死成注云此為緊急而不軟是中無胃氣故不出其日而死譫言妄語身微熱脈浮大手足溫者生逆冷身不熱手足不溫也脈沉細者不浮大也不過一日死矣是為脈證相反故死此以前是傷寒熱病證候也此指前七節之脈而言以其中有不言是何病之脈故復從而申明之也或云此總結傷寒例通篇之意成氏無注誠為缺義琥按上仲景傷寒例其中雜入叔和之論頗多金時成無己隨文混注不為分別至明萬曆間歙人方中行著傷寒條辯以其例非仲景書而削之近今時有西昌喻嘉言云此例乃叔和所作遂從而駁正其失復有程子郊倩更起而嫚罵之其毀訕前人失之太過愚家有宋板傷寒論其例首有四時八節氣候決病法此實出仲景手述非叔和所能道及今讀方喻程三家之書知尊仲景矣獨略仲景決病法而不載何昧昧也愚以傷寒例原系仲景之書其中有與內經相悖處大都是叔和所撰然叔和之言亦有可採處學者須悉心體認則前人之得失迥然自出予非故為是譭譽之端也所可笑者今醫活人之技萬分不及古人而指摘古人更甚噫抑何不自量之甚歟附昔賢傷寒例華元化云夫傷寒始得一日在皮當摩膏火灸即愈若不解者至二日在膚可法針服解肌散發汗汗出即愈若不解者至三日在肌復發汗則愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸微吐則愈若更困藜蘆丸不能吐者服小豆瓜蒂散吐之則愈視病尚未醒醒者復一法針之五日在腹六日入胃入胃則可下也若熱毒在胃外未入於胃而先下之者其熱乘虛便入胃則爛胃也然熱入胃病要當復下去之不得留於胃中也胃若實熱致此為病三死一生此輩皆多不愈胃虛熱入爛胃也其熱微者赤斑出劇者黑斑出赤斑出者五死一生黑斑出者十死一生病者過日不以時下之熱不得泄亦胃爛斑出琥按傷寒之邪自外而著於經絡入於胃腑故始得在皮繼在膚繼在肌更進而在胸在腹以入於胃入胃不解則熱不得泄胃爛而死者多矣據元化此論雖不言陰陽六經然其意實與仲景例相合其言在皮膚在肌者此即仲景三陽經未入於腑之病也其言在胸腹與入胃者此即仲景三陰經已入於腑之病也摩膏法惜今不傳針法及吐法傷寒科又不講俗醫所議者止汗下與和解三法而已汗下得宜猶可以為上工至有汗下和解錯治不效輕投溫補以治中寒法治傷寒其為害人不知幾許盍於上例一致思之或問云元化摩膏火灸法此以熱藥治寒證也子何以傷寒為熱病邪予答云經言發表不遠熱仲景治太陽病一二日用麻黃桂枝二湯以發之亦甘溫辛熱之劑至邪已入里叔和即相戒云桂枝下咽陽盛即斃明乎此則治傷寒之法可無誤矣巢元方云傷寒者起自風寒入於腠理與精氣交爭營衛痞隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表洗浴發汗即愈病三日以上氣浮在上部胸心填塞故頭痛胸中滿悶當吐之則愈病五日以上氣深千金作沉結在臟故腹脹身重骨節煩疼當下之則愈在臟髒字當作腑字解仲景云已入腑者可下而已其義相通或疑骨節煩疼當是太陽表證未罷恐不宜下殊不知上云腹脹此為胃腑實熱已極熱氣自內蒸發於外所以骨節煩疼巢氏用下法至當無疑琥按上巢氏治傷寒不過用汗吐下三法乃知其病總系實熱之證與仲景汗下例同出一義劉守真云傷寒表證當汗而不可下里證當下而不可汗半在表半在裡則當和解不可發汗吐下在上則通之在下則泄之傷寒無汗表病里和者則麻黃湯汗之或天水散之類亦佳表不解半入於裡半尚在表者小柴胡湯和解之或天水涼膈散甚良表裡熱勢俱甚者大柴胡湯微下之更甚者大承氣湯下之表熱多裡熱少者天水一涼膈半和解之裡熱多表熱少未可下者涼膈天水一半調之勢更甚者小承氣湯下之表證解但有里證者大承氣湯下之凡此諸可下者通宜三一承氣湯下之發汗不解下後前後別無異證者通宜涼膈散調之以退其熱兩感仿此而已傷風自汗表病里和者桂枝湯解肌半在表半在裡白虎湯和解之病在裡者大承氣湯下之琥按上守真氏論治傷寒法所取仲景汗下和解之方自麻黃桂枝二湯外不過是大小柴胡大小承氣及白虎湯又復自制天水散涼膈散三一承氣湯大都是甘寒苦寒辛涼之劑此以傷寒之病表裡俱熱以寒治熱固其宜也但上文云傷寒表證無汗用麻黃湯之時復云或天水散之類亦佳斯言不可為例夫天水散乃甘寒之藥縱用蔥豉之苦辛煎湯調服但能清陽明氣分肌肉間熱何能散太陽經皮表之寒氣邪經云發表不遠熱麻桂之辛熱亦傷寒初起時必用之藥若謂寒氣所郁發熱過甚竟以滑石一味為君而欲清之遂謂表病之能愈吾不信矣至於邪已入里熱勢甚而用三一承氣或表裡俱熱而用天水涼膈斯為治熱病之要法學者所當參合而用其方也張子和云凡人冒風時氣溫病傷寒三日以里頭痛身熱惡寒可用通聖散益元散入生薑豉蔥煎一大碗去滓稍熱先以多一半投之良久用釵子於咽喉中探引吐了次用少半亦稍熱投之更用蔥醋酸辣湯投之衣被蓋覆汗出則愈矣如遇世亂內經曰歲火太過炎暑流行火氣太盛肺金受邪上應熒惑大而明現用辛涼之劑解之則萬舉萬全也若遇治世人安可用升麻湯葛根湯敗毒散辛溫之劑解之亦加蔥根白豆豉上湧而表汗內經曰因其輕而揚之揚者發揚也謂吐汗以發揚寒熱之邪也世亂者謂疫氣傳染人病卒暴而死之時也治世人安謂人病不卒暴而痊安者多又云傷寒溫疫時氣冒風中暑俱四時不正之氣也人若初感之皆頭痛惡寒身熱及寒熱往來腰脊強是太陽經受病也內經曰可先治內而後治外先用生薑蔥白豆豉煎雙解散上湧及汗出則解如不解者至五六日或不大便喘滿譫語實熱兩手脈沉可用調胃大小承氣湯下之此先治外而後治內也先治內後治外謂先湧之是治內吐時汗出即是治外先治外後治內謂汗後不解方用下藥傷寒七八日發黃有斑潮熱腹滿者或痰實作止雖諸承氣湯下過者仲景云寸口脈浮滑者可用瓜蒂散吐之啟玄子云上盛不已吐而奪之是也琥按上吐汗之法極是但云投以蔥醋酸辣湯不可為則雖經云酸者令人上湧然其性能收斂外寒湯中之醋不宜用也又上云溫疫時氣冒風中暑總以傷寒貫之可見熱病所該者廣其名雖異而治法頗同矣王海藏云冬傷於寒春必溫病蓋因房室勞傷與辛苦之人腠理開泄少陰不藏腎水涸竭而得之無水則春木無以發生故為溫病至長夏之時時強木長因絕水之源無以滋化故為大熱病也傷寒之源如此春為溫病夏為熱病長夏為大熱病其變亦隨乎時而已邪之所感淺者其病輕而易治深者其病重而難治尤深者其病死而不治琥按上海藏之論是三秋時無傷寒矣蓋古人言不盡意上文既云變隨乎時則秋令多燥熱秋之傷寒當為燥熱病至深秋時則同正傷寒矣至於治法則隨其邪之淺深熱之輕重或汗或吐或和解及下在學者通變用之而已陶節菴云傷寒者冬月寒邪傷於足太陽經即時病者為正傷寒其證便有頭疼發熱惡寒脈浮緊而無汗治宜發表自然熱退身涼若傳陽明經便有目痛鼻乾不眠脈微洪之證治宜解肌若傳至少陽經便有胸脅痛而耳聾寒熱嘔而口苦脈弦數之證治宜和解表裡若表證皆除傳進三陰反見怕熱揭去衣被燥渴譫語潮熱斑黃往亂大便不通脈沉實而有力治宜急下大便通而其熱愈矣若傷風者初起頭疼發熱惡寒脈浮緩自汗鼻塞聲重此名傷風亦是太陽病起若傳至各經依前傷寒條下治之其春夏秋三時雖有惡寒身熱微頭疼即為感冒非時暴寒之輕非比冬時正傷寒為重也琥按上節菴論傷寒三陽經證傳入三陰大便不通治宜急下據仲景法凡云急下者皆用大承氣湯夫三陰有太少厥之不同而治法總以一湯下之者何也蓋仲景云三陰證已入於府者可下而已其時病人腸胃實熱已極陰經近里熱氣蒸郁三陰之經當見腹滿嗌乾口舌燥渴煩滿囊縮等證但用承氣湯下其腸胃中之實而陰經之熱自解所以陰經有三用藥治之止一法也至於仲景論太陽中風中與傷同一義與傷寒無異但以脈緩自汗為別陶氏云鼻塞聲重此即丹溪所云傷風屬肺戴院使云新咳嗽者是也其證飲食如故大小便如常乃另是一種病烏得入於太陽經例見證不明徒遺世誚琥總按上昔賢論傷寒例大都宗內經熱病之旨且其義與仲景傷寒例互相發明故其治法或汗或吐或下或和解或針刺無殊療也讀仲景書者可不玩索而旁通之
