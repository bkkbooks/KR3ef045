body:
  text: 卷之十辨厥陰病脈證並治法此係仲景原文厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止此條厥陰病乃總言病熱之大綱也成注云邪傳厥陰則熱已深而成消渴消渴者飲水多而小便少也厥陰屬木肝木過旺則腎水不足以滋之故水易消而渴不止氣上撞心心中疼熱者火生於木氣即是火火性急速以故上逆之勢如撞肝相火也心君火也以火犯火火熱亢極心中則疼飢不欲食者胃屬土火熱則土偏燥故飢木強則土受制故不欲食也食則吐蛔者蛔胃中長蟲也蛔居胃中因人不食則飢而上膈故一聞食臭即上逆而吐出也厥陰經邪熱橫逆於臟腑之間故見以上諸證實則胃中空虛無物可下若漫下之則木乘所勝利遂不止而成土崩之勢矣愚按此條論乃仲景約言病熱之大綱以故不及治法設誤下之而利不止者宜以理中湯救之厥陰中風脈微浮為欲愈不浮為未愈未言傷寒而先言中風者亦猶太陽病例先出中風條也論例中原云厥陰受病尺寸脈俱微緩愚已校正當是沉弦之誤蓋寒為沉而風為弦也茲者風已傳入脈見微浮成注云此邪氣還表向汗之時故云欲愈不浮則邪氣深入正多變證故云未愈也或問仲景但云脈微浮不言中風形證何以知為厥陰病余答云病人必見消渴或氣上撞心心中疼熱一二證而後謂之厥陰病也王宇泰云仲景立法凡曰厥陰病者皆氣上撞心痛吐蛔也言雖如此亦不可拘厥陰病欲解時從醜至卯上注已見前第三卷太陽上篇厥陰病渴欲飲水者少少與之愈厥陰病渴傳經之邪熱已深欲飲水則邪熱有向外之機蓋木火亢盛得水濟之則陰陽氣和而病自愈或問厥陰原有消渴一候不言自愈此條渴何以與之水即愈也余答云武陵陳氏云消渴者熱甚而津液消爍雖飲水不能勝其燥烈乃邪氣深入未愈之徵也此渴欲飲水其熱非消渴之比乃邪氣向外欲解之象也兩者自是不同諸四逆厥者不可下之虛家亦然此言厥陰逆厥之端也成注云四逆者四肢不溫厥者手足冷也邪傳厥陰陽氣內陷陰氣已微陽氣內陷則外不與四肢相接故逆而厥陰氣已微則內不能守於臟腑故不可下若輕下之則內陷之陽熱未去將幾微之真陰反隨之而亡矣在仲景於後條雖云熱厥者應下之然方其逆厥之時下之一法不輕試也諸字是該下文諸厥之條而言虛家亦然者言人於未病之前氣血本虛家雖病熱厥亦不可下成注引金匱云虛者十補勿一瀉之此是言其平日若病傷寒不可取以為例也愚按此條論仲景無治法補亡論常器之云可當歸四逆湯誤矣當先以四逆散調之傷寒先厥後發熱而利者必自止見厥復利先厥後熱乃陰寒也發熱是陽氣自復故利止見厥是陰氣還勝故復利此條病名為傷寒而實中寒證正文與注見中寒論中傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也索蘇故切當作素此條病先發熱而後厥乃傷寒傳經邪熱伏匿之證也始發熱者邪自三陽經起也熱至六日邪傳厥陰陽氣內陷因而見厥協熱下利反九日之久者邪熱伏於裡不能還於表也凡厥利者多胃氣下陷當不能食今反能食者恐是除中之證除中者胃中之真氣所餘無幾將欲盡除求救於食如燈將滅而復明之意當以索餅試與食之以觀其發熱與否其不驟發熱者此非除中知胃中真氣尚在其厥與利必漸自愈其發熱者是為暴熱恐其驟來則能食出即來也既來而復驟去者此胃中真氣得食而盡泄於外即名除中而必死矣若然則是厥利之人食以索餅但慮其熱之暴耳使其於九日之後其熱悠悠又三日脈之而熱續在者此言診之而前已發熱六日矣茲則復熱三日故云續也此其人內陷之陽氣漸還而復於四肢之間可期之於旦日前夜半後病當向愈蓋自醜至卯為厥陰欲解之時也所以然者以熱與厥期無太過不及而相應故當愈也如愈後又三日脈之而脈數仍不罷此為邪熱之氣尚有餘留條辨云厥陰主血血熱持久則壅瘀腐化而為癰膿所不免耳愚按此條論仲景無治法補亡論郭白雲云可服千金漏蘆湯蓋此湯即漏蘆連翹湯也治時行熱毒變作赤色癰疽者若未發癰膿之前厥利發熱還宜以白頭翁湯主之傷寒脈遲六七日而反與黃芩湯徹其熱云云至腹中應冷當不能食今反能食此名除中必死此條病雖名傷寒實則中寒證也上條除中是熱邪此條是寒邪正文與注見中寒論中傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹云云至便膿血者其喉不痹此條傷寒亦中寒之證蓋先厥後熱為真寒但寒極亦能變熱熱氣上行則為喉痹熱氣下行則便膿血後條辨云此得毋辛溫過劑所致亦猶熱病過用涼藥而變成寒證也愚以既變之後雖從中寒例當以治雜病法治之注詳中寒論中傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤此條乃傳經邪熱陽極似陰之證傷寒一二日至四五日而厥者言傷寒在一二日之時本發熱至四五日後而厥者乃邪傳厥陰之候也必發熱者言病人四肢及肌表雖厥而軀殼以內必發熱也前熱者後必厥乃申明一二日為前四五日為後以見熱極必發厥也成注云此為陽氣內陷厥深熱深厥微熱微隨陽氣內陷之深淺也陽邪深伏應須以苦寒之藥下去其熱使陰氣得伸則陰陽平四肢和順而不厥矣粗工見厥認以為寒而反用辛溫之藥以強發其汗辛溫皆升引熱上行必口傷爛赤以厥陰之脈循頰裡環唇內故也補亡論郭白雲云仲景言厥應下之者謂有當下之厥而誤汗非謂厥皆可下也故仲景又曰諸四逆厥者不可下或問厥證應下當用何藥余答云尚論篇舉厥陰篇末下利譫語條而用小承氣湯因本篇中別無下藥故耳殊不知此條系陽明篇錯簡若審證用藥厥時四肢冰冷過乎肘膝甚至有肌表皆涼脈伏匿者用四逆散熱回脈沉數大便難者方宜小承氣如脈沉實大便不通者還宜大承氣湯下之口傷爛赤者宜黃連解毒湯傷寒病厥五日熱亦五日設六日當復厥不厥者云云至故知自愈此條傷寒先厥後熱是亦中寒證也正文與注見中寒論中凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也以上數條皆言厥證而未詳其厥之義故於此節特申明之成注云手之三陰三陽相接於手十指足之三陰三陽相接於足十指陽氣內陷不與陰氣相順接故手足為之厥冷也愚以人之肢體皆屬陰氣附則溫而生氣離則冷而死陽氣主外陰氣主內成注云陽氣內陷而厥乃陰氣已微陽熱用事當是熱厥若寒厥則陰寒用事陽氣將外脫矣何由而反內陷邪學者其試思之傷寒脈微而厥至七八日膚冷云云至此為藏厥非為蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩此為藏寒蛔上入膈云云至烏梅丸主之又主久利方按上條傷寒曰藏厥曰蛔厥藏厥固系無陽證即蛔厥亦為藏寒此非首條厥陰病心中疼熱吐蛔比也正文與注並烏梅丸方並詳中寒論中傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血此條傷寒乃先熱後厥亦為熱厥之證熱少厥微陽氣內陷之淺者也惟厥微故但手足指頭寒惟熱少故雖煩躁止默默不欲食也條辨云厥陰之脈挾胃故不欲食過數日小便色白欲得食此邪熱除而胃氣復其病不治而自愈矣若厥而嘔加之胸脅煩滿者厥陰脈不但挾胃兼貫膈布脅肋乃厥深而熱亦深也成注云厥陰屬肝主血其後數日內熱不去迫血下行必從大便中出也按此條論仲景無治法補亡論郭白雲云熱不除而便血可犀角地黃湯病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也此條系真寒證正文與注見中寒論中傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血此條傷寒先發熱後見厥亦熱厥也厥後復熱此為真陰氣復陽邪還表故以厥日少熱日多為陰陽順接其病當愈之徵然熱不除為陽邪過勝成注云內搏厥陰之血其後必大便膿血按此條論仲景無治法補亡論常器之云可桃花湯誤矣愚以仲景黃芩湯可借用之傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也此條證與上條相反乃真寒厥也正文與注詳中寒論中傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死此條傷寒乃中寒也脈微厥冷為真寒煩躁是假熱灸法詳中寒論中傷寒發熱下利厥逆躁不得臥者死此條及下條皆厥逆死證也傷寒發熱則不當下利而厥逆矣今者既發熱又利而厥加之躁不得臥為陽氣擾亂陰氣亦隨之而絶矣陰陽交絶故主死也傷寒發熱下利至甚厥不止者死此承上文而言傷寒發熱縱未至於躁不得臥但利而厥不止亦是死證成注引金匱云六府氣絶於外者手足寒五臟氣絶於內者利下不禁臟腑氣絶故主死也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也此條乃真陽氣脫之證正文與注詳中寒論中傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死濡上演切與軟同此條病系邪傳厥陰熱厥中不可下之證也傷寒五六日邪氣傳裡當作裡實之時不結胸腹濡者邪不實也脈虛者血自虧也厥陰之脈挾胃貫膈使其邪果實則其胸必結而其腹必不濡厥陰藏血使其血不虧則其脈亦不至於虛矣茲者胸不結腹又濡脈又虛而其人復厥冷者不可下此為陰血素虧血為陰無陰則陽無以附故發厥也若誤下之重亡其陰必主死也愚按此條證本系先發熱而後發厥故云復厥且其厥亦不甚故云不可下也若熱深仲景應下之矣又按補亡論常器之云可當歸四逆湯誤矣復云人參湯愚意云湯中宜更加涼藥以清補之發熱而厥七日下利者為難治發熱而厥陽邪傳裡也至七日則陷內之陽當回覆於外而厥止在裡之陰氣亦當伸而熱除矣今則不惟不止反加下利則陰氣消亡故為難治成注云邪氣勝裡氣虛愚以邪氣勝者陽邪之氣勝也裡氣虛者真陰之氣虛也諸家注認以為真陽氣虛大誤之極傷寒脈促手足厥逆者可灸之此係真寒證故宜火灸正文與注見中寒論中重出例傷寒脈滑而厥者里有熱也白虎湯主之注已見前第六卷陽明篇中手足厥寒脈細欲絶者當歸四逆湯主之當歸四逆湯方若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之上二條皆真寒證正文與注並湯見中寒論中大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗若大下利而厥冷者四逆湯主之上二條皆真寒證系誤發其汗而亡陽者正文與注並湯俱見中寒論中病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散此條證乃厥陰病用吐之法也病人者厥陰病之人也言病則氣上撞心痛之義已該其中厥冷而但云手足乃厥之微者也厥則陽邪內陷脈不當緊今則脈乍緊者知邪氣僅結於胸未入於胃邪結故脈緊也邪在胸中故心下滿而煩胃無邪故飢不能食者胸邪窒塞於食有礙故雖飢而不能食也仲景法邪在胸中者宜吐之故與瓜蒂散以吐胸中之邪瓜蒂散方已見前第五卷太陽下篇傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也此條乃厥陰病熱消渴以後之變證也成注引金匱云水停心下則悸茲則厥而心下悸者明系消渴飲水多寒飲留於心下胸中之陽不能四布故見厥此非外來之寒比也故仲景之法宜先治水須與茯苓甘草湯而治厥之法卻在其中蓋水去則厥自除也不爾者謂不治其水也不治其水水漬而下入於胃必作濕熱利也諸家注皆以陰寒為厥謂仲景另有治厥法誤矣至補亡論郭白雲以四逆湯治厥大誤之極茯苓甘草湯見前第四卷太陽篇中或問曰吾子既云厥陰病熱消渴飲水多水停心下而厥則是心下者即胃脘之分也仲景又云不爾水漬入胃若是乎寒挾水濕又從外而入豈消渴所飲之水不在胃以內邪余曰不然仲景言胃中者即腸中也據陽明篇云云胃中有燥屎五六枚則此胃中者非腸中邪若然則是仲景言心下者果系胃脘言入胃者即胃以下而接於腸中也水停心下浸漬而下入於腸故作利也或又問茯苓甘草湯仲景用以治太陽府有停水兼主經中風邪未盡之藥與上證若不相涉何為而借用之也余答云仲景法有一方而治兩經之證者茯苓甘草湯兼治厥而心下悸實防水漬入胃之藥胃土也補土所以勝水故用茯苓甘草又生薑辛溫亦能助胃桂枝雖走太陽之藥其辛溫之性亦能借以助胃而散水又胃陽也水陰也胃有積水則陽氣不能四布薑桂之性用以行胃陽而外達於四肢之間卻治厥也譬之熱證多服寒藥當以辛熱之味縱治同一理耳傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之此條病系熱厥下後之危證成注云傷寒六七日邪傳厥陰之時大下後寸脈沉而遲者肺脾陽氣下陷也下部脈不至則肝家之陰亦復衰竭陰陽不相順接以故手足為之厥逆也厥陰之脈貫膈上注肺循喉嚨之後下後因亡津液遂成肺痿咽喉不利而唾膿血也成注引金匱云肺痿之病從何得之被快藥下利重亡津液故得之復泄利不止者陽氣下陷於陰分陰氣衰竭故難治也與麻黃升麻湯用以升陽和陰潤肺補脾調肝而成萬一之功耳麻黃升麻湯方麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖石膏碎綿裹白朮乾薑芍藥天門冬去心桂枝茯苓甘草炙各六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈成注引玉函曰大熱之氣寒以取之甚熱之氣以汗發之麻黃升麻之甘以發浮熱正氣虛者以辛潤之當歸桂薑之辛以散寒上熱者以苦泄之知母黃芩之苦涼心去熱津液少者以甘潤之茯苓白朮之甘緩脾生津肺燥氣熱以酸收之以甘緩之芍藥之酸以斂逆氣葳蕤天門冬石膏甘草之甘潤肺除熱琥按上仲景方既系錯雜成氏注又多差誤況系厥陰難治之證醫人何以措手琥又按上湯乃肺脾之藥而兼走肝麻黃升麻升肺脾之陽也知母黃芩石膏葳蕤天門冬能清肺家之燥熱以下後則津液重亡兼之唾膿血則肺愈燥而熱故也白朮茯苓炙甘草溫補脾虛兼主泄利下多亡陰故以芍藥當歸和補中下二焦之陰肝與脾兼受其益也用乾薑者溫中氣以濟知芩石膏之寒也用桂枝者調營衛而兼升陽之用也服藥令盡使汗出愈者非用上藥以發汗此以見陰陽和則汗微出而厥逆等候自除之意傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也此條乃言厥陰腹痛將欲自利之證也傷寒四五日邪氣傳裡之時腹中痛者凡三陰之經皆走腹若腹中更有轉氣下趨少腹此為厥陰經腹痛明矣裡氣虛而遇邪熱故不上結於胸遂下移於腸欲作自利之證按此條論仲景無治法愚意云未利者宜四逆散已利者宜白頭翁湯補亡論常器之云宜四逆湯散愚以湯散寒熱相反何得誤用傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之此條乃言厥陰傷寒過於吐下之變證也本自寒下者謂病人平日胃氣本自虛寒而下利也厥陰病邪結胸中心下煩滿者固當吐前熱後厥者應宜下醫人倘不顧其寒熱虛實而吐之下之凡吐下之藥又皆苦寒寒格者兩寒格拒其熱為上寒下熱故其人更逆吐下謂病上吐下利為更逆而甚也食入口即吐者此形其逆之至也用乾薑芩連人參湯者以開寒格清中下二焦熱而兼補裡虛也乾薑黃連黃芩人參湯方乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服成注云辛以散之甘以緩之乾薑人參之甘辛以補正氣苦以泄之黃連黃芩之苦以通寒格琥按上成注云芩連寒格其言大謬條辨云其反佐更謬之極愚以上方用乾薑之辛熱通寒格而止吐逆也芩連之苦寒泄伏熱而堅下利也人參之甘溫助胃虛而益正氣也且也乾薑人參以調陽黃連黃芩以和陰陰陽和平而格逆吐下自除矣下利有微熱而渴脈弱者令自愈此傳經熱利自愈之證也陽邪傳裡而至下利則熱當少衰故以微熱為邪退渴則知其非寒利矣且下利則津液亡故渴凡下利脈宜微小而弱茲則脈弱知熱邪已退正氣將復之象故云令自愈也下利脈數有微熱汗出令自愈設復緊為未解此傳經熱利有愈有未解之證也熱利脈數與脈弱相反未可言愈所喜者熱微汗出則陽邪還表胃家之真氣復故令自愈設脈復緊者始則寒邪在表而脈緊茲已傳裡寒化為熱其脈復緊當是實邪壅塞胸膈而作痛之診故為利未解也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死此條系真寒證正文與注見中寒論中重出例少陰負趺陽者為順也此條證已見前少陰篇中下利寸脈反浮數尺中自澀者必清膿血此條乃下利變膿血之候也熱利而得數脈非反也得浮脈則為反矣茲者寸反浮數此在裡之邪熱不少斂也尺中澀者陰虛也陽邪乘陰分之虛則其血必瘀而為膿血清圊同廁也言如廁則所下者皆膿血也按此條論仲景無治法補亡論常器之云宜桃花湯誤矣愚意云宜以仲景黃芩湯代之下利清穀不可攻表汗出必脹滿此條系真寒直中於里當是太陰經錯簡正文與注詳中寒論中下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死此辨熱利之脈也脈沉弦者沉主裡弦主急故為裡急後重如滯下之證也脈大者邪熱甚也脈經云大則病進故為利未止也脈微弱數者此陽邪之熱已退真陰之氣將復故為利自止也下利一候大忌發熱茲者脈微弱而帶數所存邪氣有限故雖發熱不至死耳按成注云脈微弱數為邪氣微而陽氣復發熱由陽勝此以熱利作寒利解大謬之極附例熱利下重者白頭翁湯主之條辨云此申上條而出其治下重者厥陰經邪熱下入於大腸之間肝性急速邪熱甚則氣滯壅塞其惡濁之物急欲出而不得故下重也主以白頭翁湯者以泄熱而厚腸也白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升成注引內經曰腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之琥按成注云腎欲堅急食苦以堅之以腎開竅於二陰故也琥又按下焦者腎肝所主肝主疏泄而反下重者邪熱壅瘀氣滯而不行也條辨云白頭翁逐血以療澼秦皮洗肝而散熱黃連調胃而厚腸黃柏除熱而止泄成注云四味皆苦寒愚以白頭翁獨帶辛溫故泄熱之中而兼散邪之力也下利欲飲水者以有熱故也白頭翁湯主之此條雖無下重之證然熱利內亡津液故欲飲水白頭翁湯不但堅下焦兼能清中熱以湯中有黃連故也熱清則津液回飲水止而利自除矣上二條證並湯即從本篇之後移附於此下利脈沉而遲其人面少赤身有微熱下利清穀者云云至其面戴陽下虛故也此條系真寒證正文與注見中寒論中下利脈數而渴者令自愈設不瘥必清膿血以有熱故也此條亦熱利變膿血之證下利而渴者熱也脈數為熱未解曰自愈者其脈必數中帶虛而其渴為未甚也設脈數渴甚為不瘥必清膿血以在裡有鬱熱故也按此條論仲景無治法補亡論常器之云可黃芩湯下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死此條系真陰證然亦有熱利過用涼藥而變成是證者醫人不可以不察也正文與注見中寒論中傷寒下利日十餘行脈反實者死此條乃熱利必死之脈證也始由傷寒繼則下利乃熱邪傳入於陰經也然利至一日十餘行則熱邪之勢宜少減脈當虛弱而帶數矣今則脈反實者邪氣勝也故主死下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此條系真寒證正文與注見中寒論中重出例熱利下重者白頭翁湯主之已見前下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此條系真寒證正文與注見中寒論中重出例下利欲飲水者以有熱故也白頭翁湯主之已見前下利譫語者有燥屎也宜小承氣湯已見前第六卷陽明病小承氣湯方下下利後更煩按之心下濡者為虛煩也宜梔子豉湯上條證已見前第四卷太陽病梔子湯方下嘔家有癰膿者不可治嘔膿盡自愈此條當是陽明經錯簡成注云胃脘有癰則嘔而吐膿不可治嘔者以治嘔之藥皆辛溫也得膿盡嘔即自愈或問胃脘癰於何得之余答云始由風寒之邪蘊於經絡繼則入於胃府變而為熱熱甚則氣瘀血積而為癰癰者壅也言熱毒壅聚而成膿也嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之上二條系真陰證正文與注見中寒論中重出例嘔而發熱者小柴胡湯主之已見前第七卷少陽篇小柴胡湯方下傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也此條傷寒乃熱傳厥陰誤治之變證也厥陰證雖有吐下之方而無大吐下之法如瓜蒂散承氣湯仲景不過暫假之以吐胸中之邪下里熱之厥耳茲則大吐下之者醫人必過用瓜蒂散及大承氣湯故至胃氣虛極也復於吐下之後復極發其汗者何也以其人外氣怫鬱怫鬱者言其人面上之氣恰如外來之邪怫鬱於表也此係陽明胃府虛極浮熱之氣上升於面醫人認以為邪熱胃燥過極不得汗復與之水以助其發汗因而得噦噦者千金方謂之噦逆俗云冷厄是也所以然者胃中虛極又繼之以冷水虛寒相搏故成噦也愚按此條本系傳經熱病既服涼藥復飲冷水涼冷過勝故成胃寒之證諸家注皆以吳茱萸湯主之者不過暫用之以補胃虛散寒飲也愚以理中湯亦可借用之傷寒噦而腹滿視其前後知何部不利利之則愈此條傷寒乃邪傳厥陰熱鬱於裡而成實噦之證也厥陰之經抵少腹挾胃上入頏顙凡噦厄之氣必從少腹而起由胃而上升於咽顙故也噦而腹滿者必其人前後便不利水火之氣不得通泄氣不通泄反逆於上而作噦也須大小便通利而噦自愈按此條論仲景無治法補亡論常器之云前部不利豬苓湯後部不利調胃承氣湯愚以湯名調胃而芒硝太峻恐厥陰無大下之法須以小承氣湯微利之琥按以上方論乃仲景治厥陰病法也厥陰病有真寒有熱病今止摘傳經熱病三十餘條一一為之解説使後學治厥陰一經切毋誤溫亦毋大下其因證制宜自有一定之良法寓於圓機活變之中耳附昔賢治厥陰病方論變法龐安時云尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮微緩者囊必不縮若尺寸俱沉短者囊必縮宜承氣湯下之琥按上龐氏云云即仲景論例中語也其言微緩者囊必不縮此以見論例中凡言脈處皆不可拘也其言沉短者囊必縮宜承氣湯下之愚以沉短囊縮恐非是下證若論脈當沉中帶弦或帶數疾按之有力斯為下證悉具當以小承氣湯微利之王海藏云厥陰證煩滿囊縮大小便不通發熱引飲腹滿脈尺寸俱微緩又云脈沉疾按之有力者為陽陽則當下宜大承氣湯琥按王氏云厥陰證煩滿囊縮大小便不通發熱引飲腹滿則脈不當微緩矣其曰尺寸俱微緩者此仲景論例中語也其曰脈沉疾按之有力是為脈證相符決當議下但其用大承氣亦太峻厲蓋熱傳厥陰陽邪久郁真陰內消若用峻厲之藥則陽邪雖得外泄而幾微之陰氣亦隨之而脫矣故余立議云若用下藥止須以小承氣湯微利之活人書問手足逆冷而大便祕小便赤或大便黑色脈沉而滑答曰此名陽證似陰也重陽必陰重陰必陽寒暑之變也假令前證其脈沉而滑者皆陽證也輕者白虎湯甚者承氣湯傷寒失下血氣不通令四肢逆冷此是伏熱深故厥亦深速用大承氣加分劑下之汗出立瘥仲景所謂熱厥應下之者此也琥按上朱氏論因仲景云熱厥應下傷寒論有法無方故採仲景之方而補之也其言輕者白虎湯此是仲景云傷寒脈滑而厥者里有熱也宜白虎湯主之愚以此條當是陽明篇錯簡蓋白虎湯乃解肌散熱之藥熱病服之有汗出而解者獨不聞仲景云熱厥應下不可反發汗邪茲用白虎湯雖非辛熱發散之比據上朱氏云加分劑下之汗出立瘥則是熱厥不但應下並宜使出汗矣倘後學觀之更用他藥反發其汗豈不大誤故余於仲景熱厥應下之條云厥深者用小承氣緩下厥微者宜四逆散調之活人五味子湯方治傷寒喘促脈伏而厥人參麥門冬去心杏仁去皮尖橘皮去白各二錢半五味子半兩生薑二錢半棗子三枚破上銼如麻豆大水二大白盞煮至一盞去滓分作二服琥按上主療云喘促脈伏而厥當是手厥陰心包相火兼挾邪熱怫鬱於內而發厥也故上湯大能清心其兼潤肺者以火盛防爍金也第湯中用薑棗人參嫌其太補此當是傷寒後邪氣已微真陰虛內熱不解而外發厥者方宜用之又李根湯方治氣上衝正在心端半夏湯洗半兩當歸芍藥茯苓各一分桂枝一兩黃芩甘草炙各一分甘李根白皮二合上銼如麻豆大每服鈔五錢匕生薑四片水一盞半煎至八分去滓溫服琥按上主療云治氣上衝正在心端此為厥陰經病蓋沖字即撞字之義也仲景於厥陰篇首條言證皆無方治故朱氏採此方治上證李根甘寒微酸得木之正氣大能走厥陰治消渴止心煩逆氣故以之為君也諸藥劑皆滋陰降火清導逆氣惟半夏桂薑為辛溫之劑意者氣上衝心與水停心下而悸相仿或者消渴所飲之水未行可用也否則寧勿服之劉河間云蓄熱內甚陽厥極深以陽氣怫鬱不能營運於身表四肢以致通身清冷痛甚不堪項背拘急目青睛疼青睛屬肝肝熱甚則疼青睛疼者其人目脈當赤若以目色青作解誤矣昏眩恍惚咽乾或痛躁渴虛汗嘔吐下利腹滿實痛煩冤悶亂喘急鄭聲脈雖疾數以其蓄熱極深而脈道不利反致沉細而欲絶或始得之陽熱暴甚而便有此證候者或兩感熱勢甚者通宜解毒湯加大承氣下之熱不退者宜再下之古人云三下之而熱未退即死矣然亦有按法以下三五次熱方退而得活者免致不下退其熱而必死也下後熱少退而未愈者黃連解毒湯調之或失下熱極以致身冷脈微而昏冒將死者若急下之殘陰暴絶而死陽熱亢極則所餘之陰氣無幾故云殘陰蓋陽氣後竭而然也然不下亦死宜涼膈散或黃連解毒湯或二藥合服或白虎合涼膈散養陰退陽積熱漸以宣散則心胸溫暖脈漸以生至於脈復有力方可三一承氣湯下之或解毒加六一散調之愈後尚宜服退熱之藥裡熱脈滑而厥者宜白虎湯熱極厥深諸藥下畢竟不能利者不救必死黃連解毒湯更加甘遂末一錢匕下之諸湯散俱見前第六卷陽明篇中六一散見前第五卷太陽篇後惟解毒湯附下直格黃連解毒湯方黃連去須黃柏黃芩大梔子各半兩上銼如麻豆大每服五錢水一盞煎至四分絞取汁溫服無時日三四服以效為度琥按上劉氏論熱厥一條可為暢發仲景之旨無餘蘊矣但其用藥有治氣分熱而發厥者有治血分熱而發厥者學者所宜分別有如解毒湯承氣湯此治血分熱之藥也白虎湯六一散此治氣分熱之藥也又涼膈散及解毒湯加甘遂末此氣血兼走之藥也倘一概混用不無有誤余以邪傳厥陰病熱已久其人真陰之氣有限若大承氣三一承氣湯中芒硝宜審用之婁全善云熱厥者初中病必身熱頭痛外別有陽證二三日至四五日方發厥兼熱厥者厥至半日卻身熱蓋熱氣深方能發厥須在二三日後也若微厥卻發熱者熱淺故也其脈雖伏按之而滑者為裡熱其人或畏熱或飲水或揚手擲足煩躁不得眠大便祕小便赤外證多昏憒者知其熱厥也白虎承氣湯隨證用之琥按上婁氏論及所用之藥與朱奉議所言熱厥之義相仿至其辨二三日四五日又言初中病必身熱頭痛方能發厥此皆闡揚仲景極切要處或問厥陰病消渴氣上撞心心中疼熱飢不欲食食則吐蛔此熱鬱於胃而吐長蟲也諸家皆以仲景治蛔厥證烏梅丸主之是邪非邪余答云烏梅丸治胃中虛冷而蛔厥乃厥陰直中之寒證也今者邪傳厥陰胃中實熱火氣上逆故暴飢欲食復不能食而吐蛔也烏梅丸中如桂附細辛辛熱之劑太甚何可用邪陶尚文祕方有理中安蛔散方中用參朮為主余復嫌其太補緣立清中安蛔湯以主之新增清中安蛔湯方治胃實熱嘔吐長蟲黃連薑汁炒三錢黃柏酒炒錢半枳實麩炒二錢烏梅三個川椒去目炒去汗三十粒上五味共劑水二鍾加生薑三大片煎八分細口服琥於上方用黃連生薑者以清中而止嘔也復加黃柏烏梅川椒者蛔得苦則安得酸則止得辛則頭伏也用枳實者泄胃實也如病人胃中虛熱而嘔者去枳實加人參一錢五分琥總按以上方論乃治厥陰熱病通變之活法也厥陰所難治者惟發厥一證據仲景論中真寒之厥十居其七鬱熱之厥十止二三以故今醫治厥每以熱證作寒治者其誤良多殊不知寒厥證仲景治法雖多而病者十不得一熱厥證仲景治法雖少而病者十居其九愚因集昔賢續論附於仲景原論之後學者誠能通變觀之則庶乎其不瘥矣
