body:
  text: 卷之四辨太陽病脈證並治法中此係仲景原文太陽病項背強𠘧𠘧無汗惡風葛根湯主之太陽病項背強𠘧𠘧前於反汗出條下已注明今則無汗惡風此原系太陽中風表實之證欲傳入陽明也內臺方議云項背強𠘧𠘧然惡風乃有風在表而不得散只因無汗是兼有寒邪故於桂枝加葛根湯方中更加麻黃而改名曰葛根湯方也葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌成注云本草言輕可去實麻黃葛根之屬是也此以中風表實故加二物於桂枝湯中也愚謂傷風惡風此亦太陽傷風證因無汗故加麻黃因𠘧𠘧然拘強故用葛根為君或問豫仲景法太陽病無汗者為傷寒表實何以不竟用麻黃湯愚謂傷寒表實必惡寒而喘此則不喘知非麻黃證故湯中不用杏人且仲景云𠘧𠘧無汗惡風明系是中風表實證故於桂枝湯中加麻黃葛根也或又問云同是太陽無汗何以別其為中風表實且傷寒亦有惡風者不必拘拘於傷風始惡風也愚意以傷寒表實是絶無汗故惡寒發熱而加喘中風表實是欲汗出而不得故項背強𠘧𠘧然而惡風以是而別其為中風表實也太陽與陽明合病者必自下利葛根湯主之傷寒有合病有並病成注云本太陽病不解並於陽明者謂之並病其合病者喻氏尚論篇云兩經之證各見一半如日月之合朔故云合也太陽與陽明合病者太陽惡寒發熱頭項強痛等證與陽明熱渴目疼鼻乾等證同時均發無有先後也陽邪之氣交合而病甚於表表邪既甚則裡氣決不相和太陽之裡為膀胱其腑主水陽明之裡為胃其腑主谷二腑之氣不和則水穀雖運化而不分清所以必自下利也治法與葛根湯以發散二經中合病之表邪而利自止按成注云裡氣不和下而不上者當病利仲景法用葛根湯者乃發中有升舉之義又按成注云寒邪氣甚客於二陽二陽方外實而不主裡則裡氣虛故必下利愚以裡氣虛即為不和不可作真虛看內臺方議云此條病用此方乃內外均解之劑葛根性甘平能祛風行於陽明之經用之為君麻黃為臣輔之發汗解太陽之表桂枝芍藥為佐通行於營衛之間甘草大棗之甘生薑之辛以通脾胃之津液為使是為內外均解愚以芍藥雖為今醫治下利之藥得桂枝既外行於營甘草雖能和中薑棗雖健脾胃行津液要之於此湯中用之不過是辛甘發散之劑初非治下利之藥也或問成注云寒邪氣甚客於二陽內臺方又云葛根性甘平能祛風行於陽明之經究竟此條合病是風是寒愚以此條病系風寒兩傷之證尚論篇以此條病主寒下條病主風且以上葛根湯即桂枝湯內加葛根不用麻黃者是為大失仲景之旨內臺方疑問云經云下利不可發汗發汗則脹滿今此下利又發汗者何也答曰少陰病下利清穀者為裡虛若更發汗則脾虛而脹今此太陽證未罷或有頭痛惡風寒證尚在表其脈尚帶浮便傳入陽明有口渴身熱等證必自下利也必須此方微發汗而散表邪中有葛根以除陽明之邪也若是諸證發熱兼有里而脈浮者此方最善愚按上云傳入陽明此與並病無異內臺為合病作解其言亦誤太陽與陽明合病不下利但嘔者葛根加半夏湯主之此條合病亦風寒兩傷之證風寒之邪交合而病甚於表表病則裡氣亦不和成注云裡氣上逆而不下者但嘔而不下利愚以其人胸中必有停飲故也仲景法與葛根湯以發散二經之邪加半夏以下氣散飲按條辨云此條病以見太陽陽明中風之不同與上條傷寒下利之證互相發明寒為陰陰氣主下降故下利風為陽陽氣主上逆故作嘔殊不知傷寒之證鬱熱於裡胸中兀兀欲吐而作嘔者甚多非比中寒之證而云必自下利也又中風之證木來侮土胃氣下注腸鳴而作利者亦不少未必皆風氣上壅而作嘔逆也蓋上條乃病人腸中有食積故下利其不治下利者以風寒方甚於表也此條乃病人胸中有停飲故作嘔其兼治作嘔者以半夏同一辛散且無礙於風寒故加之也葛根加半夏湯方葛根四兩麻黃三兩去節湯泡去黃汁焙乾稱生薑三兩切甘草二兩炙芍藥二兩桂枝二兩去皮大棗十二枚擘半夏半升洗上八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗琥按上條病證與治法諸家之注亦不過隨文作解活人書但制小其劑而於湯中藥味不敢增損愚以上條病既云嘔矣其人胸中能免滿逆之證乎湯中半夏固宜加矣而甘草大棗之甘能不相礙乎愚注仲景書發明仲景方究不敢執之以治病者正為此耳或云方中止甘草二兩大棗十二枚已有生薑三兩復加半夏半升於嘔家又何礙斯言實合仲景用藥之旨太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之本太陽桂枝證醫人不投桂枝湯反用藥下之成注云虛其腸胃為熱所乘遂利不止按此亦非腸胃真虛證乃胃有邪熱下通於腸而作泄也脈促者脈經云脈來數時一止復來曰促此為陽獨盛之脈也脈促見陽知表未解但此言表乃陽明經病非猶太陽桂枝之表證也喘而汗出者亦陽明胃腑裡熱氣逆所致此非太陽風甚氣壅之喘亦非桂枝湯證之汗出也故與葛根黃連黃芩湯以解陽明表邪清胃腑裡熱葛根黃芩黃連湯方葛根半斤甘草二兩炙黃芩二兩黃連三兩上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服琥按成注引經云甘發散為陽表未解者散以葛根甘草之甘愚以葛根味甘而帶辛成氏不言辛者乃缺義也又云苦以堅里裡氣弱者堅以黃芩黃連之苦愚以腸胃協熱陽邪亢盛則陰氣自弱芩連雖非補藥其力能抑陽而扶陰陰氣得扶則利自止喘自息成氏云苦以堅里者乃固其人腸胃中陰氣之謂也琥又按內臺方議此湯云用葛根為君以通陽明之津而散表邪黃連為臣黃芩為佐以通里氣之熱降火清金而下逆氣此即解成注云喘而汗出者乃因喘而汗出即裡熱氣逆所致故也又云甘草為使以緩其中而調和諸藥總而論之此方亦能治陽明大熱下利者又能治嗜酒之人熱喘者取用無窮也琥按上方乃治陽明病內外挾熱表裡均解之劑其入太陽篇者是因桂枝證誤下之所致也或問利既不止何以不用五苓等藥愚以下焦蓄水小便不利此太陽府病也方可用五苓等利水之藥今陽明病腸胃協熱而利大腸為手陽明胃為足陽明陽明本燥化燥金之性喜寒惡熱故湯中用芩連不過順其性以救腸胃之熱故尚論篇亦云不治利而利自止也太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此太陽傷寒也成注云寒則傷營頭痛身疼腰痛以致牽連骨節疼痛者太陽經營血不利也內經曰風寒客於人使人毫毛畢直皮膚閉而為熱者寒在表也愚以寒邪在表皮膚閉而為熱則其人當無汗而惡風寒今但言惡風者乃缺文也喘者氣逆也肺屬氣外主皮毛今者毫毛傷寒氣而畢直皮表發熱汗不得泄則肺葉必張舉而作喘仲景用麻黃湯者專以發太陽經無汗之傷寒也麻黃湯方麻黃三兩去節桂枝二兩去皮甘草一兩炙杏人七十個泡去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息成氏明理論云本草言輕可去實即麻黃葛根之屬實為寒邪在表皮腠堅實聖濟經曰汗不出而腠密邪氣勝而表實輕劑所以揚之麻黃味甘苦用以為君者以麻黃為輕劑而專主發散也桂枝為臣者以風邪在表而膚理疏者必以桂枝解其肌今寒邪在經表實而腠密非桂枝所能獨散必專麻黃以發汗而桂枝所以為臣也內經曰寒淫於內治以甘熱佐以辛苦者茲是類歟甘草味甘平杏仁味甘苦溫用以為佐使者內經曰肝苦急急食甘以緩之肝者營之主也傷寒營勝衛固血脈不流必用味甘之物以緩之故以甘草杏人為之佐使且桂枝湯主中風風則傷衛風邪並於衛則衛實而營弱仲景所謂汗出惡風者此為營弱衛強故桂枝湯佐以芍藥用和營也麻黃湯主傷寒寒則傷營寒邪並於營則營實而衛虛內經所謂氣之所併為血虛血之所併為氣虛者是矣故麻黃湯佐以杏人用利氣也琥按上成氏論云寒邪並於營則營實而衛虛若然則是仲景所云無汗惡風者推其意蓋云營實故無汗衛虛故惡風但不知中風之證為衛實矣何由而仲景桂枝湯證仍然惡風而復惡寒邪由是而知成注言實者乃邪氣之實也或問云成注言實皆由邪氣之實則是成注言虛當是正氣之虛即其引內經之言以證寒傷營云血之所併為氣虛其說非真虛邪余曰不然傷寒無汗營中之邪固實雖云惡風要之衛中之氣亦不可以言虛如果系真虛豈堪麻桂之發散乎學者讀仲景書至此須當以意會之或又問仲景法無汗不可服桂枝今麻黃湯內復用桂枝者何也余答云按仲景法無汗不得服桂枝湯以其中有芍藥薑棗也夫傷寒無汗為表實表實者津液內固而不外泄故禁用芍藥以收斂津液且使寒邪不得外散津液既不得泄更用薑棗以升生脾胃中之津液尤為無為其用生薑固無害若大棗則過於溫補恐非表實之證所宜今麻黃湯內用桂枝者以寒傷營桂枝亦營中藥能通血脈而發散寒邪兼佐麻黃而瀉營衛中之邪實蓋風寒在表營衛俱實肌膚燎熱頭疼項強腰脊痛骨節不利惡寒無汗者必須用之其湯中用杏人者以利喘也用甘草者和營衛也且以邪之所湊其氣必虛炙甘草有補虛之義大抵古人用疏利之藥必少兼補藥有如調胃承氣湯中亦用炙甘草即此意也仲景此方乃冬月正傷寒太陽經發表的藥後學如辨證精切何難遵而用之琥按方後云不須啜粥成注無解條辨云麻黃髮汗有專功之能故不須啜粥之助愚以寒傷於外熱鬱於內邪熱氣逆而發喘其人本不能食若強以稀粥與之纘論所云反增其劇也斯仲景不須啜粥之意歟太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之此條合病乃太陽傷寒之證全具止胸滿一候屬陽明也非此前葛根湯之合病為陽明病全具之證胸乃陽明之部分以陽明之支脈下膈其直者下乳內其經皆由於胸故也成注云心下滿腹滿皆為實當下之此為胸滿非裡實故不可下仲景法止從太陽例無汗而喘之證治之故云宜麻黃湯也或問陽明病已見胸滿之候何以不兼治陽明余曰病因喘而致胸滿胸前者雖為陽明之部分其實乃肺之室也喘而胸滿則肺氣必實而脹所以李東璧本草云麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥彼蓋以喘而胸滿為肺有火邪實熱之證湯中有麻黃杏人專於泄肺利氣肺氣泄利則喘逆自平又何有於陽明之胸滿邪此論實發成氏未發之意太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯成注云十日以去向解之時也脈雖浮而細是脈已靜矣嗜臥者邪退神恬而欲臥故知表已解也設不盡解而其人胸滿脅痛此胸滿非比前陽明合病之胸滿蓋少陽之支脈下胸中循脅其直者又循胸過季脅則是此脈浮細邪又在半表半裡其嗜臥為膽熱而神昏另宜與小柴胡湯以和解之若脈但浮而不細者雖過十日邪還在表謂太陽頭痛發熱無汗等證猶在也仲景法仍與麻黃湯以發其汗可見傷寒發汗不可拘拘於一二日間也小柴胡湯見後第七卷少陽篇中附例太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之自此以下四條俱從大小青龍湯後移附於此成注云脈浮緊無汗發熱身疼痛此太陽傷寒也雖至八九日從未服發汗藥則病不解太陽表證仍在尚當發其汗其服發汗藥已而微除者此必因醫人不敢用麻黃湯藥力輕而不能勝太陽經之寒邪也經云傷寒者熱病之類病至八九日後寒邪不能盡除其人必作鬱熱而發煩目瞑也發煩者為肺熱皮毛髮熱汗不得泄肺氣忿鬱而發煩也目瞑者為肝熱寒邪變熱營血為熱所搏肝失藏血之令故目瞑也劇者鬱熱甚而病劇也熱甚氣蒸載血妄行而上出於鼻曰衄得衄則邪熱之氣亦隨經而解散俗名紅汗者是也其所以致衄者以陽經熱邪之氣重故也此陽氣當兼陽明之氣而言陽明多氣多血太陽病不解其熱氣併入陽明之經必致衄而解也如其人不作衄為太陽表證仍在故云麻黃湯主之非謂已致衄而猶宜用麻黃湯也按張兼善云麻黃湯主之五字合當用於當發其汗之下太陽病脈浮緊發熱身無汗自衄者愈此太陽傷寒不因服藥而衄血自來其病比上條稍輕得衄則鬱熱隨經解散寒邪之氣不為少留故云病愈蓋汗者血之液衄猶汗也所以此條病不更主以麻黃湯也脈浮者病在表可發汗宜麻黃湯觀上二條證若似乎麻黃湯之用必待緊脈而後宜矣亦知太陽無汗證具但見浮脈則病猶在表也乘其在表為可發汗之時故云宜麻黃湯脈浮而數者可發汗宜麻黃湯又太陽無汗證具即見脈浮而數者亦可發汗蓋數為鬱熱已甚乃太陽病欲傳裡之時也以其尚有浮脈邪不離表乘其未傳猶為可發汗之時故亦云宜麻黃湯也傷寒脈浮緊不發汗因致衄者麻黃湯主之成注云傷寒脈浮緊邪在表也當與麻黃湯發汗若不發汗則邪無從出鬱熱壅甚於經因而致衄仲景法仍用麻黃湯主之愚按此條致衄必點滴而不成流故雖衄而太陽傷寒之表證必仍然不解所以用麻黃湯主之也活人書云衄後脈浮者宜麻黃湯衄後脈已微者不可行麻黃湯宜黃芩芍藥湯蓋衄後脈浮者表未解也衄後脈微者表已解也於此可見仲景用麻黃湯於衄後之大旨太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍湯主之坊本有此一句今從刪成注云此中風見寒脈也發熱惡寒者太陽表病也脈浮緊身疼痛為傷寒不汗出為中風蓋不汗出者是汗欲出而不得出非其人直無汗也風寒兩傷則鬱熱愈甚所以汗不出而加煩擾躁悶也仲景法用大青龍湯主之大青龍者桂枝麻黃之合方也以不汗出故去芍藥恐其味酸而收斂津液也因煩躁故加石膏取其甘寒而清解鬱熱也要之此湯亦有不可輕用之戒若病人脈微弱而非浮緊汗出惡風而非不汗出者切不可服服之則其人必見四肢厥逆其筋則惕惕然而跳肉必瞤瞤然而動以病本汗出復大發其汗汗多亡陽津液枯少故見厥逆筋惕肉瞤也如此者乃為大逆之候愚按末後大青龍湯主之句黃仲理改作真武湯方喻二氏皆宗之大誤蓋此條病仲景本無救逆之法末後六字乃復語也今從準繩例削去使無增後學之疑大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏人四十個去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者停後服汗多亡陽遂一作逆虛惡風煩躁不得眠也成氏明理論云青龍東方甲乙木神也應春而主肝專發生之令為敷榮之主萬物出甲開甲則有兩岐肝有兩葉以應之謂之青龍者以發散營衛兩傷之邪是應肝木之體耳桂枝湯主中風麻黃湯主傷寒發散之純者也及乎大青龍湯雖為發汗之劑而所主又不一必也中風脈浮緊為中風見寒脈傷寒脈浮緩為傷寒見風脈是風寒兩傷也風兼寒寒兼風雖欲與桂枝湯解肌以祛風而不能已其寒或欲以麻黃湯發汗以散寒而不能去其風茲仲景所以特處大青龍湯以兩解之也麻黃味甘溫桂枝味辛熱寒則傷營必以甘發之風則傷衛必以辛散之此風寒兩傷營衛俱病故以甘辛相合而為發散之劑表虛膚腠疏者則以桂枝為主此為表實腠理密則以麻黃為主是先麻黃為君後桂枝為臣也甘草味甘平杏仁味甘苦苦甘為助佐麻黃以發表大棗味甘溫生薑味辛溫辛甘相合佐桂枝以解肌風陽邪也寒陰邪也風則傷陽寒則傷陰營衛陰陽為風寒兩傷則非輕劑所能獨散也必須輕重之劑以同散之乃得陰陽之邪俱已營衛之氣俱和是以石膏為使味甘辛微寒質重而又專達肌表者也大青龍湯發汗之重劑用之稍過則有亡陽之失經曰若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也又曰一服汗者停後服若復服汗多亡陽遂虛惡風煩躁不得眠也用者宜詳審之琥按上成氏論云風陽邪也寒陰邪也風則傷陽寒則傷陰此陰陽即指人身營衛而言非謂傷風是陽熱之證傷寒是陰寒之證也恐後學不明特為析辨琥又按上大青龍證既云脈浮緊發熱惡寒身疼痛又不汗出仍是太陽傷寒但加煩躁耳何以謂之中風及讀金鏡內臺方見黃伯榮曾議云此一證中全在不汗出一不字內藏機且此不字是微有汗而不能得出因生煩躁非若傷寒之全無汗也以此不字方是傷風此乃古人智深議妙之處或問云仲景制此方以治傷風傷寒二證合病其不用芍藥者何也愚以其證汗不得出且兼煩躁故方中去芍藥加石膏以石膏之味辛涼能解肌療煩若用芍藥恐過於收斂風寒之邪不散仲景以風寒兩傷之病即以桂枝麻黃二湯合為一方而獨減芍藥者此制方之妙用也或又問成氏云大青龍湯發汗之重劑病人同是服此湯而汗多亡陽一則厥逆筋惕肉瞤一則惡風煩躁不得眠二者之寒熱迥然不同何也余答云一則病人脈微弱汗出惡風是陽氣本虛也故服之則厥逆而虛冷之證生焉一則病人脈浮緊發熱汗不出而煩躁是邪熱本甚也故服之則正氣雖虛而邪熱未除且也厥逆之逆為重以其人本不當服而誤服之也煩躁不得眠為猶輕以其人本當服而過服之也明乎此乃知仲景此湯必欲審證而投之矣方氏條辨注解大青龍湯義云青乃木色龍乃木神木主春春熱而煩躁雷雨解而致和焉人之汗以天地之雨名之龍與云雨至發煩躁之汗而營衛以和龍之所以為湯神湯之用也愚按此言實發成氏未發之義吳院判云仲景用此湯以發煩躁之汗譬若亢熱已極一雨而涼其理可見若不曉此理見其躁熱投以寒涼之藥其害豈勝言哉節菴陶氏議用大青龍湯法云熱盛而煩手足自溫脈浮而緊此傷風見寒脈也不煩少熱四肢微厥脈浮而緩此傷寒見風脈也二者為營衛俱病法宜大青龍湯但此湯險峻須風寒俱甚又加煩躁乃可與之不如桂枝麻黃各半湯為穩尤不若九味羌活湯加石膏知母枳殼也琥按上陶氏云大青龍不若桂枝麻黃各半湯為穩此論實本許學士之說猶為近理其云尤不若以九味羌活湯加石膏知母枳殼此論悖謬之極蓋此湯不分經絡錯雜異常且知母過於苦寒恐非風寒初入所宜加也陶氏一生之誤不過一用藥雜亂不對證耳殺車槌方焉可宗乎傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之成注云此傷寒見風脈也傷寒者身疼此以風勝故身不疼中寒者身重此以兼風故乍有輕時無少陰證者以身重一候似少陰欲寐之證今則身但重而不欲寐忽然又有身輕轉動之時故知其無少陰證仍然病在太陽而風寒之邪甚於表也故仲景法宜大青龍湯以發之按內臺方疑問云何為傷寒見風脈如無汗惡寒乃傷寒證脈當浮緊今反浮緩者乃傷風脈也故曰傷寒見風脈若然則是上文云傷寒可見無汗惡寒之義已該括其中又問云風寒二證皆見若不煩躁者此大青龍湯可用乎答云既無煩躁可除石膏勿用也若然則是上證無煩躁湯中可除石膏學者毋拘拘於仲景原方而云一味不可增損也傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之表不解者謂太陽病在表之風寒正盛也心下有水氣謂水飲停積心胸之間因病氣逆不得寧也水與風寒之邪相搏而病氣不得寧故曰乾嘔者水犯於胃氣逆而作嘔也又幹嘔為太陽病桂枝湯之常候曰發熱而咳者上云表不解則發熱咳則水犯於肺氣逆而作聲也以上云云系小青龍湯之主證其兼證則或為渴成注云渴者水蓄則津液不行氣燥而渴也或為利者成注云水下行漬入腸間則為利也或噎者成注引經云水得寒氣冷必相搏其人即䭇䭇與噎同猶言咽也此亦胃中水寒而氣作逆也或小便不利少腹滿者成注云水蓄下焦不行故小便不利形腫而少腹滿也或喘者愚以喘為太陽病麻黃湯之常候此則內更挾水斯氣上逆於肺因作喘也與小青龍湯者成注云發汗兼散水也水氣內漬則所傳不一故尚論篇云或上或下或中或熱或冷但有一二證即水逆之應也仲景法總以小青龍湯為主宜隨證增損以解化之小青龍湯方麻黃三兩去節芍藥三兩五味子半升乾薑三兩甘草三兩炙細辛三兩桂枝三兩去皮半夏半升湯洗上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升成氏明理論云青龍象肝木之兩岐而主風寒兩傷之疾固已傷寒表不解則麻黃湯可以發中風表不解則桂枝湯可以散惟其表不解而又加之心下有水氣則非二湯所能發散乃須小青龍湯始可祛除表裡之邪氣爾麻黃味甘辛溫為發散之主表不解應發散之則以麻黃為君桂枝味辛熱甘草味甘平甘辛為陽佐麻黃表散之用二者所以為臣芍藥味酸微寒五味子味酸溫二者所以為佐者寒傷肺咳逆而喘則肺氣逆內經曰肺欲收急食酸以收之故用芍藥五味子為佐以收逆氣乾薑細辛味辛熱半夏味辛微溫三者所以為使者心下有水津液不行則腎氣燥內經曰腎苦燥急食辛以潤之是以乾薑細辛半夏為使以散寒水而潤腎燥逆氣收寒水散津液通行汗出而解矣琥按成氏引內經云腎苦燥一段殊非緊要語條辨中因削之云水寒之相搏乾薑細辛半夏所以散之反覺其注簡而易明琥又按內臺方議云小青龍者以其能發越風寒分利水氣猶龍之超越乎天地之間是亦妙解條辨中以小青龍湯散水寒猶龍之翻波逐浪而歸海不比大青龍湯之發汗猶龍之興云致雨而升天日大曰小古人命名之義截然曉暢加減法若微利者去麻黃加蕘花如雞子熬令赤色成注云下利者不可攻其表汗出必脹滿麻黃專為表散非下利所宜故去之蕘花味苦寒下十二水水去利則止故加之若渴者去半夏加栝蔞根三兩成注云半夏味辛溫燥津液者也去之則津液易復栝蔞根味苦微寒潤枯燥者也加之則津液通行為渴所宜若噎者去麻黃加附子一枚炮成注云病人有寒復發汗胃中冷必吐蛔噎為胃氣虛冷麻黃髮汗非胃氣虛冷所宜故去之附子辛熱熱則溫其氣辛則散其寒而噎者為當祛散冷寒之氣也若小便不利少腹滿去麻黃加茯苓四兩成注云凡邪客於體在外者可汗之在下者可泄之水蓄下焦滲泄可也發汗則非所當故去麻黃而茯苓味甘淡專行津液內經曰熱淫於內以淡滲之滲溺行水甘淡所宜故加茯苓若喘者去麻黃加杏人半升去皮尖成注云喘為氣逆麻黃髮陽去之則氣易順杏人味甘苦溫加之以泄逆氣金匱要略曰其人形腫者故不內麻黃乃內杏子人以麻黃髮其陽故也喘逆形腫水氣標本之疾琥按上小青龍湯證云傷寒表不解是兼中風而言夫乾嘔發熱謂非太陽中風證邪其為咳為渴為噎為利為小便不利少腹滿此誠水氣內漬所傳之證不一也然其中冷熱之候頓殊加減藥味不可少差恐殺人亦甚速耳其或為喘者喘為太陽傷寒表不解發熱之急候何以反去麻黃蓋麻黃能發風寒外甚之喘此則水飲上侵於肺而氣壅作逆故易以杏人味苦甘而氣溫能泄利肺氣兼散水飲有專功也內臺方議云其人脈浮者不去麻黃但脈沉者宜去麻黃以是知以上加減法亦不可執琥又按上條云傷寒表不解發熱其人風寒之邪正盛止因咳嘔氣逆而湯中既用芍藥之酸以收之復用五味子半升以斂之今醫稍知藥性者例不敢用仲景於當日獨用之者何也或云五味子宜用南産黃色者取其味辛多而酸少也斯言亦近乎理或問云心下有水氣矣何以不直曰嘔而曰乾嘔余答云水者有形之物其性趨下其上升者但氣耳故曰乾嘔曰咳曰噎曰喘者皆上升之氣也然其水仍下流而或為利或為小便不利少腹滿矣又或渴者為熱水之證或噎者為寒水之證要之傷寒發噎亦有胃中水熱氣逆而作者不可但信以為寒也仲景法加炮附子其論又不可拘傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之小青龍湯主之句補亡論移在發熱不渴句下考成注中已明但正文未校正此條傷寒比上條證風寒稍輕故但咳而不至乾嘔雖喘而氣亦微也發熱不渴者表證未罷內雖挾水津液未至凝塞氣不甚燥故不渴也與小青龍湯以發表散水服湯已而渴者此水與風寒之邪俱去而津液亡故作渴乃傷寒病欲解之時也尚論篇云仍用小青龍湯以助其欲解之勢誤矣愚按上條云渴是未服湯而渴乃津液不行而作渴也此條云渴是服湯已而渴乃津液既亡而作渴也渴既不同豈可仍用上藥纘論亦云水去而渴與水逆而渴不同是雖渴而不必服藥但當靜俟津回可也重出例太陽病外證未解脈浮弱者當以汗解宜桂枝湯太陽病下之微喘者表未解故也桂枝加厚朴杏人湯主之太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之太陽病先發汗不解而復下之脈浮者不愈云云至當須解外則愈宜桂枝湯主之以上四條證正文與注見前桂枝湯方下太陽病脈浮緊無汗發熱身疼痛八九日不解云云至陽氣重故也麻黃湯主之太陽病脈浮緊發熱身無汗自衄者愈以上二條證正文與注見前麻黃湯方下二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也風寒之邪始入一經復傳一經兩經相併而同病者謂之並病今者太陽與陽明並病太陽經初得病之時發其汗汗先出不徹不徹者不透也惟不徹因轉屬陽明而成並病續自微汗出不惡寒若似乎太陽經證已罷傳入陽明之府為可下矣殊不知汗出尚微雖不惡寒太陽之邪猶未盡解故云若太陽病證不罷者不可下下之為逆謂下之不以理也如此者可小發其汗謂先解其表也設其人面色緣緣正赤者成注云陽明之經循面面正赤則陽明之邪亦在於經二陽相併其氣怫鬱邪甚於表也此不但小發汗當用熏解之法以大發之況此發汗不徹之證其人陽氣怫鬱不得宣越不足言也不足言者猶言勢所必至不須說也直是當汗不汗成注所云邪無從出壅甚於經其人不但面赤內作鬱熱而且躁且煩也邪循經行痛無常處故乍在腹中乍在四肢按之不可得也短氣者邪熱壅而氣促急也但坐者不得臥也此係太陽陽明二經之汗不徹故也更發汗則愈者謂太陽初得病時發汗之方不宜再用當更方以兼發陽明經汗則愈蓋此條病始終是一汗出不徹之證何以知之以脈澀故知之也夫汗出不徹營氣不得條達則脹澀條辨以澀脈作血虛解大誤愚按此條雖系二陽並病其實太陽證居多始則太陽經汗先出不徹因轉屬陽明成並病此作首一段看雖續得微汗不惡寒然太陽證不因微汗而罷故仍可小發汗此又作一段看設其人面色緣緣正赤此兼陽明邪熱鬱甚於表當解之熏之此又作一段看有此者終是初得病時發汗不徹之誤以至因循而當汗不汗其人陽氣怫鬱而面赤猶不足言也當見躁煩短氣渾身上下痛無定著此雖與陽明並病而太陽之邪不少衰也故云更發汗則愈此又作一段看夫此等病醫人遇之大都不知其人系汗出不徹之證何也蓋始焉發其汗汗已先出何以知其不徹所以末後又云脈澀以決其汗不徹而當更發汗也夫曰可小發汗曰當解之熏之法則云然實則未曾用發汗藥者也若曾用藥發其汗則無面赤躁煩等變證矣惟初得病時發其汗與末後更發汗此是用藥以發其汗然仲景不言湯者其湯顯而易見故不言也龐安時云宜麻黃湯愚以太陽初得病時固宜用也但曾汗出而不徹麻黃湯不宜用也尚論篇於此條更桂枝加葛根湯甚合仲景之法脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈成注引經曰諸脈浮數當發熱而灑淅惡寒言邪氣在表也法當汗出而愈無疑矣若誤下之則身重心悸身重者後條辨云下後則津液下奪而機關不利故身重也津液下奪不能上奉則心悸而動尚論篇云縱脈仍浮數不可復發其汗但宜靜調俟其自汗出乃解耳所以然者以脈雖浮數而尺中則微夫脈浮數為表實尺中微為裡虛裡虛者下後津液不足而陰虛也須待其津液回斯里氣實為表裡俱實雖不用藥以發其汗便當自汗出而愈矣脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知其然以營氣不足血少故也脈浮緊身疼痛是太陽傷寒法當以麻黃湯汗之設其人尺中脈遲則知寒邪雖盛營血自虛便不可發汗矣夫汗者血之液而營氣主之尺遲不可發汗者條辨云嫌奪血也按此條論仲景無治法補亡論郭白雲云宜小建中湯次則柴胡桂枝湯愚以此二湯實祖活人書之意蓋小建中者即桂枝湯加飴糖一味以甘能生血而先建其中也但仲景法無汗者不得服桂枝今脈浮緊為無汗雖尺中遲恐不宜用此湯又柴胡桂枝湯即小柴胡湯加桂枝藥不對證更屬不解重出例脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯上二條證正文與注見前麻黃湯方下病常自汗出者此為營氣和云云至營衛和則愈宜桂枝湯病人藏無他病云云至先其時發汗則愈宜桂枝湯主之上二條證正文與注見前桂枝湯方下傷寒脈浮緊不發汗因致衄者麻黃湯主之上條證正文與注見前麻黃湯方下傷寒不大便六七日云云至若頭痛者必衄宜桂枝湯傷寒發汗解半日許云云至可更發汗宜桂枝湯主之上二條證正文與注見前桂枝湯方下凡病若發汗若吐若下若亡津液陰陽自和者必自愈曰凡病者言不僅傷寒然也凡病若發汗若吐之下之太過以致亡津液者雖其人汗吐下證仍在不可復行汗吐下之法姑慢服藥俟其陰陽自和則氣血回覆病必自愈然此亦是當汗而汗當吐下而吐下故有陰陽和而自愈之日非誤用汗吐下藥者所能比也凡病且然而況於傷寒乎按此條論因發汗而並及吐下之法然既云發汗必是太陽病居多故亦附於太陽篇中大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈先汗後下治傷寒之正法也今病未曾發汗而先大下之既下之後復發其汗是為汗下相反津液重亡亡者無也膀胱為津液之府津液既亡則小便少而不利勿治之者謂不當用五苓散等藥以利其小便也姑俟其津液回則小便利而表裡之證必皆自愈按此條論必病人表裡證悉具以故汗下相反但小便不利無他變也設使無里證而先下無表證而復汗則病人變證蜂起豈但小便之不利哉勿治之得小便利必自愈此即上條云陰陽自和之義下之後復發汗必振寒脈微細所以然者以內外俱虛故也成注云發汗則表虛而亡陽下之則裡虛而亡陰振寒者陽氣微也脈微細者陰血弱也陰主內陽主外是為內外俱虛按此條論仲景無治法補亡論常器之云素無熱人可與芍藥附子湯有熱人可與黃耆建中湯其言尚未盡理夫寒傷於人則為病熱豈論其人之平素無熱與有熱邪縱其人平素無熱當其時已犯熱證理宜汗下但今汗下相反又且過劑故不惟小便不利甚至於振寒脈微細而內外兩虛愚以上證邪熱雖去只宜溫補不可用大熱之藥故黃耆建中湯服之為穩芍藥附子湯用之害人或問下條論亦下後復發汗所致在仲景竟用乾薑附子湯是邪非邪余答云下條證乃醫人不識中寒病因誤用汗下法故仲景急以乾薑附子湯救之此條證系傷寒病故雖既下且汗外作振寒內無寒證常云芍藥附子湯決不可用學醫者宜慎之下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之此條系真寒證復誤用汗下之法故見晝煩夜靜脈沉微表裡無熱此為陰寒獨勝陽氣大虛也正文與注並乾薑附子湯方俱見中寒論中發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之發汗後身疼痛脈沉遲者成注云邪氣未盡營血不足也經曰其脈沉者營氣微又曰脈遲者營中寒營主血營中血少兼有留邪故脈沉遲而身疼痛此必是太陽傷寒用麻黃湯發汗之後寒邪已去八九其人身雖疼痛醫者止宜據其脈以血少治之若其人寒邪不因汗解而身疼痛則其脈當見浮緊矣所以仲景法用桂枝湯加芍藥生薑以益營血而解余寒復大加人參者以甘能生血有備其不足也湯名新加者以桂枝驅邪人參補正舊例無有加人參於桂枝湯中者神而明之謂非仲景用藥之新法歟桂枝新加湯方此方自原論中第十卷採附於此桂枝三兩去皮芍藥四兩甘草二兩炙人參三兩生薑四兩切大棗十二枚擘上六味以水一斗二升微火煮取三升去滓分溫服余依桂枝湯法琥按上湯乃仲景新加補藥法以治傷寒發汗之後身疼痛而脈沉遲者夫脈沉遲為血虛有寒惟有寒故用桂枝湯加生薑以散寒惟血虛故桂枝湯中加芍藥更加人參三兩以益血內臺方議以芍藥為益血之藥若人參生薑止不過益其正氣散其餘邪殊不知仲景治血虛妙在以人參補之其後李東垣始悟其義云血難驟補加人參者陽生陰長甘能益血也要之仲景此湯既加人參則補正之力多驅邪之功少如病人寒邪盛而身疼痛醫用此湯何異操刀張兼善云寒邪盛則身疼營血虛則身亦疼其脈浮緊者邪盛也沉微者血虛也證雖相同脈則大異或問脈沉遲身疼痛焉知非中寒證余答云中寒身疼痛如被杖脈亦沉遲與此證略同然此證自太陽傷寒發汗後身疼不止脈變沉遲非中寒比也即如病人在前醫工能悉心診視則寒熱虛實無不了然如徒於書中認證認脈此等疑義實多難盡述也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏人甘草石膏湯主之本太陽傷寒用桂枝湯以發其汗汗後不解不可更行桂枝湯以汗雖出而喘益甚是麻黃湯證仍在也無大熱者謂里無大熱寒邪猶鬱於表也法宜仍與麻黃湯今則麻黃湯中減去桂枝增石膏者何也以桂枝性辛熱寒傷營營中已受辛熱所傷而強逼成汗故增石膏之甘寒以泄營中之熱而散其邪也麻黃杏人甘草石膏湯方麻黃四兩去節杏人五十個去皮尖甘草二兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升本云黃耳柸想系置水器也成注引內經曰肝苦急急食甘以緩之風氣通於肝風邪外甚故以純甘之劑發之則是成氏以此條病為太陽中風桂枝湯未嘗誤用大謬之極又上四味藥麻黃石膏俱帶辛杏人帶苦若云純甘又非定論琥按上湯即麻黃湯小變其制仲景法傷風證汗出而喘當作桂枝湯加厚朴杏人今雖汗出原系傷寒無汗證醫人誤用桂枝湯以強發其汗汗出後依然氣逆而喘所以還當用麻黃湯其去桂枝者謂前湯中已受其辛熱之誤而喘愈甚故易以石膏之甘寒徹其邪而下其喘也內臺方議云不可以汗出為傷風證再用桂枝湯只宜麻黃湯中除桂枝加石膏以散餘邪後條辨云誤服桂枝湯而汗出究竟傷寒之汗未嘗出也故用石膏止桂枝之汗用麻黃出未出之汗去其桂枝則湯中辛涼之功勝清肅在肺而喘熱自平矣附例下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯此即上條證醫人誤用桂枝湯汗出而喘不解復認以為陽明府證而誤下之下後汗出而喘依然細診其人里無大熱者方知其下之之誤以寒邪猶鬱於表而發熱也知其在表不可更行桂枝湯可與麻黃杏子甘草石膏湯發其寒邪下其喘熱蓋下雖復誤成注云邪氣所傳既同遂用一法治之後條辨評云下在用桂枝湯後是從更字上看出發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之汗者心之液發汗過多則陽亡而心液虛耗心虛則動惕而悸故其人叉手自冒心胸之間而欲得按也冒字作覆字解發汗過多必是多服麻黃湯之故所以仲景法用桂枝者以固表而守其陽用甘草者以益氣而緩其悸也要之陽氣得守則津液歸復漸長於心胸之分復何悸之有焉成注云汗多亡陽陽受氣於胸中即同此義桂枝甘草湯方桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服琥按成注云桂枝之辛走肺而益氣夫桂枝雖系護表助陽之藥然其味大辛反能散氣又云甘草之甘入脾而緩中意即千金所云心勞甚者補脾氣以益之之謂歟愚以此等注不甚曉暢刪之可也發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之發汗後者即發汗過多之後也臍下悸者條辨云腎乘心汗後液虛欲上陵心而克之故動惕見於臍下也奔豚難經云腎之積名發於少腹上至心下若豚狀此言奔豚乃腎氣發動如欲作奔豚之狀非真臍下有積如豚也後條辨云腎氣發動水邪不安其位急主之以茯苓桂枝甘草大棗湯以益心氣伐腎邪安中補土水不得肆而汗後之陽虛可漸復矣茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩去皮甘草二兩炙大棗十五枚擘上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之琥按上湯用茯苓為君以其能伐腎邪而利水道桂枝為臣外能固表下能泄奔豚之氣甘草為佐能益氣補汗後之虛陽大棗為使以和中補土而制水煎用甘瀾水者揚之無力取其不助腎邪也或問此條論並未言是水氣而諸家之注皆言是水何也余答云仲景言臍下悸欲作奔豚明系是腎邪干心腎本北方水腎邪盛者水剋火也湯中用茯苓為君謂非走陰泄水氣之藥歟若桂枝之性本上行而達表其能伐腎而御奔豚者得茯苓引用故也蓋上條病但心下悸故用桂枝甘草湯此條病至臍下悸故用前湯中加茯苓以引桂加大棗以輔甘草表裡兼主上下咸宜乃仲景用藥的當處發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之發汗後者謂外邪已解也成注云外已解而腹脹滿由脾胃津液不足氣澀不通壅而為滿與此湯以和補脾胃而通泄滯氣按成注云吐下後腹脹滿皆為實言邪氣乘虛入里故也此必是外邪未解而早吐早下所致否則既吐且下腹中之物已盡焉知非氣虛作脹邪上云發汗後而腹脹滿假使其人先傷食而復傷寒吾恐外邪雖解腹中之物未消亦系實證難言虛也此條病乃汗後氣虛腹脹滿其人必內雖作脹外無脈形故湯中用人參炙甘草等甘溫補藥無疑厚朴生薑甘草半夏人參湯方厚朴半斤去皮生薑半斤切半夏半升洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服成注引內經曰脾欲緩急食甘以緩之用苦泄之厚朴之苦以泄腹滿人參甘草之甘以益脾胃半夏生薑之辛以散滯氣內臺方議云此係汗後亡津液脾氣虛而燥澀故作脹所以湯中用人參之甘以生津液補不足炙甘草之甘以緩其中寬其脹也夫脹非苦不泄故用厚朴非辛不散故用半夏生薑條辨以蠲飲作解殊不合仲景之意傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之傷寒吐下之後裡虛氣逆心下作滿且上衝於胸膈之間更上逆於頭起則作眩蓋里愈虛而氣愈逆也脈沉緊者寒邪由經而入里也仲景法脈浮緊者可發汗今脈沉緊誤發其汗成注云發汗則外動經絡損傷陽氣陽氣外虛不能主持諸脈身為振振然而搖動也與此湯以和經散寒益陽補氣茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩去皮白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服琥按成注云陽不足者補之以甘茯苓白朮生津液而益陽也裡氣逆者散之以辛桂枝甘草行陽散氣夫桂枝走表非散裡氣逆之藥蓋裡虛氣逆以甘補之即以甘緩之故用茯苓白朮炙甘草表虛動經以辛和之復以甘助之故用桂枝炙甘草上方乃和營益氣表裡兼主之劑條辨以方中白朮刪去白字謂本草經止名術乃是蒼朮考之仲景時無所謂白朮者故以茯苓與術為勝濕導飲之藥竟以此條病為飲氣上逆證大失仲景論中之意尚論篇不改其非為誤極矣發汗病不解反惡寒者虛故也芍藥甘草附子湯主之此條系真寒證病惡寒誤發其汗病因不解惡寒證反甚醫人不可認以為傷寒證正文與注並芍藥甘草附子湯方俱見中寒論中發汗若下之病仍不解煩躁者茯苓四逆湯主之此條亦系真寒證既誤汗之復誤下之病仍不解反作煩躁乃陰寒病誤服涼藥之所致也醫人不可因其煩躁認以為傳經熱證正文與注並茯苓四逆湯方俱見中寒論中附後例發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯此條系陽明實熱入府之證正文與注並湯方俱詳後第六卷陽明篇中太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之太陽病用麻黃湯以發其汗汗因大出則胃中津液干干則煩躁不得眠即內經曰胃不和則臥不安者是也欲得飲水者人身津液為水之類汗大出而津液亡內水耗竭欲得外水以自救也法宜少少與之但令胃得水而不幹斯氣潤而和其病則愈若發汗後而脈尚浮者表未盡解也欲得飲水而小便不利此是寒飲蕩其胃中之熱下流而入於膀胱膀胱熱結故不利也微熱消渴者其人外則微熱而表不解內又消渴而飲水多是太陽之經與府俱病也與五苓散以和表裡下水熱愚按此條論當作兩截看太陽病發汗後云云至胃氣和則愈此係胃中干煩躁作渴止須飲水以和胃氣非五苓散證也若脈浮小便不利微熱消渴此係水熱結於膀胱而渴乃為五苓散證前賢不察皆一直看下大失仲景之旨愚又按上云太陽病乃閣中風傷寒而言之也中風不可誤發其汗傷寒亦不可過發其汗汗出太多則胃中干勢所必至成注混同作解甚妙條辨及尚論篇列入中風條下何其執也五苓散方豬苓十八銖去皮澤瀉一兩六銖半茯苓十八銖桂半兩去皮白朮十八銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈成氏明理論云苓令也號令之令通行津液克伐腎邪專為號令者苓之功也五苓之中茯苓為主故曰五苓散茯苓豬苓味俱甘平甘雖甘也終歸於淡甘歸於淡如人多食甘則口反淡是也內經曰淡味滲泄為陽利大便曰攻下利小便曰滲泄水飲內蓄須當滲泄之必以甘淡為主是以茯苓為君豬苓為臣白朮味甘溫脾惡濕水飲內蓄則脾氣不治益脾勝濕必以甘為助故以白朮為佐澤瀉味鹹寒內經曰鹹味下泄為陰泄陰導溺必以咸為助故以澤瀉為使桂枝味辛熱腎惡燥水蓄不行則腎氣燥內經曰腎惡燥急食辛以潤之散濕潤燥故以桂枝為使多飲暖水令汗出愈者以辛散水氣外泄是以汗潤而解也琥按原方中止用桂而成注又云桂枝且云其味辛能散濕潤燥作兩可之論其義何居內臺方議云桂與桂枝可以兩用若兼表邪者用桂枝若專利水飲者卻用桂也若然則上方中當用桂枝無疑琥又按方後云多服暖水令汗出愈此即桂枝湯方下啜熱稀粥一升余以助藥力之義建安許氏云五苓散乃汗後一解表藥於此可見發汗已脈浮數煩渴者五苓散主之發汗已者謂太陽病已發過汗也脈浮數者成注云表邪未盡不因汗而解也煩渴者此係膀胱熱結小便不利熱氣不得下泄因反上逆熏於胸膈肺胃受傷而作煩渴也脈浮數為太陽經病煩渴乃太陽府病故亦宜五苓散以解表邪泄裡熱或問五苓散治膀胱熱結之藥何以反用肉桂余曰不然膀胱熱結誠當去桂但此條病用桂乃是桂枝為脈浮數而設非肉桂也若其人飲水多小便不利無表證者方中竟可用肉桂也或又問五苓散中用術昔賢如朱奉議孫真人許學士等皆用白朮近醫方中行喻嘉言改作蒼朮何也余答云改用蒼朮雖未合義然使其人裡實熱結小便不利雖用蒼朮不為害也若其人發汗過多亡津液胃虛燥渴欲飲水而小便不利者則蒼朮過於燥烈斷不可用不若白朮之甘平滋膩能補津液而潤燥為可用也方喻二氏所可怪者凡仲景用術之方皆云此是蒼朮倘後學起而宗之不論其人虛實燥濕之證凡方中類用蒼朮不其大害者邪縱使仲景時無白朮於今業已有之在醫人亦可權宜取用如死執古方以療今病斷斷不可行也附例中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之成注云中風發熱至六七日則當解若不解而煩者邪在表也渴欲飲水者邪傳裡也太陽之裡為膀胱府府病則裡熱氣結而小便不利內不得出外亦不得入所以飲水反上行而作吐也若此者名曰水逆用五苓散者以表能散邪里能消水也或問上證既煩且渴何以不用白虎余答云白虎湯治煩渴乃上焦肺胃熱也其人必小便利今者小便不利知其熱在下焦乃膀胱府病也經云膀胱者州都之官津液藏焉氣化則能出矣上病用五苓散者以利小便使氣化得輸則津液流通煩與渴不治而自愈矣本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之本以太陽病發汗後不解因復下之故心下成痞痞者不通泰也仲景法當與瀉心湯除之若服之痞不解其人渴而口中燥煩小便不利者此為水飲內蓄膀胱熱結津液不行故口燥煩渴氣不輸化因反上逆故心下痞要其病實非在心下也與五苓散以分消表裡之水邪不治痞而痞自愈矣太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散渴欲飲水至救之十三字當在小便數者之前不惡寒而渴者者字可刪太陽病其脈寸緩關浮尺弱其證發熱汗出復惡寒此係風邪正盛於表也不嘔者裡氣和也裡氣既和緣何而至心下痞其痞者此以醫下之早邪氣乘虛而入留於心下故致痞也如其不因誤下者則陽邪必漸傳經在病人已無惡寒等證邪熱傳裡必變而作渴此太陽病轉屬陽明也陽明者胃也胃中熱渴無有不欲飲水第飲水時當少少與之不可不與亦不可多與但以法救其渴可耳如飲水之後而小便數者大便必硬此因津液偏滲於膀胱小水既多則胃中邪熱亦隨溺而泄出雖不更衣十日胃中無滿實之苦也更衣者古人於大便時必更衣而後入廁故相傳以大便為更衣也若飲水之後渴終不解者其人飲水必不合法而多故云宜五苓散以導其停水也尚論篇於此條證注五苓散云能消熱而回津夫津液偏滲於小便者用五苓散以利之小水利則邪熱消而津回渴止大便得潤而自行正內經通因通用之法也愚以上論殊為穿鑿病如小便數而少者法宜用五苓散以利之此為通因通用之法今者小便數而至大便硬則此小便不可為不多矣小便既多則津液必耗復用五苓散以利之是愈燥其津液也喻氏反以回津作解大謬之極或問小便數大便硬仲景論中何以無治法余答云此是仲景不須用藥處俟其陰陽自和則小便漸少大便必自出也如欲用藥少與麻仁丸以潤其大便庶幾猶可傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒汗出者服發汗藥而太陽經之邪未盡故汗出也渴者太陽之邪傳裡膀胱府病水氣上逆而作渴也故宜五苓散以表裡兼主之若汗出不渴者此為邪氣傳裡未甚水氣不至上逆故不作渴也所以五苓散中止用茯苓以主裡而泄水氣更留桂枝加生薑甘草以解表而固衛虛更其名為茯苓甘草湯方也茯苓甘草湯方茯苓二兩桂枝二兩去皮生薑三兩切甘草一兩炙上四味以水四升煮取三升去滓分溫三服琥按成注云茯苓甘草之甘益津液而和衛桂枝生薑之辛助陽氣而解表彼以薑桂味辛走表能助陽氣注甚明切若茯苓味甘而淡乃泄水之物何以能益津液蓋膀胱之邪水利則氣化得以流通津液即由此而回復所以五苓散散邪消水為最燥之藥成注反云潤燥者亦此義也至其云和衛乃甘草之力與茯苓何與焉成氏以上病止汗出而不渴為邪氣不傳裡但在表而表虛故以上湯為解表和衛之劑從不雲茯苓之主裡此為論與方兩失其義琥又按五苓散茯苓甘草湯二方皆太陽標本齊病表裡兼主之劑何謂標太陽之經是也何謂本膀胱府是也經在表本在裡五苓散證邪已入府表證實微故方中止用桂枝一味以主表其餘四味皆主裡之藥也茯苓甘草湯證邪猶在經里證尚少故方中止用茯苓一味以主裡其餘三味皆主表之藥也學者能於仲景書反覆玩索其中意味自見重出例中風發熱六七日不解云云至名曰水逆五苓散主之已見前未持脈時病人手叉自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此此仲景示人以診病法也醫師診病必先持脈今者未持脈時是師欲持其手切脈也而病人反以手叉自冒其心其時病者精神不與醫師相對師因行教試法也手叉叉手義同注已見前教令咳而不咳者耳聾也所以然者以發汗過多陽亡胸中之氣餒而不充故手叉自冒心重復發汗精氣更虛不得上通於耳故耳聾無聞也尚論篇云此耳聾與少陽傳經邪盛之耳聾迥別按成注云陽氣虛精氣不足夫陽氣精氣非二物也人身之陽為氣氣積久而成精氣為精之母精為氣之子氣者肺主之心胸即其分也精者腎主之兩耳其開竅也又按此條病仲景無治法補亡論常器之云素無熱人可與芍藥附子湯素有熱人可與黃耆建中湯愚以重發汗而致虛黃耆建中湯固宜用也夫精氣虛非火虛芍藥附子湯不宜用也至於病人之平素有熱無熱此常氏診病最可笑之法發汗後飲水多必喘以水灌之亦喘喘肺病也經曰形寒飲冷則傷肺發汗後其人亡津液而燥渴內飲水多水氣上逆必作喘外以水灌冷氣侵膚與內邪相搏亦作喘也按此條論仲景無治法補亡論常器之云可與麻黃杏子甘草石膏湯主之愚以發汗後以水灌之其人汗孔仍受水寒所閉上湯固宜用也然不若仍用麻黃湯以發之若發汗後飲水多其人汗孔或疏上湯不宜用也宜改用茯苓桂枝生薑甘草湯喘甚者加厚朴杏子人發汗後水藥不得入口為逆若更發汗必吐下不止發汗後水藥不得入口者此是過服麻黃湯以發其汗汗多亡陽胃中元氣虛不能消水此治之之逆謂治不以理也醫人不知用藥之過更服前湯以發其汗則胃中元氣大虛所入之藥不惟吐出而且下利不止是為大逆此仲景所以深致謹戒之意按此條論仲景無救逆之法補亡論常器之云可與半夏茯苓湯發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之發汗吐下後者謂雖經汗吐且下而傷寒之邪熱猶未解也邪熱未解必乘其人之虛而客於胸中胸中鬱熱因生煩躁陽氣擾亂不得眠也劇者煩極也煩極則知其人鬱熱愈甚故不惟不眠而且反覆顛倒而不安心中懊憹鬱郁然不舒暢而憒悶也成注引內經曰其高者因而越之與梔子豉湯以吐胸中之邪按成注云心惡熱熱甚必神昏是以反覆顛倒殊不知反覆顛倒非神昏也乃心胸中鬱熱煩悶懊懊憹憹欲作吐之狀耳所以內臺方議云此非結胸痞證之比而可下當用梔子豉湯吐而散之也或問云虛煩證奚堪再吐余答云虛者正氣之虛煩者邪氣之實邪熱鬱於胸中是為吐證仍在理宜更用吐法猶之汗下之證仍在可再行汗下法也愚以虛煩二字不可作真虛看梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服成氏明理論云傷寒邪氣自表而傳裡留於胸中為邪在高分則可吐之是越之之法也所吐之證亦自不同如不經汗下邪氣蘊鬱於膈則謂之膈實應以瓜蒂散吐之瓜蒂散吐胸中實邪者也若發汗吐下後邪氣乘虛留於胸中則謂之虛煩應以梔子豉湯吐之梔子豉湯吐胸中虛煩者也梔子味苦寒內經曰酸苦湧泄為陰湧者吐之也湧吐虛煩必以苦為主是以梔子為君煩為熱勝也湧熱者必以苦勝熱者必以寒香豉味苦寒助梔子以吐虛煩是以香豉為臣也琥按方中梔子十四枚當是四十枚否則香豉四合分兩多寡不相稱矣琥按梔子豉湯仲景雖用以吐虛煩之藥余曾調此湯與病人服之未必能吐何也蓋梔子之性苦寒能清胃火潤燥豉性苦寒微甘能瀉熱而兼下氣調中所以其苦未必能使人吐也醫工必欲升散火鬱當於病人喉中探之使吐可耳又用豉法須陳腐極臭者能使人吐方中雲香豉恐醫工用豉反取新制而氣不臭者無怪乎其不能使人吐也若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之此承上文而言發汗吐下後已見虛煩不眠證矣若其人兼少氣者成注云熱傷氣也故加甘草以益之若兼嘔者熱煩而氣逆也故加生薑以散之梔子甘草豉湯方此方自原論中第十卷採附於此於梔子豉湯內加入甘草二兩余依前法得吐止後服內臺方議云心煩懊憹等證屬梔子豉湯已主之矣若其人少氣者為元氣虛乏熱搏不能固也加甘草之甘以緩其中而補其氣愚以少氣者乃熱傷氣而氣促急非真氣虛乏也加甘草者以甘緩之之義服湯後宜徐徐吐之妙梔子生薑豉湯方此方自原論中第十卷採附於此於梔子豉湯方內加生薑五兩余依前法得吐止後服內臺方議云心煩懊憹等證與梔子豉湯吐之則已也若又嘔者為熱氣搏逆不散加生薑之辛以散其氣而止其嘔也發汗若下之而煩熱胸中窒者梔子豉湯主之窒塞也汗下後邪熱未解客於胸中胸中窒塞故生煩熱與梔子豉湯者以吐胸中之邪熱也愚以胸中窒者內有物也或問內有物何以下之而不出以其物在膈上故宜用吐法也尚論篇以此條論為實煩證非是故歟傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒五六日若似乎可下矣然此終是太陽表證仍在為不可下之時所以大下之後身熱不去者表受邪也心中結痛者邪客於胸也成注云若大下後身熱去心胸空者為欲解今者身熱不去心中結痛是未欲解與梔子豉湯以吐胸中之邪熱蓋吐中有發散之義故身熱亦從此而去按成注云大下後身熱去心中結痛者結胸也身熱不去心中結痛者虛煩也彼以仲景梔子豉湯第一條證心中懊憹者為虛煩故以此條用梔子豉湯亦云虛煩證也殊不知心中結痛比上條胸中窒更甚當是實煩之證但身熱不去此為熱氣未盡收斂於內比結胸證為少輕耳用藥雖同證則迥異附例下利後更煩按之心下濡者為虛煩也宜梔子豉湯濡當作軟此條自厥陰篇移附於此下利後更煩者此非用藥下後而發煩乃自利之後而更煩也蓋陽經下利本發煩熱但既下之後則煩當減而邪欲解矣若其煩比前更加及按之心下卻軟而不硬不痛者是為虛煩成注云此邪氣乘虛客於胸中也與梔子豉湯吐之則愈或問邪傳三陰則下利子何得以厥陰下利之證而移之太陽篇也余答云如厥陰病熱下利則不但煩而當見消渴證矣若謂陽經無下利之證則是仲景葛根湯證非太陽陽明合病之自下利乎學者當以理格之傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之本太陽傷寒表邪未解而誤下之以致心煩腹滿心煩者邪入而壅於高分也邪熱壅於高分則心以下之氣不能宣越因而腹滿既煩且滿故令臥起不安成注云與梔子厚朴湯以吐煩泄滿梔子厚朴湯方梔子十四枚擘厚朴四兩姜炙枳實四枚去穰炒以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服琥按成注云酸苦湧泄梔子之苦以湧虛煩厚朴枳實之苦以泄腹滿以吐中即具發泄之義故耳琥又按成注以腹滿為裡實證蓋上吐下泄乃醫家瀉實滿之法也故用厚朴枳實於大黃中則其滿從下而泄用厚朴枳實於梔子中則其滿即從上而湧也要之上藥亦非吐劑或於服湯後探之使吐可耳內臺方議云下後但腹滿而不心煩即邪氣入里若心煩而不腹滿即邪氣在胸中屬梔子豉湯今既煩而且腹滿乃邪氣在胸腹之間也煩則不能臥滿則不能坐故臥起皆不安故用梔子為君以吐其煩厚朴為臣枳實為佐使二者之苦以瀉腹滿也按上議實本成注之義傷寒醫以丸藥大下之身熱不云微煩者梔子乾薑湯主之太陽傷寒醫誤以丸藥大下之徒傷中氣邪熱不除所以身熱不去邪氣乘虛客於胸中而作微煩也與梔子乾薑湯吐之以散邪熱扶中氣梔子乾薑湯方梔子十四枚擘乾薑二兩切上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服琥按成注云苦以湧之梔子之苦以吐煩辛以潤之乾薑之辛以益氣夫辛味本散其益氣者乃姜氣之溫耳仲景立此湯本吐煩之劑方中用乾薑者因醫以丸藥大下之後其人必中氣受傷專賴乾薑之辛溫以扶助中氣謂雖吐而不致有妨於胃所以外臺方議云安中正氣乾薑有臣佐之力者即此義也凡用梔子湯病人舊微溏者不可與服之凡用梔子湯謂凡上數湯中皆有梔子故總上文而言之也梔子之性太苦而寒若病人平素腸胃虛寒而大便微溏者不可與服如誤用之恐不能上湧反致下泄為害甚矣醫者可不以此為戒按成注引內經曰先泄而後生他病者治其本必先調之後乃治其他病況梔子湯仲景皆用於誤下之後胸中煩熱不解者若病人舊微溏又病傷寒而誤下之吾恐胸中雖煩未必盡是鬱熱故云不可與梔子湯也後條辨或問云本草不言梔子為吐劑仲景用之攻吐何也答云梔子本非吐藥茲因胸煩為邪氣在上拒而不納故煮湯投之則自吐邪氣因得以出內經注云此因其邪之本高而後用藥越之為甚易耳則是吐藥奚必盡投以瓜蒂散邪太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此條雖太陽病強發汗亡陽以致裡虛實系真寒陰證正文與注並湯俱見中寒論中咽喉乾燥者不可發汗以下數條皆言不可發汗尚論篇序於麻黃湯之後亦有理茲從舊例作解不須更易此承上數條發汗及吐下之誤因言不可發汗之候多端醫工不可以不知也有如咽喉乾燥者成注云津液不足也以發汗則重奪其津液故不可也後條辨云凡醫家欲行汗法必當顧慮夫上焦之津液有如此者淋家不可發汗發汗必便血淋者膀胱裡熱氣化不行小水淋瀝而時出也淋家津液已虛更發其汗則水府告匱徒逼其血從小便出耳後條辨云凡醫家欲行汗法必當顧慮夫下焦之津液有如此者瘡家雖身疼痛不可發汗發汗則痓成注云表虛聚熱則生瘡瘡家雖身疼如傷寒不可發汗發汗則表氣愈虛熱勢愈甚津液枯燥不能榮養筋脈因而變痓後條辨云凡醫家欲行汗法便當顧慮夫周身之津液有如此者衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠汗為血液衄血之人血凌清道陽經受傷若更發汗重亡其陽復奪其陰則額上必陷乃上焦津液枯竭之應也脈急緊者諸脈皆屬於目目得血而能視筋脈無血以養則緊急而不能牽引其目故目直視而不眴眴瞬同目搖動也不得眠者衛氣夜行於陰則眠今者衛無營主僅能行於陽不能行於陰故不得眠即成注云陰氣虛者是也後條辨云凡醫家欲行汗法復不可不顧慮夫陽經之營血有如此者亡血家不可發汗發汗則寒栗而振血屬陰亡血即亡陰也陰亡則陽無以附更發其汗陽從外脫其人必寒栗而振搖成注所云陰陽俱虛者是也後條辨云凡醫家欲行汗法復不可不顧慮夫陰經之營血有如此者汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕心主血汗者心之液平素多汗之家心虛血少可知重發其汗必恍惚心亂乃心液亡而神氣浮越也小便已陰疼者小腸為心之府心藏虛而府中津液亦告竭也後條辨云凡醫家欲行汗法更不可不顧慮夫表氣之疏密營室之衰旺有如此者仲景法與禹餘糧丸大都是益血鎮固之劑惜乎原方已闕不可考也補亡論常器之云禹餘糧一味火煅散服亦可郭白雲云用禹餘糧不用石石乃殼也愚以其言未必盡合仲景原方之義今姑存之以備參考按以上數條證補亡論皆有方治咽喉乾燥者常器之云可與小柴胡湯其言於義未合石頑云宜小建中湯其言猶近乎理淋家常云宜豬苓湯然用於汗後小便血者亦嫌其過於滲利也石頑云未汗宜黃耆建中湯蓋此湯用於瘡家身疼痛者甚妙若淋家猶未盡善瘡家常云誤汗成痓桂枝加葛根湯其言雖為可取要不若王日休云小建中湯加歸耆更妙衄家常云可與犀角地黃湯此不過治衄之常劑許叔微云黃耆建中湯奪汗動血加犀角夫衄家系陽明經熱上湯恐非陽明藥也呂滄州云小建中湯加蔥豉誤汗直視者不可治大抵衄傢俱汗證蔥豉專豁陽明經鬱熱為對證之的藥亡血家常云可與芍藥地黃湯夫亡血家亦有陰虛發熱者上湯固宜用也石頑云黃耆建中湯誤汗振栗苓桂朮甘湯加當歸據成注云亡血發汗則陰陽俱虛愚以上二湯皆亡血家汗後之劑病人有寒復發汗胃中冷必吐蛔此條系真寒證正文與注見中寒論中本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆成注云病在表者汗之為宜下之為逆病在裡者下之為宜汗之為逆大約治傷寒之法表證急者即宜汗里證急者即宜下不可拘拘於先汗而後下也汗下得宜治不為逆傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯此條系太陽傷寒醫家誤行下法因下利清穀不止雖身疼痛急當溫救其里至其救表之藥仍用桂枝湯者以其人胃氣本實不為誤下所害故也正文與注詳見中寒論中病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯此條系中寒病其發熱頭痛者以寒中少陰必由太陽直入故頭痛而反發熱脈沉身體疼痛乃陰寒之氣由內而徹於外也其為中寒病無疑正文與注詳見中寒論中太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後復下之冒之為言覆也謂寒邪怫鬱如以物蒙覆其頭目也太陽病先下之復發汗是為汗下皆逆徒虛其表裡之氣邪終不解因而致冒金匱要略云冒家欲解必大汗出故云自愈其所以自愈者非汗自出而愈乃用藥使之汗出斯表氣得和故也汗出表和則不必復下故云必得里未和者然後用藥復下之可見表裡兩虛之人雖其汗下之證醫人不敢輕用汗下之藥有如此者按此條論仲景無治法補亡論常器之云和表用小柴胡湯然此湯非太陽病當用之藥愚以表宜桂枝湯或小建中湯黃耆建中湯選而用之常氏又云復下用調胃承氣湯恐此湯又非裡虛所宜愚以下宜桂枝加大黃湯又按條辨注得里未和里字指大小便言其說甚誤尚論篇亦云下里藥無過大柴胡湯五苓散誤之誤矣竊思正文中既云然後復下之此專指大便而言若兼利小便則不言下矣斯其義可不辨而自明太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出脈經作之而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之太陽病未解其邪所著不在於表即入於裡表裡之病於陰陽二脈驗之脈經曰寸為陽關以前是也尺為陰關以後是也今者寸關尺三處脈皆和平是為陰陽俱停乃正氣將復邪氣欲去之兆也然猶必先振栗乃得汗出而後解由其人病久元氣虛正與邪爭故也其不為振汗邪無從出者但陽脈微即為表邪盛也法當汗之而解但陰脈微即為里邪實也法當下之而解蓋此為太陽病已入於府胃中鬱熱不能自消故云若欲下之宜調胃承氣湯按成注引陽虛陰盛陽盛陰虛為陰陽脈微汗下作解其義晦而不明尚論篇注陰陽脈微為病後之脈與初病不同蓋初病皆邪氣勝則實之脈病後皆正氣奪則虛之脈所以最虛之處便是容邪之處故陽脈微者邪乘其陽汗之而解陰脈微者邪乘其陰下之而解斯言實發成氏之未發然愚以邪氣既乘之後恐其脈未必盡出於微若脈既微必無用承氣湯下之之理大抵脈微二字當活看此非微弱之微乃邪滯而脈道細伏之義邪滯於經則表氣不得條達故陽脈微邪滯於府則裡氣不能通暢故陰脈微又按上論云先汗出而解仲景無方千金云宜桂枝湯謂胃承氣湯方見後第六卷陽明篇中重出例太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯正文與注見前桂枝湯方下附後例傷寒五六日中風往來寒熱胸脅苦滿云云至身有微熱或咳者與小柴胡湯主之此條系風寒之邪在半表半裡乃少陽經證不當入太陽篇正文與注並小柴胡湯方及加減法俱見後第七卷少陽篇中血弱氣盡腠理開邪氣因入云云至故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之得病六七日脈遲浮弱云云至柴胡湯不中與也食谷者噦傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之上五條證俱見後少陽篇中小建中湯方見後第三條證下傷寒中風有柴胡證但見一證便是不必悉具凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解上二條證俱見後少陽篇中傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪當傳裡之時今則別無他證但心中悸而煩者此外邪已微而不傳正氣驟虛不能自持也蓋陽氣內虛則心悸陰氣內虛則心煩故與小建中湯以建其裡氣之虛愚以此條病必是太陽傷寒發汗之後所變故建中湯即桂枝湯小變其制也小建中湯方桂枝三兩去皮甘草三兩炙大棗十二枚擘芍藥六兩生薑二兩切膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也嘔家必胃有邪熱而胸中作滿中滿者勿食甘若用建中湯之甜是助其滿內經雲實實者是也成氏明理論云脾者土也應中央處四藏之中為中州治中焦生育營衛通行津液一有不調則營衛失所育津液失所行必以此湯溫建中藏是以建中名焉膠飴味甘溫甘草味甘平脾欲緩急食甘以緩之建脾者必以甘為主故以膠飴為君甘草為臣桂味辛熱辛散也潤也營衛不足潤而散之芍藥味酸微寒酸收也泄也津液不逮收而行之是以桂枝芍藥為佐生薑味辛溫大棗味甘溫胃者衛之源脾者營之本黃帝針經曰營出中焦衛出上焦是矣衛為陽不足者益之必以辛營為陰不足者補之必以甘辛甘相合脾胃健而營衛通是以薑棗為使琥按小建中湯補中有發散之義大抵中氣虛寒者宜用之倘傷寒家有水氣衝心而悸熱邪壅膈而煩者上湯不宜輕用也內臺方議或問曰建中湯方與桂枝湯同只多膠飴所主之病全然不同何也答曰桂枝湯中桂枝芍藥等分以芍藥佐桂枝而治衛氣也建中湯中芍藥多半而桂枝減少以桂枝佐芍藥而益其營氣也是以大有不同愚以上言猶為未盡其義蓋桂枝湯中以芍藥佐桂枝則辛甘相合散而助表建中湯中以桂枝佐芍藥則酸甘相合斂而補中能達此義斯仲景制方之意無餘蘊矣附後例太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止云云至與大柴胡湯下之則愈按此條證云太陽病過經十餘日其時已傳少陽為柴胡證矣故以下之為反先與小柴胡湯也正文與注並大柴胡湯方俱見後第七卷少陽篇中傷寒十三日不解胸脅滿而嘔云云至先宜小柴胡湯以解外後以柴胡加芒硝湯主之此條亦系少陽病正文與注並湯俱見後少陽篇中傷寒十三日不解過經譫語者以有熱也當以湯下之云云至此為內實也調胃承氣湯主之按此條證系陽明府病正文與注並湯俱見後第六卷陽明篇中太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽病邪熱不解隨經入府結於膀胱太陽為多血之經府有結熱則經中之血與熱相搏蓄於下焦其人如狂如狂者乃邪熱之氣上熏於心以故妄亂與狂相似也血自下者邪熱隨血而出故云愈也若其人外不解外即表也表邪不解里雖蓄血尚未可攻謂當先解其外外得解已但少腹急結者此可驗膀胱熱結下焦蓄血也乃可竟用藥以攻之成注云與桃核承氣湯以下熱散血愚以下熱散血當作下血散熱夫血乃有形之物可下而不可散熱乃無形之氣可散而不可下成注字義亦缺斟酌又按熱結膀胱膀胱乃小腹中之物膀胱熱結其氣蒸於少腹則血不流利故作急結之形為下焦蓄血之證諦也所以桃核承氣湯乃攻下焦蓄血治少腹急結之藥實非通膀胱熱結之藥也條辨注云少腹指膀胱急結者有形之血蓄積也尚論篇注云少腹急結為膀胱之血蓄而不行若似乎血在膀胱以內則是服桃核承氣湯後蓄血當從小便中出矣二家所言殊缺分析又按此條論云外不解者尚未可攻仲景當日獨缺解外藥補亡論郭白雲採千金方云宜桂枝湯及考內臺方議云若其外證不解或脈帶浮或惡寒或身痛等證尚未可攻且與葛根湯以解其外上二湯皆太陽病解外之藥學者宜臨證消息用之桃核承氣湯方桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利琥按成注云甘以緩之辛以散之少腹急結緩以桃仁之甘夫緩不言甘草而反言桃仁殊為不解又云下焦蓄血散以桂枝之辛夫桂枝非散蓄血之藥上湯中用之者以其邪自太陽經傳來故也愚以上湯即調胃承氣湯中加桃仁桂枝蓋下焦蓄血無關於胃故用調胃承氣湯緩緩下之即上方後云當微利者是也成注復云大熱之氣寒以取之熱甚搏血故用大黃芒硝加桃仁者破血結也加桂枝者解外邪也用甘草者緩腹急也或問桃仁承氣湯中用桂枝之義余答云喻嘉言有云太陽隨經之餘邪非桂枝不解所以仲景用桃仁增入承氣以達血所仍加桂枝分解外邪正恐其邪少有未解則壅熱愈甚血愈蓄積不能即下故桃仁承氣湯中用桂枝解外與大柴胡湯中用柴胡解外其義實相仿也附後例傷寒八九日下之胸滿煩驚云云至不可轉側者柴胡加龍骨牡蠣湯主之此條系少陽傷寒誤下之證正文與注並柴胡加龍骨牡蠣湯方俱見後第七卷少陽篇中傷寒腹滿譫語云云至此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒云云至此肝乘肺也名曰橫刺期門上二條證正文與注並穴圖俱見後第十四卷刺熱論中太陽病二日反躁凡當作反尉其背而大汗出云云至穀氣下流故也太陽病中風以火劫發汗云云至小便利者其人可治傷寒脈浮醫以火迫劫之云云至起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方形作傷寒云云至被火者必譫語云云至當汗出愈太陽病以火熏之云云至名為火邪脈浮熱甚反灸之云云至必咽燥唾血微數之脈慎不可灸云云至焦骨傷筋血難復也脈浮宜以汗解用火灸之云云至名火逆也欲自解者必當先煩云云至故知汗出解也燒針令其汗云云至與桂枝加桂湯更加桂二兩火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方太陽傷寒者加溫針必驚也以上火逆證十一條方二首正文與注俱見後第十二卷救逆法中琥按傷寒一病內經中只有刺熱法無用火之法蓋傷寒本系熱證復用火以灸之是以火濟火也所以仲景於上文云煩躁譫語衄血唾血清血發黃驚狂身體枯燥手足躁擾腰重而痹口乾咽爛焦骨傷筋等皆為火逆之證垂戒諄諄後醫不可不以此為鑑然此但為傷寒者說若中寒不以用火為禁也太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者云云至以醫吐之所致也此為小逆上條證乃不當吐而醫誤吐之為逆正文與注見後第十二卷救逆法中太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也此條證雖不宜吐然吐之亦不為逆太陽病吐之者必病人胸膈之中挾痰或食也吐之後反不惡寒者即誤吐中亦有發散之義故不惡寒也不欲近衣此因吐後胃中空虛邪熱乘之內作煩熱故不欲近衣也按此條論仲景無治法補亡論常器之云可與竹葉石膏湯愚以吐後胃中虛熱而煩者庶幾近之若吐後胸中鬱熱未盡而煩者宜梔子豉湯病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也脈數者一息六七至是也數為胃氣本熱胃氣熱當消穀引食引進也今病反吐者此以發汗太過令陽氣外微陽氣受於胸中故膈中之氣亦虛膈中氣虛則邪熱入胃脈乃數也數為客熱客熱者即邪熱也邪熱之氣不能消穀以病人胃中有邪熱則正氣必虛故不能引食而吐也愚按氣本屬陽虛甚則冷然此胃中既有邪熱則正氣雖虛未至於冷正文中冷字宜從刪按此條論仲景雖不明言是太陽然此當是太陽傷寒發汗太過而脈變數條辨以脈數為溫病誤發其汗因而致吐者非又按此條論仲景無治法補亡論常器之云可與小半夏湯此湯雖系止吐之藥但發汗後津液必亡尚宜斟酌用之又云宜小溫中湯此常氏以吐為胃中虛冷忘其脈數之為客熱也倘後學宗之焉得無誤附後例太陽病過經十餘日心下溫溫欲吐而胸中痛云云至與調胃承氣湯云云至以嘔故知極吐下也按此條太陽病過經十餘日病已不在太陽欲吐胸中痛此當是邪傳陽明已入於府故與調胃承氣湯正文與注見後第六卷陽明篇中太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽病六七日邪氣正當傳裡之時縱表證仍在而脈微沉是徒有表證已無表脈也又脈微沉為邪氣在裡乃結胸之脈今則反不結胸知邪不在上焦其人發狂者比前桃核承氣湯如狂證較甚此熱在下焦而為膀胱府病無疑矣鞕與硬同少腹硬滿則其病又甚於急結小便自利則知其熱不結於下焦之氣分而結於下焦之血分也前如狂證蓄血輕故自下而愈此發狂證蓄血重必用藥以下其血乃愈所以然者謂所以少腹硬滿之故以太陽邪熱不解隨經入膀胱之府膀胱熱結血瘀於小腹之裡故也成注云與抵當湯以下蓄血尚論篇云此條證較前條桃核承氣證更重且六七日表證仍在曷為不先解其外邪又曷為攻藥中不兼加桂枝邪夫蓄血而至於發狂則熱勢攻心桃核承氣不足以動其血桂枝不足以散其邪非用單刀直入之將必不能斬關取勝故名其湯為抵當抵者至也乃至當不易之良法也邪結於胸則用陷胸以滌飲邪結少腹則用抵當以逐血設非此一法少腹中所結之血既不附氣而行更有何藥可攻其堅壘哉所以一峻攻斯血去而邪不留並無藉桂枝分解之力耳愚以看病之法須分表裡假若表裡之證兼見須分輕重而直取其邪上云六七日表證仍在則表邪已衰非比一二日之盛矣況其下文云脈微而沉其人發狂少腹硬滿明系太陽隨經瘀熱在裡里證已急焉得不用峻攻之劑醫人於此若猶顧慮夫在表之餘邪是為不知證之輕重治之緩急斯時人命不幾同兒戲邪噫今醫有以抵當湯丸為猛厲而不敢下者其小心適足以害人而病家反以為把穩有寧甘就死而不肯服者亦大可傷也抵當湯方水蛭三十個熬虻蟲三十個熬去翅足桃仁二十個去皮尖大黃三兩酒浸上四味銼如麻豆以水五升煮取三升去滓溫服一升不下再服成氏明理論云人之所有者氣與血也氣為陽氣留而不行者則易散以陽病易治故也血為陰血蓄而不行者則難散以陰病難治故也血蓄於下非大毒駛劑則不能抵當其甚邪故治蓄血曰抵當湯水蛭味鹹苦微寒內經曰咸勝血血蓄於下勝血者必以咸為主故以水蛭為君虻蟲味苦微寒苦走血血結不行破血者必以苦為助是以虻蟲為臣桃仁味苦甘平肝者血之源血聚則肝氣燥肝苦急急食甘以緩之散血緩急是以桃仁為佐大黃味苦寒濕氣在下以苦泄之血亦濕類也蕩血逐熱是以大黃為使四物相合而方劑成病與藥對藥與病宜雖苛毒重疾必獲全濟之功矣太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之太陽病身黃者膀胱熱結濕氣不行土主濕而色黃濕熱相搏故身發黃也脈沉為里證結者脈來緩時一止復來之名也脈緩為濕所以里濕之脈當見沉結少腹硬則濕熱之形已蓄於下焦可知上三證者猶不分溺之與血以血亦濕潤之物也故當於小便驗之如小便不利者為溺蓄於膀胱之內而無血也若小便自利其人如狂者乃血蓄於膀胱以外為甚諦諦者審也猶言精審而無差也仲景法與抵當湯以下蓄血按上文云小便不利者仲景不言治法成注云可與茵陳湯補亡論云與五苓散後條辨云屬茵陳五苓散愚以三方可選而用之傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸傷寒有熱者謂里有熱熱入下焦故少腹作滿形也夫曰滿比急結稍甚比硬稍輕欲審其蓄血之證亦須於小便驗之據病人小腹滿應當小便不利今反利者為有蓄血也當下之然下之不可用其餘湯藥蓋以桃核承氣則太輕抵當湯又太峻成注云此無身黃髮狂等證是未至於甚可與抵當丸小可下之蓋藥味雖同杵分為丸一以緩其性一以小其制也抵當丸方水蛭二十個虻蟲二十五個桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服晬時周時也太陽病小便利者以飲水多必心下悸小便少者必苦裡急也太陽病小便利者是膀胱之府無邪熱也若其人飲水多此熱在上焦心火亢甚小便雖利然渴飲水多則水來犯火必心下悸若其人飲水多而小便少此熱在下焦為太陽邪熱隨經入府水積不行膀胱之裡必苦急也尚論篇謂飲水多小便少乃邪熱足以消水故以裡急二字為里證已急作解大誤之極按此條論仲景無治法補亡論常器之云可茯苓甘草桂薑湯又豬苓湯推常氏之意以太陽病小便利者為表證多里證少故用茯苓甘草桂薑湯小便少者為表證少里證多故用豬苓湯也
