front:
  text: 自序世人之病傷寒為多傷寒之書仲景為聖夫以一病而有三百九十七法一百一十三方詳已惡乎廣哉不知仲景之書本於內經熱論其言六經傳變非不辨且晰也仲景復推廣以成書因是以有王叔和之增益因是以有成無己之注解蓋愈推則愈廣焉則余之補闕略訂訛謬而為是書也非無自矣且夫傷寒之病多由時氣則四時八節二十四氣七十二候不可不詳釋也傷寒之病必傳經絡則十二經之在手足者不可不兼圖也傷寒之病非一證則三百九十七法一百一十三方不可不反覆窮究而為之推衍附益也傷寒之病間用針刺其法近世罕見則熱病之五十九穴不可不備録也余獨怪世醫徒取節庵一編無他樂其簡耳然昔人方論皆有奧義存於其間使不深察其意嘗有失之毫芒而死生頓易者矣余非不憚煩也正惡夫世之樂於簡而輕視民命者往往誤而殺人也則是書之補前人所未補發前人所未發者曷可少哉其曰傷寒非寒者蓋寒病則治以熱劑熱病則治以涼劑此自然之理也傷寒之病名雖為寒其所見之證皆熱竊恐後人執傷寒之名而誤投熱劑故曰傷寒非寒也至感真寒而深入三陰者特十之一二耳此其所見之病皆寒而與熱證迥異則名之曰真寒而別為編康熙庚申重九長洲汪琥苓友自序
