body:
  text: 凡例一此書之成專以辨注仲景傷寒論也然仲景論傷寒實本素問熱病仲景分六經不出靈樞經脈故余摘取二篇中文列之傷寒例前為第一卷使後人尊仲景復知尊軒岐況仲景當日既成傷寒論亦自云述不敢云作則知仲景之論實宗內經之旨也一內經熱論篇文王太僕注之於先馬玄臺廣之於後然其中有未盡合理處間以鄙意補之二王叔和撰次仲景方論書凡十卷其中如傷寒例六經辨脈證治法及陰陽易瘥後諸病此實系仲景原文悉為編入所削者如第一卷脈法及第七卷以後汗吐下諸篇以其為叔和所增入也至於第二卷中如痙濕暍三證第七卷前如霍亂一證亦系仲景原文而不編入者以其為雜病也一仲景論為方書之祖以內經中有論而無方也叔和起而撰次之知尊仲景矣但其於仲景論中插入己意使學者不知孰為仲景孰為叔和以故後人誹議之云叔和變亂仲景傷寒論故其脈經亦受高陽生所竊取此其報也然仲景書當三國時兵火之後殘缺失次若非叔和撰集不能延至於後復有成無己為之注解也今醫勿但責叔和之過而忘叔和之功一叔和撰次六經篇有陽明少陽病列於太陽篇者有太陽病列於陽明篇者有中寒病雜入太陽陽明病中及雜入三陰熱病中者今皆悉為歸正凡三陽病各歸三陽篇其三陰熱病亦各自歸其篇惟中寒病則另作上中下三卷辨其證為真寒使後學盡知傷寒中寒二證判然庶無錯誤一傷寒經絡仲景書止分六經不言手足其實則合手經而皆病愚故於首卷熱論篇後即圖注靈樞手足陰陽六經其注以滑氏發揮為主然亦間有錯誤處復以鄙意較之一成無己注解傷寒論猶王太僕之注內經所難者惟創始耳後之人於其注之可疑者雖多所發明大半由其注而啓悟至有忘其起豫之功反責其解釋之謬者所以王宇泰云成氏解釋最為詳明雖其中時或自相矛盾亦白璧微瑕固無損於連城也或曰成氏注傷寒論不過隨文順釋但嫌其不辨叔和語不分仲景書正不知古人虛心著書不敢輕易指責所以品愈高名愈著如吾輩者亦自厭其饒舌耳一成氏注仲景書已完又自撰明理論其解仲景桂枝麻黃青龍等湯尤為明暢第惜其所解者不過草余方耳其所未發明者愚即以原注中之意及採內臺等書大半以鄙意補之一駁正傷寒論例近非一人愚今較之亦從衆也但仲景全書中有四時八節決病法乃傷寒論一部綱領近今之書悉皆脫略惟準繩於論例中猶存正文但當日成氏亦未及注愚特細為解釋以見十二宮辰斗柄所指時節氣候為之轉移當其時倘病傷寒醫人宜隨時氣立論則用藥始可十全所以仲景亦云此須洞解之也一傷寒論自成注以後在昔明醫如李東垣不過以治法略舉其要朱丹溪亦僅以疑處摘問其目未聞有以仲景原論全解者至明季有歙人方中行著傷寒條辨八卷乃成氏之後一人而已我朝初有喻嘉言者推廣方氏未發之旨著尚論篇五卷是亦仲景之功臣也復有程子郊倩即仿二書之意著後條辨六集其中亦有可採之處所可嫌者三家之書皆倒亂仲景六經篇原文彼雖各有其理要之六經原次或當日叔和未盡改易其間仲景妙義焉知不反由此新編而盡失邪況方書治病不過欲每條解明不致醫藥有誤而已非若文公章句必欲承上起下也孔子云愛禮存羊凡六經原次余不敢亂叔和之舊一仲景六經篇中或有前不得不附之後後不得不附之前者則曰附例或已經附注過而原論中復及者則曰重出例或原論中始及未經注過宜附之後者則曰附後例其他如溫病壞病及病宜用刺另立治法各分其篇於後者又諸湯方宜附之後者皆如上例也六經篇中惟中寒病為真陰證不入上例止以重圈記之其真陰寒證宜用湯藥亦以重圈記之一此書凡系仲景論成注有未妥者間採方喻程及諸名家之說不敢竊取其所著書及姓氏必為標出間附己意則曰愚按及設為或問而余答也一此書既集仲景論後必附昔賢及後人方論悉屬鄙意逐條解明然亦多方引證不敢創為私說務使論必中理方必切病愚切願天下後世之人但能讀是書雖遇傷寒變證極奇之病然療之有法施之輒效業醫者可不勉之
