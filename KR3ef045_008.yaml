body:
  text: 卷之八辯太陰病脈證並治法此係仲景原文太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬此條言太陰病乃陽邪傳裡之證也太陰之脈入腹屬脾絡胃邪熱壅甚則為腹滿邪迫於上則吐而食不下邪迫於下則利甚而腹時痛成注云陰寒在內則腹中常痛此陽邪干里故雖痛而不常但時時腹自痛言有時而痛有時則又止也邪雖干里既痛且利則此腹痛之候宜和而不宜下矣若誤下之必胸下結硬此即前第五卷太陽下篇云病發於陰而反下之因作痞者此之謂也或問此條病在未下之先仲景法當用何藥余答云太陰受病當四五日發以其脈布胃中絡於嗌故腹滿嗌乾龐安時以大承氣湯下之今者腹雖滿而嗌不幹是病熱不甚既吐且利其邪未實故不可下愚以仲景法還宜以桂枝加芍藥湯主之要之此湯本太陽病誤下腹滿時痛轉屬太陰之藥若未經誤下而病已屬太陰者則此湯中桂枝另宜以升麻或葛根代之太陰中風四肢煩疼陽微陰澀而長者為欲愈此條系太陰中風證一言太陰當見腹滿等候矣兼之四肢煩疼者太陰之經屬脾脾主四肢成注云風淫末疾是也夫煩疼一候似兼表邪今者陽脈既微表邪少也陰脈則澀里未和也條辯云血凝氣滯則脈澀此非向愈之徵其欲愈者乃脈長故也尚論篇云微澀之中更察其脈之長此為邪氣已退正氣欲復故其病為欲自愈也太陰病欲解時從亥至醜上注已見前第三卷太陽上篇太陰病脈浮者可發汗宜桂枝湯此條太陰病當是太陽經傳來者夫曰太陰病當見腹滿等候診其脈不沉細而浮則知太陽經風邪猶未解也故宜桂枝湯以汗解之湯見前第三卷太陽篇中自利不渴者屬太陰以其藏有寒故也當溫之宜四逆輩此條系真寒病正文與注並湯見中寒論中傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也此條系太陰傷寒自利慾解之證前陽明篇中傷寒脈浮而緩云云至八九日大便硬者此為轉屬陽明今者以脾家實故雖暴煩要之腐穢當自利而去何也蓋太陰病必腹滿腹滿者胃中有物也胃中水穀之積既變而為腐穢則邪應從大小便出其暴煩者邪欲泄而正氣與之爭也成注云下利煩躁者死此為先利而後煩是正氣脫而邪氣擾也茲則先煩後利是脾家之正氣實故不受邪而與之爭因暴發煩熱也下利日十餘行者邪氣隨腐穢而得下泄也以故腐穢去盡利必自止而病亦愈本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之此條系太陽病傳入太陰之證太陽病何以驟傳入太陰成注云表邪未罷醫下之邪因乘虛傳於太陰裡氣不和故腹滿時痛此陽邪陷入於陰分也故仍用桂枝湯以解太陽未盡之表邪加芍藥以和太陰裡虛之腹痛桂枝加芍藥湯方此方自原論中第十卷採附於此於桂枝湯方內更加芍藥三兩通前共六兩余依桂枝湯法琥按上方乃治太陽表邪未盡太陰裡氣虛熱而腹痛者也武陵陳氏云上證原從誤治引太陽之邪入里其邪未盡離乎太陽未全歸於太陰自表而入還欲其自表而出故仍用桂枝湯驅太陽未盡之邪況桂枝辛溫建中亦可溫中而救誤下之害其加芍藥者專主腹痛腹痛宜和凡屬寒之痛宜姜附之熱以和之而芍藥在所不用屬熱之痛宜芍藥之寒以和之而姜附又非所宜此陽經之邪侵入太陰作痛者故當以芍藥和之芍藥性寒寒能御熱而瀉侵脾之熱邪芍藥味酸酸能收斂脾氣使不受外邪所侵此其所以用桂枝湯而加芍藥也後世不論寒痛熱痛而概用芍藥者豈不謬哉大實痛者桂枝加大黃湯主之此承上文而言如腹滿痛甚又為大實之證其用桂枝湯不可加芍藥以治之何也以其人胃家本實雖因太陽病誤下熱邪傳入太陰之經然太陰之邪已歸陽明而入於府此非裡虛痛乃里實痛也成注云大實大滿自可下除之故加大黃以下里實其仍用桂枝湯者以太陽之邪猶未盡故也桂枝加大黃湯方此方自原論中第十卷採附於此桂枝三兩去皮大黃一兩芍藥六兩生薑三兩切甘草二兩炙大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服琥按上方仲景既云加大黃則不當加芍藥矣而方中用芍藥至六兩所以條辯云此皆後人之苟用者當斟酌也內臺於上方止用赤芍藥一兩雖變仲景之法實得用藥之旨內臺方議曰表邪未罷若便下之則虛其中邪氣反入里若脈虛弱因而腹滿時痛者乃脾虛也不可再下急與桂枝加芍藥湯以止其痛若脈沉實大實而痛以手按之不止者乃脾實也即胃實急宜再下與桂枝湯以和表加芍藥大黃以攻其里且赤芍藥性涼而能瀉中大黃苦寒而能除其實瀉其脾也內臺方疑問曰桂枝加芍藥湯用白芍藥加大黃湯用赤芍藥二證皆同何得有異答曰白芍藥能補脾止痛赤芍藥能瀉脾利痛前證加芍藥湯乃治虛邪後證加大黃湯乃治實邪以此虛實之不同故補瀉之有異非明智者孰能辯之琥又按上桂枝加大黃湯仲景雖入太陰經例實則治太陽陽明之藥也與大柴胡湯治少陽陽明證義同太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也此承上兩節而言太陰病者腹滿時痛是也但腹滿痛者其脈未必盡弱今者太陰之脈既弱其人腸胃之氣必不能固其大便必接續自利而通設於未利之先當行大黃芍藥者方中宜減用之以其人脈弱則胃氣亦弱大便易於動利故也診其臟脈可以知腑醫人用藥可不詳慎以保其中州之氣乎或問大黃能傷胃氣故宜減芍藥能扶脾陰何以減之余答云脈弱而胃氣弱者弱則氣餒不充仲景以甘溫之藥能生氣芍藥之味酸寒雖不若大黃之峻要非氣弱者所宜多用以故減之亦宜琥按以上方論乃仲景治太陰病法也要之人病太陰傷寒其脈證實不止此學者須於昔賢方論參合用之附昔賢治太陰病方論變法龐安時云尺寸俱沉細者太陰受病也當四五日發其經布胃中絡於嗌故腹滿而嗌乾宜大承氣湯下之郭河南云此即仲景辯太陰之說也當詳證而後可下琥按上條論仲景於序例中不言湯藥龐氏以腹滿嗌乾的系太陰熱證故云宜大承氣湯郭氏云未可遽下者以其脈沉細恐胃中未結實琥又按傷寒例云太陰受病脈尺寸俱沉細少陰受病脈尺寸俱沉厥陰受病脈尺寸俱微緩凡言脈處大都系叔和補入兼之傳寫時不無所誤以理論之三陰經居里脈皆當沉豈有太陰少陰脈既見沉而厥陰更居於里其脈反不言沉之理今校正尺寸俱微緩者當是太陰受病尺寸俱沉細者當是厥陰受病細字乃弦字傳寫之誤尺寸俱沉是少陰受病無煩議耳凡三陰證宜用承氣湯者於沉脈中必數而有力惟太陰脈微帶緩此為辯證最妙之法又云傷寒脈浮緩手足自溫者系在太陰雲云以脾家實腐穢當去故也橘皮湯主之總論橘皮湯方橘皮一兩生薑二兩細銼水一升半煎七合去滓分二服稍熱呷未瘥再作服琥按上主療云云即仲景原論也仲景云腐穢當自去故無方治今龐氏用橘皮湯者內安太陰去穢惡扶助正氣故也活人桔梗半夏湯方治傷寒冷熱不和心腹痞滿時發疼痛順陰陽消痞滿桔梗微炒細銼半夏生薑汁製陳橘皮各一兩枳實半兩麩炒赤色上銼如麻豆大每服鈔五錢匕水一盞半生薑三片同煎七分去滓溫服琥按上主療云心腹痞滿時發疼痛此太陰病也故上藥入足太陰兼走手太陰足陽明為散邪泄實之劑宣明檳榔散方治傷寒陰病下之太早成痞心下痞滿而不痛按之軟虛也檳榔枳殼等分上為末每服三錢煎黃連湯調下不計時候溫服琥按上主療云心下痞滿乃腹滿也腹滿為太陰經病仲景云太陰為病脈弱設當行大黃芍藥者宜減之今者傷寒陰病當是太陰病誤下之而成痞按之不痛比大實之證略虛非真虛也上方乃手足太陰兼入陽明之劑陶氏桂枝大黃湯方治足太陰脾經受證腹滿而痛咽乾而渴手足溫脈來沉而有力此因邪熱從陽經傳入陰經也桂枝赤芍藥甘草大黃枳實柴胡此味可刪水二鍾姜一片棗二枚煎之臨服槌法入檳榔磨水三匙熱服本經腹滿不惡寒而喘者加大腹皮去甘草琥按上方即仲景桂枝加大黃湯也其用赤芍藥者此本許氏內臺方之議加枳實檳榔者此合河間宣明散方而用之也據上主療云云與少陽證毫無與其用柴胡殊悖於理又加減法云腹滿者去甘草愚以海藏法若滿者並不加大棗也琥按仲景云太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之或問云二藥既所當減另有他藥以代之否余答云太陰病當行大黃芍藥者乃腹滿實熱作痛此陽邪陷於陰分也熱痛者不可減芍藥自利者法當去大黃宜以黃芩芍藥湯代之新增黃芩芍藥湯方黃芩芍藥俱酒炒生薑各一兩水二升煎八合去滓熱服不愈再作服上方乃手足太陰泄熱散邪之劑兼入手足陽明仲景雖云脈弱要之脈弦數而腹痛者更宜用此方也琥總按上方論乃治太陰病活變之法也可以佐仲景方論之未備者要之人病多端並上方論亦不足以盡其變在學者推廣而通之耳
