body:
  text: 卷之十三辯溫病脈證並治法此係仲景原文自太陽上篇移集於此溫病非傷寒也而餘一並及之何也經云冬傷於寒春必病溫以其病由傷寒而致也暑病亦由傷寒而致而不及之何也經云夏傷於暑秋必痎瘧以傷暑自是夏時病且溫病有一二日至八九日六經傳變之候而暑病則無是也秋瘧亦有六經傳變之候又何為而不及之也金匱序云仲景著傷寒雜病論合十六卷今世但傳傷寒十卷而雜病未見其書王翰林於蠹簡中得其書三卷中論雜病而瘧疾亦與焉茲故不復及也且也瘧疾而有六經傳變者此即是秋時傷寒否則仲景豈不明經絡何為而未詳言也又如傷暑亦系雜病金匱中即是中暍之證若傷暑而有六經傳變者此又是夏時傷寒其初必由寒氣而得也外如霍亂病亦系雜證傷寒論列之六經篇後者必仲景原論中既言傷寒即言雜病也惜乎其十六卷書已大半亡失即今世所傳傷寒論十卷其辯脈平脈可汗可下諸篇悉系叔和所增入者則知雜病所亡為甚多也明趙以德著金匱衍義既知痙濕暍百合狐惑瘧疾等證非傷寒矣獨不能撿出霍亂一候此又余之所不解也茲因論溫病而並議及此倘有志斯道者必以余言為不謬也太陽病發熱而渴不惡寒者為溫病此言溫病之與傷寒異也夫曰太陽病者正以見同是太陽經頭項強痛之證彼傷寒由寒氣而得則惡寒此溫病由溫氣而得故不惡寒初起便即發熱而渴也愚以不惡寒發熱而渴此是陽明溫病但頭項強痛之證兼屬太陽故系之為太陽病愚又以四時之氣在春為溫正氣傷人即時可以致病未必盡由冬傷於寒所致故其治法亦不與傷寒同也若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期疑此條有錯簡小便不利四字當在若被下者之前此承上文而言溫病誤治之逆證也溫病之初是溫氣襲人經絡不可誤發其汗醫人不知只認以為太陽證妄投麻桂等湯以發其汗溫襲經絡又亡津液陽氣亢極故身熱如灼此為風溫要此風溫者即溫病蓋春時多風溫氣即從風中而來故又名風溫也風溫誤汗之證其脈陰陽俱浮陰陽俱浮者以溫病本熱又發其汗則周身陽氣盡越於外故其脈尺寸俱浮自汗出者成注云衛氣受傷也身重多眠鼻息鼾語言難者條辯云風壅則氣昏熱甚則氣鬱也小便不利者汗出多而津液耗也被下而直視失溲者此本太陽病而誤汗及下所致條辯云太陽之支脈為目上綱誤汗則經氣絕故目不轉睛而上竄也又膀胱為太陽之府津液藏焉既汗且下重亡津液故溲溺遺失也若誤以火灸者輕則火熱土燥其色外奪而發黃重則火甚熱極而生風故其神志如驚癇之狀其手足則鉤曲而時瘈瘲也若火熏之者謂發黃驚癇等證不惟火灸則然如以火熏之而變證亦然也愚按火熏者劫汗之法醫人不知發汗之誤以身灼熱不止猶以為發汗不透而用火熏此誤治之常耳風溫證發汗是一逆汗之而病不除覆被下及被火是再逆焉望命期之不促而欲尚引時日乎哉或問身重小便不利焉知非濕痹證余答云濕痹身重此固小便不利若得汗出則濕氣隨之而散矣今者自汗出而身反重謂非風溫之證而何按此條論仲景無治法補亡論常器之云轉下火熏皆為逆也可白虎加人參湯桂枝柴胡各半湯桂枝去芍藥加蜀漆龍骨牡蠣湯郭白雲複議用柴胡桂枝幹薑湯柴胡加龍骨牡蠣湯愚以上條無少陽經證諸湯中凡有柴胡者皆非對證之藥凡有薑桂者又非溫熱之證所宜其白虎加人參湯復與太陽病發熱而渴者不相涉考之千金方有葳蕤湯此實補仲景治法之未備方載後昔賢治溫病法中或問太陽病發熱而渴不惡寒其於未發汗之前當用何藥余答云若仲景論中如葛根湯葛根黃芩黃連湯兩方可參合加減用之新增葛根黃芩湯方即傷寒論中葛根湯去桂枝大棗又葛根芩連湯中去黃連二方相合之複方也葛根一兩黃芩麻黃各五錢去節芍藥四錢甘草一錢生薑五大片上六味以水四升先煮葛根麻黃減一升內諸藥煮取二升去滓分溫再服覆取微似汗琥按上湯乃治太陽病發熱而渴不惡寒者成注云發熱而渴不惡寒陽明也病兼陽明故以上湯合二經溫熱而去之若自汗出則此湯又在所當禁用附昔賢治溫病方論變法千金葳蕤湯治風溫之病脈陰陽俱浮汗出體重其息必喘其形狀不仁嘿嘿但欲眠下之者則小便難發其汗者必譫語加燒針者則耳聾難言但吐下之則遺失便利如此疾者宜服之方葳蕤白薇麻黃獨活杏人芎藭甘草青木香各二兩石膏三兩上九味㕮咀以水八升煮取三升去滓分三服取汗若一寒一熱加朴硝一分及大黃三兩下之活人書用大羌活不用獨活加葛根琥按上方乃太陽陽明藥也兼入少陰之劑其云治風溫者以仲景有風溫之病而無方故特製此湯以補仲景之未備但汗下被火之後其變證與仲景則有異即如發汗後仲景云語言難出此則反云譫語又是胃實證故方後復加硝黃也設加燒針而耳聾者又不敢下至於汗後本方中麻黃又不宜用全在醫者因證出入庶乎其無誤矣此方已見前第五卷太陽篇後止分兩略殊耳小品茅根湯療溫病有熱飲水暴冷噦者方茅根葛根各切半升上二味以水四升煮取二升稍溫飲之啘止則停噦一名冷啘俗云冷呃是也古今錄驗去茅根加枇杷葉又一方加橘皮桂心琥按上方乃治陽明病溫之劑一方加橘皮桂心者此必是胸中有停飲故用橘皮之辛溫以利之桂心之辛熱以散之也古今錄驗知母解肌湯療溫熱病頭痛骨肉煩疼口燥心悶者或是夏月天行毒外寒內熱者或已下之餘熱未盡者或熱病自得利有虛熱煩渴者方麻黃二兩去節知母葛根石膏各三兩甘草二兩炙上五味切以水七升煮取三升分為三服若已下及自得下虛熱未歇者除麻黃加知母葛根病熱未除因夢泄者可除麻黃加白薇人參各二兩則止琥按上方乃治太陽陽明病溫熱之藥也刪繁療肺府藏熱暴氣發斑點香豉湯方香豉一升綿裹蔥須切四兩石膏八兩梔子仁三兩生薑八兩大青二兩升麻三兩芒硝三兩上八味切以水六升煮七味取二升五合去滓然後下芒硝分三服琥按上湯雖云療肺府藏熱實則清解陽明胃府鬱熱之神方也溫病發斑赤者五死一生黑者九死一生龐安時云大疫難救麥奴丸主之即活人書黑奴丸見前第十二卷中又古今錄驗有一物黃連湯愚以加犀角其效更神總論雞子湯治熱盛狂語欲死生雞子七枚芒硝一兩井萃水一大升同攪千遍去沫頓服快利為度琥按上湯乃治手足陽明燥熱之劑琥又按溫病狂熱飲水發斑之證最多愚故集以上諸方特治之活人書四十三問夏至以前發熱惡寒頭疼身體痛其脈浮緊答曰此名溫病也春月傷寒謂之溫病冬傷於寒輕者夏至以前發為溫病蓋因春溫暖之氣而發也云云琥按仲景言溫病不惡寒而渴上條云溫病惡寒不言渴脈又浮緊此直是春月傷寒何得云冬傷於寒至春始發為溫病邪其言不順故於下四十五問又出風溫一條而用葳蕤知母乾葛栝蔞根等湯且云風溫不可發汗也殊不知仲景當日言風溫者即太陽溫病發汗已身灼熱者名曰風溫此實一病而偶分兩條奉議不解書旨分為二病其誤多矣活人栝蔞根湯治風溫加渴甚者石膏一兩栝蔞根三分人參防風甘草炙各半兩葛根一兩半生用乾者只三錢上銼如麻豆大每服鈔五錢匕用水一盞半煮至一中盞去滓溫服一方加知母琥按上方乃治陽明病溫氣分熱渴藥也保命集云溫病冬傷於寒所得也至春變為溫病傷寒汗下不愈而過經其證尚在而不除者亦溫病也云云琥按內經云冬傷於寒春必病溫又云精者身之本也藏於精者春不病溫故東垣云房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時強木長無以滋生化之源故為溫病耳今云岐子云傷寒汗下不愈過經而其證不除者亦為溫病愚以仲景六經中自有過經不愈之證與溫病毫不相涉何得扭合作溫病邪噫是又大失仲景之旨矣或問陽明病溫極多其初起兼太陽病者有之故以上等方皆二經藥也敢問少陽之經亦有病溫證乎余答云有之然亦必陽明病居多而少陽為雜見之證如準繩中用柴胡升麻湯是也今採其方附錄於後準繩柴胡升麻湯治時行瘟疫壯熱惡風頭痛體疼鼻塞咽乾咳嗽涕唾稠黏柴胡去苗乾葛荊芥去梗赤芍藥石膏各一錢半前胡去苗升麻桑白皮黃芩各一錢上作一服水二鍾生薑三片豆豉二十粒煎至一鍾不拘時服琥按上方乃治少陽陽明病溫兼散手太陰風熱之劑或問趙氏醫貫治溫病謂溫病不惡寒則知其表無寒邪矣曰渴則知其腎水乾枯矣蓋緣其人素有火者冬時寒氣雖傷不能深入藏於肌膚歷時既久火為寒鬱於中將腎水熬煎枯竭甲陽木也藉癸水而生腎水既枯至春時強木旺無以為發生之本故發熱而渴余以六味地黃丸滋其水以柴胡辛涼之藥舒其木鬱隨手而應其說是邪非邪余答云此其說雖發明溫病之源實推廣李東垣之意然六味地黃丸料煎湯豈治溫病之藥邪此為鄉愿亂德其說似是而非者也或又問云然則治溫病之方將何藥以滋腎水邪余又答云腎水枯當急救肺金金清則水自滋溫為春令春木勝則病溫金清則旺而風木之邪自平以上諸方中藥如葳蕤白薇石膏知母茅根栝蔞根謂非色白入肺清涼助金之藥乎況溫病發熱而渴火鬱之氣盛也火盛必先爍金所以古方治陽明病溫實清肺之藥居多清肺金者滋腎水也且熱渴已極先治其標趙氏反用六味丸料以益水之源是為迂而不切於病情者也猶云活人甚眾吾不信矣或問龐安時論溫病有四時自受乖氣而成腑臟陰陽溫毒者則春有青筋牽夏有赤脈㩌秋有白氣貍音郁與郁同冬有黑骨溫四季有黃肉隨證別五臟各有方治其說然歟余答云素問但言冬傷於寒春必病溫又仲景傷寒例云其冬有非節之暖者名曰冬溫其於夏秋二時未聞有所謂溫病也今龐氏於四時之月創造五色奇證以駭人心目近今以來未見有人得此等病者所以花溪虞氏特起而議之至今總論一書亦漸淹沒而不傳也琥總按上溫病方論一卷乃春時感溫氣而成病即內經所云先夏至為病溫者是也病源千金外臺等書皆以溫病為溫疫云此病因歲時不和溫涼失節人感乖戾之氣而生病病氣轉相染易乃至滅門延及外人無收視者此係大瘟大疫如東垣用普濟飲子治大頭傷寒者是非仲景論中所云溫病也溫病間或相染不至滅門絕戶恐俗醫不知而互相錯認故於卷後並及之云附方劑分兩說仲景方劑並按古法錙銖分兩與今不同所附千金外臺等方亦然謂如㕮咀者即今之銼如麻豆大是也云一升者即今之大白盞也云銖者六銖為一分即二錢半也二十四銖為一兩也云三兩者即今之一兩云二兩即今之六錢半也料例大者只合三分之一足矣
