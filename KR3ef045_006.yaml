body:
  text: 卷之六辨陽明病脈證並治法此係仲景原文問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也此一節連下二節乃仲景設為問答以見三陽經皆有入府之證也陽明者胃府也成注云邪自太陽經傳入於府者謂之太陽陽明邪自陽明經傳入於府者謂之正陽陽明邪自少陽經傳入於府者謂之少陽陽明經云此三經受病已入於府者可下而已即此謂也太陽陽明者龐安時云本太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明而成脾約之證愚以胃中乾燥則脾氣亢熱其人於未病時胃中所受水穀雖變為糟粕而下入於大腸要之脾既亢熱則水之精氣不能四布腸中無水氣以滋之若為之圍繞束縛所以大便欲出而甚難則是腸之約實脾氣亢熱而為之約也愚按此條論仲景自有麻仁丸主之成注又引小承氣湯殊出不解蓋成注所以引太陽病若吐若下若發汗後微煩小便數大便因硬者此未成脾約證故與小承氣湯若云即是脾約證誤矣正陽陽明者胃家實是也方氏條辨云正謂本經也以病到本經遂入胃而成胃實是也龐安時云病人本風盛氣實津液消鑠或始惡寒汗出後惡寒既罷而反發熱或始得病便發熱狂言者名曰正陽陽明乃知其入府之由有兩道焉惡寒者自太陽經傳來便發熱者由本經入府也武林陳亮斯亦云有從陽明經自受病而入胃府者如素問云中於面則下陽明是也有從他經傳入陽明而後入府者如後文轉屬陽明之類是也蓋太陽既轉屬陽明亦是正陽陽明而非太陽陽明矣此不可不辨也愚以少陽陽明入府之由亦仿此或問前條證龐氏引後節何緣得陽明病之文而云太陽病若發汗云云因轉屬陽明為太陽陽明病今陳氏於此條又引其文而云太陽既轉屬陽明此亦是正陽陽明病二者孰是孰非余答云二者之言皆是學者須臨證辨之轉屬陽明而猶帶太陽表證或頭項強痛或惡寒者此即是太陽陽明若頭不痛項不強太陽表證毫無者此即是正陽陽明也少陽陽明亦然以寒熱往來等候之有無辨之少陽陽明者發汗利小便已胃中燥煩實大便難是也少陽陽明者本少陽經病少陽不可發汗及利小便如誤發其汗則津液既亡於表誤利其小便則津液復奪於前津液既去因傳入陽明之府則胃中燥煩且實而大便難蓋胃無津液故燥燥則生煩熱也夫仲景雖云胃中實愚以其雲實者本兼大腸之府而言惟大腸府實以故大便難況大腸亦屬陽明之府也龐安時云本傳到少陽因發汗利小便胃中燥大便難者名曰少陽陽明按成注於前條胃家實之證引陽明病脈遲云云大承氣湯以主之於此條大便難獨無治法後之人有以三承氣湯分治上三條證者愚以其説亦非切當大抵太陽陽明證宜桂枝加大黃湯正陽陽明證宜三承氣湯選用少陽陽明證宜大柴胡湯此為不易之法陽明之為病胃家實也武林陳氏注云此節承上三節而言三陽明之為病其入胃之塗雖有不同而邪在胃家其實則一而已故正陽陽明固為胃家實矣而太陽之脾約少陽之大便難又何嘗非胃家實乎以其均入陽明均為胃實故總結之曰陽明之為病胃家實也條辨云實者大便結為硬滿而不得出也愚按此言則是仲景云胃家實當兼大腸府實合看以腸與胃上下實相通也所以海藏辨胃中有燥屎五六枚云此非在胃中也通言陽明也言胃是連及大腸也今者大便結為硬滿則大腸火燥之氣逆而上行故名曰胃中實要之胃中非有物也據海藏此言實與上文胃家實之義互相發明學者細玩其説斯義自見問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也此一節乃設為問答以明陽明府病也問曰何由而得陽明府病答曰由太陽病若發汗若下若利小便治之不當徒亡津液津液者胃中之所聚也津液既亡則胃中乾燥太陽之邪不解因轉屬陽明之府不更衣者不大便也注已見前太陽中篇成注云不更衣則胃中物不得泄故為內實內實者大腸以內堅結也腸內堅結以故大便難若此者乃陽明府實之病也愚按此條論雖由太陽病不解轉屬陽明之府然曰不更衣內實大便難毫無太陽經病所以尚論篇云此屬正陽陽明為可下之證或問太陽病若下矣則胃中之物已去縱亡津液胃中乾燥未必覆成內實余答云方其太陽初病時下之不當徒亡汗液胃中之物依然不泄必轉屬陽明而成燥糞故成內實之證此條仲景但示人以認證以故不及治法問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也上言陽明病系胃家內實其外見證從未言及故此條又設為問答云陽明入府之病其外證云何答曰陽明外證則身熱身熱者身以前熱也夫身熱與發熱異以其熱在肌肉之分非若發熱之翕翕然僅在皮膚以外也汗自出者府中實熱則津液受其蒸迫故其汗則自出也又此條汗自出與太陽中風汗自出亦有異太陽病則汗雖出而不能透故其出亦甚少此條病則汗由內熱蒸出其出必多而不能止也不惡寒者邪不在表也反惡熱者明其熱在裡也傷寒當惡寒故以惡熱為反然邪既入胃寒化為熱夫惡熱雖在內之證愚以其狀必見於外或揚手擲足迸去覆蓋勢所必至因外以證內其為陽明府實證無疑矣尚論篇以此條病辨陽明中風證兼太陽若以其邪猶在於經大誤之極大抵此條病乃承氣湯證問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也此節連下節申言陽明病亦有惡寒之證故復設為問答以明之問曰陽明病皆身熱不惡寒今病有始得之一日身不發熱而惡寒此惡寒者非比太陽病之惡寒夫太陽為寒水之經其表寒必甚此為陽明病惡寒陽明為燥金之經其表寒自微惟其微故答云雖得之一日惡寒將自罷自罷者從未發表而寒自已即自汗出而惡熱自汗出惡熱乃陽明病入府之外證注已見前按成注云不發熱惡寒即邪未全入府尚帶表邪此表邪者乃陽明經在表之邪其人必外病頭額痛而惡寒內病胃府實隨即自汗出而惡熱後條辨評云初得陽明表氣被阻故亦有不發熱而惡寒證須臾即化熱矣邪不關表故也斯言深得仲景立論之意問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也此承上文發明惡寒自罷之故其所以自罷者以陽明胃府居人身之中主養四旁成注云凡四旁有病皆能傳入於胃胃屬土土為萬物所歸萬物歸於土中則其化衰息無復變動故云無所復傳始雖惡寒二日自止者譬之冬寒已極一遇土王則寒化衰息是即止之義也此為正陽陽明乃可下之證後條辨注萬物所歸無所復傳二句云陽明以下法為正必五臟六腑之邪皆歸結於此別無去路方是下證之陽明等間莫教錯了本太陽初得病時發其汗汗先出不徹因轉屬陽明也此條系太陽病轉屬陽明經之證按前第五節云太陽病若發汗亡津液胃中乾燥因轉屬陽明此為發汗太過邪已離表乃陽明府病也今此太陽初得病之時發汗不徹轉屬陽明此為發汗不及邪還在表愚故云此係陽明經病若議用藥仲景法當以葛根湯主之汗出不徹義注見前太陽中篇傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也發熱無汗嘔不能食此傷寒自太陽經起也太陽傷寒其人本不能食所以仲景於麻黃湯後云不須啜粥其義可以相推然嘔已見陽明府實證傷寒當無汗今反汗出濈濈然濈濈者汗出凝聚之貌外既汗出則陽明胃府實熱內蒸可知此太陽經病轉而屬於陽明之府也傷寒三日陽明脈大脈大者指下洪長也成注引經云陽明受病當二三日發傷寒至三日乃邪傳陽明之時陽明氣血居多氣血為熱所搏以故脈大愚以陽明脈大有二義邪並於經則脈大邪入於府亦脈大成注言經而不言府猶為未盡其義大抵脈大而浮者邪並於經也脈大而實者邪入於府也脈不單行須於兼至之脈辨其在經在府之證傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也此條言太陰病亦有轉屬陽明之證既云傷寒則脈當浮而緊今則云浮而緩者何也寒邪之氣透三陽經而入於太陰則其來既遲不若太陽之邪急而脈緊且以緩為脾家之本脈也寒入太陰而其脈仍浮者何也以其邪猶在經也脾主四末太陰之寒氣將化而為熱故手足自溫是為系在太陰繫系同此係太陰傷寒之證可無疑矣太陰為濕土之經寒濕相搏鬱蒸成熱身當發黃黃者土鬱之色也若其人小便自利則脾濕去而熱不內郁不能發黃至八九日則小便所利既多而胃中燥熱已極胃燥則腸干大便必硬此為轉屬陽明病乃府實之證也愚按此條證與脾約無異但初起時系太陰傷寒耳若論治法亦宜仲景麻仁丸傷寒轉系陽明者其人濈然微汗出也此承上文而申言之上言傷寒系在太陰要之既轉而繫於陽明其人外證不但小便利當濈然微汗出蓋熱蒸於內汗潤於外汗雖微而府實之證的矣愚按太陰轉系陽明若非汗出恐太陰經證未罷雖小便利大便硬何敢輕用下藥陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也此條陽明病乃風寒之邪猶在於經兼太陽表證而言既云陽明中風則但當發熱不當惡寒而脈浮緊矣其發熱惡寒脈浮而緊者乃太陽之寒邪猶未盡也陽明之脈挾口然口苦者為膽汁上溢此陽明邪熱侵入少陽之經也又陽明之脈循喉嚨惟太陰之脈始挾咽今咽乾者為脾熱亢甚此陽明邪熱復侵入太陰之經也陽明之脈復循腹裡風寒之邪中於陽明經中鬱熱則腹滿熱盛氣壅則肺氣上逆而作微喘也陽明之風熱兼挾太陽之寒邪純是表證兼挾表脈雖云腹滿此非大實腹滿為可下之證也若誤下之則內亡津液外邪乘虛盡入於裡故腹滿不減而小便復難此為胃與膀胱齊病後條辨云病在陽明太陽之經者纍及太陽陽明之府醫人不可不知謹也愚按此條論仲景無治法補亡論常器之云可桂枝麻黃各半湯又小柴胡湯推常氏之意以陽明中風證得太陽傷寒脈此比仲景大青龍證只少煩躁耳以故用麻桂各半湯也愚以仲景法還宜用葛根湯又推常氏之意以口苦用小柴胡湯愚以兼見之證若口苦若咽乾總宜以葛根湯為主加黃芩等涼藥以治之至其既下之後另宜隨證用湯藥或下其腹滿或利其小便可耳陽明病若能食名中風不能食名中寒此言陽明病乃風寒之邪在經其人必身熱目疼鼻乾不得臥者是也陽明主水穀成注云風為陽邪陽邪殺穀故中風者能食寒為陰邪陰邪不能殺穀故傷寒者不能食愚按仲景云中寒者與傷寒同義非真寒證也若系真中寒是胃家虛冷藥宜用五積散理中湯之類今者不能食是胃氣實但邪未入府不作鬱熱耳因名中寒實與傷寒無異又按成注云陽邪殺穀陰邪不殺穀此風寒之邪未全入胃猶在於經故以能食不能食辨中風與傷寒耳若邪全入胃胃府鬱熱必大實大滿雖能食者亦盡歸於不能食矣由是而知能食者俗名火嘈非胃中虛切莫與食大抵陽明受病總不食為主此為最妙之法又按此條言陽明病乃陽明經自中之風寒非自太陽經傳來者以故風自為風寒自為寒也若自太陽經傳來者則在太陽雖有風寒之辨傳至陽明經已莫能別矣且也太陽經中風服桂枝湯已須啜熱稀粥一升余乃知太陽病亦以能食為中風也又太陽經傷寒服麻黃湯後不須啜粥乃知太陽病亦以不能食為傷寒也所以風寒之邪初入陽明亦以能食不能食為中風傷寒之別陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也此係胃中冷實之證陽明中寒者謂寒邪初入於經未全入胃不作鬱熱也胃為陽主氣胃中陽氣勝則能運行水穀使出入不失其常度今者胃中寒遏其陽氣以故谷不能入水不能出所以不能食而小便亦不利也手足濈然汗出者四肢為諸陽之本又陽明胃府復主四肢胃府之陽既為寒氣所遏不得內發鬱蒸於外以故手足濈然而汗出也固瘕者寒氣固結猶如瘕聚而不散故云此欲作固瘕非真欲成瘕聚也其人大便雖初硬而後必溏蓋手足濈然汗出者其人必大便硬其所以初硬後溏者以胃中所入之寒氣已固結而成冷中焦陽氣不運不能泌別水穀以故小便不利而大便必溏也按此條論仲景無治法補亡論常器之云可理中湯愚以寒氣固瘕水穀不別此為冷實之證理中湯太補不宜用也又云豬苓湯推常氏之意以小便不利故用此湯但仲景既云胃中冷水穀不別以致小便不利復用豬苓澤瀉滑石等寒藥何也蓋胃中雖冷而實胃實必作鬱熱故常氏用豬苓湯以利其小便俟小便利則大便自硬然後議用承氣等下藥陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈此係陽明經熱未全入府之證陽明病欲食者謂風邪初傳入胃胃氣本強不為病奪也胃強則能遊溢精氣通調水道是小便宜利矣今反不利者以胃氣挾邪熱而過強水氣升發於表勢欲作汗故不下而為溺也大便自調知非水穀不別胃中冷實之證可比其人骨節疼翕翕如有熱狀者風邪鬱於陽明之表也但此骨節疼非比太陽傷寒寒氣拘急而疼乃陽明中風熱氣蒸發而疼以故熱伏於肌肉之間在表則但翕翕然如有熱而又若無熱之狀也奄忽也奄然發狂者乃邪熱初入於胃胃氣強不受熱邪所困正與邪爭邪氣還表以故發狂汗出而解也濈然義注已見前水以小便言穀氣以欲食言胃能食則穀氣勝水氣不勝穀氣必相與作汗而共並於表則前此未汗而脈緊者至此則緊脈去而陽明經病必自愈按脈緊則愈補亡論闕疑常器之云一本作脈去則愈郭白雲云千金作堅者則愈無脈字是誤以脈緊為去為堅者或漏脈字或漏者字當云脈緊者則愈愚今校正當云脈緊去則愈或云脈緊宜用麻黃湯愚以仲景法太陽病脈緊者宜麻黃湯此條系陽明病當改用葛根湯也況上正文云汗出而解以故不及治法陽明病欲解時從申至戌上注已見前第三卷太陽上篇陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦寒中陽明胃中虛冷無熱可攻成注云熱去寒起竟認作有熱之證其誤甚矣其人雖不能食以胃氣本虛故不食非胃中實而食不下也此條系真寒證正文與注俱見中寒論中陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也此係陽明中風初入於胃里未全實之證脈遲者為陰主裡陽明病至脈遲則邪已離經漸入於府但府中鬱熱未甚故其脈尚遲食難用飽者以中風證其初本能食至此則邪已入胃勢必于于難用飽矣飽則穀氣與熱邪相搏鬱蒸成濕濕熱之氣上攻則微煩而頭眩小便必難者濕熱上攻則水道必不下順也濕熱鬱於中焦上不得越下不得泄此其勢又必至蒸發於外欲作谷疸之證疸黃病也以此證本因陽明中風不能禁其食故成谷疸而身發黃色也濕熱內積而成谷疸則其人腹滿可知腹滿者下之則愈今下之而腹滿如故何也所以然者以脈遲則表邪未全入里熱氣尚未斂實故其病不因下而少衰成注引經云脈遲尚未可攻正此謂也按此條論仲景無治法補亡論常器之云宜豬苓湯五苓散愚以上二方未成谷疸時加減出入可隨證選用郭白雲云已發黃者茵陳蒿湯此為不可易之劑陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也此係陽明經有寒邪鬱熱不能透發可見陽明之為病亦以無汗為傷寒也陽明多氣多血寒中陽明熱鬱肌肉法當多汗今反無汗者此以經中陽氣虛不能升發於表以故皮中如蟲行之狀也如蟲行者癢也皮中者肌肉之間汗欲出而不得以故肌肉作癢如蟲行皮中狀猶之太陽病得之八九日以其不得小汗出身必癢當用桂枝麻黃各半湯以小發其汗故尚論篇云言久虛者此明汗所以不能透出於肌表之故非謂當用補也按此條論仲景無治法補亡論常器之云可桂枝加黃耆湯郭白雲云以無汗故如蟲行皮中狀須小汗乃解宜桂枝麻黃各半湯以此湯解身癢能小汗故也愚以上二湯皆太陽經藥今系陽明無汗證仲景法還當用葛根湯主之陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛此亦陽明經傷寒也小便利者邪不在裡也此為陽明經初得之病至二三日經中鬱熱不得外泄漸入於胃則嘔而咳或以咳為肺病然肺之系與胃口相附胃熱既上衝而作嘔則肺氣亦上逆而為咳也四肢者諸陽之本陽明受寒邪所傷經中陽氣不能外達肌膚而為汗焉能橫走手足而溫其四肢邪厥逆也冷也逆冷既甚則鬱熱愈深熱氣上攻必苦頭痛若不咳不嘔不厥者經中鬱熱尚未深也故頭不痛蓋諸陽之經皆上頭即頭痛一候可見手足厥之為熱厥而非真寒證矣按此條論仲景無治法補亡論常器之云類要用小建中湯誤矣可小柴胡湯推常氏之意以嘔而咳建中為嘔家所禁故改用小柴胡殊不知此係陽明病胃口鬱熱作嘔氣逆作咳與柴胡證之喜嘔或咳者實無與郭白雲云手足厥者宜小建中湯要之此證非中氣虛寒而發厥乃表寒鬱其經中陽熱之氣而發厥也愚以仲景法還當用葛根湯加減以發其汗陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛此係陽明經中風也風主動搖故頭眩眩者頭旋而目運也風為陽邪故不惡寒能食而咳其義見前凡風寒之邪皆能鬱熱而作咳風比寒邪其熱尤甚故其人必咽痛咽門者胃之系也咳甚則咽傷而痛若不咳則咽不傷故不痛或問云咳出於肺其人當病喉痛何以傷咽余答云經云臟腑皆令人咳今者陽明病當是胃有風熱而咳故云必咽痛也按此條論仲景無治法補亡論常器之云可服茯苓甘草白朮生薑湯愚以頭眩而咳純是風熱反用茯苓白朮等補氣之藥其誤甚矣又云咽痛者宜桔梗湯此本少陰病咽痛之藥蓋少陰之脈循喉嚨咽痛者胃熱甚侵及少陰之經上湯可相借用之陽明病無汗小便不利心中懊憹者身心發黃此係陽明經有鬱熱兼入於府之證無汗而小便不利則熱鬱濕停濕熱內積其氣上熏則心中懊憹此為土鬱之證可知身必發黃者蓋言濕熱鬱蒸勢所必至也陽明病被火額上微汗出小便不利者必發黃此條病與上條大同小異陽明無汗因以火強迫其汗熱邪被火周身之氣燥極而熱不外越但上攻於額而微汗出此與太陽病但頭汗出同義經中邪熱既不得外越又不得下泄而小便不利此為濕熱交蒸身亦必至發黃也按上二條論仲景無治法補亡論常器之皆云可與茵陳蒿湯調下五苓散愚以茵陳蒿湯固宜用但五苓散乃太陽經利小便兼解表之藥今陽明經無汗若用五苓宜去桂枝加葛根為妥又白朮一味當改用蒼朮緣上二條證皆濕勝發黃濕熱內盛故也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出此係太陽風寒之邪傳入陽明之證陽明病當見目疼鼻乾不得臥矣其脈浮而緊者仍見太陽傷寒之脈也陰寒之邪束其經中之陽氣陽氣被郁不得發故乘其經氣王時必潮熱發作也若其脈但浮者此是太陽經風邪傳於陽明其人必盜汗出盜汗者睡而汗出也陽邪入於陰分以故睡則汗出愚按此條論當分作兩截看脈浮緊潮熱此是陽明傷寒仲景法宜葛根湯主之脈浮盜汗出此是陽明中風仲景法宜桂枝加葛根湯主之補亡論與柴胡桂枝湯誤矣陽明病口燥但欲漱水不欲咽者此必衄此係陽明經燥熱之證成注云陽明之脈起於鼻絡於口陽明裡熱則渴欲飲水此口燥但欲飲水不欲咽者是熱在經而里無熱也陽明氣血俱多經中熱甚迫血妄行必作衄也按此條論仲景無治法補亡論常器之云可黃芩芍藥地黃湯一云當作黃芩芍藥甘草湯愚以此二湯乃衄後之藥於未衄時還宜用葛根等湯加減主之陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也當還二字作還當其義乃順此條病可見陽明府實大便硬之證亦有不必下者醫人不可以不知也陽明病本自汗出者表中風也醫更重發汗謂過用葛根湯以大發其汗陽明經表病已瘥瘥者病小愈也病雖小愈必尚微煩煩者里有熱也病已瘥而尚煩是即謂不了了若此者大便必硬其所以大便硬之故以重發汗亡津液津液者為胃所主胃亡津液而乾燥則大腸無以滋養故令大便硬也大便雖硬其人但微煩而無躁渴譫語狂亂等急證故無可下之法當問其小便之多少以候其津液之自回若其人於自汗出之日小便本三四行今於微煩之日小便止再行知大便不久將出何也蓋汗與小便皆津液所化汗雖重發而津液亡矣今者小便藥之次數得少於前其時津液不偏滲於膀胱胃中得以少留故云還當入胃非云既滲於膀胱以內當還而入於胃中也胃有津液則大腸得以充潤故知不久必大便下也愚按此條陽明病當兼手足而言蓋大便硬不盡屬胃實出之大腸府也病家如欲用藥宜少與麻仁丸傷寒嘔多雖有陽明證不可攻之此承上文而言不可攻之證復有數條醫人不可以不知也此條傷寒當是太陽證嘔多者風寒之邪方盛於表胸中陽氣為寒所郁於是上逆而作嘔故云雖有陽明胃家實不大便之證不可攻之成注云嘔者熱在上焦未全入府故不可下按此條論仲景無治法補亡論常器之云小柴胡湯愚以嘔而口苦者為少陽經證方宜用小柴胡湯今者太陽傷寒未罷嘔多兼有陽明證仲景法還宜用葛根加半夏湯也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病心下硬滿心下者胸膈之間也此為邪氣初聚府未全實慎不可攻攻之則腸胃中真氣受傷利遂不止成注云正氣脫而死者此也利止者成注云邪氣去正氣安則愈或問云同是誤攻何以其利有止與不止之分愚答云其不止者必其人腸胃素虛或醫反用大承氣故利不止而死其止者必其人腸胃素實或醫止用小承氣故利止而愈或又問云結胸證同是心下硬滿又屬可下何也余答云結胸當是虛硬虛滿與半夏瀉心湯證心下痞滿略同故云不可攻也補亡論常器之云未攻者可與生薑瀉心湯即是此意又云利不止者四逆湯愚意云止須以理中湯救之陽明病面合赤色不可攻之攻之必發熱色黃小便不利也此條言陽明病必胃家實不大便之證合通也成注云陽明病面色通赤者風熱之邪猶在經也如誤下之則表邪不解胃氣徒虛津液大耗表不解故其發熱必愈盛胃氣虛以故面色赤者轉而為黃此係燥熱但致面色微黃非若濕熱之通身發黃也津液燥以故小便不利此係水竭而不利非水瘀而不利也後條辨云一誤攻之截熱於外耗液於裡胃氣燥而成黃者此之謂歟按此條論仲景無治法補亡論郭白雲云既不可攻但茵陳蒿湯調五苓散服之推郭氏之意以發熱為裡熱小便不利為停濕竟認作濕熱發黃大謬之極況此發熱色黃小便不利系誤攻以後變證方其面合赤色之時未必先有是證也愚意以面合赤色與二陽並病面色緣緣正赤相同此為陽氣怫鬱於表可小發汗仲景法還宜桂枝加葛根湯以微汗之陽明病不吐不下心煩者可與調胃承氣湯此條言陽明病亦胃家實之證不吐不下者謂熱邪上不得越下不得泄也熱鬱胃府之中其氣必上熏於膈則心煩煩悶而熱也陽明病但心煩為下證未全具故以調胃承氣湯下其實熱和其胃氣調胃承氣湯方此方自原論中第二卷移附於此大黃四兩去皮清酒浸甘草二兩炙芒硝半升上三味㕮咀以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服之成注引內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平助二物推陳而緩中承氣湯方義注見後湯方下王海藏云大黃泄實芒硝軟堅甘草和中上湯必燥實堅三證全者可用愚按和中二字即是調胃之意內臺方議問曰諸下泄方中皆不用甘草獨此湯中復用甘草何也答曰諸下泄方乃下大實大熱之證速如星火甘草能緩諸藥是以去也獨此方中乃調和胃氣故用甘草以緩其中也或問云胃喜溫暖故凡溫暖之藥可稱調胃上方中用硝黃鹹苦大寒止炙甘草一味溫暖反少用之何也余答云胃以溫暖為適中所以胃犯大熱之氣則太過而不調犯大寒之氣則不及而亦不調今者胃有鬱熱而煩是太過也故方中專藉甘草引硝黃瀉胃中有餘之熱調和其氣而使之平調胃之名正以此也今醫於上方中甘草多用生者此亦是瀉有餘之義附例發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯此條病系太陽傷寒發汗之後惡寒之證當解其不解者乃汗多亡陽表氣虛故也汗後不惡寒而但熱者此為邪已離表盡入於裡胃氣燥熱乃里實之證也成注引經云汗出不惡寒者此表解里未和與調胃承氣湯以和胃氣按此條論言虛證補亡論郭白雲云宜芍藥甘草附子湯此因原論中前條有發汗病不解反惡寒者為營衛俱虛乃陰寒之證誤發其汗所致仲景法用芍藥甘草附子湯主之今者發汗惡寒證雖相同未必是真寒證此湯恐不宜用當以黃耆建中湯主之傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之此條病本系太陽傷寒延至十三日不解是為過經過經者謂六經傳盡病已過而不愈也有如太陽病一日受者六日當解傳至厥陰六日受病當十二日解所以傷寒家相傳十三日不解者不論病自何經而起曾傳變六經與否統謂之過經也成注云再傳經盡謂之過經余於太陽上篇已辨其非譫語者自言也寒邪郁里胃中有熱熱氣熏膈則神昏而自言也譫語有熱法當以湯蕩滌之若小便利者津液偏滲大便當堅硬而不出今反下利及診其脈又調和而非自利之脈知醫非其治而以丸藥下之也若其人不因誤下而自利者其脈當微而手足見厥此為內虛不可下也今脈反和反和者言其脈與陽明府證不相背之意若脈果調和則無病矣此為內實故見譫語下利等證與調胃承氣湯者以下胃中之實熱也或問既下利矣則大便未必燥堅何以湯中復用芒硝余答云譫語有熱是有燥屎醫用丸藥下之太緩腸中堅實之物不能去所下者旁流溏垢耳據仲景法下利譫語者有燥屎也宜小承氣湯今改用調胃者以醫誤下之故內實不去胃氣徒傷故於小承氣湯去厚朴枳實而加甘草以調和之也因大便堅實以故復加芒硝太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也此條病亦系太陽傷寒至十餘日病為過經心下溫溫欲吐溫溫者熱氣泛沃之狀欲吐而不能吐則其為乾嘔可知矣胸中痛者膈以內實也胸痛當責邪熱結於胃中而大便應硬今則反溏大便溏則氣下泄腹不應滿今則微滿鬱郁微煩者腹滿熱聚而衝於膈也以上見證殆有故焉必先其時極吐極下所致極吐則胃脘受傷故胸中痛極下則直腸不禁故大便溏既吐且下而心中溫溫然仍欲吐腹仍微滿鬱郁然生煩此為胃氣雖傷邪熱結實不因吐下而去也法宜與調胃承氣湯下之若不因極吐下者則欲吐胸痛等候邪猶在經承氣湯不可與也要之病邪在經此亦非柴胡湯證以柴胡證之嘔必口苦此不口苦是太陽風氣上壅也柴胡證之胸痛必連脅此不脅痛是陽明鬱熱留經也其微溏而下利者乃太陽陽明合病當是葛根湯證其非柴胡證明矣今以嘔甚故知胃中實熱自極吐下而作嘔其當與調胃承氣的確無疑按上云此非柴胡證則是但嘔胸痛微溏者仲景法還宜用葛根加半夏湯也補亡論郭白雲云宜大半夏加橘皮湯或問云極吐則胃氣受傷固宜用調胃承氣矣極下而大便溏何以不去芒硝余答云極吐則胃中水去而津液亡大便溏則旁流之物已盡腸中燥屎愈堅焉得不用芒硝所以調胃承氣為不可易之劑上三條證自太陽中篇移附於此太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之上數條言太陽病皆過經不解而後下之此條言太陽病不可拘以日數但見屬胃之證即可下也有如太陽病方三日曾發過汗矣其不解者非表邪不解乃病熱不能解也太陽病止翕翕發熱明知其熱在外今變而為蒸蒸發熱蒸者熏也炊也火氣上升之貌條辨云其熱自內騰達於外如蒸炊然此係太陽之邪轉屬於胃經云已入於府者可下而已與調胃承氣湯者以下證未全具故大承氣中止用硝黃復加甘草以調其中而下其實熱也或問太陽病暫三日胃中何由而實大便何由而硬余答云尚論篇云其熱蒸蒸勢必至其汗濈濈汗出過多則胃中燥實大便必硬但下證未急故用調胃承氣湯緩以攻之也傷寒吐後腹脹滿者與調胃承氣湯此條承上文而言傷寒雖不指何經大都是太陽病既吐之後則胸中熱邪得越表證亦隨之而解以吐中有發散之義故也今者既吐之後腹復脹滿是邪熱不因吐解留結於胃而為裡實之證無疑矣與調胃承氣湯者以吐後胃氣受傷不得不調之以緩下其實也或問治脹滿莫如厚朴枳實何以不用大小承氣今者調胃承氣中去枳朴反加甘草經云中滿者勿食甘其湯不與病相左邪余曰不然傷寒既經吐後則胸中之實已去其腹脹滿者實熱在胃之下脘也若用枳朴與病無與徒傷其上焦之陽氣且甘草雖能作滿亦能引瀉滿之藥直至脹滿之所以導去其實熱所以調胃承氣湯中用甘草者其佐硝黃而瀉滿之功更神非俗醫所能擬議也上二條證自本篇麻仁丸後移附於此總按上五條證皆系太陽病今入陽明篇者以其病自太陽經起轉屬陽明胃府實熱乃太陽陽明也故俱入陽明篇中陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈當大或長今則脈遲脈遲義注見前脈遲雖汗出惟不惡寒者此為外欲解蓋汗出與下汗多相照應汗出為表已解然汗出多亦有表未解者故云雖汗出必以不惡寒為表證罷也身必重者陽明主肌肉邪在表之陽則身輕易以轉側入里之陰則身重也短氣者氣實促急也腹滿而喘此因滿而致喘皆裡實可攻之證然亦必有潮熱者為外證確乎欲解里證確乎可攻否則雖汗出身重短氣腹滿而喘據脈遲而言恐非實熱之證不可攻也其熱既潮手足又濈然而汗出手足汗出者胃中鬱熱亢甚蒸發於四肢之間汗去則津液燥此大便已硬也成注云與大承氣湯以下胃熱若其人汗出多肌表間微發熱而惡寒者外未解也不可攻裡即不惡寒而熱不潮者胃未全實大便未硬雖可攻裡未可與大承氣湯若其人腹大滿大便不通者止可與小承氣湯微和胃氣而使之平勿令大泄下者蓋言病有緩急治有輕重醫者當知通變之法也大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服成氏明理論云承順也傷寒邪氣入胃者謂之入府府之為言聚也胃為水穀之海營衛之源水穀會聚於胃變化而為營衛邪氣入於胃也胃氣鬱滯糟粕祕結壅而為實是正氣不得舒順也本草曰通可去滯泄可去閉塞而不利閉而不通以湯蕩滌使塞者利而閉者通正氣得以舒順是以承氣名之王冰曰宣下必以苦宜補必以酸言酸收而苦泄也枳實味苦寒潰堅破結苦寒為主是以枳實為君厚朴味苦溫內經曰燥淫於內治以苦溫泄滿除燥苦溫為輔是以厚朴為臣芒硝味鹹寒內經曰熱淫於內治以鹹寒人傷於寒則為病熱熱氣聚於胃則謂之實鹹寒之物以除消熱實故以芒硝為佐大黃味苦寒內經曰燥淫所勝以苦下之熱氣內勝則津液消而腸胃燥苦寒之物以蕩滌其燥熱故以大黃為使是以大黃有將軍之號也承氣湯下藥也用之尤宜審焉審知大滿大實堅有燥屎乃可投之如非大滿猶生寒熱則病不除況無滿實者而結胸痞氣之屬由是而生矣是以脈經有云傷寒有承氣之戒古人亦特謹之王海藏云厚朴去痞枳實泄滿芒硝軟堅大黃泄實必痞滿燥實四證全者方可用之內臺方議云中滿者瀉之於內此方通瀉之劑也傷寒之邪自表傳裡若至陽明則為內實之盛也如譫言有燥屎大熱便祕腹滿不得通煩熱脈沉實陽明汗多少陰口燥厥陰囊縮非此大下泄之劑不能已也輕者小承氣湯重者大承氣湯小承氣少厚朴而無芒硝以芒硝性寒而能潤堅厚朴能破大實病未至盛以此減之大承氣多厚朴而加芒硝以其病之盛而大滿大實非此不能除也仲景所用大承氣者二十五證雖曰各異然即下泄之法也其法雖多不出大滿大實大熱其脈沉實滑者之所當用也或問大承氣湯乃陽邪入府大實痞滿且堅者方可用之今內臺方議云少陰口燥厥陰囊縮非此大下泄之劑不能已何也余答云仲景法三陰熱證總系胃府邪實陰經近里府實則經壅熱所以熱傷太陰則嗌乾腹滿傷少陰則口燥咽乾傷厥陰則煩滿囊縮此為入府可下均宜用大承氣湯主之也小承氣湯方大黃四兩酒洗厚朴二兩炙去皮枳實三枚大者炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿再服成注云大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不至堅故少減厚朴枳實也王海藏云大黃泄實厚朴去痞必痞實全者可用琥按厚朴乃泄脹滿之藥其去痞者當是枳實一味也吳院判云或問承氣湯仲景有大小調胃之名何也然傷寒邪熱傳變入里謂之入府府者聚也蓋邪熱與糟粕蘊而為實也實則潮熱譫語手足濈濈汗出者此燥屎所為也如人壯大熱大實者宜大承氣湯下之小熱小實者與小承氣湯下之又熱結不堅滿者減去厚朴枳實加甘草而和緩之故曰調胃承氣也若病大而以小承氣攻之則邪氣不伏病小而以大承氣攻之則過傷正氣且不及還可再攻過則不能復救可不謹哉凡用攻法必須妙算料量合宜則應手而效若不料量孟浪攻之必至殺人武陵陳氏云方名承氣殆即亢則害承乃制之義乎亢極反兼勝已之化承者以下承上也夫天地一理萬物一氣故寒極生熱熱極生寒物窮則變未有亢極而不變者傷寒邪熱入胃津液耗真陰虛陽勝陰病所謂陽盛陰虛汗之則死下之則愈急以苦寒勝熱之劑救將絶之陰瀉亢甚之陽承氣湯所以有挽回造化之功也然不言承亢而言承氣何哉夫寒熱流轉不過一氣之變遷而已用藥制方彼氣機之不可變者力難矯之亦第就氣機之必變者而一承之耳設其氣有陽無陰一亢而不可復則為脈澀直視喘滿者死何則以其氣機已絶更無可承之氣也由是言之聖人雖盡人工之妙止合乎天運之常耳不云承氣而云何陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也此條陽明病以潮熱失氣示人以可下之法也陽明病潮熱雖屬可攻然亦必以大便之微硬不硬以定大承氣湯之與不與微硬者猶言略硬也若潮熱不大便已六七日恐其腹中有燥屎欲知之法須少與小承氣湯探之湯入腹中轉失氣者可攻不轉失氣者不可攻轉失氣者成注云轉氣下失也轉失氣則知其人大便已硬腸胃中燥熱亢甚故其氣時轉而下俗謂之屁氣是也不轉失氣則腸胃中雖有熱而未至於燥猶挾水濕此但初頭硬後必溏薄也故雖六七日不大便不可以大承氣湯攻之攻之則其人腸胃受傷必至脹滿不能食也欲飲水者津液去思欲得水以自救也與水則噦者胃虛不能消水以故氣逆而作噦也設其人於誤攻之後復發潮熱則雖有脹滿不能食等證不可為虛其大便必當復硬但溏者既去則所留者雖硬而甚少耳止須復以小承氣湯和之足矣和之者以腸胃中小熱小實用小承氣湯下之則實熱去而胃氣自和然亦必轉失氣者乃可攻之若仍不失氣並小承氣不可攻之蓋慎之至也夫實則譫語虛則鄭聲鄭聲重語也重平聲此一節辨鄭聲譫語之不同以為下文諸節譫語之綱領譫語者自言也注已見前鄭聲者語聲轉而重復故仲景以重語作鄭聲注腳也夫譫語與鄭聲有虛實之辨成注引經云邪氣盛則實精氣奪則虛譫語由邪氣盛而神識昏鄭聲由精氣奪而聲不全愚以神識昏則妄見妄聞其語誕妄其聲高大而不以次故謂之實邪實則胃實所以下文用大小承氣皆譫語證也愚以聲不全則無妄見妄聞之狀其語倒亂其聲低微不正故謂之虛仲景恐人以譫語認作鄭聲而以實證作虛證治故其於鄭聲別無證治之條可見傷寒無虛證明矣究竟鄭聲一候亦由邪實而正虛不可認以為真虛也後人有以鄭聲為虛證無邪可攻而以溫補法治之者大半皆死可不審之直視譫語喘滿者死下利者亦死此先言譫語之死證也經云五臟六腑之氣皆上注於目而為之精直視者邪干於藏精不榮於目也夫譫語非死證加之直視則危矣更加喘滿者及下利者成注云喘滿為氣上脫下利為氣下脫是皆主死為不治之證發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死此係太陽病轉屬陽明譫語之證本太陽經得病時發汗多轉屬陽明重發其汗汗多亡陽汗本血之液陽亡則陰亦虧津血耗竭胃中燥實而譫語譫語者脈當弦實或洪滑為自和自和者言脈與病不相背也是病雖甚不死若譫語脈短者為邪熱盛正氣衰乃陽證見陰脈也以故主死或以陽亡為脫陽脫陽者見鬼故譫語擬欲以四逆湯急回其陽大訣之極殊不知仲景云亡陽者乃亡津液之通稱津液亡而反用附桂等辛熱之劑吾恐脈雖和亦必至死條辨云此疑太陽篇錯簡傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服此條舉譫語之勢重者而言傷寒若吐若下後津液亡而邪未盡去是為不解邪熱內結不大便五六日上至十餘日此為可下之時日晡所發潮熱者府實燥甚故當其經氣王時發潮熱也不惡寒者表證罷也獨語者即譫語也字釋云病人自言為譫則是獨語如見鬼狀乃陽明府實而妄見妄聞病劇則不識人劇者甚也成注云熱氣甚大昏冒正氣故不識人循衣摸床者陽熱偏勝而躁動於手也惕而不安者胃熱沖膈心神為之不寧也又胃熱甚而氣上逆則喘今者喘雖微而直視直視則邪干藏矣故其死生之機須於脈候決之後條辨云以上見證莫非陽亢陰絶孤陽無依而擾亂之象弦澀皆陰脈脈弦者為陰未絶猶帶長養故可生脈澀者為陰絶已成涸竭以故云死其熱邪微而未至於劇者但發潮熱譫語宜以大承氣湯下胃中實熱通腸中燥結一服利止後服者蓋大承氣雖能抑陽通陰若利而再服恐下多反亡其陰必至危殆可不禁之陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服此條病並下條乃譫語宜用小承氣湯之證陽明病指胃家實而言其人多汗者乃自汗出而多也汗多則津液外泄胃亡津液則燥腸與胃相通胃中燥則大便必硬硬則熱邪不得下泄陽明府實因作譫語治法止須與小承氣湯下其實熱若一服實熱得下胃中稍空則譫語止更莫復服者以亡津液不堪過下故也或問芒硝能潤燥軟堅今者胃中燥大便硬何以不用大承氣湯余答云武陵陳氏云大承氣湯證必如前條不大便五六日或至十餘日之久漸漸搏實而後用之今則汗多燥硬而譫語其機甚速此亡津液之故而非漸漸搏實雖堅而不大滿故止當用小承氣主之且津液不足非大承氣所宜服藥後譫語雖止即未大便亦莫盡劑恐過傷元氣耳斯言實得仲景之旨陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也陽明病至譫語發潮熱下證亦已審矣本當用大承氣以攻之只因脈滑而疾滑者往來流利加之急疾雖主有宿食內熱然成注云脈未沉實者為裡熱未實不可攻也止須以小承氣湯主之然亦未敢多用先與承氣湯一升視其失氣與否以為用藥進退之法設明日不大便前脈滑疾者今反變而為微澀乃正氣內衰之診故曰裡虛此為難治熱邪雖盛不可更與承氣湯也按後條辨云譫語潮熱脈反微澀為裡氣大虛並前此之脈滑疾亦屬虛陽泛上之假象其言似是而非愚以譫語潮熱脈滑疾者乃陽證見陽脈其人邪氣盛而正氣未衰也故云可與承氣湯脈反微澀者是陽證見陰脈其人邪氣盛正氣衰故云不可更與承氣湯也不轉失氣並不大便非腸中空虛而無物乃胃家正氣既衰雖得湯藥內助其惡濁之物仍然不能下泄故云難治後之人議用補虛回陽之法是與仲景初時用承氣湯之意相反補亡論常器之云可用黃耆人參建中湯亦與證不合大抵此條病但云難治其非不治之證明矣如欲用藥還宜補瀉兼施之劑陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之爾與爾同自此以下二條乃譫語宜用大承氣湯之證譫語潮熱下證已具也不能食為腸胃皆實故其屎既燥且硬若能食為腸實胃虛故其屎但硬耳俱宜大承氣湯下之尚論篇云同一譫語潮熱故同一治法至於藥劑之大小必有分矣愚按補亡論宜大承氣湯下之句在若能食者之前蓋能食既異治法必不相同仲景法宜另以調胃承氣湯主之也附後例陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈此條系刺法正文與注並穴圖詳見後第十四卷刺熱論中汗出譫語者以其有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯此條系太陽陽明證汗出者本太陽經有風邪也然汗出既多則胃中燥實必至譫語所以汗出之時譫語者主有燥屎在胃中夫燥屎非胃中之物要之胃實而至譫語則腸中之屎必燥此為風勝故至燥也須下之者然亦必邪過太陽經至八九日之時成注云無表證乃可下之若下之早則表邪乘虛盡入於裡將向之譫語者至此必邪熱更甚而語言必亂何也以經中之邪雖罷而表因虛在府之熱愈結而里則實故也皆須下之則愈宜大承氣湯蓋過經可下者固宜用是湯下早裡實者亦宜用是湯也尚論篇云必再一大下庶大腸空而風邪得以並出故自愈此是下早裡實宜再下之義補亡論以末二句移之過經乃可下之句下誤矣傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語此條亦系太陽陽明證本太陽傷寒至四五日表邪入里已非發汗之時兼之脈沉而喘滿此喘非麻黃湯證之喘乃胃府實熱胸膈滿而作喘據脈沉而論又為在裡之證醫反發其汗致津液越出越出者其出不順言津液由內而越於外也津液既亡則胃中乾燥大便必難表虛里實義注已見前條中惟裡實故久則譫語病至譫語則下證已急雖不出方此承上文之意亦宜用大承氣湯主之以表虛里實既同故同一治法也補亡論用調胃承氣湯殊出不解或問大便為難何至用大承氣余答云既久而至譫語之時則大便不惟難而且硬仲景法還宜用大承氣湯的當無疑附例二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯此條系並病譫語之證二陽並病者乃太陽陽明二經相併而病也經病無可下之理今者太陽證罷已無惡寒頭痛在表之邪矣但發潮熱手足漐漐汗出大便難而譫語是為陽明入府之證故云下之則愈亦宜用大承氣湯也陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯此條言陽明病下後當再攻之證陽明病既下之後心中懊憹而煩似為虛煩成注云當與梔子豉湯若胃中有燥屎者宜攻而不宜湧也何以知之下節云繞臍痛云云此為辨燥屎之法如病人腹微滿而不痛乃初硬後溏不可攻之若有燥屎可攻者還宜用大承氣湯也或問陽明病既下之矣何以胃中猶有燥屎余答云病人痞滿燥實證俱全本當用大承氣醫人或止用小承氣為下之未盡此即是上條證病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也此節承上文而辨有燥屎之法陽明病下之後若病人不大便又五六日繞臍痛繞臍痛者邪已入下脘及腸中也燥實氣不得通則痛煩躁者邪熱內盛也發作有時者邪乘未申之時陽明經氣王故當其時則煩躁發作此是有燥屎之徵故使不大便也愚按仲景用大承氣湯證必辨其有燥屎則是前言潮熱譫語手足汗出轉失氣其法可謂備矣此條復云繞臍痛可見證候多端醫者所當通變而診治之也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯此條系太陽陽明證病人煩熱者此太陽經風邪猶未盡也汗出者自汗出也自汗出則其熱暫解至明日又煩故云有如瘧狀乃表證仍在也日晡所發熱者熱傳陽明邪已入府而發潮熱乃里證已具也然亦當審其脈如脈實者里證已的宜下之故云與大承氣湯如脈虛浮者為表證未解雖日晡發熱不過是煩熱而非潮熱其邪未全入府猶在於經故云宜桂枝湯以透發其汗俟表證罷然後斟酌下藥或問病如瘧狀則脈實者何以不用大柴胡湯余答云上云如瘧狀者乃煩熱時得汗則解有如瘧非云寒熱如瘧也但脈虛浮者宜發汗愚以此必是太陽陽明經證仲景法還宜用桂枝加葛根湯方也大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯此條乃大下後府實未盡更當大下之證不大便煩滿腹痛者下證具也因有下證故大下之今者大下之後又六七日不大便煩仍不解腹中滿而作痛者此有燥屎也夫既經大下何以裡實如是所以然者以其人本有宿食故下之而猶未盡也成注云與大承氣湯以下除之或問大下後六七日不大便此是下證否余答云大下之後胃中虛新谷未入雖六七日不大便亦非下證惟煩不解腹滿痛此是有燥屎之徵故宜復與大承氣湯下除之也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯此條病未經下而有燥屎乃醫人不易識之證成注云小便利則大便硬此有燥屎乃理之常今者病人小便不利大便乍難乍易何以知其有燥屎邪蓋大實大滿之證則前後便皆不通大便為燥屎壅塞其未堅結者或有時而並出故乍易其極堅結者終著於大腸之中故乍難燥屎結積於下濁氣攻衝於上以故時有微熱微熱者熱伏於內不得發泄此比潮熱則更深矣後條辨云濁氣乘於心肺故既冒且喘不得臥者胃家為燥熱所擾即經云胃不和則臥不安也凡此者皆是有燥屎之徵故云宜大承氣湯陳亮斯云此為識燥屎之變法醫人不可以不知也太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈此條系太陽陽明證太陽病既經汗吐下其邪為已減矣所未解者內入於胃胃府實熱必不大甚故曰微煩微煩者大便未必能硬其硬者只因小便數故也此非大滿大實之證故云與小承氣湯和之則愈愚按此條病乃汗吐下不解非誤汗吐下之比故成注止云損津液而非亡津液也大便因硬乃大便略覺硬非大便堅結而難出成注以脾約作解大誤之極得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯此條乃申言大小承氣不可多用及驟用之意得病二三日不言傷寒與中風者乃風寒之邪皆有不須分辨之病也脈弱者謂無浮緊等在表之脈也無太陽柴胡證謂無惡寒發熱或往來寒熱在表及半表半裡之證也煩躁心下硬者全是陽明府熱邪實至四五日則足陽明胃府實熱者下而傳於手陽明當大腸之府實熱也經云腸實則胃虛故能食能食者其人不痞不滿為下證未急非陽明胃強發狂能食比也故云雖能食止須以小承氣湯少少與微和之因其人煩躁必不大便欲令其小安也至六日仍煩躁不安而不大便者前用小承氣湯可加至一升使得大便而止此言小承氣湯不可多用之意若不大便句承上文煩躁心下硬而言至六七日不大便為可下之時但小便少乃小水不利此係胃中之水穀不分清故不能食非譫語潮熱有燥屎之不能食也故云雖不能食但初頭硬後必溏未定成硬而攻之並硬者必化而為溏矣須待小便利屎定成硬乃可用大承氣湯攻之此言大承氣亦不可驟用之意條辨云太陽不言藥以有桂枝麻黃之不同也柴胡不言證以專少陽也此等文皆是互相發明之義後條辨云能食者結在腸間而胃火自盛故煩躁不能食者胃弱不能布水水漬胸中以故脈弱愚以心下硬此是二三日之見證至四五日六七日之時其硬當更下矣或問脈弱則胃氣亦弱何以用大承氣余答云大承氣湯中有芒硝直走大腸攻其硬屎斯邪去而胃不傷如未定成硬而遽攻之斯邪不能去徒傷胃氣耳醫人不可不知傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯無表裡證里字當是傳寫錯誤宜從刪此條系邪熱侵藏急當下之之證傷寒至六七日為邪氣入里之時目中不了了不了了者病人之目視物不明瞭也睛不和者乃醫者視病人之睛光或昏暗或散亂是為不和為陽明熱邪亢盛土來乘水腎水將絶瞳子不能照物故也當其時已無表證但大便難者裡實也身微熱者裡熱也裡實熱盛故於身外候之亦微熱非在表發熱也此為裡實當下兼之目睛不和此為裡實熱盛當急下宜大承氣湯以瀉土之郁救水之涸不可遲也按此條系陽明府病條辨以陽明經脈絡目作解大謬之極陽明病發熱汗多者急下之宜大承氣湯此條病亦當急下以救胃涸之證邪熱入府裡熱盛而蒸發於外故云發熱汗多成注云熱迫津液將竭急與大承氣湯以下其府熱存其津液也發汗不解腹滿痛者急下之宜大承氣湯此條病乃正陽陽明宜急下之證發汗不解者此發陽明經中之汗表證罷而邪不解也不解則邪熱傳入於府府中大實腹滿而痛成注云傳之迅者也惟傳之迅故宜大承氣湯急下之以通其在裡之實熱腹滿不減減不足言當下之宜大承氣湯此承上條而申言之腹中滿痛急用大承氣湯下之後腹滿不減言脹滿之形不因下之而減成注云邪氣仍實也減不足言者言下之後縱減一二分尚論篇云不足以殺其勢也故云當復下之宜大承氣湯陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯此條系合病然亦必俟少陽之邪總歸陽明故為當下之證條辨云陽明屬土其主水穀少陽屬木其主風風主飧泄以故二陽合病必至下利也陽明脈大少陽脈弦其脈不負者謂陽明大脈與少陽弦脈相敵乃為順候也若少陽脈勝而弦陽明脈負而不大乃陽明之正氣失而其候不順也木為土之賊土受木克其名為負此下利不治之證也若其脈滑而數者滑主食數主熱乃有宿食也此為少陽之邪盡歸陽明之府而成府實證成注云與大承氣湯以下除之以上十三條證即從本篇之後移附於此下利譫語者有燥屎也宜小承氣湯此條自厥陰篇移附於此下利者腸胃之疾也若譫語則胃家實與厥陰無與主腸中有燥屎不得下也治宜小承氣湯者此半利半結止須緩以攻之也或問既下利矣則熱氣得以下泄何由而致譫語有燥屎也余答云此係陽明府實大熱之證胃中糟粕為熱邪所壅留著於內其未成硬者或時得下其已成硬者終不得出則此燥屎者為下利之根也燥屎不得出則邪熱上乘於心以故譫語要之此證須以手按臍腹當必堅痛此為有燥屎之徵三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之此條雖系合病實則陽明經與府氣分熱極之證三陽合病者陽證多熱病合三陽其熱甚矣熱甚則肢體倦怠而神昏以故身重難以轉側口不仁而譫語不仁者不正也條辨云飲食不利便無口之知覺也凡此者皆是陽明主證經云少陽病甚則面微塵垢亦塵也面垢者少陽熱而青黯之色不澤也遺尿者太陽熱而膀胱之府不約也成注云三者以陽明證多故出陽明篇中三陽合病為表裡有邪醫因身重而誤發其汗則邪並陽明胃中燥熱故譫語益甚復因譫語而誤下之則腸胃之陰受傷陽無依而上越故額上生汗手足逆冷者胃虛熱極而見厥乃熱深厥亦深也若不因發汗而自汗出者成注雖云三陽熱甚終是陽明氣分燥熱以故肌肉之間自汗時出也成注復云與白虎湯以解內外之熱此是合經與府俱治之義或問白虎湯何以能解三陽之熱余答云病至自汗出則太少之邪總歸陽明矣安得不從陽明而專治之或又問云既從陽明而治之何以下之而不愈余又答云腹滿譫語似乎可下要之陽明胃府氣分燥熱亢極者亦致譫語其腹滿者氣滯也身重者氣困也口不仁者氣不和也面垢者氣不舒也遺屎者氣不攝也自汗出者氣不斂也凡此者皆氣分燥熱所致也氣燥熱而反用大小承氣等血藥以攻之故見頭汗手足冷等變證也白虎湯能清陽明氣分熱滋腸胃中之燥故為上證必用之藥白虎湯方此方自原論中第四卷太陽下篇移附於此知母六兩石膏一斤碎甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服成氏明理論云白虎西方金神也應秋而歸肺熱甚於內者以寒下之熱甚於外者以涼解之其有中外俱熱內不得泄外不得發者非此湯則不能解也夏熱秋涼暑暍之氣得秋而止秋之令曰處暑是湯以白虎名之謂能止熱也知母味苦寒內經曰熱淫所勝佐以苦甘又曰熱淫於內以苦發之欲徹表熱必以苦為主故以知母為君石膏味甘微寒熱則傷氣寒以勝之甘以緩之熱勝其氣必以甘寒為助是以石膏為臣甘草粳米味甘平脾欲緩急食甘以緩之熱氣內余消爍津液則脾氣燥必以甘平之物緩其中故以甘草粳米為使是太陽中暍得此湯則頓除即熱見白虎而盡矣立秋後不可服白虎為大寒劑秋王之時若不能食服之而為噦逆成虛羸者多矣徐春沂云立秋後云云疑是後人所加李東垣云身以前胃之經也胸胃肺之室也邪在陽明肺受火制故用辛寒以清肺所以號為白虎湯也琥按白虎湯大都是甘寒清肺胃之劑成注云緩脾燥者以胃熱得清而脾自不燥也成注又云太陽中暍得此湯則頓除此不過暫假以為用耳至仲景云三陽合病用白虎湯能兼主少陽經熱殊為不解況上文云面垢愚以面垢者亦陽明經病蓋陽明經之脈實循面而行故也細審上條全是陽明經中暍證曰腹滿者陽明之脈循腹裡也曰身重者陽明脈行身之前身以前熱甚故困極而重也曰口不仁而面垢及額上生汗者陽明之脈挾口循兩頰上行於面而至額顱也經云因於暑汗煩則喘渴靜則多言上證雖未至喘渴然既譫語自汗出矣則胃中燥熱已具喘渴之勢復何疑而不用白虎湯也尚論篇云此證夏月最多斯言甚是有理張兼善云活人書謂白虎湯治中暍並汗後一解表藥耳非正傷寒藥也夫白虎湯具載仲景之書證治昭然明白何為而言非正傷寒之藥也況傷寒論言無表證者可與白虎湯今云汗後一解表藥耳於法既無表證何解之有琥按白虎湯活人書謂汗後一解表之藥不為誤也陽明病汗多表熱不解用之與太陽病用桂枝湯解表之義相同張氏不明此義引傷寒論言無表證者可與白虎湯主之殊不知仲景云無表證者乃表無惡寒無汗等證也今既有汗而大熱不解其邪仍在肌肉之間斯時而用白虎謂非仍是解表藥邪即如仲景大青龍湯中用石膏且能治汗不出而煩躁則是石膏之解肌表愈可信矣張兼善又云活人書謂夏月陰氣在內白虎尤宜戒之而明理論又云立秋後不可服白虎夫傷寒之法有是證則投是藥安可拘於時而為治哉假如秋冬之間患傷寒身無表證而大煩渴於法合用白虎湯苟拘其時何以措手若以白虎為大寒其承氣又何行於冬令乎夏既宜戒秋後又不可行然則宜於何時也琥又按白虎湯張氏云於法合用不可拘於時令實為有理故內臺方議亦云古人一方對一證若嚴冬之時果有白虎湯證安得不用石膏斯言實與張氏之論相合但張氏云傷寒身無表證後用白虎湯竟認白虎湯非解表熱之藥此與仲景之論又相反矣內臺方議又云發汗後大熱不解多汗出不惡寒大渴能飲水者用白虎湯乃知無表證者但謂無惡寒汗不出證也若陽明汗出肌表間大熱不解仍為必用之藥琥又按白虎湯病人於夏秋熱燥時大宜用熱邪傷氣此湯乃解陽明經與府氣分燥熱之藥也冬寒時所當慎用此為不易之論琥又按白虎湯古無下走大腸之説余曾治一人傷寒六七日不大便熱渴多汗譫語飲水不解醫曾以小承氣試之雖大便亦不多而病依然醫復欲以大承氣下之余往診其脈得洪大而長此熱傷陽明氣分也因以白虎湯去粳米加陳皮蘆根一服後得大便而病悉愈乃悟石膏一味不但外解肌表之熱其性沉寒兼能內入大腸而下氣分熱祕此誠千古未發之義附例傷寒脈浮滑此表有熱里有寒白虎湯主之此條自太陽下篇移附於此傷寒脈浮滑者滑為裡熱浮滑為表兼風而亦主熱此太陽風寒之邪已傳入陽明而經與府齊病熱也今則云表有熱里有寒補亡論校正云傷寒脈浮滑此表裡有熱斯言乃為定論條辨云里有寒者以傷寒之熱本寒因也實則表裡俱熱故用白虎湯以內外兩解之也傷寒脈滑而厥者里有熱也白虎湯主之此條病自厥陰篇移附於此傷寒本熱病熱傷陽明則脈滑脈滑者脈經云往來流利乃熱盛氣壅之診也脈雖滑而外證見厥厥者手足逆冷也叔和因其手足逆冷遂撰入厥陰篇以厥陰者陰之盡邪傷其經不分冷熱而外證見厥者多殊不知足陽明胃府屬土土主四末府熱亢極則氣壅而血不流通以故四肢之末見厥在裡則燥熱實盛乃熱深者厥亦深也故宜用白虎湯以解其裡熱金鏡內臺方議云仲景所用白虎湯三證然有大小不同處亦皆古人載之經典復詳味之若果用白虎湯無差誤矣必須多汗飲水也所以白虎湯戒曰白虎乃大寒之劑若非大熱多汗渴飲水者不可服也又古賦曰無汗喜渴而脈單浮者勿投白虎學者須明識此則用湯自無差錯矣重出例二陽並病太陽證罷但發潮熱云云至宜大承氣湯注已見前陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之此條連下條乃陽明病宜吐之證也陽明病見浮緊之脈其風寒之邪當自太陽經傳來也陽明之脈挾口太陰之脈挾咽二經表裡相合陽明病熱故口苦而並咽亦燥也然膽熱則口苦咽又為膽之使故口苦也腹滿者熱入陽明之府也但發熱而喘此是太陽經風寒未盡風寒未盡者當惡寒不惡熱今者汗出不惡寒反惡熱而身重身重者陽明主肌肉濕土重著也蓋此條病表裡之證兩未全具不可誤汗誤下若加燒針則更誤矣醫人不識而發其汗則津液傷而邪愈熾當見心躁極而憒亂及譫語而病劇矣若加燒針則火熱犯心當見怵惕煩躁不眠等變證矣怵惕者恐懼之貌也若誤下之則邪未內實徒傷胃氣將客邪之氣乘虛而入於膈中多變動等證矣心中懊憹注已見前太陽篇中既懊憹而舌上又生苔者此為寒邪鬱熱於胸之驗也成注云與梔子豉湯以吐胸中之邪可見陽明病亦有宜吐之證也愚按舌上苔仲景不言何色成注云舌上苔白知熱氣客於胸中胸中者胃口也若熱聚胃中當見苔黃熱結大腸當見苔黑矣若然則是仲景云舌苔當是白苔無疑陳亮斯云按本文汗下燒針獨詳言誤下治法者以陽明一篇所重在下故辨之獨深悉焉梔子豉湯方見前第四卷太陽中篇附例陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之此亦陽明病誤下之變證陽明誤下邪熱雖應內陷不比太陽病誤下之深故其身外猶有餘熱手足溫不結胸手足溫者徵其表和而無大邪不結胸者徵其里和而無大邪表裡已無大邪其邪但在胸膈之間以故心中懊憹飢不能食者言懊憹之甚則似飢非飢嘈雜不能食也但頭汗出者成注云熱自胸中熏蒸於上故但頭汗出而身無汗也與梔子豉湯以吐胸中之邪熱此條即從後移附於此若渴欲飲水口乾舌燥者白虎加人參湯主之此條本在前條梔子豉湯證之下成注云此下後之見證愚意云此條不但誤下兼之誤汗所致誤下則胃中虛誤汗則胃中不惟虛而且燥熱極矣渴欲飲水口乾舌燥者此熱邪傷氣耗液之徵也故用白虎加人參湯以清熱補氣潤津液或問舌者心之苗白虎加人參湯但治胃虛燥熱何為而兼主心也余答云胃居中州胃熱則脾困心肺亦受其熏蒸以故口乾者口為脾之竅也湯名白虎專能清肺心肺相連以故兼治舌燥一氣可相通也然亦必心肺脾氣分燥熱者宜用之若熱在血分又當改用瀉心湯方也白虎加人參湯方此方自原論中第十卷採附於此於白虎湯內加人參三兩余依白虎湯法內臺方議云白虎湯證前已議之加人參者取其生津止渴之義也琥按白虎湯加人參雖云取其生津液止渴然亦必汗下後胃氣大虛更兼汗多熱渴不解者方可議加人參否則勿輕加也附例傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之自此以下其三條皆自太陽下篇移附於此此條傷寒病雖自太陽經傳來要之既吐且下而其邪不解至七八日之時寒鬱為熱已入陽明之府而邪熱更甚矣里者府也表者經也熱結在裡者謂府熱甚於經也表裡俱熱者表熱則陽明經肌肉間熱時時惡風者乃熱極汗多不能收攝腠理疏以故時時惡風也裡熱則胃府中燥熱以故大渴舌上乾燥而煩欲飲水數升此因吐下之後胃氣虛內亡津液以故燥渴甚極也與白虎湯加人參扶正氣以分解內外之邪熱要之此湯惟正氣虛而邪氣微者宜之若邪氣甚者不敢輕加人參也傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒當身有熱今者身無大熱此太陽之表證已解也口燥渴心煩是陽明之裡證方盛也背微惡寒此非太陽經有餘邪乃病人燥渴心煩之極內蒸熱而表必多汗以故惡寒與上條惡風之義相同系肌表虛極也與白虎湯以解裡熱加人參以固表虛愚按此條傷寒當即是上條病於吐下之後胃氣亦虛故敢加人參也傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之傷寒脈浮此兼有風也發熱無汗乃太陽在表風寒之邪未除也白虎湯但能解肌表之熱不能解皮表之寒故云不可與也若渴欲飲水無太陽在表之證府燥熱極有汗者方可與白虎湯成注疑其不可加人參因云臨病之工大宜精別愚以人參一味誠不宜輕加也若脈浮發熱渴欲飲水小便不利者豬苓湯主之此條病本接前第一條白虎加人參湯證而申言之也成注云此亦下後邪熱客於下焦之證陽明病誤下胃中空虛上焦受傷與下焦何與蓋下後則胃中津液亡而燥渴欲飲水但渴未甚而與之水水不能消積於下焦小便因而不利其脈浮者非風邪在表之脈浮乃熱邪傷氣之脈浮也夫熱傷陽明血分則潮熱熱傷陽明氣分仍發熱故與豬苓湯以專清裡熱利小便而脈浮發熱自愈此又陽明病利小便之一法也或問渴欲飲水與白虎湯證相同且也白虎湯證亦未嘗云小便利茲何以因其小便不利即改用豬苓湯也余答云白虎湯證即或有小便不利者但病人汗出多水氣得以外泄今觀下條云汗出多不可與豬苓湯乃知此證其汗亦少汗與溺俱無則所飲之水安得不停故用豬苓湯上以潤燥渴下以利濕熱也或又問云病人既停水濕何以猶見燥渴余又答云今人病熱大渴引飲飲愈多則渴愈甚所飲之水既多一時小便豈能盡去況人既病熱則氣必偏勝水自趨下火自炎上此即是水濕停而燥渴之徵豬苓湯方豬苓去皮茯苓阿膠滑石碎澤瀉各一兩上五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服成注云甘甚而反淡淡味滲泄為陽豬苓茯苓之甘以行小便鹹味湧泄為陰澤瀉之咸以泄伏水滑利竅阿膠滑石之滑以利水道琥按上成注云甘甚而反淡以二苓之味雖云甘而實淡故也豬苓湯專於利水則是上文云脈浮發熱非關表證明矣後條辨云豬苓湯之治與太陽五苓散頗同在太陽為寒水氣化不避桂術者從寒也在陽明為燥金氣化改桂術為滑石阿膠者從燥也同是小便不利而在太陽則從寒在陽明則從燥病機之際各有氣宜醫者可漫焉施治乎哉或問小便不利其水亦蓄在膀胱中否余答云不然太陽病小便不利其水當蓄在膀胱之中以膀胱為太陽之府也五苓散中有桂枝之熱以通之以桂枝為太陽經藥也茲者陽明病小便不利其水當積在胃下脘以胃為陽明之府也故豬苓散中有滑石之寒以利之以滑石為陽明經藥也或又問云水既積在胃成注何以云熱客下焦也余又答云胃中之水雖有停積終當入於小腸但其水至闌門分水之處遂阻絶不行不能滲入膀胱以故小便不利闌門分水之處謂非下焦主之邪乃今而知豬苓湯證之小便不利為腸胃中之水不入膀胱而不利非若五苓散證之小便不利為膀胱中有水氣化不出而不利也醫者能達是理則用藥之道自明陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也此承上文而言豬苓湯之禁渴欲飲水小便不利者豬苓湯證也然其證汗必不多若汗出多雖小便不利不可與豬苓湯何也汗出既多則胃中水液外輸隨飲隨燥津液少以故作渴復用豬苓湯以利小便是重亡其津液故示戒也脈浮而遲表熱裡寒下利清穀者四逆湯主之此條系真寒證表熱是假裡寒是真故與四逆湯主之正文與注見中寒論中若胃中虛冷不能食者飲水則噦此亦真寒之證正文與注見中寒論中脈浮發熱口乾鼻燥能食者則衄脈浮發熱此陽明經有風也甚至口乾鼻燥經中之熱熾矣能食者成注云里和也仲景法陽明病能食者名中風風熱壅甚於經又不傳裡勢必致鼻衄也按此條論仲景無治法補亡論常器之云可黃芩湯愚意云宜犀角地黃湯重出例陽明病下之其外有熱云云至但頭汗出者梔子豉湯主之正文與注已見前附後例陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯云云至身濈然而汗出解也上二條證雖雲陽明病實少陽經病居多故皆與小柴胡湯正文與注見後第七卷少陽篇中陽明中風脈弦浮大而短氣腹部滿脅下及心痛云云至耳前後腫云云至與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治此條陽明病亦少陽證居多至末後脈但浮雲云雖略兼太陽終非主證其主證云脈弦脅下痛耳前後腫可見少陽經病偏重故與小柴胡湯正文與注見後第七卷少陽篇中陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導此條乃詳言導法以佐下法之窮也陽明病自汗出者不可發汗若發其汗兼之小便自利者此為津液內竭內指腸胃而言汗泄於外溺去於下皆內耗其津液故云竭也津液既竭則大便硬不問而可知矣大便雖硬成注云此非結熱不可攻之當待其自欲大便時遂因其勢而行導之之法如蜜煎土瓜根大豬膽皆可用也或問小便自利大便硬何以不用麻仁丸余答云麻仁丸治胃熱屎結於回腸以內茲者胃無熱證屎已近肛門之上直腸之中故云因其勢而導之也蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之內臺方用蜜五合煎凝時加皂角末五錢蘸捻作挺以豬膽汁或油潤穀道內之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出內臺方不用醋以小竹管插入膽口留一頭用油潤內入穀道中以手將膽捻之其汁自入內此法用之甚便土瓜根方缺琥按土瓜即王瓜月令四月王瓜生即此也王瓜系蔓草類李氏綱目云其根作土氣其實似瓜故名土瓜根似栝蔞根而小氣味苦寒肘後方治大便不通採根搗汁筒吹入肛門內取通此與上豬膽汁方同義內臺方用土瓜根削如挺內入穀道中誤矣蓋蜜挺入穀道能煬化而潤大便土瓜根不能煬化如削挺用之恐失仲景制方之義陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯此條言陽明病非胃家實之證乃太陽病初傳陽明經中有風邪也脈遲者太陽中風緩脈之所變傳至陽明邪將入里故脈變遲汗出多者陽明熱而肌腠疏也微惡寒者太陽在表之風邪未盡解也治宜桂枝湯以解肌發汗以其病從太陽經來故仍從太陽經例治之愚以上條證雖從太陽例治但既云陽明病仲景法還宜用桂枝加葛根湯方也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此條言陽明病亦非胃家實之證乃太陽病初傳陽明經中有寒邪也脈浮無汗而喘者此太陽傷寒之證仍在也但脈浮而不緊為其邪傳入陽明脈雖變而麻黃湯證不變故仍用麻黃湯以發其汗則愈或問無汗而喘但脈浮不緊何以定其為陽明證余答云病人必見目疼鼻乾故云陽明證也以其病從太陽經來故從太陽麻黃湯例要之既云陽明病仲景法還宜用葛根湯方也陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之此條乃陽明濕熱發黃之證陽明病發熱汗出則熱氣得以散越故不發黃今但頭汗出身無汗劑頸而還此為熱不得越也劑頸而還義注已見前太陽下篇熱不得越於外庶幾小便利則熱氣得以下泄亦不至於發黃茲者小便又不利則熱氣內郁鬱熱愈深則發渴愈盛其所引飲必多此為瘀熱在裡里者陽明之府胃也胃屬土其色黃胃實熱甚兼有水濕瘀積則蒸其色而發出於外其身必黃用茵陳蒿湯者以清濕熱下里實也茵陳蒿湯方茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗二升先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也成氏明理論云王冰曰小熱之氣涼以和之大熱之氣寒以取之發黃者熱之極也非大寒之劑則不能散其熱茵陳蒿味苦寒酸苦湧泄為陰酸以湧之苦以泄之泄甚熱者必以苦為主故以茵陳蒿為君心法南方火而主熱梔子味苦寒苦入心而寒勝熱大熱之氣必以苦寒之物勝之故以梔子為臣大黃味苦寒宜補必以酸宜下必以苦推除邪熱必假將軍攻之故以大黃為使苦寒相合雖甚熱大毒必祛除分泄前後復得利而解矣琥按上茵陳蒿湯乃前後通泄之藥所以上方後云黃從小便去未足以盡其義成注復云前後得利而解斯為至當之論附例傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此條亦濕熱發黃之證傷寒七八日成注云正當熱甚之時熱甚於內黃髮於外身黃如橘子色者其黃鮮明而且潤澤乃濕熱俱盛之候也小便不利腹微滿者濕熱之氣不能施化陽明胃府實故外作脹滿之形也與茵陳蒿湯以清濕熱下胃實此條即從本篇之後移附於此陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之此條乃陽明胃府血分實熱之證陽明證其人喜忘者好忘前言往事也條辨云志傷則好忘心之所之謂志心又為血之主血為熱壅蓄積於胃其瘀既久必上干於心故令喜忘屎雖硬非承氣湯證須驗其大便易而色黑此為瘀血欲下之證治宜抵當湯以下瘀血乃通因通用之法也或問屎既云硬何以大便反易余答云大便中所下黑物乃敗血而非屎也陽明本多血故雖不至如太陽發狂之甚亦當以抵當湯下之又仲景法辨太陽蓄血證必驗其小便利辨陽明蓄血證必驗其大便易亦各從其府而言之抵當湯方見前第四卷太陽中篇附例病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯此條乃陽明大腸府血分實熱之證病人者陽明病之人也陽明表證當身熱目疼鼻乾不得臥陽明裡證當痞滿燥實譫語今則兩證俱無但內發熱是里證未全具也脈浮而數是表證未全具也數為裡熱然脈浮者猶帶表為不可下其可下者止因七八日之久陽明邪熱已深故脈雖浮數而可下之既下之後則邪熱去而浮數之脈皆當解矣假令已下浮脈去而數脈不解則外來風邪之熱與胃中真火之熱相合故云合熱夫人胃中有真火則能消化水穀今則復合邪熱故不惟消穀而且善飢善之為言易也穀食既能消而易飢則後必時常大便今至六七日不大便者此下焦有瘀血並絶其大便之道路也何也蓋陽明多氣多血成注云熱客於氣則脈浮熱客於血則脈數數脈見於既下之後則胃中空虛邪熱併合迫血下行蓄積於大腸之間以故並大便亦不得下成注云與抵當湯以下去之或問此條云瘀血與上條蓄血有以異否余答云蓄血者血但蓄積而可流通以故大便反易瘀血者其血瘀積甚至阻塞以故大便不行又按成注云可下之與大承氣湯以承氣湯為清滌陽明裡熱之藥故也尚論篇注云可下之如大柴胡湯之類誤矣若脈數不解而下不止必協熱而便膿血也此承上文脈數不解而言下不止者成注云下利不止為熱得下泄則血不致瘀必協熱而便膿血協合也猶迫協也腸胃之氣為熱邪所迫協故便膿血也按此條論仲景無治法補亡論常器之云可白頭翁湯上二條證即從本篇之後移附於此重出例陽明病下之心中懊憹而煩云云若有燥屎者宜大承氣湯病人不大便五六日云云此有燥屎故使不大便也病人煩熱汗出則解又如瘧狀云云下之與大承氣湯發汗宜桂枝湯大下後六七日不大便云云本有宿食故也宜大承氣湯病人小便不利大便乍難乍易云云有燥屎也宜大承氣湯上五條證俱見前大承氣湯方下食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也此條系胃家虛寒證正文與注並吳茱萸湯方俱見中寒論中重出例太陽病寸緩關浮尺弱云云至渴者宜五苓散上條證見前第三卷五苓散方之下脈陽微而汗出少者為自和也汗出多者為太過此條系陽明經自汗出之證脈陽微者寸關以前之脈微而無力也陽明病原當有汗今者汗出少成注云脈陽微者邪氣少汗出亦少為適當故自和汗出多者反損正氣是為太過脈經云脈陽微者當自汗出愚以其汗出少而自和者邪由汗解也其汗出多者邪不因汗而解且失於救治故為太過也陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也此承上文而言陽明病陽脈不微而實實者按之搏指而有力也陽脈既實則邪實雖有汗當更發其汗汗出多者因用藥過劑以故汗出多亦為太過凡汗出太過者皆為陽絶於里陽絶者成注即云亡陽陽亡則津液外泄仲景云陽絶於里者即津液絶於里也津液既亡則腸胃乾燥大便因硬按此條論仲景無治法愚意云總於後條用麻仁丸以主之補亡論議用小柴胡湯又柴胡桂枝湯以通津液如大便益堅議用承氣等湯大誤之極脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶此又承上文而申言陽絶之脈也浮為陽之陽言陽邪其陽之陽言人身真陽之氣真陽氣積於裡即成津液今者脈輕取之則浮浮為陽邪獨盛於外重按之則芤芤為津液已亡於中陽邪乘津液之亡而相搏則胃中之氣皆鬱而變熱熱則津液愈竭其真陽之氣因絶而不能復生津液也所謂陽絶於里者有如此趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之此條病系脾約乃麻仁丸正治之證趺陽者胃脈也在足趺上五寸骨間去陷谷三寸即足陽明經衝陽二穴按之其脈應指而起蓋古人切脈必通身診視如人迎脈之出於結喉兩旁可以類推浮為陽盛故主胃強澀為陰虛故小便數二脈既相搏擊則水愈虧火愈熾腸胃燥結因大便難而成脾約之證脾約義已見前與麻仁丸者以通腸胃而潤燥結也按成注以胃強脾弱為脾約作解推其意以胃中之邪熱盛為陽強故見脈浮脾家之津液少為陰弱故見脈澀仲景用麻仁丸者以瀉胃之陽而扶脾之陰也麻仁丸方明理論即名脾約丸麻子仁二升芍藥半斤枳實半斤炙大黃一斤去皮厚朴一尺去皮炙杏人一升去皮尖熬別作脂上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以知為度成氏明理論云約者結約之約又約束之約也內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數而大便硬故曰其脾為約麻仁味甘平杏仁味甘溫內經曰脾欲緩急食甘以緩之麻仁杏仁潤物也本草曰潤可去枯脾胃乾燥必以甘潤之物為之主是以麻仁為君杏仁為臣枳實味苦寒厚朴味苦溫潤燥者必以甘甘以潤之破結者必以苦苦以泄之枳實厚朴為佐以散脾之結約芍藥味酸微寒大黃味苦寒酸苦湧泄為陰芍藥大黃為使以下脾之結燥腸潤結化津液還入胃中則大便可小便少而愈矣琥按上成氏注云酸苦湧泄為陰芍藥大黃為使以下脾之結燥愚以散結自有厚朴枳實潤燥自有麻子杏人至於下泄便難莫如大黃之苦寒與芍藥何與焉據傷寒論中原注云芍藥之酸以斂津液此為正解脾約證津液不足以故小便數而大便難津液不足以酸收之芍藥味酸而能走陰氣平而能補津液麻仁丸雖泄胃強之藥要之泄者自泄補者自補道並行而不相悖耳重出例太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之傷寒吐後腹脹滿者與調胃承氣湯上二條證已見前調胃承氣湯方下太陽病若吐若下云云大便因硬者與小承氣湯和之愈得病二三日脈弱無太陽柴胡證云云至屎定硬乃可攻之宜大承氣湯傷寒六七日目中不了了云云急下之宜大承氣湯陽明病發熱汗多者急下之宜大承氣湯發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯陽明少陽合病必下利云云至有宿食也當下之宜大承氣湯上七條證俱見前大小承氣湯方下病人無表裡證發熱七八日云云至六七日不大便者有瘀血宜抵當湯若脈數不解而下不止必協熱而便膿血也上二條證已見前抵當湯方下傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之傷寒寒濕在裡此內傷生冷之寒也內傷生冷之寒則表之不解徒致發黃下之不可以無鬱熱愚意云此海藏老人所云陰黃者是也於寒濕中求之則知非熱證矣正文與注詳見中寒論中重出例傷寒七八日身黃如橘子色云云至茵陳蒿湯主之此條證已見前茵陳蒿湯方下傷寒身黃髮熱者梔子柏皮湯主之此條系陽明發黃證陽明傷寒而病身黃者陽明居中屬土其色黃茲者身黃髮熱則濕熱已從里而發出非若茵陳蒿湯證之裡熱腹滿為可下也王太僕云小熱之氣涼以和之故用梔子柏皮湯以清解鬱熱梔子柏皮湯方梔子一十五個擘甘草一兩炙黃柏二兩上三味以水四升煮取一升半去滓分溫再服內臺方議云傷寒身黃髮熱者為表裡有熱其熱未實不可汗下故以梔子為君能瀉相火去胃熱利小便黃柏為臣能去鬱滯之熱甘草為佐使能緩其中以瀉經中之熱也武林陳氏云發熱表證也何不兼用麻黃桂枝葛根等發表之劑乎答曰身黃兼發熱者乃黃證中之發熱而非麻黃桂枝證之發熱也熱既鬱而為黃雖表而非純乎表證但當清其鬱以退其黃則發熱自愈或問下條發黃證何以又用麻黃余答云下條言身必發黃者乃瘀熱在經絡之裡黃欲發而尚未發出故用麻黃連軺赤小豆湯若既發黃則麻黃在所不用矣傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之此條系陽明濕熱在半表半裡之證成注云濕熱相交民多病疸疸黃也今者傷寒瘀熱在裡夫寒邪自外而來則必挾濕濕瘀於經絡之中則鬱而變熱濕熱既盛其人遍身必將發黃與麻黃連軺赤小豆湯者以濕熱方盛於在表之裡治宜仍從表以散其濕而除其熱也麻黃連軺赤小豆湯方麻黃二兩去節赤小豆一升連軺二兩連翹根也杏人四十個去皮尖大棗十二枚擘生梓白皮一斤生薑二兩切甘草二兩炙上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡成注引內經曰濕上甚而熱治以苦溫佐以甘辛以汗為故正此之謂也又煎用潦水者亦取其水味薄則不助濕氣故字疑有誤當從刪或問瘀熱在裡身必發黃仲景法當用茵陳蒿湯今不用大黃以下里熱反用麻黃湯加減以發其汗何也余答云此條病當是太陽經傳來者太陽傷寒理宜用麻黃湯止因邪傳陽明熱鬱於裡里非胃府以陽明經居太陽之裡即尚論篇所云軀殼之裡是也惟其裡熱所以上方中用麻黃湯而去桂枝之辛熱更加赤小豆薑棗之甘辛以祛散在表之寒濕復加連軺生梓白皮之苦寒以清解肌里之瘀熱內臺方議云傷寒汗不盡則陽明經為瘀熱所凝身必發黃其脈當浮取此湯以微汗之此即成注所云以汗為正同一義也琥按以上陽明病脈證並治法仲景原論中止一篇列之第五卷然其方亦不可盡執須合昔賢方論通變而行則醫之為道庶乎其近之矣附昔賢治陽明病方論變法深師療傷寒一日至三日應汗者作此湯方葛根半斤烏梅十四枚蔥白一握豉一升綿裹上四味切以水九升煮取三升分為三服初一服便厚覆取汗汗出粉傅之崔氏取名葛根湯方中無烏梅琥按上主療云傷寒一日至三日是初起即入陽明至三日為應汗之時故以葛根蔥白之甘辛以解肌發汗豆豉之苦甘以泄熱除煩乃陽明經發表之神劑但方中烏梅一味味酸收斂為不可用也又石膏湯療傷寒病已八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣或時呼呻而已攻內體猶沉重拘攣由表未解今直用解毒湯則攣急不瘥直用汗藥則毒因加劇而方無表裡療者意思以三黃湯以救其內有所增加以解其外故名石膏湯方石膏湯方石膏黃連黃柏黃芩各二兩香豉一升綿裹梔子十枚擘麻黃三兩去節上七味切以水一斗煮取三升分為三服一日並服出汗初服一劑小汗其後更合一劑分兩日服常令微汗出拘攣煩憒即瘥得數行利心開令語毒折也琥按上方即三黃石膏湯也雖云療三焦熱實則陽明經府齊熱但表邪尚在里未結實故不可下此方為清解最重之劑愚意以方中梔子太少麻黃太多石膏宜倍用其效更神孫真人治疫氣傷寒三日以前不解者方好豉一升綿裹蔥白一升切童尿三升上三味先熬豉蔥令相得則投童尿煮取二升分再服徐徐服之覆令汗神驗琥按上主治云疫氣傷寒則知此疫氣非大瘟大疫即四時反涼反熱之氣人不及備而病者率多相似以故云疫乃四時傷寒也蔥豉辛涼以散腸胃之郁童尿針寒以降陽明之熱熱鬱去而病自解矣又治傷寒四五日頭痛壯熱四肢煩疼不飲食方梔子仁黃連黃柏大黃各半兩好豉一升蔥白七莖上㕮咀以水八升煮上四物六七沸內蔥豉煮三升頓服一升日三服湯訖溫覆令汗出不得汗者復服重發此藥無忌特宜老小神良琥按上方乃治陽明經府齊熱又療三焦實熱之劑頭痛壯熱四肢煩疼經中熱也不能飲食府中實也解除實熱此湯最神又治夏月傷寒四肢煩疼發熱其人喜煩嘔逆支滿劇如禍祟寒熱相搏故令喜煩宜七物黃連湯方七物黃連湯方黃連茯苓黃芩各十八銖芍藥葛根各一兩甘草一兩六銖小麥三合上㕮咀以水七升煮取三升分三服不能一升者可稍稍服之湯勢安乃臥藥主毒氣服湯之後胸中熱及咽喉痛皆瘥其明日復煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取三分之一以水四升煮得二升稍稍服琥按上方乃清解陽明風熱之劑其用小麥者猶仲景白虎湯中加粳米也又治時氣病煩熱如火狂言欲走宜水導散方水導散方甘遂半兩白芷二兩大黃四兩厚朴八兩枳實五枚芒硝二合上六味㕮咀以水一斗先煮厚朴枳實取五升去滓內大黃煎取二升去滓下芒硝更煎一兩沸分再服得快利止琥按上方乃治陽明經府內外實熱之劑又治傷寒有熱虛羸少氣心下滿胃中有宿食大便不利宜生地黃湯方生地黃湯方生地黃三斤大黃四兩甘草四兩芒硝二合大棗二十枚上五味合搗爛蒸五升米下熟絞取汁分再服琥按上方乃治陽明燥結腸胃實熱之劑陰虛人大宜服之張文仲療傷寒已四五日頭疼體痛肉熱如火病入腸胃宜利瀉之方生麥門冬一升去心生地黃一斤知母二兩生薑五兩半芒硝二兩半上五味以水八升煮取二升半內芒硝煎五沸分五服取利為度琥按上主療云肉熱如火者陽明主肌肉也陽明府熱腸胃燥結熱氣上攻則頭疼熱氣外蒸則體痛故用麥門冬生地黃之甘寒以降火知母之苦寒以除熱生薑之辛涼以散邪芒硝之鹹寒以潤燥軟堅堅燥通而頭疼體痛肉熱等證自除矣此方治病人大便不通但燥堅而不痞滿者宜用之又陰虛人具下證者亦宜用又若十餘日不大便者服承氣丸方大黃杏人去皮尖各二兩枳實一兩炙芒硝一合上五味搗下篩蜜和為丸如彈子以生薑湯六七合研一丸服之須臾即通不通更服一丸取通為度琥按上方即仲景承氣湯與麻仁丸變其制而用之活人升麻湯方治傷寒中風頭痛憎寒壯熱肢體痛發熱畏寒鼻乾不得睡兼治寒暄不時人多疾疫乍暖脫著衣巾及暴熱之次忽變陰寒身體疼痛頭重如石者升麻白芍藥甘草炙乾葛各等分上銼如麻豆大每服五錢以水一盞半煎至八分去滓若大假寒即熱服若熱即溫服服藥已身涼止藥琥按上主療云傷寒中風頭痛云云發熱畏寒鼻乾不得睡是陽明經受病也方中用升麻葛根甘草乃辛甘發散風寒之義但其中白芍藥一味惟發熱有汗者宜用之如畏寒無汗者不宜用也愚意云須以赤芍藥代之為穩又葛根蔥白湯方治頭痛不止葛根芍藥知母各半兩蔥白一把川芎生薑各一兩上銼如麻豆大以水三升煎取一升半去滓熱分二服琥按上方乃治陽明風熱燥極頭痛之劑韓祗和治傷寒病以脈為先證為後如病人兩手脈浮數而緊者名曰傷寒若寸脈力小尺脈力大雖不惡風不自汗出此乃陰氣已盛先見於脈也若不投藥和之後必惡風及自汗出若立春以後至清明以前宜調脈湯主之既曰傷寒則證當惡寒無汗今則云後必惡風及自汗出於證不合恐有錯誤微旨調脈湯方葛根一兩前胡去苗防風各七錢半甘草炙半兩上為粗末每服五錢水一盞生薑一塊如小指大劈破煎七分去滓溫服如寸脈依前力小加棗三枚同煎按上方乃陽明經發汗之的劑又手太陰經感冒風寒亦宜用之又如病人兩手脈浮數而緩名曰中風若寸脈力小云云文同前宜薄荷湯主之微旨薄荷湯方薄荷一兩葛根人參甘草炙各半兩防風去蘆二兩上㕮咀每服五錢水一盞煎至七分去滓熱服如三五服寸脈力尚小加薄荷二分琥按上方亦足陽明手太陰發表之的劑氣虛人病風寒者乃可服之否則人參一味勿輕用也又前方後云寸脈力小加棗此方則加薄荷者何也蓋前方中辛藥居多故用大棗之甘以助之此方中有人參力大於棗且辛藥又少故又加薄荷二分使辛甘相合而成發散之功宣明涼膈散一名連翹飲子治傷寒表不解半入於裡下證未全下後燥熱怫結於內煩心懊憹不得眠臟腑積熱頭昏唇焦咽燥喉閉目赤煩渴口舌生瘡咳唾稠黏譫語狂妄腸胃燥澀便溺祕結風熱壅滯等證連翹一兩山梔子大黃薄荷葉黃芩各半兩甘草一兩半芒硝一分上為末每服二三錢水一盞蜜少許直格云或無蜜亦可舊用竹葉或亦不須煎至七分去滓溫服準繩云加黃連五錢名清心湯琥按上方乃治內外三焦氣血實熱之劑散名涼膈者以胃居於膈實清滌胃府風熱壅滯之方也又上主療云表不解乃表之而邪熱不解非表證仍在也學者宜以意會之宣明三一承氣湯治傷寒雜病內外所傷日數遠近腹滿咽乾煩渴譫妄心下按之硬痛小便赤澀大便結滯熱甚喘咳悶亂驚狂等證脈數沉實者並皆治之大黃錦文者芒硝厚朴去皮枳實各半兩甘草一兩準繩方中甘草止五錢四味皆一兩上銼如麻豆大水一盞半生薑三片煎至七分內硝煎一二沸去滓溫服王宇泰云此湯治傷寒大承氣湯證腹滿實痛調胃承氣證譫語下利小承氣湯證內熱不便三者合而為一此下劑也琥按云岐子保命集云凡治傷寒發表有淺深攻裡有微甚承氣攻裡立法有三大承氣者厚朴苦溫去痞枳實苦寒泄滿芒硝鹹寒而能軟堅大黃苦寒能泄實痞滿燥實四證全則可用故曰大承氣湯小承氣者大黃苦寒泄實厚朴苦溫去痞痞實兩全可用也故曰小承氣湯按此段少枳實泄滿句調胃承氣者大黃苦寒泄實芒硝鹹寒而能軟堅潤燥甘草甘平和其中燥實堅三證全者可用故曰調胃承氣湯攻裡之不同若此又按王海藏此事難知云假令調胃承氣證用大承氣下之則愈後元氣不復以其氣藥犯之也大承氣證用調胃承氣下之則愈後神癡不清以其氣藥無之也小承氣證若用芒硝下之則或下利不止變而成虛矣三湯之不可亂投又若此今宣明方合而為一猶曰此俱系瀉陽明胃府實熱之藥只須學者臨證增損用之不致大誤至陶氏殺車槌方復加柴胡黃芩芍藥改名六一順氣湯而云用此以代三承氣及大柴胡大陷胸等湯之神藥以致後醫不顧病人上中下三焦氣血虛實一概合用其流禍至今更甚不亦悲夫陶氏黃龍湯治有患心下硬痛下利純清水譫語發渴身熱庸醫不識此證但見下利便呼為漏底傷寒而用熱藥止之就如抱薪救火誤人死者多矣殊不知此因熱邪傳裡胃中燥屎結實此利非內寒而利乃日逐自飲湯藥而利也直急下之名曰結熱利證身有熱者宜用此方大黃芒硝枳實厚朴甘草人參當歸年老氣血虛者去芒硝水二鍾薑三片棗子二枚煎之後再加桔梗一沸熱服為度琥按上方即前三一承氣湯中加人參當歸也以病人氣血虛故加此二味藥方後再加桔梗者以其能引大黃等藥上至胸中至高之分而成功此潔古法也雖然愚曾細評此方為不可用之劑及見今醫用之而病人無一效者何也夫人身之中一陰陽耳陰陽之分一氣血耳病熱之人皆陽有餘而陰不足乃知其氣必實其血必虛所以病機氣宜中有當歸承氣湯方者用之以補血而益陰也若加人參則徒助有餘之陽氣而邪熱愈盛故少則無濟於病多則必致殺人問或有用之而效者必參少而諸瀉藥之力也俗醫不曉此義至有用此湯而人參加至一二兩者此正所云抱薪投火誤人於必死也或問氣虛人豈無患熱病者余答云氣虛者陽虛也陽虛之人多病中寒其病傷寒者皆精血少而水虛是為陰虛故不勝傷寒之邪熱耳據上主療云譫語發渴身熱胃中燥屎結實此數者皆陽有餘而陰不足之證陶氏猶以為氣虛而用人參抑何不明理而自相矛盾歟琥總按上古今諸名家治陽明病方論雖與仲景之法互相變通然亦不可執用須臨證參合加減施之則庶乎其不瘥矣
