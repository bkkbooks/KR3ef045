body:
  text: 卷之十一辨陰陽易瘥後勞復病脈證並治法此係仲景原文琥按仲景論叔和所增入者王安道云乃第一卷辨脈平脈法又第七八九卷汗吐下諸篇而已至若六經篇以前則有痙濕暍三證六經篇以後則有霍亂一證此亦仲景原文非叔和所能讚辭愚今不為辨注者蓋以上四證本非傷寒仲景當日偶比類言之也然其實則各有不同有如痙證當見頭搖口噤背反張濕證則皆小便不利大便反快暍證大都口開前板齒燥霍亂亦必揮霍撩亂嘔利齊作此其與傷寒不同處所以喻嘉言著尚論篇以四證為雜病而不列之傷寒中也其他如陰陽易瘥後等證此即傷寒病之未愈者故特辨注之如下傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之此言瘥後諸病而先以陰陽易冠其首也陰陽易之為病成注言之已明易者以無病人清正之氣與病後人交合換得濁邪之氣故曰易也身體重少氣者我之正氣脫也少腹裡急云云者我受彼之邪氣上逆也後條辨云三焦相混一皆穢濁之邪布塞於經絡之中故見以上諸證用燒褌散者以導引其濁邪之氣男女各由溺而出也燒褌散方上取婦人中褌近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子褌當燒灰當即襠也內臺方議曰大病新瘥血氣未復餘熱未盡強合陰陽故曰易也易者如換易也故與褌中隱處燒灰服之以復其氣也男病用女女病用男者此以陰陽復易之義也琥按上議即本成注之義其云回覆其所易之氣此實發成注之未發與仲景制方之旨為甚相合琥又按燒褌散成注不言氣味仲景但云小便即利陰頭微腫則愈此是言男子病故曰陰頭微腫若婦人病止利小便而已條辨云褌當近隱處陰陽二氣之所聚也尚論篇云服之小便得利陰頭微腫者陰毒仍從陰竅出也此陰毒當是陰中所受之毒非陰寒之毒也琥又按所受之毒有不盡從陰竅而得者戴院使云男子之病穢氣出於口女子之病穢氣出於陰然方其強合之時即女子口中未必無穢氣出者及其施泄之後即男子陰中亦未必無穢氣下者此皆不可拘也全在醫者以意會之大病瘥後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子大五六枚成注云病有勞復有食復傷寒新瘥血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而強食之熱有所藏因其穀氣留搏兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子豉湯以解之食復則胃有宿積加大黃以下之愚按兩陽相合而病以病熱本屬陽而食入於陰經又云長氣於陽故云兩陽相合也枳實梔子豉湯方枳實三枚炙梔子十四枚擘豉一升綿裹上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗成注云枳實梔子豉湯則應吐劑此云覆令微似汗出者以其熱聚於上苦則吐之熱散於表者苦則發之內經曰火淫所勝以苦發之此之謂也琥按仲景云勞復證以勞則氣上熱氣浮越於胸中也故用枳實為君以寬中下氣梔子為臣以除虛煩香豉為佐以解勞熱煮以清漿水者以瘥後復病宜助胃氣也胃氣升則勞復之熱降矣覆令微似汗者胃家之氣既升則遍身得以和暢故云微似汗也成注云熱聚於表苦則發之誤矣又方氏條辨注勞復之勞為房勞尚論篇已斥其非傷寒瘥以後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之瘥以後不因勞食而更發熱者此半表半裡之間有留邪也故用小柴胡湯湯中有人參以扶正氣去餘邪乃和解法也若診其人而脈浮是熱發在表脈沉實是熱發在裡表裡有邪另當斟酌汗下之法條辨云脈浮是有重感脈沉實是飲食失節其説極是小柴胡湯方已見前第七卷少陽篇中大病瘥後從腰以下有水氣者牡蠣澤瀉散主之成注云大病瘥後脾胃氣虛不能制約腎水水溢下焦腰以下為腫也金匱要略云腰以下腫當利小便與牡蠣澤瀉散利小便而散水也牡蠣澤瀉散方牡蠣熬澤瀉栝蔞根蜀漆洗去腥葶藶熬商陸根熬海藻洗去咸以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三成注云鹹味湧泄牡蠣澤瀉海藻之咸以泄水氣內經曰濕淫於內平以苦佐以酸辛以苦泄之蜀漆葶藶栝蔞商陸之酸辛與苦以導腫濕琥按上成注猶混雜不明牡蠣澤瀉海藻三味之咸固能入腎而導水若蜀漆葶藶商陸根之苦辛乃苦以泄其水辛以散其邪也又商陸兼酸酸與苦皆能湧泄至於栝蔞根非泄水之物條辨云苦能徹熱乃蜀漆之使大都上方用以治下焦水熱病最宜或問大病瘥後成注既云脾胃氣虛何不竟用補脾之劑使脾胃氣壯腎水不將有以制約邪余曰然尚論篇亦云脾土告困不能攝水疑者以為不顧其虛而反用牡蠣澤瀉散峻攻殊不知此正因水勢未犯身半以上急驅其水所全甚大設用輕劑則陰水必襲入陽界驅之恐無及矣愚以言雖如此使脾土果虛如仲景五苓散方亦可借用但方中藥宜去桂加牡蠣海藻投之甚穩蓋此條系下焦水熱證故不宜加桂也大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸大病瘥後何為而胃上有寒此必是病熱之時過用涼藥所致條辨云唾者口中液也寒以飲言胸中有寒飲故喜唾也不了了言病了而不了無已時也與理中丸以溫脾胃之氣其不用湯而用丸者以病瘥之後不可驟補故也理中丸方此方自原論中第七卷採附於此人參甘草炙白朮乾薑以上各三兩上四味搗篩為末蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服成氏明理論云心肺在膈上為陽腎肝在膈下為陰此上下藏也脾胃應土處在中州在五臟曰孤臟屬三焦曰中焦自三焦獨治在中一有不調此丸專治故名曰理中丸人參味甘溫內經曰脾欲緩急食甘以緩之緩中益脾必以甘為主是以人參為君白朮味甘溫內經曰脾惡濕甘勝濕溫中勝濕必以甘為助是以白朮為臣甘草味甘平內經曰五味所入甘先入脾脾不足者以甘補之補中助脾必先甘劑是以甘草為佐乾薑味辛熱喜溫而惡寒者胃也胃寒則中焦不治內經曰寒淫所勝平以辛熱散寒溫胃必先辛劑是以乾薑為使云云內經曰熱者寒之寒者熱之此之謂也琥按上成氏注理中丸乃治脾胃虛寒藥也使脾胃虛而不至於寒則乾薑在所當減況敢加桂附等藥乎使脾胃寒而不至於虛則參朮又在所當減矣醫者不可不知又上證言喜唾得乃吐涎沫也倘其人噁心欲作嘔吐之狀方中宜去甘草又用乾薑不若多用生薑之為妥矣傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒本是熱病熱邪所耗則精液銷爍元氣虧損故其人必虛羸少氣氣逆欲吐者氣虛不能消飲胸中停蓄故上逆而欲作吐也與竹葉石膏湯以調胃氣散熱逆愚按前條是胃中虛寒證此條是胃中虛熱證竹葉石膏湯方竹葉二把石膏一斤半夏半升洗麥門冬一升去心人參三兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服成注云辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾而益氣麥門冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散氣逆琥按上方乃和解肺胃虛熱兼消停飲之劑成注云辛甘發散誤矣至若胃無大熱石膏在所當去胃無停飲半夏又非所宜臨證制方不宜執也病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈病人脈已解者謂脈不浮又不沉實表裡之邪為盡除也煩熱也日暮猶微熱者成注云日暮為陽明王時以病熱新瘥之人強與穀食食谷既多脾胃氣尚虛弱一時不能消化故令生煩熱也然其熱甚微止須減損其谷而病自愈愚按此條乃不須服藥證故仲景止設一損谷之法成注云當小下之是與前條食復證無別矣誤極誤極附昔賢治瘥後病方論變法孫真人云病新瘥後但得食糜粥寧少食令飢慎勿飽不得他有所食雖思之勿與之也引日轉久可漸食羊肉白糜若羹汁雉兔鹿肉不可食豬狗肉也琥按上孫氏云宜食羊雉兔鹿等肉夫雉屬火而性溫有毒又羊鹿雖補其性大熱恐病後不宜食也倘少食羹汁亦無害惟兔屬金而性涼為可食耳新瘥後當靜臥慎勿早起梳洗亦不可多言語用心使意勞煩凡此皆令人勞復故督郵顧子獻得病已瘥未健詣華敷視脈敷曰雖瘥尚虛未得復陽氣不足慎勿勞事余勞尚可女勞外臺作御內則死當吐舌數寸其婦聞其夫瘥從百餘里來省之經宿交接中間三日發熱口噤舌出數寸而死按此段巢氏病源云出之範汪方中也病新瘥未滿百日氣力未平復而以房室者略無不死有士蓋正者疾愈後六十日已能行射獵以房室即吐涎而死及熱病房室名為陰陽易之病皆難治多死近者有一士大夫小得傷寒瘥已十餘日能乘馬行來自謂平復以房室即小腹急痛手足拘攣而死琥按上孫氏云云皆女勞復也外臺祕要中引作陰陽易病以致俗醫妄談云陰陽易之病有舌出數寸而死者殊不知陰陽易病猶屬可生女勞復病大率多死故千金但有治勞復之方而無女勞復之藥也慎疾君子其自謹之千金補大病後不足虛勞方萬病虛勞同用取七歲以下五歲以上黃牛新生者乳一升以水四升煎取一升如人體溫稍稍飲之不得過多十日服不絶為佳琥按黃牛屬土其乳色白又屬金味甘氣溫大能補氣養營潤燥除虛熱解勞乏病後肺脾氣虛大腸枯燥者大宜服之又治傷寒溫病後勞復或食或飲或動作方梔子仁三七枚石膏五兩香豉一升鼠屎尖頭大者二十枚上四味㕮咀以水七升煮取三升分三服琥按上主治云勞復或食飲或動作夫兩者之復不無少異蓋飲食之復宜消導動作之復宜調補在仲景既以枳實梔子豉湯兩用之上方之用即祖仲景之意也大抵此方專治勞復熱渴證故以石膏鼠糞二者之甘寒以涼解之愚以石膏一味太寒重莫若以知母或栝蔞根代之千金又一方治食大飽不消勞復脈實者即上方中去石膏加大黃此又仲景法云有宿食者加大黃如博棋子大五六枚是也愚謂以上等方治食復固效治勞復尚宜斟酌又治重病新瘥早起勞及飲食多致發欲死方燒鱉甲末飲服方寸匕琥按上方乃治少陰厥陰勞復寒熱間作之證又麥門冬湯治勞復氣欲絶起死人方麥門冬去心一兩甘草二兩京棗二十枚竹葉切一升上四味㕮咀以水七升煮粳米一升令熟去米內諸藥煎取三升分三服不能服者綿滴湯內口中用之有效據原方中麥冬止一兩太少可增至三兩琥按上方乃治肺脾勞乏之劑即仲景竹葉石膏湯之變也王海藏治勞復亦用此方去京棗復云加人參大妙又治傷寒瘥後一年心下停水不能食者方生地黃一斤白朮一斤好面二斤上三味合搗令相得曝乾下篩酒服方寸匕日三加至二匕琥按上主治云心下停水當是脾氣虛熱而不和也故上方用生地以涼之白朮以補之好面以和之或問心下停水而反用地黃得毋泥膈邪余答云生地之性宣通不比熟地之泥膈況助以白朮好面則中焦之濕熱清而土氣得益水自不停食自能下矣仲景法大病瘥後從腰以下有水氣者牡蠣澤瀉散主之其藥甚厲此云心下停水而其藥又甚平可見先聖後賢其因證制方各臻其妙豈粗工所能倣佛乎哉又曰婦人溫病雖瘥若未平復血脈未和尚有熱毒而與之交接得病者名為陰易之病其人身體重熱上衝胸頭重不能舉眼中生眵䁾一作膜𣍿四肢一云膝脛拘急小腹絞痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱血氣虛骨髓竭便噓噓吸吸氣力轉少著床不能動搖起止仰人或引歲月方死醫者張苗説有婢得瘥後數日有六人姦之皆死治交接後陰卵腫縮腹中絞痛便欲死方取所交接婦人衣服以覆男子立愈又一方取女人手足爪二十枚女人中衣帶中衣裡衣也外臺方作衣中裳一尺燒以酒若米飲汁服之琥按上二方即仲景燒褌散之遺意也男病取女女病取男如法服之深師療婦人得溫病雖瘥平復未滿一百日不可與交合交合為陰易之病病必拘急手足拳皆死丈夫病以易婦人名為陽易速當療之可瘥滿四日不可療也宜令服此藥方乾薑四兩上一味搗末湯和一頓服溫覆汗出得解止手足伸遂愈琥按仲景云陰陽易乃傷寒病瘥後之證至深師與孫真人皆指為溫病瘥後之證何也此猶之太陽病中風傷寒其初雖異而其傳變則一也溫病後是感得溫熱之餘氣而反用乾薑一味者何也此必是男女因交接之時走脫陽氣令不病者反得病故用乾薑之辛熱使頓服之也病候多端制方不一今姑存之以備採擇又療勞復大青湯方大青四兩甘草二兩炙阿膠二兩炒香豉二兩上四味切以水一斗煮取三升去滓溫服一升日五六欲盡復作常使有湯渴便飲無毒除熱止吐下傷寒一二日上至十數日困篤發汗熱不解吐下後熱不除止下痢甚良先煮大青甘草取四升去滓內膠豉膠消盡便漉去勿令豉壞當預漬膠令釋也琥按上方乃治肺胃煩熱之劑蓋勞則氣耗而生煩熱故也今方家惟大青一味不見用綱目云其莖葉深青其性大寒其味苦甘乃草藥中之無毒者醫人不可以不知也又療傷寒瘥後勞復葵子湯方葵子二升粱米一升上二味合煮作薄粥飲之多多為佳取汗立瘥琥按上方乃滑利腸胃兼和中氣之劑蓋用葵子之甘寒以利竅粱米之甘涼以養胃也範汪豭鼠糞湯療傷寒病後男子陰易方薤一大把肘後方作藍即板藍根也葉可作靛今處處種之豭鼠糞十四枚豭音加雄鼠也其糞兩頭尖者是上二味以水五升煮取二升盡飲之溫臥汗出便愈亦理勞復琥按薤味辛溫藍味苦寒亦各因其證而用之又療交接勞復卵腫腹中絞痛便絶死竹皮湯方此方又療傷寒病瘥語言書疏坐起行步勞復者刮青竹皮一升上一味以水三升煮五六沸絞去滓頓服立愈琥按上主療云交接勞復乃女勞復而非陰陽易也勞復之證有陰虛生內熱者此方可選而用之又療陰陽易栝蔞湯方栝蔞根二兩上一味以水五升煮取一升分二服先以青淡竹瀝一升合水二升煮好銀二兩減半去銀先與病人飲之訖須臾乃服湯小便利即瘥栝蔞湯銀汁須冷服琥按栝蔞湯苦寒清中銀汁甘寒墜下病人熱毒上攻神氣浮越者宜用之龐安時云病新瘥後氣血津液虛耗慎勿為諸勞動事凡言語思慮勞神梳浴澡頮音誨洗面也勞力勞則生熱而復病如初也又新瘥後精髓枯燥切不可為房事犯房事勞復必死故督郵顧子獻病瘥後華敷囑之慎勿房事余勞尚可女勞即死此是女勞復非陰陽易也又素問曰病熱而有所遺者是新瘥後腸胃尚弱若多食則難消化而復病如初也此是食復新瘥強人足兩月虛弱人足百日則無復病矣總論療天行勞復頭痛四肢疼蔥豉湯方蔥白豉各半升水二升半煎蔥爛去滓入雄鼠矢三七枚末之和勻分再服未瘥更作又療天行勞復作熱旦至晚則腰背痛頭項強重葛根薑豉湯葛根薑豉湯芍藥生薑各一兩半豉蔥白各一合半葛根二兩㕮咀水三升煎二升下豉煎一升半去滓溫飲一盞又療天行瘥後勞復發熱嘔吐食不下蘆根湯蘆根湯蘆根半升生薑二兩橘皮枇杷葉各一兩以水三升煮一升半去滓溫飲一盞心煩躁加石膏二兩加水一升煮二升琥按上三方皆云療天行病其因自巢氏病源始病源就仲景之論而曰傷寒曰時氣曰熱病曰溫病傷寒者觸冒冬時之寒乃正氣病也時氣者四時反寒反熱之氣也熱病者病重於溫經云五臟皆有也溫病者冬傷於寒至春所變也四種病皆分一日二日至八九日及傳變之候並與傷寒同也四者之中惟時氣一候病無長少率多相似故外臺方以天行名之今龐氏作總病論列之傷寒證中愚意云此即四時傷寒病也上三方皆治陽明勞復之藥獨葛根薑豉湯云療腰背痛頭項強重當是太陽經病傳寫時得毋誤邪姑並採之以備參考又療病未平復後勞動致熱氣攻胸手足拘急搐搦如中風狀宜栝蔞竹茹湯栝蔞竹茹湯琥按此即是前範汪竹皮湯又栝蔞根湯二方合用之復方也但所治略殊耳又療男子房勞成復者宜鼠矢薤根湯兼治陰陽易神驗鼠矢薤根湯琥按此方即前範汪豭鼠糞湯也治療亦同又云男子房勞復發熱口噤臨死舌出數寸又始得病百節痛如被杖渾身沉重恍惚失措脈促而絶不可治或有吐涎不止或有譫妄煩亂者皆不可治又療婦人病未平復因夫所動少腹篡中音算篡內深處為下極大便前小便後兩陰之間也急痛腰胯四肢不任舉動無熱證者附子黃耆湯白朮當歸桂枝附子甘草芍藥人參各半兩黃耆三分生薑一兩半㕮咀水四升煮至一升半去滓通口服一盞食久再服溫覆取小汗琥按上龐氏所云則是婦人亦有房勞而病復者此補千金方之未備上方太溫熱猶之深師用乾薑一味治陰陽易病在投之得其宜耳又云陰陽易病者陰陽相感動其毒氣著人如換易也然女犯男得病鮮有死者男犯女得病救稍緩則十無一人得生者又若女犯男男自發勞復則女不病男犯女女自發勞復則男亦得病但略輕富貴之家雖知其事後生輕於自恣犯之多致不救田野之家濛濛昧昧只知傷寒能殺人因此病死者又十有三四皆不知其所犯之由深可傷也宜服手足甲褌灰散可灸毛際橫骨上中央曲骨一穴百壯若陰卵縮未下灸大敦二穴在足大指端去爪甲角如韭葉小炷七壯手足甲褌灰散已見前又療傷寒口乾喜唾方大棗四十枚煮去皮核烏梅肥者十個去核為末上以棗肉和為丸含化自然汁琥按仲景云大病瘥後喜唾宜理中丸以胃上有寒也上主療云口乾則非胃寒乃胃家虛而津液敗矣故用大棗之甘溫以補之烏梅之酸平以斂之朱奉議云傷寒病新瘥陰陽氣未和因合房室則令人陰腫入腹絞痛婦人則裡急腰胯連腹內痛名為陰陽易也云云宜燒褌散即仲景原方豭鼠糞湯已見前但範汪方用薤此用韭根尤妙竹皮湯乾薑湯並見前青竹茹湯內有栝蔞根即前栝蔞竹茹湯也當歸白朮湯見下可選用之活人當歸白朮湯治婦人病未平復因有所動小腹急痛腰胯疼四肢不任舉動無力熱發方白朮一分當歸一兩桂枝去皮甘草炙芍藥附子生去皮破半片人參黃耆各一分生薑半兩上銼如麻豆大以水三升煮取一升半去滓通口服一盞食頃再服一盞溫覆微汗便瘥琥按上主療云婦人病未平復當是勞復之證其名陰易者誤也上方乃溫甘辛熱大補氣血之劑又陽虛畏寒者宜用陰虛發熱者審用之劉河間云汗下後勞復柴胡飲子見前第七卷少陽篇中飲酒復劇黃連解毒湯見前第十卷厥陰篇中或雙解散加黃連見前第五卷太陽篇中在裡者三乙承氣湯見前第六卷陽明篇中在表者益元散即天水散亦見前太陽篇中或雙解散半表半裡大小柴胡湯即仲景原方涼膈散亦見前陽明篇中解毒湯隨證用之食復三乙承氣湯琥按上劉氏用藥各有所宜有如少陽勞復宜小柴胡湯食復宜大柴胡湯虛而食復者宜柴胡飲子飲酒復三焦皆熱者宜黃連解毒湯陽明食復大熱大實者宜涼膈散三乙承氣湯勞復陽明氣分大熱者宜益元散至若雙解散藥味雜亂徒傷元氣非瘥後復病所宜用也王海藏治一人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也王診之曰勞心之所致神之所舍未復其初而又勞傷其神營衛失度當補其子益其脾解其勞庶幾得愈授以補脾湯佐以小柴胡湯而解云云全文已見前第一卷手經篇中上論出名醫類案準繩云學士許叔微記不知何考補脾湯治傷寒得汗瘥後脾胃傷冷物胸膈不快及尋常血氣不和者人參白朮甘草橘皮去白青皮去瓤乾薑各等分上為末每服三錢水一盞煎數沸熱服入鹽點亦得琥按上方乃溫補中氣之劑其用青皮者瀉木所以扶土木為土之賊也海藏又云大抵勞者動也動非一種有內外血氣之異焉若勞乎氣無力與精神者法宜微舉之若勞乎血與筋骨者以四物之類補之若勞在脾內為中州調中可已此為有形病也但見外證則謂之復病非為勞也如再感風寒是已琥按上論云云以病後內傷為勞外感為復此發仲景未發之旨又其治有形病以四物湯之類其治無形病有微舉法又調中之法未及論方愚意云大約是東垣補中益氣之類耳方不盡録全在醫者以意取之云岐子云大病瘥後真氣未全強行房事勞損督任二經故少腹裡急或引陰中急痛拘急熱氣上衝胸頭重不能舉目中生花脛拘急兩足蹻脈督任四經病可易取男子婦人褌燒之服名燒褌散琥按上論當是男女勞復證亦取褌燒散者乃相假而合治之法也琥又按陰陽易病仲景不言何經茲云督任受傷陰陽蹻脈四經合病可謂暢發病情又易老用燒褌散分寒熱而治病在三陰煎附子四逆等湯調下如有熱者以鼠屎竹茹湯之類送下可見古方亦不可執也張兼善云假如婦人病新瘥未平復而男子與之交因感外邪而卒病實非餘邪相染醫見病速謂之陰易於法何以別乎夫易病者有上條所見之證存焉其與外所感豈相侔哉設若風寒外傷當有表證安有少腹裡急引陰中拘攣者乎或又云假如男子病新瘥未平復強合陰陽而自病仍小腹裡急引陰中拘攣證同易病求其理何故不染易他人而自復未審其證治可同何法也病雖自復理與易同亦用燒褌散以誘安其正氣夫易病之為合陰陽感動餘邪而其人正氣本虛故能染著不然安得受其邪哉今病自復緣正氣尚虛而餘邪因動悉非外感故與易同亦用燒褌散以安正氣正氣安餘邪自平矣琥按上張氏論反覆圓活可謂發仲景之未發要之既病易復挾外感者未必無之此亦不可執也琥又按仲景止言陰陽易而千金復增女勞復證昔賢相傳陰陽易猶可生若女勞復必死者何也愚以復病由病後正氣大虛餘邪不能傳易於人因而自病則多死以其人不堪再病故也易病由病人正氣稍復不病之人正氣反虛餘邪遂至傳易因而忽病然猶可生以其人病尚初發也倘兩人正氣皆不虛雖合陰陽復者不復易者亦不易矣兩人正氣皆虛強合陰陽復者自復易者自易有同時而病者矣巢氏病源云易者陰陽相感動其毒度著如人之換易也若二男二女並不相易愚又以二女或不能易若二男亦有強相合者焉知其不易也古人著書言不盡意全在後學以意會之琥又按燒褌散一方海藏云若果得陰脈各隨三陰經用四逆等湯調送下此熱因寒用也吳仁齋以竹皮湯合主之此寒因熱用也婁全善煎人參湯調服此虛者補之也信哉用藥炎不可執也醫林雲離經脈見多主死太過曰至一呼三至曰至不及曰損一呼一至曰損二脈惟陰陽易病有之琥按脈一呼三至由可不死餘脈皆死琥總按傷寒陰陽易並瘥後病仲景止引其端至諸家方論各有變通是皆彼此祖述互相發明者也至於瘥後病愚曾細閲病源千金外臺等書證非一候治亦多方茲不能盡採附焉
