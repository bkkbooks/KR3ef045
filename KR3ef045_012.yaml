body:
  text: 卷之十二辯誤汗吐下火灸溫針逆病脈證並治法此係仲景原文散見太陽少陽少陰等篇今集於此太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之中去聲成注云太陽病三日中曾經發汗吐下溫針虛其正氣病仍不解者謂之壞病言治不對證為醫所壞也桂枝不中與者以其初本系太陽中風乃桂枝湯證至此則其病已壞桂枝湯不中與也更當審其脈證知犯何逆隨其逆而救之愚按此條論仲景無救逆之法補亡論亦不言及惟準繩云逆者謂汗下皆不順於理也隨證治之者即仲景原論中雲汗後病不解及發汗若下之病仍不解某湯主之類是也後條辯又云有如汗後亡陽動經渴躁譫語下後虛煩結胸痞氣吐後內煩腹脹滿溫針後吐衄驚狂之類變證多端治非一法仲景恐人以桂枝湯證誤治仍執定一桂枝湯故令醫人舍湯辯脈另尋一看證之活法耳學者須以意會之太陽病二日反躁反熨其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及不多大便已頭卓然而痛其人足心必熱穀氣下流故也此為欲解也也字當在故字之下太陽病止二日邪猶在表不當躁而反躁者此必是大青龍湯證故無汗成注云躁者熱氣行於里也醫人不知反用火熨其背強發其汗使之大出火熱之邪因而入胃胃中之水告竭陰不勝陽其發躁煩譫語之證必矣至十餘日正氣漸復陰與陽爭故作振戰悚慄之候自下利者火邪由大腸而得泄此為欲自解也其有不自解者必在前所熨之汗從腰以下未出成注云此為津液虛不得下通故欲小便並不得也津液既虛火邪上逆其勢不惟躁煩而反增嘔欲失溲者此是形容不得小便之狀足下惡風者腰以下無汗風邪猶鬱於下部故惡風也大便硬者胃中水竭之故此非津液偏滲故小便當數而反不數及不多也凡此者實由大便硬不自下利皆未解證也法宜用藥以通其大便大便已則火邪自泄陰氣得復而上升頭必卓然而反空痛陽氣得伸而下降足不惡風而其心必熱此是穀氣下流故也穀氣者食氣也食氣下流則胃中輸轉火邪皆去而病即愈按此條論仲景無治法補亡論常器之云可與白虎加人參湯五苓散調胃承氣湯郭白雲云推常氏之意謂火氣入胃胃中枯燥故用白虎加人參湯解之然須無表證渴飲水者可服小便不利者固當用五苓散然亦必渴飲水者宜服其大便硬者用調胃承氣湯亦必小便不利譫語仍在者然後可服又云此條論於諸證未生時必須先去火邪宜救逆湯愚以人參白虎湯猶可用五苓散斷不可用此係胃中水竭津液燥故欲小便不得非小便不行也大便硬雖小便不數亦系火熱燥證其用調胃承氣湯不若以麻仁丸代之至於救逆湯與上條證不合不必用也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治太陽中風此必是桂枝湯證醫人誤以火劫強發其汗邪風加以火熱以致血氣流溢失其常行之度風陽也火亦陽也兩陽相熏灼邪熱搏於外則肌肉受傷脾主肌肉而屬土故身發黃邪熱搏於陽明之經為陽盛陽盛則火升故欲衄邪熱搏於太陽之府為陰虛陰虛則水涸故小便難水火者人身之陰陽實則氣與血也偏勝者勢必至於交病故云陰陽俱虛竭也陰陽俱虛則前之流溢者至此而衰耗身體焉得不枯燥也成注云三陽經絡至頸三陰至胸中而還劑分也但頭汗出劑頸而還者邪熱炎上搏陽而不搏於陰也腹滿微喘者邪熱內郁也口乾咽爛者邪熱上熏也或不大便者邪熱耗其津液也久則胃中燥熱必發譫語甚者至噦則邪熱氣逆為病更深矣四肢者諸陽之本邪熱亢盛則手足擾亂甚至捻衣而摸床矣後條辯云以上諸證無非邪風火熱逆亂其氣血一至於此乃真陰立亡之象此際欲治風則火勢蒸騰欲治火則風勢壅遏惟有利小便一法使小便利庶幾火邪得泄津液得通其人病猶可治也諸家注皆言小便自利夫上文既云小便難豈有病劇而反自利之理必須用藥以探之其人小便利猶為可治之證如其不利雖治之恐無效矣此實仲景言外之意按此條論仲景無治法愚意云但當利其小便宜豬苓湯初亡論云與五苓散恐太燥津液不宜用也又云救逆可桂枝去芍藥加蜀漆牡蠣龍骨湯亦非對證之藥又云發黃者宜茵陳蒿湯愚以此非胃實有瘀濕乃干黃也上藥非所宜用又云不大便宜大承氣湯愚以此非胃實譫語乃燥熱神志昏亂故手足為之躁擾也上藥更非所宜但當從小便中導去其熱而諸證悉平傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮者是傷寒見風脈也風脈既見其為表虛可知醫人誤以火迫劫之汗乃大出而亡其陽成注云汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安湯名救逆者以驚狂不安皆逆證也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬龍骨四兩大棗十二枚擘蜀漆三兩洗去腥上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升成注云與桂枝湯以解未盡之表邪去芍藥以芍藥益陰非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也琥按成注猶未盡仲景制方之義夫亡陽者汗必多汗為血液何不用芍藥以和營以方中已有牡蠣之鹹寒龍骨之收澀而芍藥可不用也且也牡蠣龍骨兼能勝火熱之氣而鎮驚狂其加蜀漆者必病人素有痰熱結於胸膈至此復挾火邪錯逆故用蜀漆之辛以散之也否則亡陽證而用此暴悍之劑大非所宜又桂枝湯中生薑一味亦太辛散雖有寒邪宜稍減用之形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈愚疑以發熱二字當在渴字之前形作傷寒言病人之形似太陽傷寒頭項強痛惡寒而無汗矣及診其脈不弦緊而反弱弱者風脈也風為陽其人必發熱而渴誤被火劫汗雖不出風火相合熱搏於胃胃中躁煩必至譫語然此譫語者非胃實不可下也還診其脈而弱中帶浮邪乃在表解之之法當用藥使汗出而愈按此條論仲景無治法補亡論輒用救逆湯誤矣愚意云宜大青龍湯更加涼藥主之太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪清同圊廁也成注云此為火邪迫血而下行者也太陽病本無汗此麻黃湯證也醫人誤以火熏迫之究不得汗則熱無從出火邪入胃以故發躁而不寧也寒傷營而汗又為血液到經不解者太陽到六七日為傳經已盡邪仍不解則胃中所鬱火熱之邪將迫血下行而如圊矣此名為火邪者是申明圊血之故實由火邪所迫而然也按此條論仲景無治法補亡論常器之云可依前救逆湯黃芩芍藥湯愚以黃芩芍藥湯庶幾猶可救逆湯還宜加減用之脈浮熱甚反灸之此為實實以虛治因而火動必咽燥唾血成注云此火邪迫血而上行者也脈浮熱甚乃風邪盛於表此為表實灸法多補病惟虛寒者宜之今者表有風熱而反灸是以實作虛治也邪因火動內搏於胃故咽燥而唾血此條論仲景無治法補亡論常器之云可依前救逆湯誤矣愚意云宜犀角地黃湯微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈微而數此必是風寒之後陰虛而熱未除也虛寒可灸虛熱慎不可灸若反灸之則熱因火入相搏為邪上攻則為煩為逆且陰本虛也更追以火使虛者愈虛熱本實也更逐以火使實者愈實陰主營血而行於脈中當追逐之餘脈中已無血聚故曰散也艾火之氣雖微其內攻之力能焦骨傷筋所以然者蓋由血散而難復故也此條論仲景無治法補亡論常器之云可依前救逆湯其有汗者宜桂枝柴胡湯愚以二湯俱與病未合另宜斟酌用藥脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮者邪居於表故宜以汗解之醫人誤以火灸之邪因火迫無外出之路而愈盛邪盛則病從腰以下必重而痹何也蓋汗者濕熱之氣也今者邪因火迫汗不出而熱甚劇則濕氣下流而成痹矣此名火逆者言此亦由火氣所逆而使然也此條論仲景無治法補亡論郭白雲云宜少與救逆湯愚意云雖宜救逆亦宜兼痹治之欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也此承上文脈浮而言成注云煩熱也邪氣還表則為煩熱汗出而解以脈浮故為邪還表也愚按此條是言未灸之先有不用藥汗自出而解者則知上條病為汗已將出用火遏其出路故致濕熱之氣下流而成重痹之候又按補亡論以此條與上條合為一條甚通燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩病至用燒針發汗此必是太陽傷寒證也仲景法宜用麻黃湯以汗之今醫誤用燒針以令其汗太陽初得病為寒氣在表故其寒邪即從針孔處反入於裡在外則肉腫起如核而色赤在內必發奔豚其氣從少腹直上衝心也蓋太陽為寒水之經腎即為寒水之藏臟腑相合經病用針故引寒邪之氣內入於藏也成注云先灸核上以散其寒與桂枝加桂湯以泄奔豚之氣桂枝湯已見前第三卷太陽上篇更加桂二兩金匱方共成五兩琥按桂枝湯雖系解肌之劑今者寒邪之氣內入腎藏而上衝於心此水來犯火之證條辯議所加者當是桂而非枝此深合仲景之旨或問傷寒本系熱病復加燒針則上衝之氣宜從火治議者不當加桂余答云子言甚合鄙意然此證須知是太陽病未發熱之時誤用燒針開泄腠理以引寒氣入藏故與中寒同治若內有鬱熱則必見煩躁等證矣設見煩躁等證理宜從子言以活法治之又按成注云燒針發汗則內損陰血而驚動心氣愚意以若損陰血而驚動心氣是為陽盛陰虛非寒證比矣此與仲景加桂之意不合誤極誤極火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之火逆下之者此必是太陽病誤以火熨其背或以火劫其汗病人更加譫語腹滿起臥不安等證醫認以為裡實而下之裡氣重虛又加以燒針之大熱火邪內迫則生煩躁條辯云此條病逆而又逆但未變重故與桂枝甘草龍骨牡蠣湯以散解火邪桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣二兩熬龍骨二兩上為末以水五升煮取二升半去滓溫服八合日三服成注云辛甘發散桂枝甘草之辛甘以發散經中之火邪澀可去脫龍骨牡蠣之澀以收斂浮越之正氣琥按上方即前桂枝去芍藥加蜀漆龍蠣救逆湯制小其劑而用之也火邪迫內則生煩躁故用龍骨牡蠣之鹹寒甘平以勝火熱而收斂浮越之氣蓋煩躁不比驚狂之甚而其氣亦浮越也愚以煩躁雖帶表邪不宜散以桂枝之辛熱又火逆既經下之此陰血受傷較之救逆湯宜增芍藥仲景之方不可執也太陽傷寒者加溫針必驚也太陽傷寒宜用麻黃湯以發汗醫人誤加溫針以攻其寒殊不知寒盛於外熱鬱於內針用火溫營血得之反增其熱熱氣湊心必見驚證驚者神不寧而時作聳動故也按此條論仲景無治法補亡論常器之云可依前救逆湯愚以救逆湯宜加減用之太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆太陽病當惡寒發熱今者自汗出不惡寒但發熱是轉陽明證矣及切其脈又非陽明之脈乃細數見於關上關主中焦為脾胃之分細則為虛數則為熱以醫誤吐之為過也尚論篇云吐中亦有發散之義故得自汗出不惡寒一二日太陽之邪氣尚淺吐之者胃不盡傷吐後胃虛故腹中飢胃口受傷故欲食而不能也三四日陽明之邪氣漸深吐之者胃氣全傷吐後胃虛大熱故不喜糜粥之熱欲食冷食及冷食朝食暮則吐出緣陽明之氣由吐而逆不能下行此醫誤吐之所致胃傷而脾亦受傷也成注云胃氣尚在故云小逆言此實由誤吐一時氣逆使然非關格大逆之候比也按此條論仲景無治法補亡論常器之云可與小半夏湯小治中湯亦可與半夏乾薑湯出金匱方郭白雲云活人書大小半夏加茯苓湯半夏生薑湯皆可選用愚以上方如治中湯半夏乾薑湯斷不可用蓋此證系胃中虛熱而非虛寒成氏原注云表寒傳於胃中胃中虛寒者大誤若胃中果系虛寒則不當見數脈矣以上太陽逆證共一十四條自原論中第三卷集入於此若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之按此條原論上文云本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯此承上文尚未吐下而言若已吐下發汗溫針不惟犯少陽三禁更加溫針以迫劫之成注云損耗津液胃中乾燥木邪干胃必發譫語柴胡證罷者謂無脅下硬滿乾嘔不能食往來寒熱等證也此為壞病知犯何逆以法治之謂不當尚認為少陽證小柴胡湯之外另宜以活法治之也愚按此條論仲景無救逆之法補亡論龐安時云犯何逆者犯四種溫病壞候也郭白雲云溫針譫語亦宜桂枝甘草龍骨牡蠣湯愚以上二家之言皆以臆見輕擬前聖之旨蓋仲景云知犯何逆者與太陽病壞證云云略同謂汗吐下溫針四者之治各有逆證而醫人犯之非謂四者齊犯也偶出譫語一條亦不當強劃溫針所致強執一方以治之況在當日仲景必有少陽壞病之條及救逆之方今皆亡之耳學者設遇少陽壞病只須憑證以活法治之以上少陽逆證一條自原論中第五卷集入於此少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也此條乃熱邪傳入少陰誤用火劫而致逆之證夫曰少陰病則知其脈微細而但欲寐矣醫人不知誤認以為虛寒妄加火氣劫之少陰之支脈別出肺今以火氣強劫其汗尚論篇云熱邪挾火氣上攻必為咳下攻必為利內攻必譫語此以里有伏熱外被火氣逼迫兩熱相併勢必致神亂而譫語小便必難者火氣迫其津液外泄而為汗內泄而為利水道枯澀以故小便難且腎開竅於二陰少陰水藏被火所迫以致前陰之水從後陰而並出救逆之法可無方乎按此條論仲景無治法補亡論常器之云宜桂枝去芍藥加蜀漆龍骨牡蠣救逆湯以救火逆豬苓湯五苓散以通小便愚以常氏治火逆不論何經皆用救逆湯焉能與病相合至其用豬苓湯以通小便庶幾猶可若五苓散太辛燥恐非火逆所宜以上少陰逆證一條自原論中第六卷集入於此附昔賢治逆病方論變法孫真人云病形不可攻不可灸因火為邪血散脈中傷脈尚可傷臟則劇井腧益腫黃汁出經合外爛肉腐為癰膿此為火疽醫所傷也夫脈數者不可灸因火為邪即為煩因虛逐實血走脈中火氣雖微內攻有力焦骨傷筋血難復也應在瀉心宜瀉心湯即仲景半夏瀉心湯方也見前第七卷少陽篇中琥按上論即仲景火逆證而借用仲景瀉心之法也推千金之意以心屬火火逆應在瀉心愚以原方中有芩連固為火逆所宜若乾薑一味恐太辛熱不宜用也張文仲療傷寒八九日不瘥名為敗傷寒諸藥不能消者方活人書云壞傷寒鱉甲炙蜀升麻前胡烏梅枳實炒犀角磅黃芩各二兩生地黃甘草一兩上九味切以水七升煮取二升半分五服日三服夜二服外臺云此出支太醫方琥按仲景云太陽病三日已發汗若吐若下若溫針仍不解者此為壞病少陽經病亦然此云八九日諸藥不能消則知汗吐下諸法皆誤用之而至逆矣上藥專走陽明兼入厥陰為清熱滋燥之劑龐安時總病論云火邪證謂醫以火於臥床下或周身用火迫劫汗或焚或誤灸皆屬火邪也又云論曰灸久燒針後證似火劫者並宜火劫治之證似火劫者謂驚狂煩躁之候見也又云煩躁驚及狂用六石風引湯尤良柴胡加龍骨牡蠣湯亦通用病人因火劫至十五六日身黃下利狂欲走師脈之言當下清血如豚肝乃愈後如師言何以知之師曰寸口脈陽浮而陰濡弱陽浮為風濡弱為虛浮虛受風少血發熱惡寒灑淅項強頭眩醫以火熏郁令汗出惡寒遂甚客熱因火而發怫鬱蒸於肌膚身目為黃小便微難短氣鼻中出血而復下之胃無津液利遂不止熱瘀在膀胱蓄結成積狀如豚肝當下未下必亂迷憒狂走赴水不能自制蓄血若去目明心了此皆醫所為輕者得愈極者不治琥按上論皆因火而致逆之證仲景治火逆驚狂有桂枝去芍藥加蜀漆牡蠣龍骨湯治火逆煩躁證有桂枝甘草龍骨牡蠣湯今龐氏用六石風引湯又柴胡加龍骨牡蠣湯可見證非一候方不可執此又變通乎仲景之法者也柴胡加龍骨牡蠣湯見前第七卷少陽篇中六石風引湯總論不載今採金匱方附之於後風引湯本除熱癱癇大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石英紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指撮井萃水三升煮三沸溫服一升琥按上方內有六石想即是龐氏所用湯也愚以六石中止寒水滑石石膏可用余石皆溫澀不可用得毋以本草十劑云濕可以去枯紫白石英之屬是邪蓋火逆雖系枯燥之證恐多用石藥更加乾薑桂枝等反增其燥上湯之用不可執也活人黑奴丸治時行熱病六七日未得汗脈洪大或數面赤目瞪身體大熱煩躁狂言欲走大渴甚又五六日以上不解熱在胸中口噤不能言為壞病傷寒醫所不治棄為死人或人精魂已竭心下才暖撥開其口灌藥下咽即活兼治陽毒及發斑黃芩一兩釜底煤即百草霜研入一兩大黃一兩一分或作二兩芒硝一兩灶突墨一兩研入梁上塵一兩小麥奴小麥未成熟時叢中不成麥捻之成黑勃是也無此亦得龐安時云如無即以小麥炒黑攤地上出火毒用之一兩麻黃去節泡一二沸焙乾秤三兩上件搗羅為極細末爍蜜為丸如彈子大以新汲水三合研下一丸渴者但與冷水盡足飲之須臾當寒寒竟汗出便瘥若日移五尺不汗依前法再服一丸瘥即止須微利也此藥須是病人大渴倍常躁盛者乃可與之若小渴者強與之翻為禍耳琥按上方即千金麥奴丸也本止治傷寒五六日以上不解云云為壞病活人兼治時行熱病及陽毒發斑耳愚以此方用以治火逆證煩躁驚狂渴欲飲水譫語大便秘而內外實熱者最神蓋火逆是受火之餘毒故以釜底煤灶突墨等藥以從治之也準繩載是齋方云傷寒陰陽二證不明或投藥錯誤致患人困重垂死七日以後皆可服傳者云千不失一用好人參一兩去蘆薄切水一大升於銀石器內煎至一盞以新水沉之令冷一服而盡汗不自他出只在鼻梁尖上涓涓如水是其應也妙甚蘇韜光云侍郎方丈嘗以救數十人王使君宰清流日倅車申屠行父之子婦產後病時疫一十餘日已成壞病偶見問因勸其服人參一味遂安是時未知有此方偶然暗合耳琥按上是齋方是治壞病中之誤汗吐下真氣脫而致虛者服之自神琥又按傷寒汗吐下針灸等法關係非輕今醫止知汗下而吐法與針灸之道久已不講然因汗下而致逆者亦不少諸逆之中惟火為甚以傷寒本系熱病復加以火其逆可知所以仲景當日特設救逆湯以治之其他諸逆雖有治法不云救逆也至於後賢立論亦以火逆諄諄垂訓良有以夫
