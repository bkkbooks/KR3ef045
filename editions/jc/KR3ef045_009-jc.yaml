body:
  text: 卷之九辯少陰病脈證並治法此係仲景原文少陰之為病脈微細但欲寐也此少陰病熱困極之狀也少陰者腎經也腎為水藏主寒其脈當沉今曰脈微細者與沉相類之脈也邪在三陽脈皆洪大傳入少陰則變微細者此熱邪深而脈內伏也成注云邪傳少陰則氣行於陰而不行於陽故但欲寐愚以此非真寐乃熱極而神志昏憒若欲寐然條辯謬以欲寐為靜若果靜則邪去而無病矣此與仲景立論之意大悖愚按少陰病但欲寐此僅舉病熱之端以故不及治法少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也此條少陰病非自三陽經傳來者乃少陰經自中之寒氣已深內迫於臟故見以上等證正文與注俱見中寒論中病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利此亦少陰真寒證也注見中寒論中見後例少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也此火逆證也正文與注見第十二卷救逆論中少陰病脈細沉數病為在裡不可發汗此條乃陽邪傳入少陰之證夫曰少陰病者此承首條但欲寐而申言治法之不可誤也診其脈於細沉之中帶數可見熱邪雖伏而終不可掩乃熱入於裡之徵也里指胃府而言仲景云三陰經受病已入於府者可下而已病熱在裡正當議下故云不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之此條少陰病乃寒邪直中之陰證故不可汗而並無可下之理正文與注見中寒論中少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈此條病亦寒邪直中少陰之證脈暴微為陽氣得回故為欲解可見脈微不但指陰證而言則是首條云脈微細為陽熱傳陰之證無疑矣正文與注見中寒論中少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病惡寒而踡時自煩欲去衣被者可治上二條皆真寒證正文與注見中寒論中少陰中風脈陽微陰浮者為欲愈此條言少陰中風雖不明指其證要之辯其脈可以知其證之輕矣少陰中風風為陽邪其初必自太陽經傳來者但邪在太陽脈本陽浮陰弱傳至少陰又自有微細之本脈曰微細者其脈於尺寸之間浮沉取之俱微而細乃陰陽皆微細也夫微細之脈為表邪已緩里邪深伏茲者陽脈雖不細而見微此在表之風邪已解也陰脈不微細而反浮此在裡之正氣自和也尚論篇云陽微則外邪不復內入陰浮則內邪盡從外出故為欲愈少陰病欲解時從子至寅上注已見前第三卷太陽上篇少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯此條系真寒證故宜用艾灸法正文與注見中寒論中少陰病八九日一身手足盡熱者以熱在膀胱必便血也此條乃少陰經邪熱傳入太陽府證也少陰腎經也與太陽膀胱經為表裡少陰病八九日寒邪鬱而變熱熱勢已極有不入陽明胃府而入本經之府者故云熱在膀胱也一身手足盡熱者言其熱自內達外與表熱不同膀胱為多血之經腎又開竅於二陰熱在膀胱則下焦之血受傷故從前後便而出也按此條論仲景無治法補亡論常器之云可桃仁承氣湯芍藥地黃湯愚以桃仁承氣湯仲景用以治太陽病不解熱結膀胱下焦有蓄血者此條證成注云血散下行上湯斷難借用如欲用藥還宜芍藥地黃湯郭白雲云未見方愚意云想即是芍藥地黃二味藥煎湯服也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治此條少陰病乃傳經熱證厥冷也熱深者厥亦深熱邪深入表雖發厥而無汗成注所云熱行於里者是也醫人不知不攻其里而反用麻桂等藥以強發其汗汗不得出則在內燥熱已極必擊動少陰之血而出於上竅錯經妄行故從口鼻或目中出也條辯云下厥者以少陰居下而熱深也上竭者以血妄逆而幾盡也汗與血一而已得汗固非易治得血其治尤難此為最逆之候愚按此條論仲景但云難治其非必死之證明矣補亡論常器之云可芍藥地黃湯少陰病惡寒身踡而利手足逆者不治少陰病吐利躁煩四逆者死少陰病下利止而頭眩時時自冒者死少陰病四逆惡寒而身踡脈不至不煩而躁者死以上四條皆中寒死證正文與注俱見中寒論中少陰病六七日息高者死少陰病至六七日傳經之熱已深少陰屬水水生氣成注云腎為呼吸之門息高則邪熱甚而水將涸腎虛不能納氣歸源其鼻息但呼出而聲甚高故主死也或云此亦中寒死證殊不知少陰經中寒者乃命門火衰而陽虛也陽虛則氣餒而鼻不能報息矣今云息高明系熱證無疑少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死少陰病始得之反發熱脈沉者麻黃附子細辛湯主之麻黃附子細辛湯方少陰病得之二三日麻黃附子甘草湯微發汗以二三日無證故微發汗也麻黃附子甘草湯方以上證三條方二首俱見中寒論中少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之此條少陰病雖得之二三日當是三陽經傳來者少陰之脈出絡心注胸中腎經邪熱上凌於心故發煩也第少陰病熱當但欲寐茲則不得臥者何也蓋熱微則昏沉而欲寐熱甚則反擾亂而不得臥也成注云與黃連阿膠湯以扶陰散熱或問云心中煩不得臥非少陰獨有之證何以知其為少陰病邪余答云此條少陰病必口燥舌本干而渴者否則心煩不得臥幾與陽明病無別矣學者臨證宜細診之黃連阿膠湯方黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠烊盡小冷內雞子黃擾令相得溫服七合日三服成注云陽有餘以苦除之黃芩黃連之苦以除熱陰不足以甘補之雞子黃阿膠之甘以補血酸收也泄也芍藥之酸收陰氣而泄邪熱琥按上方乃治足少陰腎水不足手少陰心火有餘火有餘者陽熱內盛也陽熱盛必以苦泄之以寒勝之故用黃連為君黃芩佐之水不足者陰血下虛也陰血虛必以甘溫補之酸平收之故以阿膠雞子黃為君白芍藥為使也且也白芍藥能斂陰益血成注反云其泄邪熱殊非善解琥又按此方凡繫好色之徒精血內虛而病邪熱者宜用之或問好色之徒復病風寒此係陰證傷寒須急投附子四逆輩猶恐未及若用上藥是以寒治陰不幾速其死邪余答云人身一陰陽耳而陰陽之根蒂皆本於腎好色之徒兩腎受傷陰虛者多陽虛者少陽虛者命門火衰也陰虛者腎中水竭也凡人入房過度則精多所遺所遺之精皆為水而屬陰況其作強之時心火先熾火熾則水流水愈流則火愈熾五內燥熱外復傷寒而病邪熱兩熱相夾腎水必枯其人發煩躁而舌黑生芒則就死矣語云傷寒偏打下虛人者正此謂也又今人有耽於淫樂精泄不止而死者世俗不云走陰而反云走陽何謬之極邪或又問云誠如吾子所言則是人病傷寒無所謂陰證矣余答云有之陰證者中寒也其病乃是陽虛陽虛之人命門火衰其平日必言語低微飲食不化四肢無力腰以下冷前陰不舉小便清白此為真氣不足復為外寒所襲表裡四末皆冷是為真陰之證然亦不全因入房所致即小兒亦有病陰證者以胃中陽氣虛不能作鬱熱故也其證詳中寒論中少陰病得之一二日口中和其背惡寒者當灸之附子湯主之附子湯方少陰病身體痛手足寒骨節痛脈沉者附子湯主之上二條證並湯方俱見中寒論中少陰病下利便膿血者桃花湯主之桃花湯方少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之上二條證並湯方俱見中寒論中少陰下利便膿血者可刺此條即上條桃花湯證愚意云可刺者當是可灸之訛正文與注並灸法俱見中寒論中少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之此條病亦真陰證正文與注並湯俱見中寒論中少陰病下利咽痛胸滿心煩者豬膚湯主之此條少陰病亦自三陽經傳來者熱邪傳入少陰少陰之經氣虛故下利其咽痛胸滿心煩者以其經之脈循喉嚨其支者從肺出絡心注胸中尚論篇云少陰邪熱充斥上下中間無所不到故也成注云與豬膚湯以調陰散熱豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服成注云豬水畜也其氣先入腎少陰客熱以豬膚解之加白蜜以潤燥除煩白粉以益氣斷利琥按上湯治少陰客熱虛燥下利之藥也豬膚甘寒白蜜甘涼白粉甘平三物皆能清熱潤燥補虛熱清則煩滿除燥潤則咽痛解虛補則利自止矣或問下利一候乃水來侮土今者少陰經有熱邪當是濕熱利何為而云有燥熱也余答云下利既多則亡陰致虛而津液去故燥咽痛心胸煩滿此是燥熱之徵無疑少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯此條少陰病亦陽邪入於陰經之證經中客熱故咽痛用甘草湯者甘以發其熱緩其痛也服湯後不瘥者與桔梗湯即於甘草湯內加桔梗以開提其邪邪散則少陰之氣自和矣甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升半去滓分溫再服成注云桔梗辛溫以散寒甘草甘平以除熱甘梗相合以調寒熱或問仲景於甘桔二湯證無所謂寒熱者成注云甘梗相合以調寒熱何也余答云少陰為寒水之藏今者熱客其經故成注又云寒熱相搏則為咽痛乃熱邪與經中之寒氣相搏故宜用甘梗相合以調和之也武陵陳亮斯云咽痛既屬熱邪何不兼用寒涼之味不知少陰病真藏氣寒得熱證猶為易治若純寒則已濱於死故雖屬熱證不敢輕用寒涼以其熱非極熱而驟用寒涼勢必變極寒之證其去死不遠矣此豬膚湯治熱痛熱利亦止用粉蜜豬膚不用苦寒兢兢防正氣之虛寒而熱證之易變為寒證同一意耳學者不可不識此意少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之此條少陰病亦系陽邪所傳入者邪熱客於經絡甚至咽傷生瘡比之上條咽痛則更劇矣不能語言聲不出者以少陰之脈入肺循喉嚨肺屬金主聲金空則鳴肺受熱邪所實故喉嚨為之窒塞也或問仲景言咽痛咽以咽物於喉何與而云語聲不出邪余答云喉與咽相附仲景言少陰病熱咽痛而喉嚨即在其中苦酒湯方半夏洗破如棗核大十四枚雞子一枚去黃內上苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑考內臺方第一味用苦酒上共三味今此方第一味半夏第二味雞子則是內上苦酒上字無著落矣宜校正之成注云辛以散之半夏之辛以發音聲甘以緩之雞子之甘以緩咽痛酸以收之苦酒之酸以斂咽瘡或問成注云熱傷於絡則經絡乾燥使咽中傷生瘡既燥熱矣何以方中猶有半夏余答云咽中生瘡乃濕熱也此證之始由三陽經有寒邪傳入少陰鬱而變熱又寒之中濕氣居多鬱熱之內豈無留濕濕熱相搏咽中生瘡語聲不出成注云燥熱者誤也故上方用半夏以去濕散邪雞子白以清熱降火苦酒之用一以斂半夏之太辛一以消瘡腫而療咽傷也此方乃清燥兼施之劑少陰病咽中痛半夏散及湯主之此條少陰病乃自太陽經傳來者風寒入於少陰之經鬱熱未甚亦作咽痛用半夏散者取辛甘發散之義也半夏散及湯方半夏洗桂枝去皮甘草炙以上各等分以上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之成注引內經曰寒淫所勝平以辛熱佐以甘苦半夏桂枝之辛以散經寒甘草之甘以緩正氣琥按上湯中用甘草當是助正氣發風邪緩咽痛成注但云緩正氣恐有遺義或問仲景半夏散云治客寒咽痛條辯獨云風熱何也余答云半夏散中有桂枝本治太陽中風藥仲景止云寒者風亦自寒中來也風寒傷太陽之表傳入少陰之裡未有不鬱而成熱者但有熱甚不甚之分耳半夏散雖非治熱之藥然以辛甘發散其風寒之邪而熱自解成注但云客寒亦未盡其義少陰病下利白通湯主之白通湯方少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生白通加豬膽汁湯方少陰病二三日不已至四五日腹痛云云至或下利或嘔者真武湯主之真武湯方加減法少陰病下利清穀裡寒外熱云云至脈不出者通脈四逆湯主之通脈四逆湯方加減法以上四條證並四湯方俱見中寒論中少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之此條少陰病乃傷寒邪在少陽傳入少陰之證四逆者四肢不和順也成注云傷寒傳至少陰則邪熱漸深故四肢逆而不溫此非寒厥之宜溫補亦非熱厥之宜寒瀉矣止宜用四逆散以解其熱而散其邪也其或咳或悸等證此裡熱之候尤當析辯加藥法不可誤也四逆散方甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服成注引內經曰熱淫於內佐以甘苦以酸收之以苦發之枳實甘草之苦甘以泄裡熱芍藥之酸以收陰氣柴胡之苦以發表熱琥按上方雖云治少陰實陽明少陽藥也內臺方議曰四逆者手足不溫也四厥者寒冷之甚也四厥為陰寒之邪四逆為傳經之邪乃陽熱已退邪氣不散將欲傳陰而未入也此只屬陽故與涼劑以治之用甘草為君以和其中而行四末以枳實為臣而行結滯以芍藥為佐而行營氣以柴胡為使而通散表裡之邪也琥按上云陽熱已退言陽經之邪熱斂而退入於裡以故外不熱而四逆仲景用四逆散者乃和解邪熱兼消裡實之劑後加減法咳者加五味子乾薑各五分並主下利成注云肺寒氣逆則咳五味子之酸收逆氣乾薑之辛散肺寒並主下利者肺與大腸為表裡上咳下利治則頗同愚意云亦有肺熱而咳者不可拘也下利亦然悸者加桂枝五分內臺方注云氣虛不能通行於心則心下築築而動悸也桂枝入心故加之愚意云亦有邪熱乘於心包而動悸者不可以氣虛例治之小便不利者加茯苓五分條辯云茯苓味淡滲而利竅故宜加之腹中痛者加附子一枚炮令拆成注云裡虛遇邪則痛加附子以補虛愚按前成注於方後云熱淫於內云云枳實甘草之苦甘以泄裡熱蓋裡熱宜泄雖腹痛未必是虛若用炮附子必致大害條辯順文作解其誤甚矣建安許氏云古金鏡方中倍加芍藥五分以其能止痛也後人改作附子此豈從治之法邪泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸七內湯中煮取一升半分溫再服成注云泄利下重者下焦氣滯也加薤白以泄氣滯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之此治少陰熱利分理之法也成注云下利不渴者裡寒也此以下利而渴知非裡寒至六七日正當熱邪傳裡之時經云足少陰之脈其直者入肺中其支者從肺出絡心注胸中下利本有水漬經中之熱與水搏結侵於肺則咳逆於胸則嘔凌於心則煩少陰之病本欲寐今者反不得眠其為熱甚而躁動明矣與豬苓湯以清降邪熱通調水道斯利止而嘔渴等候自平矣或問下利咳而嘔渴心煩不得眠焉知非少陽陽明病余答云少陽陽明若見此證為裡實其脈必弦大而長此條病脈必微細故知其為少陰下利之證無疑豬苓湯方見前第六卷陽明篇中內臺方議曰少陰下利不渴者為寒今此下利渴又咳而嘔心煩不得眠知非裡寒乃里熱者故用豬苓為君茯苓為臣輕淡之味而理虛煩行水道澤瀉為佐而泄伏水阿膠滑石為使鎮下而利水道者也琥按阿膠之用不但利水其氣平而味甘微咸上以益肺氣而清化源則咳止下以滋腎陰而除經熱則利平此成氏未悉之義學者不可不知琥又按上方乃治陽明病熱渴引飲小便不利之劑上條病亦借用之何也蓋陽明病發熱渴欲飲水小便不利者乃水熱相結而不行茲則少陰病下利咳而嘔渴心煩不得眠者亦水熱搏結而不行也病名雖異而病源則同故仲景法同用豬苓湯主之不過是清熱利水兼潤燥滋陰之義少陰病得之二三日口燥咽乾者急下之宜大承氣湯此條系邪傳少陰熱入於府之證少陰病得之二三日者非才得病二三日即口燥咽乾謂少陰口燥咽乾之病已得之二三日也少陰之脈循喉嚨挾舌本邪熱傳於經以故口燥咽乾成注云邪熱已甚腎水將干急與大承氣湯下之以全腎也湯見前第六卷陽明篇中或問大承氣湯乃下胃府實熱之藥與少陰病熱腎水乾之證無與成注云與大承氣湯急下之以全腎何也余答云仲景於論例中原云三陰經受病已入於府者可下而已則是上條少陰病乃入府證也少陰邪熱已入於府胃府實熱以故口燥咽乾用大承氣湯以泄府實而經中之邪熱自除且少陰之藏本腎屬水胃府屬土瀉土所以救水故成注云然也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此條少陰病亦熱邪入府所當急下之證少陰之藏本水經中熱極則迫其水液下流而腎燥腎愈燥則腸中之物愈堅以故下利止清水耳色純青者腎將竭而肝木反來侮之故色青也心下痛為實口乾燥為熱故與大承氣湯以下實熱之邪少陰病六七日腹脹不大便者急下之宜大承氣湯此條病雖系少陰實則陽明實熱證之顯見者也少陰邪熱傳入陽明胃府成注云陽明內熱壅甚腹滿不大便陽明病土勝腎水則干急與大承氣湯以救腎水或問少陰之邪既傳陽明而見腹脹等證何以不入陽明篇中余答云此條病實承上二條口燥咽乾之證而言以故系之為少陰病否則與陽明病實無以別矣學者宜細診之附例少陰負趺陽者為順也此條自厥陰篇移附於此愚意云少陰病可下者亦當於脈候決之少陰者兩手尺中之脈也趺陽者兩足跗上高骨間動脈也少陰主腎水趺陽主胃土茲者少陰脈弱趺陽脈強是為負於趺陽則腎水已虧胃土太旺故宜用大承氣湯以瀉土救水雖下之亦為順候也琥按趺陽脈圖經原名衝陽脈在足跗中指端上行五寸去陷谷穴三寸足陽明脈之所過也為原故一名會原診法病重者切此以決死生傷寒以胃氣為本趺陽之脈不衰知胃氣尚在病雖危猶可治也少陰病脈沉者急溫之宜四逆湯少陰病飲食入口則吐心中溫溫欲吐云云至乾嘔者不可吐也急溫之宜四逆湯上二條證並湯方俱見中寒論中少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之此條系真陰證之宜用灸法者正文與注詳中寒論中琥按以上方論乃仲景治少陰病法也少陰之經有真寒有熱病今止就少陰熱病從陽經傳來者一十七條悉為解說於前又考昔賢治少陰熱病法與仲景論稍有異旨者復為詳辯於後務使學者臨證施方略知通變云耳附昔賢治少陰病方論變法龐安時云尺寸俱沉者少陰受病也當五六日發以其經貫腎絡於肺系舌本故口燥舌乾而渴也宜大承氣湯下之補亡論常器之云未可下也更詳餘證可下則下之琥按上龐氏云云即仲景論例中語也其用大承氣湯者又即仲景云少陰病得之二三日口燥咽乾者急下之宜大承氣湯其說同也但一云五六日一云二三日若論傳經之時不止二三日矣此必是口燥咽乾之證已得之二三日故云宜急下也琥又按常器之云未可下者以脈沉故也殊不知少陰熱病可下之脈沉必沉脈中兼數疾或有力此的系可下之脈昔人言不盡意在學者以意會之而已又少陰病邪氣傳經之脈本微細邪氣入府之脈必沉實愚嘗診之最為有準云岐子云少陰經病口燥舌乾而渴者胃中實熱而有痛脈沉而疾者宜大承氣湯少陰經病口乾燥而渴自利清水心下痛胃實也脈沉而疾者宜大承氣湯少陰經病貫腎絡於肺系舌本故口乾燥而渴飲水大便難者胃實也脈沉而疾者宜大承氣湯琥按上云岐子云云即仲景少陰病所當急下之三證也仲景原論中不言脈而此獨言脈更覺詳悉海藏老人云少陰證口燥舌乾而渴脈尺寸俱沉沉疾則大承氣湯疾而無力者不可下如大熱而脈反細小不可下宜瀉心湯難知一物黃連瀉心湯此方出古本東垣書第九卷此事難知中黃連無分兩並無用水煎法易老隨證加減例附後煩者加梔子煩心煩也仲景少陰熱病有心煩一條燥者加香豉燥即口燥是也加香豉者火鬱則發之也嘔者加半夏嘔者胸有飲也加半夏以滌飲滿者加甘草滿胸滿也加生甘草引黃連一味直至滿所以泄實熱腹痛加芍藥少陰熱病有腹中痛一條仲景加炮附子者誤也今加芍藥以能和營血止腹痛脈遲加附子下焦寒加乾薑此二條與制湯本義相反今從刪大便硬者加酒浸大黃此比之大承氣為少緩耳雖下之與脈細小無害琥按上方乃海藏治少陰傳經熱證口燥舌乾而渴止因尺寸脈細小不敢用大承氣而以此湯代之者也觀乎此而知昔賢讀仲景書不輕用仲景方蓋慎之至耳今醫治傷寒但知憑證而不細察夫脈者不其大害矣夫琥又按仲景辯少陰證相傳為足經主腎今海藏反用黃連一味為瀉心湯者乃知手少陰亦有傷寒病也又云少陰渴逆者失下也陰消將盡陽逆上行使陰不納也或舌攣言語不正反昏冒與咽痛者少陰也速下之大承氣湯若陽極脈微將盡者不宜下宜瀉心湯涼膈散去硝清肺亦可難知涼膈去硝散方此方本治上焦熱甚氣中之血藥也今借用之以治少陰渴逆之證山梔子仁一兩連翹黃芩薄荷各一兩半大黃半兩上為粗末每服一兩水二盞同竹葉七片煎至一盞去滓入蜜少許食後服琥按上主療云少陰渴逆腎熱也然至舌攣言語不正昏冒咽痛雖為腎熱實則陰不納陽陽熱已極逆而上行上干於心矣脈微者乃陰氣微而將盡也此為脈中無神故不可用下藥以大泄其熱止須用涼膈散又去硝以清肺蓋金為水母肺清則腎經之熱亦隨之而解矣此讀仲景書而神於通變不執死方者歟又云少陰心驚悸邪熱入陰腎水乘心是以心悸是水犯火也不當治水與火治在於木故仲景用四逆散調之此即甘草枳實柴胡芍藥四味藥也方已見前琥按上主療云治木者乃腎熱極反調其肝實則瀉其子也又仲景於四逆散方後云悸者加桂枝五分茲則專主悸而不加桂可見用藥之法不可執也琥按仲景治少陰病用大承氣湯者共三證一則口燥咽乾一則自利純青水心下痛口乾燥一則腹脹不大便乃火土過極水將涸矣故用大承氣湯瀉土即所以救水土為水之賊也然病人之脈必兩尺沉數有力者宜下之無力者不宜下也宜滋陰瀉熱玄黃膏主之新增玄黃膏方玄參生地黃各四兩大黃酒浸一兩上三味蒸一伏時合搗令相得如膏每用取兩許投百沸湯中熱絞取汁一升作一服腹脹者加厚朴枳實各五錢上方乃入手足少陰兼走陽明之藥也陰虛人及老人血少者大宜服之琥總按以上方論乃治少陰經熱病通變之法也少陰熱病所急者止一下證所難者亦止一下證耳學者苟能臨證切脈神而明之則舊論新方何一非濟人之良法哉
