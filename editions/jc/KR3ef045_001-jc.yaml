body:
  text: 卷之一辯傷寒非寒病論內經黃帝問曰今夫熱病者皆傷寒之類也岐伯對曰人之傷於寒也則為病熱熱雖甚不死黃帝又問曰人傷於寒而傳為熱何也岐伯曰夫寒甚則生熱也此可見人病傷寒皆系熱證或疑其所傷非熱要其寒氣既傳於內無有不鬱而生熱者故人之熱病雖多惟傷寒之熱其熱為最方寒之初感也捫其人之頭額肢體其肌膚烙手而熱如火及寒之深入也候其人之口鼻呼吸其出氣燻人而熱如蒸甚則面紅目赤鼻乾唇焦齒燥舌裂喜露手足裸身體渴欲飲水溺濁而赤便焦而黑凡人身表裡上下無處非熱又何有於寒哉內經中論傷寒反以熱病名篇即此意也難經云傷寒有五有中風有傷寒有濕溫有熱病有溫病凡風濕溫熱皆得謂之傷寒則知其名雖為寒其實非真寒也漢張仲景著傷寒論凡溫暑風濕瘧痢時行疫毒之氣多雜其中其意何也彼蓋以以上等證皆系熱病人患熱病多傳經故凡傳經之熱病經云皆傷寒之類也其論中所不解者三陰經真寒證不由陽經傳入並非內經所云熱病亦列於傳經熱病之中使後之學者寒熱不明陰陽錯誤其為害可勝道哉金時劉河間集傷寒標本一書只分汗下和解法置溫中之例不論其於麻桂等湯中類加知母石膏黃芩等藥更於柴胡白虎承氣等湯外複製天水散涼膈散甘露飲解毒湯等輒投以三黃三石等苦寒甘辛涼解之藥至仲景所用乾薑烏附桂心吳茱萸等湯劑並未言及此豈患病之人再無陰寒之證者邪但既曰傷寒皆是熱病當如內經中所云也自丹溪朱氏出始云仲景論傷寒矣而未及乎中寒曰傷曰中不聞有議愚今祖丹溪之意凡仲景中寒之條混於傷寒中者悉為標出另作一書名曰中寒論其餘溫暑諸病雖各因證分別要其病名皆曰傷寒何也以其病皆熱病皆傳經者也爰集古今諸名家之說附以管見為著傷寒非寒論其中間有缺略當俟後之君子起而補輯之纂注內經熱論出素問第三十一篇內經熱論一篇乃傷寒之根本也張仲景著傷寒論其六經傳變即從此篇之文而推廣之故凡治傷寒者必先究內經熱論後讀仲景傷寒庶幾學有源流心有主宰因不揣固陋為之解釋冀有志於斯道者一展卷而知所宗焉黃帝問曰今夫熱病者皆傷寒之類也傷寒本系熱病其餘如溫暑諸證亦為熱病觀難經云傷寒有五可見推此篇帝問之意以熱病莫大於傷寒故凡今諸熱病者皆傷寒之類也王太僕注竟以溫熱之病即由冬時傷寒至夏至前後所變是此熱病者其根先伏於隔年之冬有是理乎即傷寒論中雲然要與此段經旨不合更推帝於當日何不曰傷寒所變或竟曰傷寒所致而曰傷寒之類其旨當從愚注可知馬玄臺注亦不明茲不更錄或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故岐伯對曰巨陽者即太陽諸陽之屬也其脈連於風府按圖經云風府一穴在頂上入髮際一寸大筋內宛宛中乃督脈所行之穴與太陽經無涉經文中舉之者以太陽一經夾督脈而行故也故為諸陽主氣也馬注云足太陽膀胱之脈自睛明穴而始上連於督脈之風府穴從頭項至背至足凡一身手足陽經皆屬於此故穴有一百二十六真為諸陽經主氣也人之傷於寒也則為病熱熱雖甚不死此句對上其愈皆以十日以上句其兩感於寒而病者必不免於死此句對上其死皆以六七日之間句帝曰願聞其狀此問傷寒傳經病熱之狀岐伯曰傷寒一日巨陽受之傷寒之邪由表傳裡太陽為表之表所以寒邪傷表第一日太陽先受傷寒論云尺寸俱浮者太陽受病也當一二日發可見傷寒之發不可拘拘於日數矣按傷寒論以下有其脈上連風府句故頭項痛腰脊強足太陽之脈從巔入絡腦還出別下項循肩髆內挾脊抵腰中故見頭項痛腰脊強之證經文中不言熱者以太陽病有未發熱之時也二日陽明受之陽明主肉陽明為表之中故太陽之邪不解第二日當傳入陽明也傷寒論云陽明受病當二三日發其後諸經皆兼二日而言其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也身熱目疼鼻乾非病熱而何六經經脈之行詳後圖中三日少陽受之少陽主膽少陽為表之裡故其傳又次之其脈循脅絡於耳故胸脅痛而耳聾詳此亦病熱之狀三陽經絡皆受其病而未入於藏者故可汗而已按藏字傷寒論作府字大妙後全元起楊上善皆宗之李東垣云此非五臟之臟乃藏物之藏不改作府亦通馬注云此即指後三陰經以三陰屬五臟故以藏字言此論欠通成無己注傷寒論云三陽受邪為病在表法當汗解然三陽亦有便入府者入府則宜下故云未入於府者可汗而已已止也言病熱之勢衰也四日太陰受之太陰為里之表其有失於汗而邪不已者當自少陽而傳入於太陰經也太陰脈布胃中絡於嗌故腹滿而嗌乾成注云脾經壅而成熱也五日少陰受之少陰為里之中少陰脈貫腎絡於肺系舌本故口燥舌乾而渴成注云邪傳入里熱氣漸深也六日厥陰受之厥陰為里之裡厥陰脈循陰器而絡於肝故煩滿而囊縮病愈深而熱愈極誰謂傷寒為寒證乎按傷寒論以下有此三經皆受病已入於府者可下而已三句成注云三陰在經者猶宜汗故云已入於腑者可下而已也三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣當其時也陰陽六經皆病臟腑受熱已深宜用下藥以泄其熱如初時失於汗者急宜汗下兼施方免於死有如當汗不汗當下不下經絡之邪未解胃府之實未去則營衛之陰陽不行五臟之氣血不通必不免於死所謂其死皆以六七日之間者此也其不兩感於寒者此承上文而言循經傳入之證初非兩感於寒要其病熱已極其治稍疏亦不能免於死今則以其不兩感於寒而病熱輕者言之七日巨陽病衰頭痛少愈此言初時巨陽所感之邪或熱不甚不傳入於諸經即或熱甚漸傳入於諸經要其未盡傳者尚在巨陽至第七日比之初時之病其熱必衰而頭痛等證則少愈焉下諸經病衰注仿此八日陽明病衰身熱少愈愈字傷寒論改作歇字九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏少陰脈絡於肺嚏者肺熱得泄陰陽和暢也十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣大氣謂大熱之邪氣至十二日以後則皆去而病已所謂其愈皆在十日以上者此也所謂熱雖甚不死者亦此也帝曰治之奈何此因上文有死於失治者故問治之之法也岐伯曰治之各通其藏脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已此言治之之法也大抵三日以前邪必在表故云可汗三日以後邪多入里故云可泄此正所以各通其臟腑之經脈而衰已其病熱之勢也愚按傷寒汗下之法不可拘於日數王注云日數雖多但有表證脈大浮數猶宜發汗日數雖少即有里證脈沉細數便當下之治傷寒者須審辯脈證方得無誤此篇中文凡言日數皆不可拘也帝曰熱病已愈時有所遺者何也謂熱未盡去尚有遺留於臟腑間也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏所藏者即所遺之熱也因其穀氣相薄兩熱相合故有所遺也兩熱者謂所藏之熱與新入穀氣之熱相侵薄故相交合也帝曰善治遺奈何岐伯曰視其虛實調其逆從逆者正治謂以寒治熱也從者反治謂以熱治熱也可使必已矣帝曰病熱當何禁之岐伯曰病熱少愈食肉則復謂熱病復發如故多食則遺謂初時熱病不能盡去蓋病遺熱輕而病復熱重也此其禁也帝曰其病兩感於寒者其脈應與其病形何如脈應者謂三陰三陽經脈之應也岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛巨陽口乾而煩滿少陰按傷寒論云口乾煩滿而渴二日則陽明與太陰俱病則腹滿太陰身熱陽明不欲食太陰譫言陽明三日則少陽與厥陰俱病則耳聾少陽囊縮而厥厥陰水漿不入不知人六日死此則其陰陽經脈之相應表裡俱病之互形有如此帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也此承上文帝疑兩感傷寒非若單傳之病其死必待六七日之間而伯言三日之時病人臟腑營衛亢熱已極此時宜即死矣如是之後必又三日乃死者何也岐伯曰陽明者十二經脈之長也其氣血盛故不知人三日其氣乃盡故死矣陽明為十二經之長以上諸經之氣血盛則諸經之病熱亦甚熱甚故不知人方其初病三日之時諸經之邪熱雖甚而陽明之元氣未盡故不即死又三日則陽明之元氣盡不能勝諸經之邪熱故云必不免於死耳凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止凡熱病因時變遷冬為寒春為溫夏為暑秋為瘧各因時氣所傷分立病名上言病傷寒而成溫者謂熱病發於冬則為傷寒如發於夏至以前三春之時時令已溫故成溫病如過夏至以後時令大熱故成暑病總之為溫為暑各有時也暑病多汗勿止汗者謂不可遽用實表之藥以止其汗亦不可反用發表之藥以泄其汗乃清暑解肌之法也治暑法另具暑門治溫法見後第十三卷論中圖注內經足陰陽六經之脈出靈樞第十篇欲讀仲景傷寒又須識內經經脈不識經脈則六經篇傳變之病無由而起悟也所以朱奉議著活人書其第一卷先言足六經脈惜乎手之六經並未言及愚今以足經圖注於前從俗論也復以手經圖注於後衍經義也先軒岐而後仲景則知仲景立論悉本於內經云爾膀胱足太陽之脈起於目內眥上額交巔目之內角為內眥一名大眥髮際前為額巔頂也其支者從巔至耳上角支者如木之有枝經絡發揮云支別此言脈之旁行者與正經相別也耳上角為足少陽經所行之地此太陽之支脈交於少陽之經脈也其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱別字疑有誤此言脈之直行者乃太陽之正經也絡繞也猶兜也還復也循巡也又依也沿也挾夾抵至屬連屬也腦者頭中之髓腦外之後為項肩後成片大骨謂之肩髆椎骨為脊尻上橫骨為腰挾脊為膂蓋足太陽正經直行之脈亦從巔內入絡於腦復出下項卻循肩髆內挾脊兩旁下行至腰中復入循膂內絡兩腎下而連屬於膀胱也其支者從腰中下挾脊貫臀入膕中臀尻旁大肉也膝後曲處為膕此其支脈之別行者即接上直行之經而下行者也蓋上直行之經從腰中內入循膂而絡於腎此支脈即從腰中接行下挾脊貫臀而入於膕中也其支者從髆內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側胛音甲發揮中改作胂音申膂內曰胂夾脊肉也髀股也一云股外為髀髀之上捷骨之下曰髀樞廉隅也邊也後廉猶言後邊也踹腨同一名腓腸下腿肚也足跗後兩旁圓骨曰踝外曰外踝京骨本經穴名此又言足太陽一大支之脈與直行之經左右相夾而別行者也其脈亦從肩髆內左右別行下貫胂挾脊內下歷尻臀過髀樞循髀外後廉髀樞之裡下而與前支脈之入膕中者相合復下行貫入腨內復出外踝之後循京骨穴至足小指外側之端以交於足少陰經也經穴分寸詳見銅人資生針灸等書茲不細述以後諸經仿此此係腎膀俞穴因其正經必由腰中而入自內而連絡腎與膀胱故圖與經文顛倒實則兩腎在腰以上而膀胱又居於小腹之前也琥按足太陽之脈上下左右分行共十道其脈之起自目內眥上額交於巔上者二道此為正經猶樹之有根也其直行者從巔入絡腦還出下項挾脊抵腰中者二道此亦為正經猶樹之有本也其別行者從正經之巔至耳上角者二道此為第一小支又從腰中接正經而下行貫臀入膕者二道此為第二大支又從正經之髆內別下貫胂挾脊過髀下合入膕之支脈復下貫腨出外踝之後至小指外側者二道此為第三大支猶樹之有枝也以上皆太陽所行之脈然其支脈之接合正經而至足者即為正經之脈也前熱論中止云頭項痛腰脊強此但言正經之脈從頭下項挾脊抵腰故也愚謂太陽受病凡所過之經皆當疼痛不利此為驗證要法胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱之字疑誤頞鼻梁也一名山根承漿任脈穴名在唇下陷中卻退也頷中為頤腮下是也又腮下骨為下廉大迎頰車本經穴名客主人足少陽經穴名髮際囟門以前也髮際前為額顱此言足陽明之脈起於鼻之兩旁左右相交於頞中過足太陽經睛明穴之分故云旁約太陽之脈下循鼻外入上齒中還出挾兩口吻環繞唇下左右相交於承漿穴退循頤後下廉出本經之大迎穴循兩頰車上耳前過足少陽之客主人穴更上而循髮際至額顱之前也其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾人迎缺盆本經穴名此言支脈之別行者即接前大迎穴前之脈下人迎而行循喉嚨兩旁入缺盆穴中下膈內當上脘中脘之分屬於胃而絡於脾也其直者從缺盆下乳內廉下挾臍入氣街中氣街本經穴名一名氣衝此言經脈之直行者從缺盆穴接上支脈下行由兩乳之內挾臍而入於氣街穴中乃陽明正經之脈也其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間胃口下發揮中作胃下口內間內字當作外股內為髀髀前膝上起肉處為伏兔伏兔後交紋處為髀關膝蓋為臏足莖骨為脛跗足面也此又其支脈之從內而達外者由屬胃處起胃下口循腹之裡下至氣街中出而與前支脈之入氣街者相合復下行而至髀關伏兔膝臏脛外足跗等處入中指外間至足大指次指之端而終也其支者下廉三寸而別下入中指外間下廉本經穴名一名下巨虛此言支脈之小者由下廉穴三寸之下別行循脛踝之外下入中指外間而與前之支脈相合也滑氏注下廉云自膝下三寸循三里穴之外別行而下者非馬玄臺靈樞注從之其誤甚矣其支者別跗上入大指間出其端此又言其支脈之小者從足跗上別行入大指間循大指之下出其端以交於足太陰經也琥按足陽明之脈上下左右分行共十二道其脈之起自鼻交頞云云出大迎還上至額顱者二道其脈屈曲而行此為正經乃脈之根也其別行者從大迎前下人迎云云入缺盆而內連胃與脾者二道此由外而入內之第一大支脈是雖支脈其上下實接正經而行者也其直行者從缺盆云云下入氣街中者二道此為正經乃脈之本也又其別行者起於胃下口下合氣街而行於外復下而入中指內當作外間者二道此由內而發外之第二大支脈乃脈之枝也又其支者從大支之下廉穴三寸而別亦入於中指外間者二道又其支者別跗上出大指端者二道此又二小支脈也前熱論中雲身熱目疼鼻乾不得臥此亦僅言其略愚謂凡陽明所過之經皆當受病前云目疼者當是繞目作痛非目中疼也蓋陽明經絡於目滑氏以絡字作繞字解愚意以陽明經起於鼻旁約太陽之脈繞目而上下行故云絡於目也凡經中字義當活看膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆目銳眥目外角也一名小眥此言足少陽之脈起於目外眥上抵頭角折下而行於耳後復自耳後折外上行至兩眉頭及目內眥之分復自眉目之分上行側頭部下折而循於頸過手少陽經天牖穴之分故云行手少陽之前至肩上循肩非本經穴名手足少陽陽維之會故云卻交出手少陽之後下肩而入於缺盆穴之外與前陽明脈之入缺盆者實相近而不相合也按起於目云云至循頸發揮中雲自瞳子髎至風池凡二十穴作三折而行學者細考銅人等書側頭部其經自明其支者從耳後入耳中出走耳前至目銳眥後此其一小支脈之行於頭者其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中䪼目下也手少陽脈下頰至䪼故云合手少陽於䪼胸中當兩乳之間膈膜也居心肺之下脅腋下也曲骨兩旁為毛際捷骨之下為髀厭即髀樞中也此又其一大支脈從目銳眥別行下而與前脈之入缺盆者相合入內而連絡肝膽復出氣街而下入髀厭中也其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間脅之上際為腋脅下小肋為季脅俗名軟肋是也髀之外為髀陽輔骨膝下內外側大骨也外髁上尖骨曰絕骨足面為跗小指次指即無名指足之第四指也此言其直行之經脈即從前入缺盆之脈而起下行而與前支脈之入髀厭者相合復下行而入於足小指次指之間也其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛足大指本節後為岐骨爪甲後為三毛此又其一小支脈之行於足者其脈從跗上別行循岐骨出大指之端還貫入爪甲之後以交於足厥陰經也琥按足少陽之脈上下左右分行共十道其脈之起自目外眥上抵頭角云云循頸至肩上而下入於缺盆穴之外者二道此其脈行之最屈曲者乃脈之根也其別行者從耳後入耳中云云至目銳眥後者二道此為第一小支又其別行者從目銳眥下大迎云云合缺盆而下胸貫膈內連肝膽復出氣街云云入髀厭中者又二道此為第二大支是雖支脈實接正經而並行者也其直行者從缺盆下腋云云下合髀厭中云云復下而入小指次指之間者二道此為正經乃脈之本也又其支者從跗上別行入大指間云云貫爪甲出三毛者又二道此為第三小支之脈也前熱論中雲胸脅痛而耳聾此亦僅言其略醫者當以意會之脾足太陰之脈起於大指之端循指內側白肉際過木𠅆骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃考此處當有其支者三字上膈挾咽連舌本散舌下木𠅆骨一作核骨足大指本節後內側圓骨馬注承滑氏之誤云是孤拐骨謬矣蓋孤拐即是踝骨下文又云上內踝前廉豈有重出之理踝骨注見前骨在內為內踝腨內脛骨注並見前髀內為股大腿是也臍上為腹咽所以咽物者居喉之前舌本舌根也此言足太陰之脈起於足大指之端循大指內側白肉際過大指本節內側核骨之後上內踝前廉復上腨內過三陰交本經穴名足太陰厥陰少陰之交會正當足脛骨之內側腿肚之下故云循脛骨之後上行而交出於足厥陰之前也復自脛骨之上而行循膝股內前廉迤邐入腹上行至本經之腹哀穴內行以屬脾絡胃也蓋足之三陰其正經之脈止從足走腹下文云上膈挾咽至舌者乃支脈也愚今考正其支者復自腹哀穴上膈至乳外上側之周榮穴由周榮穴外曲折向下至大包穴皆本經穴名復自大包而內發揮中作外誤曲折向上行人迎之裡挾咽連舌本散舌下而終也其支者復從胃別上膈注心中此又其支脈之行復從絡胃處別正經而上膈內注於心之分以交於手少陰經也滑氏注云由腹哀穴別行再從胃部上膈者非琥按足太陰之脈上下左右分行共六道其脈之起自足大指之端云云入腹屈曲上行至腹哀穴內行而屬脾絡胃者二道此為正經乃脈之本也其支者由腹哀穴接正經而上行至膈云云散舌下者又二道此其二大支脈也內經中系缺文諸家亦無明注遂混入正經之中又其支者復從胃別上膈注心中者二道此其二小支脈也前熱論中雲腹滿而嗌乾此亦僅舉其病熱之略耳腎足少陰之脈起於小指之下邪趨足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱趨走也跟足跟也然谷本經穴名此言足少陰經之脈起足小指之下斜走足心之湧泉穴轉出足內踝前至本經然谷穴之下循內踝後別入足跟中按別入跟中活人書竟作別行之一小支脈者非還上而循內踝上出腨膕之內再上股內後廉貫脊會督脈之長強穴還出於前循橫骨穴而上至肓俞之所皆本經穴名內行而分屬兩腎更下臍過任脈之關元中極二穴而絡於膀胱也其直者從腎上貫肝膈入肺中循喉嚨挾舌本此言其直行之脈從肓俞穴屬腎處上行歷諸穴至本經之通谷穴入內貫肝與膈更入肺中再上而循喉嚨並足陽明經之人迎穴挾舌本而終也其支者從肺出絡心注胸中按心字當作心包若系真心藏肺之內烏得云出絡也此其支脈之行即從入肺處出絡心包注於膻中正當心胸之間以交於手厥陰經也琥按足少陰之脈上下左右分行共六道其脈之起自足小指之下云云別入足跟云云上股內後廉貫脊還前而出於橫骨穴上至肓俞內入而屬腎還下臍而絡膀胱者二道此為正經乃脈之本也然其行多淺深屈曲之處活人書以入跟中者為另一支別之脈亦以其屈曲故也其直者由屬腎處接正經而上貫肝膈云云終於舌本者又二道此亦正經之脈也其支者從肺出絡心注胸中者又二道此其內行之小支脈也前熱論中雲口燥舌乾而渴此亦僅言其病之略耳又按少陰之脈上挾舌本而終內經云口燥者此因舌本病熱而干極故並口亦燥也肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔愚按上貫膈以下文當是另一大支之脈蓋足之三陰從足上走入腹其與督脈會於巔者此借諸陽經之氣其支脈始得上升於巔也故屬肝絡膽句下當增其支者三字又叢字當作聚肋字當作腋聚毛足大指後橫紋處陰器即前陰也男女通稱為器臍下為小腹目內深處為系頏顙咽顙也此言足厥陰之脈起於足大指後橫紋處上循跗抵本經之中封穴以其穴遠內踝前一寸故云去也上踝過足太陰經三陰交穴至中都本經穴名在內踝上七寸䯒骨中復上一寸故云八寸交出太陰之後上循膕與股內入陰毛中左右相交環繞陰器至小腹而上會任脈之中極關元諸穴復外而上循季肋端之章門穴復上而至期門之所俱本經穴名直兩乳下內行而挾胃屬肝還下而絡於膽也其支者復自期門穴而上貫膈橫布脅復上腋此借足少陽之氣也復上循喉嚨之後此藉手足陽明又手太陽與督脈之氣也復上入頏顙此又借足陽明手太陽之氣也上行於頭循足陽明之裡即借陽明之氣內行連目脈深處復上出額行足少陽之裡又借少陽之氣上交於巔與督脈相會於項中之百會穴而終也百會督脈穴名足太陽脈亦會於此此可見厥陰支脈之行必借諸陽經之氣始得上升於頭者如此其支者從目系下頰裡環唇內此言其一小支脈即從目系處下行循頰之裡而下左右交環於口唇之內也其支者復從肝別貫膈上注肺此言交經之支從期門屬肝處別上貫膈注肺中還下行至中焦之分以交於手太陰經也琥按足厥陰之脈上下左右分行共八道其脈之起自足大指聚毛之上云云過陰器至小腹循章門穴復上至期門穴之裡上而挾胃下而屬肝絡膽者二道此為正經乃脈之本也其支者自期門穴之裡上貫膈云云復上而內連目系上出額與督脈會於巔者二道此其支脈之大者也上二道支脈諸家混注入正經之中予特分出其說見前又其支之逆行者從目系處下頰裡環唇內者二道此其支脈之小者也又其支之交經者從期門屬肝之處別貫膈上注於肺者二道此由正經發出之支脈從肺而交於手太陰經者也前熱論中雲煩滿而囊縮此亦僅言其病之略耳又按熱論云煩滿而囊縮仲景傷寒論皆宗之考活人書別引經義云肝者筋之合也筋者聚於陰器而脈絡於舌本脈弗營則筋急筋急則引舌與卵故唇青舌卷而卵縮愚以病熱之人其唇色不至於青所以世俗之醫相傳診視熱病法但言舌卷卵縮或云舌卷囊縮為病熱深極之候也琥總按上內經熱病論中辯傷寒止分足六經證漢張仲景推廣內經熱病原文而著傷寒論云從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒此是正傷寒病寒氣所傷總不越足之六經所以自古迄今注傷寒者奚啻數百家其辯脈證治法亦但詳足經不及手經也試以時令言之霜降之時濕土王也以後則寒水用事矣春分以前風木王也再推其前則冬季之濕土用事矣就六經言之足太陽少陰皆水也三冬時實主之足少陽厥陰皆木也春分時實主之足陽明太陰皆土也霜降與冬季之時實主之劉草窻有云水木土三者皆不勝寒氣所傷故水遇寒則涸而冰木遇寒則葉落枝枯土遇寒則坼而不堅此所以傷寒之病在人身止水木土三臟三腑受邪其外見證亦不過足之三陰三陽或以次受邪而為傳病或傳不以次而為間病或先後相傳前病不去而為並病或二陽三陽一同受邪而為合病或陰陽臟腑表裡受邪而為兩感凡此者皆正傷寒之為病也雖然名為傷寒而風濕之氣亦在其中要之風濕所傷總於足六經證見之其他如春分以後霜降以前則暑熱燥三氣俱多其間但有非時之寒氣著人今醫通謂之傷寒然其病與冬時之正傷寒大異其傳變亦不但拘拘於足之六經也有如四月屬巳在天則暑氣用事在人則手厥陰心包絡手少陽三焦二經應之以四月天氣論之人病無傷寒矣不知天之六氣巳與亥相沖亥本北方水火極則衝動水氣而生寒所以四月時人亦不免有傷寒之病也五月屬午在天則熱氣用事在人則手少陰心手太陽小腸二經應之以五月天氣本熱人不免有傷寒之病者午衝子水而生寒也六月屬未在天則濕氣用事濕本地氣土中有水為熱所蒸在人則脾與胃應之夫脾胃系足經無煩舉也人於六月中亦不免有傷寒者以濕土中本有寒氣故也七月屬申八月屬酉在天則燥氣用事天之六氣申酉相對而沖者寅卯木也寅申本相火主大熱之氣木火相煽故卯亦從酉而成燥在人則手太陰肺手陽明大腸二經應之以七八月天氣論之人病無傷寒矣不知燥金之氣本涼涼之中寒氣居多故人於秋時亦有傷寒病也劉草窻又云手經所屬皆金與火金與火不畏寒故金遇寒則愈堅又火體極熱寒不能襲殊不知火正畏水寒能勝熱又不知夏秋非時之暫寒終不及冬月之嚴寒其氣與暑熱並行夫暑熱同一火氣火又為金之賊若然則是春分以後霜降以前其間有非時之傷寒其熱邪所傳有連手經亦受病者故予前言云不可但拘拘於足之六經也明洛陽進士孫應奎手集醫方類選自著傷寒論云凡風寒暑濕熱燥天之六氣自外而中人五臟六腑十二經絡者四時之中皆得謂之傷寒要是言也即河間劉守真傷寒直格中所云手足經絡配天地四時之義愚以四時之中六氣傷人各不相侔其初若不由寒氣而得者皆不得謂之傷寒謂傷風自是傷風傷暑自是傷暑是也其初若由寒氣而得者皆得謂之傷寒即如夏秋熱燥之時旦晚間偶著霧露清涼之氣是也大抵傷寒一病在四時之中不分何時皆以寒為標熱為本其人病若標本皆寒者此係中寒病非傷寒病也又正傷寒止傳足經類傷寒間有傳手經者此非予一人之私說在昔賢已引其端但無分經辯證確然之論耳據前熱論中雲三陰三陽五臟六腑皆受病夫五臟六腑皆受熱所困而病極矣則是三陰三陽經者豈但言足而不言手邪前人著書每多引而不發專待後人啟悟惜乎今時之醫未有明言及手六經病者子因不得已而起闢其說非故欲欺世而盜名也歷考昔賢論傷寒兼傳手六經說河間劉氏宣明論云傷寒傳足經不傳手經內經及仲景論中未詳言耳且自人身十二經絡分布上下手足各有三陰三陽稟天地之氣天樞之上同天之陽天樞之下同地之陰至真大論云身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之注云當陰之分冷病歸之當陽之分熱病歸之有八節邪氣所中於人陽邪為病傳手經陰邪為病傳足經其邪自何而入自風池而入為脊骨兩旁一寸五分是十二經之俞穴春夏應陽秋冬應陰又云寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於涼盛於寒春夏秋冬各差其分易云水流濕火就燥太陰陽明論云陽受風氣陰受濕氣又云傷於風者上先受之傷於濕者下先受之注云陽氣炎上故受風陰氣潤下故受濕蓋同氣相合耳故風熱火為陽寒濕燥為陰熱論云熱病者傷寒之類也人之傷於寒則為病熱刺熱論云五臟俱有熱病肝熱病左頰先赤心熱病顏先赤脾熱病鼻先赤肺熱病右頰先赤腎熱病腮先赤甲乙熱論云有手足太陰熱病有手足少陰熱病有手足厥陰熱病熱論又云三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣未嘗止傳足經不傳手經云岐子保命集云傷寒三陽頭痛何法刺之答曰手之三陽足之三陽皆會於頭者謂諸陽之會其受邪伏留而不去故曰三陽頭痛視其色脈知在何經如脈浮而頭痛過在手足太陽刺腕骨京骨如脈浮而長過在手足陽明刺合骨衝陽如脈浮而弦過在手足少陽刺陽池丘墟風府風池刺頭痛之法也傷寒邪在三陰內不得交通故為腹痛手足之經皆會於腹如脈弦而腹痛過在足厥陰肝手太陰肺刺太衝太淵如脈沉而腹痛過在足少陰腎手厥陰心包刺太谿大陵如脈沉細而腹痛過在足太陰脾手少陰心刺太白神門三陰交刺腹痛之法也海藏老人此事難知云傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽終日不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳至十日以來形貌如醉人醫見神昏不已多用承氣湯下之則誤矣蓋不知此熱傳手少陰心經也本太陽經傷風謂風為陽邪陽邪傷衛陰血自燥熱蓄膀胱壬病逆傳於丙丙丁兄妹由是傳心火上迫而熏肺所以神昏也宜梔子黃芩黃連湯若脈在丙者導赤散脈在丁者瀉心湯朱奉議解云與食則咽者邪不在胃也不與則不思者以其神昏故也熱邪既不在胃誤與承氣湯下之其死必矣陶節庵瑣言云傷寒傳足不傳手經者俗醫之謬論也夫人身之氣自平旦會於膻中朝行手太陰肺經以次分布諸經所以一脈愆和則百脈皆病理固然也彼云傳足不傳手者何所據乎蓋傷寒者乃冬時感寒即病之名也冬乃坎水用事其氣嚴寒凜冽在時則足太陽少陰正司其令觸冒之者則二經受病其次則足少陽厥陰繼冬而司春令而亦受傷何也蓋風木之令起於大寒節正當十二月中至春分後方行溫令故風寒亦能傷之足陽明太陰中土也與冬時無預而亦傷之何也紫陽朱子曰土無定位無成名無專氣寄王於四季能終始萬物則四時寒熱溫涼之氣皆能傷之也況表邪傳裡必歸於脾胃而成燥糞用承氣湯以除去之胃氣和矣手之六經主於夏秋故不傷之足之六經蓋受傷之方分境界也若言傷足不傷手則可以為傳足不傳手則不可也況風寒之中人先入營衛晝夜循環無所不至豈間斷於手經哉設或不傳氣逆作喘何經而來如謂不然何仲景桂枝麻黃二湯乃心肺藥也請試思之張景岳類經注云傷寒傳變止言足經不言手經其義本出素問熱論篇中夫人之血氣運行周身流注不息豈傳遇手經而邪有不入者哉且寒之中人必先皮毛皮毛者肺之合故在外則有寒慄鼻塞等證謂不傳於肺乎其入手少陰厥陰也則有舌苔拂鬱神昏錯亂等證謂不傳於心主包絡乎其入手陽明也則有泄瀉秘結等證謂不傳於大腸乎其入手太陽也則有癃閉不化等證謂不傳於小腸乎其入手少陽也則有上下不通五官失職痞滿燥實俱全等證謂不傳於三焦乎然本經之不言手者何也蓋傷寒者表邪也欲求外證但當察於周身而周身上下脈絡惟足六經則盡之矣手經不能遍也且手經所至足經無不至者故但言足經則其左右前後陰陽諸證無不可按而得而手經亦在其中不必言矣琥總按上諸賢名論大抵人在四時之中六氣所傷則手足十二經皆受病其正傷寒則但足六經受病耳至其鬱熱流傳則手經亦在所不免若夏秋暑熱燥病其邪宜止傷手經然亦不免有傷足經者何也以其初必受風寒之氣而病故也所以今醫總謂之傷寒然分而言之在冬月既名為正傷寒則在三時當名為類傷寒也其類傷寒如手之六經或傷或傳其證每多故其經絡之起止循行交會連屬之處學者所當究心焉圖注內經手陰陽六經之脈出靈樞第十篇小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸按筋字發揮中作骨極是試以手按其處實系兩骨而無筋也臂骨盡處為腕腕下兌骨為踝即手腕外側高起圓骨是也肘手臂中節也肘之上下皆名為臂臑音儒肩髆下內側對腋處高起耎白肉也膂上兩角為肩解肩胛即肩髆注見前此言手太陽之脈起於小指端循手外側上腕出手踝中直上循臂骨下出肘內側兩骨間上循臑肉外之後廉出肩解繞肩胛此係後肩會督脈之大椎穴左右相交於兩肩之上此係前肩入缺盆向腋下內行當膻中之分絡心復從絡心處還出循胃系蓋胃系即咽也按此當在咽之下下膈行任脈之外過上中下三脘皆任脈穴名抵胃言至胃盡處正當臍上二寸之分而屬於小腸也其支者從缺盆循頸上頰至目銳眥卻入耳中此言其支脈之行從缺盆上行循頸頰等處至目外角卻行入耳中抵聽宮而終也其支者別頰上䪼抵鼻至目內眥斜絡於顴此言交經之支別從前支脈上頰之處復上䪼抵鼻至目內眥之睛明穴以交於足太陽經也發揮中無斜絡於顴四字滑氏不知交經之後其支脈之餘氣復斜行絡於兩顴而後止也琥按手太陽之脈上下左右分行共六道其脈之起自手小指外側端上行腕踝臂肘臑肉等處上肩會大椎復交肩入缺盆絡心屬小腸者二道此其正經之脈也其支者即從前入缺盆處上行循頸與頰至目外角卻行入耳中者又二道此其接正經而上行之二大支脈也又其支者從前支脈上頰之處別行上䪼抵鼻至目內眥其餘氣則左右斜絡於顴者二道此其交經之二小支脈也前熱論中雲項痛脊強雖不言手太陽經病然手太陽之脈繞肩胛會大椎蓋大椎上連於項下通乎脊又肩胛即肩髆足太陽之脈下項循肩髆可見太陽一經有手足兼病者今醫多昧而不及察也東垣云仲景用五苓散以瀉濕熱乃治太陽病從標入本之藥小腸火為本膀胱水為本寒毒之氣從標入本邪與手經相合而下至膀胱難知中以五苓散主之琥據上東垣之說則是傷寒有手太陽經病可無疑矣大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸上廉外廉前廉義同總臂外之上側也人垂兩手則陽明之經向前故又云外前廉會上二字疑有脫誤大指次指謂手之第二指名食指也合谷本經穴名髃音魚肩端骨也柱骨肩胛上際頸骨之根也此言手陽明之脈起於食指端循次指上廉出合谷兩骨之間俗名虎口是也復上入兩筋之中此即本經之陽谿穴也復上循臂骨之上廉又入肘外廉及臑之外前廉復上肩出肩端兩骨間之前廉更上出柱骨之上會於大椎復下前肩而入缺盆內絡肺臟還出循足陽明經脈下膈當天樞之分天樞足陽明經穴名挾臍旁二寸以屬於大腸腑也其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔此言其支脈之行從前入缺盆處上行於頸貫於頰入下齒縫中還出挾兩口吻相交於人中之分人中督脈穴名在鼻柱下左脈往右右脈往左上挾鼻孔兩旁以交於足陽明經也琥按手陽明之脈上下左右分行共四道其脈之起自手第二指內側端上行循指出虎口復上行循臂入肘上臑及肩出髃骨復上出天柱骨會於大椎下前肩而入缺盆絡肺循足陽明經下膈挾臍旁二寸而屬大腸者二道此其正經之脈也其支者即從前入缺盆處別上頸貫頰入下齒縫中復出挾口吻左右相交於人中復上挾鼻孔之外而終者二道此其交經之支脈也前熱論中雲身熱鼻乾不得臥身熱者身以前熱也雖不言手陽明經病然手陽明下入缺盆絡肺下膈屬大腸者其脈循足陽明經亦行於身之前又其支者上挾鼻孔則是身熱鼻乾不得臥謂非手足陽明二經兼病邪今醫但執足經以求治是亦昧而不及察也東垣答海藏問云謂如手陽明流入足陽明是上流下也本非足經病當於手經中求之是知治足經者非也琥據上東垣之說則是傷寒有手陽明經病可無疑矣三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦兩指之兩當作次三焦者滑氏發揮云上焦在心下下膈當胃上口其治在膻中中焦在胃中腕當臍上四寸不上不下其治在臍旁下焦當膀胱上口其治在臍下一寸乃水穀之道路氣之所終始也馬氏注以三焦為有形之物云右腎之下有脂膜如手大正與膀胱相對者非孫東宿著三焦評已明證其誤詳醫旨緒餘中小指次指手之第四指也手表手之外也膻中任脈穴名當兩乳之間循歷也循屬猶言歷屬也此言手少陽之脈起於手第四指端上出次指間循手外腕出臂外兩骨之間上貫肘循臑外上肩過兩肩井足少陽經穴名故云出足少陽之後入缺盆橫布於膻中之分散繞心包乃下膈當胃上口以屬上焦於中脘以屬中焦於陰交以屬下焦也陰交任脈穴名在臍下一寸考胃上口當在膈之上滑氏云下膈者誤也其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至䪼此言支脈之行從前布膻中之處上出缺盆之外上項過大椎復上挾耳後直上至耳上角折行至兩眉頭及目內眥之分屈曲下頰還上而至於䪼也其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥此言交經之一小支脈即從前支脈挾耳後處入耳中卻出走耳前過足少陽經客主人穴之前下交兩頰還上而至目銳眥以交於足少陽經也琥按手少陽之脈上下左右分行共六道其脈之起自手第四指端循手腕臂肘臑肉之外上肩入缺盆布膻中之分散絡心包下膈而歷屬上中下三焦者二道此其正經之脈也其支者即從前布膻中之處上出缺盆上項挾耳而行出耳上角屈行下頰還上而至䪼者二道此接正經而上行之支脈也又其支者從耳後入耳中出走耳前交頰還上而至目銳眥者二道此其交經之支脈也前熱論中雲胸脅痛而耳聾世醫但知為足少陽經之病殊不知手少陽之脈亦入耳中又其正經之脈布膻中下膈非胸之分而何則是少陽一證除脅痛之外凡耳聾胸痛等候每多手經受邪者今醫皆昧而不之察也深師療傷寒已八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣或時呼呻毒已攻內表猶未解今直用解毒湯則攣急不瘥直用汗藥則毒因加劇而方無表裡療者意思以三黃湯救其內有所增加以解其外因用三黃石膏梔子香豉麻黃湯方詳外臺秘要中按上證系手少陽三焦受病故無汗下之禁王叔和撰次傷寒脈法云陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也成氏注云三焦者原氣之別使主行氣於陽三焦既傷則陽氣不通而致身冷惡寒夫身冷惡寒明系表證由是而知叔和所云三焦傷者乃手少陽經病也琥據上二家之說則是傷寒有手少陽經病可無疑矣肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端中焦者在胃中脘當臍上四寸之分胃口胃下口也即小腸上口名曰幽門馬氏注以胃口為胃之上脘大誤夫肺經之脈既下絡於大腸矣則是還上而過小腸循胃口者非胃下口而何且也既循胃口復上膈豈有胃之上口反在膈下之理肺系喉嚨也手掌後高骨旁動脈為關關前動脈為寸口曰上魚者謂掌骨之前大指本節之後其肥肉隆起處形如魚者統謂之魚魚際即其間之穴名也此言手太陰之脈起於中焦下行而絡於大腸還上而循胃下口上膈連屬於肺即從肺系出外橫行循胸以出腋下下循臑內行少陰心主二經之前蓋人垂兩手則肘臂貼身大指居前小指居後手少陰心經循小指之內手厥陰心主循小指次指出其端此經之行循大指內側故云行少陰心主之前也再下而行肘中循臂內上骨之下廉今人臂皆兩骨相合垂手則上骨居前曰下廉者上骨之內側也入寸口上魚循本經之魚際穴復循大指內側而出其端也其支者從腕後直出次指內廉出其端此言其支脈之行從本經手腕後之列缺穴直達次指內廉出其端以交於手陽明經也馬注云從列缺穴已交於手陽明經之合谷穴即循手陽明經以達於次指端之商陽穴又隨商陽穴而上行者非蓋此道支脈行於次指之內自出指端交經之後方行於次指之內側也琥按手太陰之脈上下左右分行共四道其脈之本起於中焦下絡大腸上屬於肺從肺系外行橫出腋下下循臑肘與臂入寸口上魚出大指之端者二道此其正經之脈也其支者從正經所行手腕之後別行而出次指之端者二道此其交經之脈也前熱論中雲腹滿嗌乾此實系足太陰經受病殊不知手太陰之脈下絡大腸還循胃口腸胃實熱腹必作滿又太陰脈從肺系肺之系即喉嚨也喉嚨之口名為嗌肺氣熱則嗌必干由是而知腹滿嗌乾者每多手太陰經病熱之證今醫亦昧而不及察也許學士叔微治一舟子病傷寒發黃鼻內痠痛身與目如金小便赤而數大便如經或欲行茵陳五苓許曰非其治也小便和大便如常則知病不在臟腑今眼睛疼鼻頗痛是病在清道中清道者華蓋肺之經也若下大黃則必腹脹為逆因用瓜蒂散先食水次搐之鼻中黃水盡乃愈琥據上許學士案則是傷寒有手太陰經證可無疑矣心手少陰之脈起於心中出屬心系下膈絡小腸心系滑氏注云有二一則由肺葉而下曲折向後並脊膂貫脊髓與腎相通者愚以此是腎之系凡四臟皆繫於心也一則與肺相通上入肺兩大葉間者此方為心之系蓋心與肺同一系而肺之系實上接於喉也此言手少陰之脈起於心中上出屬心之系外行循任脈之外下膈當臍上二寸之分以絡於小腸也其支者從心系上挾咽系口系此言其支脈之行即從心系而上由喉之後挾咽兩旁再上而繫於目之內系也其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端銳骨之銳省文作兌即手踝骨也此言其直行之經脈復從心系直上至肺之分出循腋下由本經之極泉穴下行循臑內後廉行手太陰心主二經之後下肘臂內之後廉至掌後兌骨之端入掌內廉循小指內出其端以交於手太陽經也琥按手少陰之脈上下左右分行共六道其脈之起自心中出屬心系下膈絡小腸者二道此為脈之根也其支者即從前屬心系處上挾咽系目系者二道此為脈之枝也其直者復從心系卻上肺出腋下下循臑肘臂掌之內循小指內出其端者二道此為脈之本也前熱論中雲口燥舌乾而渴世醫只知此為足少陰經之病殊不知舌乃心之苗舌乾者手少陰經必為熱所乘醫人亦昧而不知察也王海藏治一人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也王診之曰勞心之所致神之所舍未復其初而又勞傷其神營衛失度當補其子益其脾解發其勞庶幾得愈授以補脾湯佐以小柴胡湯而解或者曰虛則補其母今則補其子何也王曰子不知虛勞之異乎千金云心勞甚者補脾氣以益之脾王則感之於心矣此與荀子所謂未有子富而父貧者同義按海藏以補脾湯佐以小柴胡而解身熱自汗則知其虛熱仍在經中故不專治藏也琥據上海藏案則知傷寒有手少陰經病可無疑矣心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦心包一名手心主滑氏注云以用而言手厥陰相火代君火行事故為心之主也以藏象而言其藏在心漫脂之外有細筋膜如絲與心肺相連故云心之包絡也三焦注見前此言手厥陰心包絡之脈起於胸中出屬心下之包絡由是下膈當胃上脘以絡上焦於中脘以絡中焦及臍下一寸以絡下焦故云歷絡也考上焦當在心下膈上其治在膻中滑氏注云當胃上口誤今改胃上脘方與下膈句無背蓋上脘在膈之下上焦之用雖在膈上實通乎膈之下也其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端此言支脈之行從前屬心包之處上循胸橫出脅下腋三寸還上行至腋下循臑肉之內下行以界乎太陰少陰二經之中間入肘中下臂行臂兩筋之間入掌中循中指出其端而終也其支者別掌中循小指次指出其端此言其交經之支即從前入掌中處別行循小指次指出其端以交於手少陽經也琥按手厥陰之脈上下左右分行共六道其脈之本起於胸中出屬心包下膈歷絡三焦者二道或云此止從中一道之脈要其出屬心包之處必自左右而分屬也此為正經之脈也其支者循胸出脅上腋下臑肘臂掌之中循中指出其端者二道是雖支脈實接正經而行於手者也又其支者從掌中別行循小指次指出其端者二道此為交經之二小支脈也前熱論中雲煩滿囊縮夫囊縮固足厥陰經病矣其煩與滿非手厥陰經病邪蓋手厥陰之脈循胸下膈今煩滿為胸膈間病乃三焦經絡受傷醫者皆昧而不及察也吳院判云傷寒論中凡瀉心湯共五首以其湯有冷熱之不同故云岐子云非瀉心火之熱瀉心下之痞也殊不知傷寒之痞皆胸膈熱邪之氣有餘仲景用瀉心湯者乃瀉心包之熱也按五湯之中熱藥莫過於附子然以大黃二兩黃芩黃連各一兩純是苦寒瀉熱之劑此不過借附子之辛以散心包之邪結且也包絡屬火附子亦屬火從治之法莫妙於此保命集云傷寒下後胸中結痞過在足少陰腎手厥陰包絡刺兩經之井原以瀉胸中之氣琥據上二條論則是傷寒有手厥陰經之病可無疑矣琥總按上手經共六條凡四時之中人傷於寒而病熱者亦不少熱傷手經理宜審證療之但今治傷寒家無不以手六經證為迂闊而不切於病情者故遇手三陽證混於足三陽證而不知遇手三陰證又混於足三陰傳經之證及混於胃腑實熱之證而不覺以至方不對證藥多殺人不亦痛夫竊考素問中以傷寒為熱病因著熱病篇又著刺熱篇此篇中全交凡用針家不可不察其略云心熱病者刺手少陰太陽肺熱病者刺手太陰陽明又云熱病始手臂痛者刺手陽明太陰又云熱病甚者為五十九刺甲乙經云所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是則是刺熱病之法豈但刺足經而不及手經者邪俗醫不講刺法但求湯藥因置手經而不論殊不知治熱病而不知手經止用藥之法每多缺略烏可以為醫而司人之命故孫真人習業篇云凡欲為太醫必須諳甲乙素問黃帝針經明堂流注十二經三部九候精熟如此方為太醫不爾猶無目夜遊動致顛殞朱奉議亦云凡治傷寒先識經絡不識經絡觸塗冥行今夫業醫者欲知傷寒傳變奇證總不越手足十二經五臟六腑陰陽虛實之中盍於此卷書一究心焉
