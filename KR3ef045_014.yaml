body:
  text: 卷之十四辨風池風府期門等穴針刺法並附圖此係仲景原文資生經云凡治傷寒惟陰證可灸余皆當針陰證者中寒也其餘傷寒皆熱病之類熱病宜刺刺者以針泄其熱也前篇用燒針是反助其熱因而致逆針用火燒針猶灸也大抵灸者補多而瀉少針者瀉多而補少明乎針灸之道則治病其庶幾乎太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈此條太陽病當是中風發熱汗出惡風脈緩者是為桂枝湯證也成注云煩者熱也初服桂枝湯後當汗出而身涼和若反煩不解者風甚而未能散也先刺風池風府以通太陽之經而泄風氣卻與桂枝湯解散則愈風池風府穴圖風池二穴圖經云在顳顬後髮際陷中活人書云在項後當是項側後蓋顳顬穴本挾玉枕骨下陷中此二穴又在顳顬之後後之為言下也足少陽陽維之會宜刺三分肌肉厚者可五分留七呼禁灸琥按圖經原云針入七分今止刺三分者從甲乙經之説也留七呼言留針於穴中至七呼氣之久以泄其風熱之邪風府一穴圖經云一名舌本在項髮際上一寸大筋內宛宛中活人書云在項後入髮際一寸疾言其肉立起言休立下督脈陽維之會宜刺止三分肌肉薄者針入二分候病人呼氣即出針禁不可灸使人失喑或問風池風府本屬足少陽經及督脈所行之部分與太陽經無與而仲景刺之何也余答云風池穴在偃伏頭部第三行風府穴在中行其第二行穴即太陽經所行之地則是風池風府實挾太陽經而行者也況二穴皆為陽維之會陽維者諸陽之總也諸陽之氣得泄何患太陽之風熱不去哉以上太陽可刺病一條自原論中第二卷太陽治法上集入於此傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒腹滿譫語者以其人病初起本太陽傷寒其後見證又得腹滿譫語夫腹滿為邪傳脾譫語為邪傳胃若寸口脈見浮緊此非太陽之邪傳裡矣診法脈浮而緊者為弦兩關之前脈弦乃知此腹滿譫語證為肝經風熱之邪自旺而乘脾也脾病見肝脈為木行乘土木乘所勝名曰縱縱者直也言木本剋土其乘則甚直也期門者肝之募成注云刺之以瀉肝經之盛氣或問太陽傷寒脈本浮緊此條證寸口脈浮而緊仲景獨云肝乘脾成注又云肝經氣盛醫者何以別之余答云太陽傷寒脈尺寸俱浮緊以人兩尺主膀胱為太陽寒水之經浮緊者風寒之氣特盛也茲則但言寸而不言尺知非膀胱經氣盛矣且也仲景脈法言尺寸則關在其中左關主肝右關主脾寸口脈浮而緊則兩關以前之脈皆弦謂非肝乘脾之診邪斯時欲用瀉脾之藥則土受木賊已不勝其攻克理宜瀉肝以去其風熱斯議藥不如議針之神速矣期門穴圖期門二穴圖經云在不容旁一寸五分上直乳第二肋端肝之募也足厥陰太陰陰維之會可刺入四分不可灸凡針期門必瀉勿補活人書云可肥人二寸瘦人寸半又云凡婦人病法當針期門不可行子午法恐纏藏膜引氣上但下針令病人吸五吸停針良久徐徐出針此是平瀉法也龐安時又云刺期門法須得脈弦或浮緊刺之必愈宜針入一寸琥按上圖經云不容在幽門旁一寸五分幽門又在巨闕旁五分巨闕在臆前蔽骨下一寸五分蓋巨闕系腹部中行期門系腹部第四行穴也細量左右上下分寸其穴自明活人書云穴在乳直下肋骨近腹處是也則是第二肋當從下數起恰在軟肋之兩端是穴刺法肥人一寸瘦人半寸不肥不瘦中而取之傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門自汗出云云至病欲解三句當在刺期門三字之下傷寒發熱嗇嗇惡寒者此太陽之風邪尚未除也然肺主皮毛邪在手太陰肺經亦然大渴欲飲水者成注引玉函云作大渴欲飲酢漿是知肝氣勝也肝來乘肺肺受邪熱則渴欲飲水飲水既多其腹必滿肺屬金金本制木而反受木乘其事不直故曰橫法宜刺期門以瀉肝經之盛氣成注云肝肺氣平水散而津液得通外作自汗出內為小便利而解也或問此條病既云發熱嗇嗇惡寒又云大渴欲飲水焉知非太陽陽明證余答云若果系陽明胃熱大渴欲飲則熱能消水未必腹滿熱邪既傳陽明雖太陽經中之邪或不盡除又未必嗇嗇惡寒故成注云大渴欲飲水為肝氣勝也以上太陽可刺病二條自原論中第三卷太陽治法中集入於此婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之發熱惡寒者表未解也本系婦人中風風熱甚迫血妄行故經水適來正當七八日為邪將傳裡之時邪氣乘虛而入於血室熱除脈遲身涼者成注云邪氣內陷而表證罷也脅下滿如結胸狀譫語者條辨云血室為營血停留之所經脈集會之處即衝脈所謂血海是也其脈起於氣街並少陰之經夾臍上行至胸中而散故熱入而病作其證則如是也法當刺期門者以期門為肝之募肝主血血熱則瘀熱入血室而瘀積必歸於肝故隨其經之實而用刺法以瀉之也成注反云審看何經氣實更隨其實而瀉之殊出不解愚按此條病仲景雖出太陽治法之下實則少陽之邪傳入厥陰血分實熱故作譫語等證仲景恐醫人認為陽明府實證輕用三承氣湯以伐胃氣故特出一刺期門法以療之愚又按仲景云如結胸狀必病人脅下滿雖如結胸及按之必不痛故知其非胃實且也脅下雖痛而痛不在胸此其邪止在肝膽之分仲景當日特用刺法何其神哉以上太陽可刺病一條自原論中第四卷太陽治法下集入於此陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈按此條當亦是婦人病邪熱鬱於陽明之經陽明多氣多血邪熱甚則迫血從下而行血下則經脈空虛熱得乘虛而入其室亦作譫語後條辨云血室雖衝脈所屬而心君實血室之主室被熱擾其主必昏故也但頭汗出者血下奪則無汗熱上擾則汗蒸也刺期門以瀉經中之實則邪熱得除而津液回覆遂濈然汗出而解矣或問此條病仲景不言是婦人所以尚論諸家直指為男子今吾子偏以婦人論之何也余答云血室雖不分男女皆有而熱入血室之證則惟婦人始有之余於前第七卷少陽篇後言之已明況仲景於太陽篇中一則曰婦人中風雲云經水適來此為熱入血室再則曰婦人中風雲云經水適斷此為熱入血室三則曰婦人傷寒云云經水適來此為熱入血室則是熱入血室明系婦人之證至此實不待言而可知矣且也此條言下血當是經水及期而交錯妄行以故血室有虧而邪熱得以乘之故成熱入血室之證考之靈樞海論云衝脈為十二經之海注云此即血海也衝脈起於胞中其前行者並足少陰之經挾臍上行至胸中而散又考素問天真論云女子二七而天癸至任脈通太衝脈盛月事以時下夫少陰也任也沖也其經脈皆行於腹故其血必由前陰而下斯血室有虧邪熱方得而入則是仲景云下血乃經水交錯妄行又不問而自明矣此其理非讀書明理之君子其孰能知之以上陽明可刺病一條自原論中第五卷陽明治法集入於此太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門間去聲太少並病者本太陽之表邪不衰併入少陽而交病故謂之並病並者猶秦並六國並則其勢大矣太陽之脈絡頭下項故頭項強痛少陽之脈循胸絡脅故如結胸心下痞硬二陽之脈皆起於目而行於頭故目眩而頭冒也當刺大椎第一間者謂當刺大椎一穴在第一椎之間為背部中行穴乃手足三陽督脈之會先刺之以瀉太少並病之邪不已更刺兩肺俞蓋肺主氣尚論篇云刺肺俞以通其氣斯膀胱之氣化行而邪自不留復刺肝俞以瀉少陽之邪以肝與膽兩經相合為表裡也慎不可發汗者以太陽之邪既並少陽則發汗在所當禁倘誤發其汗則胃中津液干木邪乘之必發譫語而脈弦至五六日邪當解而譫語不止成注云此為少陽邪熱甚也刺期門以瀉肝膽之氣或問此條病於發汗後譫語不止又見心下痞硬何以不用下藥余答云仲景云時如結胸則是心下雖痞硬必按之不痛非真結胸且也心下痞硬而脈又見弦乃肝木旺而乘胃土少陽經證居多雖欲下之敢輕下邪大椎肺俞肝俞穴圖大椎本作顀一穴圖經云在第一椎上陷中手足三陽督脈之會可刺入五分留三呼瀉五吸琥按仲景云刺大椎第一間當是此穴成注不明而條辨尚論等書皆不言及此不知仲景刺大椎法與太陽病刺風府之義實相同耳故余於上圖補出以備後學參考琥又按仲景刺大椎一穴者此並太少之邪而合瀉之也合瀉之而病邪不已則分瀉之故又刺肺俞與肝俞焉肺俞二穴圖經云在第三椎下兩旁相去各一寸五分足太陽脈氣所發可刺入三分留七呼得氣即瀉肥人可刺入五分不可灸肝俞二穴圖經云在第九椎下兩旁相去各一寸五分可刺入三分留六呼不可灸琥按上四穴非禁灸但灸非熱病所宜耳太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之此條與上條之證相同上條云慎不可發汗此條云慎勿下之正以下為少陽所禁且太陽病邪猶在經亦不可下愚於前注已明言不可下之義大抵以上兩條證乃互文以見意也愚按成注云刺大椎肺俞以瀉太陽之邪刺肝俞以瀉少陽之邪則是成氏終不知大椎一穴實合太少而齊瀉諸家注皆不明用針之理竟置大椎而不論大誤之極以上太少相併可刺病二條自原論中第四卷太陽治法下集附於此重出例太陽病頭痛至七日以上云云若欲作再經者針足陽明使經不傳則愈此條病注已見前第三卷太陽上篇但仲景云針足陽明成注未明指其穴考之龐氏總病論云補足陽明上三里穴推龐氏之意以足三里穴得補則經氣實而不傳殊不知成注云針足陽明為迎而奪之以泄其經中之熱使熱邪得泄不至再傳他經故云愈也龐氏不明用針之理竟以瀉為補誤極誤極又考張氏纘論云刺衝陽穴按衝陽即仲景所謂趺陽脈也在足跗上五寸高骨間動脈愚以仲景有診趺陽法而不言刺張氏之言實本史氏傷寒論注不足法也今止就足三里穴附圖於後附足三里穴圖三里二穴圖經云土也在膝下三寸䯒骨外廉兩筋間當舉足取之類經云坐而豎膝低跗取之足陽明之所入為合可刺五分留七呼此穴主瀉胃中之熱天星祕訣云兼期門治傷寒過經不出汗增治法云治熱病汗不出喜嘔口乾並宜針不宜灸以上太陽病傳入陽明經可刺證一條自原論中第二卷太陽治法上集附於此附昔賢刺風池風府期門等穴瀉熱病法資生經云風池治傷寒頭痛又主煩滿汗不出又主溫病汗不出目眩苦頭疼琥按上主療云云此必是太陽頭痛也仲景云太陽病初服桂枝湯反煩不解者先刺兩風池又主溫病汗不出愚以春氣多溫此即是春時傷寒也又主目眩苦頭疼此必是太少合病以足太陽之脈起目內眥少陽之脈起目鋭眥故也千金方云江南諸師祕仲景要方不傳灸法初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒一二日但烈火灸兩風池又肝俞百壯琥按上灸法大誤之極彼孫氏豈以澀澀守火為真寒證邪夫曰頭痛面目如飲酒狀其為熱病無疑矣熱病用灸法是以火濟火此與仲景法大相背謬而千金録之其害多矣類經云風府主傷風頭痛項急不得回顧目眩反視一云主瀉胸中之熱又云陽明二日尋風府琥按上主療云傷風頭痛當即是仲景云太陽中風證也太陽者經名巨陽巨陽者諸陽之屬也其脈連於風府故云治項急等證又云主瀉胸中之熱胸中者胃之部分故云陽明二日尋風府也仲景但云太陽病服桂枝湯後反煩不解刺風池風府今則兼主陽明以瀉胸中之熱謂非發仲景未發之旨邪資生經云期門治婦人傷寒過經不解當針期門使經不傳琥按仲景法刺期門但治婦人熱入血室茲則兼治婦人傷寒過經不解此為善用仲景之法者矣許學士治一婦人患傷寒熱入血室醫者不識用補血調氣藥治之數日遂成血結胸許公曰小柴胡已遲不可行也無已刺期門穴豫不能針請善針者針之如言而愈或問熱入血室何為而成結胸也許曰邪氣傳入經絡與正氣相搏上下流行遇經水適來適斷邪氣乘虛入於血室血為邪所迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸矣婦人平居血養肝猶水養木方未受孕則下行之為月水既孕則中蓄之以養胎及已産則上壅之以為乳皆血也今邪逐血並歸於肝經聚於膻中結於乳下故手觸之則痛非藥可及故當刺期門也琥按上許氏云云實發仲景未發之義仲景論婦人熱入血室證但云胸脅下滿如結胸狀此則直云聚於膻中結於乳下以手觸之則痛遂成血結胸學者試為思之此與仲景用大小陷胸湯之結胸其狀何別余曾細審其證仲景云結胸者乃邪熱乘虛而入於府故以手按之其痛在胃脘之中許氏云血結胸乃邪熱乘虛而入於經脈其痛止在兩乳之下是以別也且仲景言婦人中風熱入血室第二條證云其血必結此是血尚未結也法當用小柴胡主之今者許氏所云即仲景言婦人中風熱入血室第一條證為血既結故云小柴胡已遲當刺期門此非深探仲景論中之理其孰能知之資生經云大椎主傷寒熱盛煩嘔類經一云能瀉胸中之熱琥按仲景云刺大椎治頭項強痛眩冒時如結胸心下痞硬此則云熱盛煩嘔又能瀉胸中之熱大都是太陽邪熱未盡欲傳陽明故胸中熱作煩嘔刺大椎者謂能泄太陽之邪熱使不傳陽明病可自愈故也千金方云諸煩熱時氣溫病灸大椎百壯刺三分瀉之按先灸後刺是引熱氣入經絡矣豈不大誤類經云肺俞肝俞俱主瀉五臟之熱琥按經云刺中肺三日死中肝五日死二穴寧勿刺之若虛寒病用灸法則甚穩附刺溫熱病五十九穴考正仲景云凡治溫病可刺五十九穴正文已見前第二卷傷寒論例中成注云五十九刺者以瀉諸經之溫熱針經云熱病取之諸陽五十九穴刺以瀉其熱而出其汗實其陰而補其不足所謂五十九刺兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入髮際一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後口下者各一項中一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二以上云云見靈樞熱病第二十三又內經曰熱俞五十九頭上五行行五者以瀉諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九者皆熱之左右也以上云云見素問水熱穴論篇第六十一琥按仲景云五十九穴而成注兩引內經其穴各有不同使用針家何所適從蓋嘗考之甲乙經云按上靈樞素問二經之言雖有不同皆刺熱之要穴也資生經但云溫病可針刺五十九穴而不明言其處以江南諸師祕仲景要方而不傳故也馬玄臺注靈樞特辨成氏注傷寒兩入之誤且云水熱論中五十九穴與靈樞刺熱病五十九穴不同者以彼則刺水病此則刺熱病病有不同穴因以異既治傷寒當從靈樞不宜入以治水之穴矣或問水熱穴論水俞凡五十七穴前半篇已詳言之末後言熱病五十九俞乃治傷寒之法也何為而獨不從之乎余答云末後言治熱病五十九俞乃人病風水水寒之氣鬱於內則變而為熱故刺五十九俞以瀉表裡臟腑之熱其理譬之人傷於寒寒盛則生熱非直云傷寒病也馬氏所言實為不易之論余因就靈樞中文辨注其穴於後靈樞所謂五十九刺者兩手外內側各三凡十二痏手太陽少澤穴在手小指外側端去爪甲下一分陷中可刺入一分手陽明商陽穴在手大指次指內側去爪甲角如韭葉可刺入一分留一呼手少陽關衝穴在手小指次指之端去爪甲角如韭葉可刺入一分手太陰少商穴在手大指端內側去爪甲角如韭葉以三稜針刺之微出血手少陰少衝穴在手小指內廉之端去爪甲角如韭葉可刺入一分手厥陰中衝穴在手中指端去爪甲如韭葉陷中可刺入一分計六井穴左右手共十二痏痏者刺瘡也有刺必有瘢故即以痏為數五指間各一凡八痏手太陽後溪穴在手小指外側本節後陷中可刺入一分手陽明三間穴在手大指次指本節之後內側陷中可刺入三分留三呼手少陽中渚穴在手小指次指本節後間陷中可刺入二分手少陰少府穴在手小指本節後陷中可刺入二分手之六經厥陰本節後無穴太陰本節後有魚際穴其脈實散腕中而不在指間計四經左右共八痏也足亦如是足太陽束骨穴在足小指本節後陷中可刺入三分足陽明陷谷穴在足大指次指之間本節後陷中可刺入三分留七呼足少陽臨泣穴在足小指次指本節後間陷中可刺入二分足太陰大都穴在足大指本節後陷中可刺入三分足之六經少陰脈不行於指厥陰本節後上二寸有太衝脈而其穴亦不在指間計四經左右亦八痏也頭入發一寸旁三分各三凡六痏頭入發一寸旁即督脈上星穴之次其旁之穴分而為三則足太陽之五處穴在上星旁一寸五分可刺三分留七呼承光穴在五處後一寸五分可刺入三分通天穴在承光後一寸三分可刺入三分留七呼左右各三穴故凡六痏此偃伏頭部第二行穴也穴皆由前髮際上而至後更入發三寸邊五凡十痏更入發者自上星之次向後也三寸邊五者去中行三寸許兩邊各五也即足少陽之臨泣穴在目上直入髮際五分陷中可刺入三分留七呼得氣即瀉目窗穴在臨泣後一寸可刺入三分正營穴在目窗後一寸可刺入三分承靈穴在正營後一寸五分可刺入三分一云禁針腦空穴在承靈後一寸五分挾玉枕骨下陷中可刺四分得氣即瀉左右共凡十痏乃偃伏頭部第三行穴也耳前後口下者各一項中一凡六痏耳前者聽會穴也在耳前陷中開口有空可刺入七分留三呼得氣即瀉乃側面部穴也耳後者完骨穴也在耳後入髮際四分可刺三分留七呼乃側頭部穴也俱屬足少陽經左右各一凡四穴口下者任脈之承漿穴也在唇下宛宛中可刺入三分得氣即瀉在面部中行止一穴項中者督脈之啞門也在項中央入髮際五分宛宛中可刺入二分不可深在偃伏頭部中行止一穴共凡六痏巔上一百會穴也在前頂後一寸五分頂中央旋毛中可容豆督脈足太陽交會於巔上手足少陽足厥陰俱會於此可刺入二分得氣即瀉囟會一囟會督脈穴名在上星後一寸陷中可容豆可刺二分留三呼得氣即瀉髮際一前髮際謂神庭穴在鼻直上入髮際五分發高者髮際是穴發低者加二三分督脈足太陽陽明三脈之會銅人等書皆云禁不可針針即發狂甲乙經云令人癲疾目失精馬氏靈樞注引之欲足五十九穴之數誤矣後髮際謂風府穴已見前以上四穴俱在偃伏頭部中行廉泉一廉泉任脈穴名在頷下結喉上中央舌本下仰而取之陰維任脈之會可刺三分得氣即瀉乃正面部中行穴也風池二穴與刺法已見前天柱二天柱足太陽經穴名挾項後髮際大筋外廉陷中可刺五分得氣即瀉乃偃伏頭部第二行穴也琥按上五十九穴皆可刺惟前髮際神庭一穴禁不可刺則是可刺之穴實止五十八矣或云髮際止一穴而廉泉有二穴當是舌根下之左右泉脈為足少陰之會斯言出類經圖翼姑訂入之以備參考附刺熱病針圖或問云刺熱病當用何針余答云當用鑱針匙音低針鋒針員利針此四者為刺熱病之針也靈樞熱病篇云熱病先膚痛窒鼻充面取之皮以第一針五十九云云熱病先身澀倚而熱煩悗干唇口嗌取之脈以第一針五十九云云第一針者即九針論所云鑱針也其頭大其末鋭取法干巾針去末寸半漸鋭之長一寸六分主熱在頭身用之令無得深入而使陽氣出熱病頭痛顳顬目𤸪脈痛善衄厥熱病也取之以第三針云云第三針者即九針論所云匙針也其身大其末圓取法於黍粟之鋭長三寸半主按脈取氣令邪氣出熱病面青腦痛手足躁取之筋間以第四針云云熱病數驚瘈瘲而狂取之脈以第四針云云熱病身重骨痛耳聾而好瞑取之骨以第四針五十九云云熱病體重腸中熱取之以第四針云云熱病挾臍急痛胸脅滿云云取以第四針第四針者即九針論所云鋒針是也筒其身鋒其末取法於絮針長一寸六分令可以瀉熱出血九針十二原篇曰刃三隅以發痼疾前五十九刺中取少商穴以三稜針刺之微出血即用此針也熱病嗌乾多飲善驚臥不能起取之膚肉以第六針五十九云云第六針者即九針論所云員利針也尖如犛且圓且鋭微大其末反小其身取法於犛針長一寸六分以取暴氣琥按以上云云乃熱病用針之大略也欲觀全文須於內經中細考之附同身寸説或問針穴分寸當依何法余答云相傳用同身寸同身寸者謂即以其身之寸同其人之身也銅人經謂之周身寸其法如屈指量則以中指中節倒邊兩紋之尖相去為一寸如伸指量則以中指上節下之橫紋量至中節下之中紋為一寸此古法也至於一人之身在頭或獨大獨尖面或獨長獨闊腰或獨細獨粗四肢或不相等上下三停或不相齊即可用中指節之寸周身自有活法以較量之故又名為周身寸也有如師欲刺頭上穴依明堂訣式頭圍該二尺六寸頂去額長四寸額下去頤頷中為頤長一尺頂去項髮際長七寸五分項發下至大椎長三寸五分頂去腦角四寸耳後當完骨完骨者耳後髮際高骨也廣九寸耳前當耳門廣二寸兩顴之間廣九寸五分兩顴相去實止七寸曰九寸五分者連兩顴骨高處皆量在內以上分寸與中指寸相計少有不合可用活法較量於其間即得真正尺寸且師更以手摩摸其骨空之處即得真正穴道所謂頭必因於頭腹必因於腹背必因於背手足必因於手足總其長短大小而折衷之則庶乎其合法矣以上傷寒書共一十四卷此先摘仲景所云熱病附以後賢方論而推廣發明者也其仲景所云真寒陰證復作中寒論上中下三卷雜以後賢方論合為十七卷務使傷寒中寒判然有別斯醫人自無誤治之證云耳
