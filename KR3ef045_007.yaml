body:
  text: 卷之七辨少陽病脈證並治法此係仲景原文少陽之為病口苦咽乾目眩也此少陽經病熱之綱也少陽者膽經也其脈起於目鋭眥靈樞經云足少陽之正上挾咽出頤頷中又曰是動則病口苦苦者膽之味苦味從火化咽又為膽之使故膽熱則口苦而並咽亦干也眩者目旋暈也少陽屬木為風風主動搖故其經病熱則目眩也愚按上三證不足以盡少陽病故云此僅舉其病熱之大綱耳少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚此節辨少陽中風證成注云少陽之脈起於目鋭眥走於耳中其支者下胸中貫膈風傷氣風則為熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽有吐下之禁止因煩滿故誤行吐下之法成注又云吐則傷氣氣虛者悸下則亡血血虛者驚愚以驚悸皆主於心胸滿而煩者邪已離表未全入里為半在表半在裡之證乃上焦病也上焦與心相近誤吐且下則氣血衰耗而神明無主以故忪然而悸惕然而驚也按此條論仲景無治法補亡論龐安時云可小柴胡湯吐下悸而煩者郭白雲云當服柴胡加龍骨牡蠣湯傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸此節辨少陽傷寒證少陽屬木其脈當弦脈細者成注云邪漸傳裡也少陽之脈上抵頭角故曰頭痛寒鬱則發熱此屬少陽傷寒證無疑矣邪在少陽發汗又所當禁且其經多氣少血誤發其汗譫語者條辨云奪其血液而胃干以故心慌而言亂也此少陽之邪已轉屬胃胃和則愈者言當用藥以下胃中之熱而使之和平也不下則胃不和不但譫語更加煩擾忪悸此言胃熱亢極而上犯於心肺故藏神不自寧也按此條論仲景無和胃之藥成注云與調胃承氣湯此言少陽之邪已入胃故可下也愚以邪自少陽經傳來還須用大柴胡湯下之為妥本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯此條言太陽病轉入少陽之證本太陽病不解轉入少陽此但言邪所從來之路醫者止就少陽經議證可耳足少陽之脈循脅裡邪入少陽故脅下硬滿膽熱氣上逆而犯胃以故乾嘔不能食往來寒熱者邪在半表半裡明理論云邪之客於表者為寒邪與陽相爭則為寒邪之入於裡者為熱邪與陰相爭則為熱邪居表裡之間或出或入以故寒熱且往且來也尚未吐下者治猶未誤也少陽之脈當弦曰沉緊者邪將傳裡陳亮斯云邪入膽府故脈沉緊而不弦此是少陽經與府齊病也膽府清淨無地容邪故其邪仍結於經而脅下硬滿止宜與小柴胡以和解之小柴胡湯方此方自原論中第三卷移附於此柴胡半斤黃芩人參甘草各三兩半夏半升洗生薑三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服成氏明理論云傷寒邪氣在表者必漬形以為汗邪氣在裡者必蕩滌以為利其於不外不內半表半裡既非發汗之所宜又非吐下之所對是當和解則可矣小柴胡為和解表裡之劑也柴胡味苦平微寒黃芩味苦寒內經曰熱淫於內以苦發之邪在半表半裡則半成熱矣熱氣內傳變不可測須迎而奪之必先散熱是以苦寒為主故以柴胡為君黃芩為臣以成徹熱發表之劑人參味甘溫甘草味甘平邪氣傳裡則裡氣不治甘以緩之是以甘物為之助故用人參甘草為佐以扶正氣而復之也半夏味辛微溫邪初入里則裡氣逆辛以散之是以辛物為之助故用半夏為佐以順逆氣而散邪也裡氣平正則邪氣不得深入是以三味佐柴胡以和里生薑味辛溫大棗味甘溫內經曰辛甘發散為陽表邪未已迤邐內傳既未作實宜當兩解其在外者必以辛甘之物發散故生薑大棗為使輔柴胡以和表七物相合兩解之劑當矣後加減法明理論又云邪氣自表未斂為實乘虛而湊則所傳不一故有增損以御之若胸中煩而不嘔去半夏人參加栝蔞實一枚煩者熱也嘔者氣逆也胸中煩而不嘔則熱聚而氣不逆邪氣欲漸成實也人參味甘為補劑去之使不助熱也半夏味辛為散劑去之以無逆氣也栝蔞實味苦寒除熱必以寒泄熱必以苦加栝蔞實以通胸中鬱熱若渴者去半夏加人參合前成四兩半栝蔞根四兩津液不足則渴半夏味辛性燥滲津液物也去之則津液易復人參味甘而潤栝蔞根味苦而堅堅潤相合津液生而渴自已愚以胃實熱甚而渴者人參恐不宜用加藥法不可執也若腹中痛者去黃芩加芍藥三兩宜通而塞為痛邪氣入里裡氣不足寒氣壅之則腹中痛黃芩味苦寒性堅而寒中去之則中氣易和芍藥味酸苦微寒酸性泄而利中加之則塞氣得通而痛自已愚以此必是裡寒血滯而腹中痛以故去黃芩加芍藥若邪熱實結而腹中痛恐黃芩不宜去芍藥不宜加也又上云芍藥性泄而利中亦非正解若脅下痞硬去大棗加牡蠣四兩內經曰甘者令人中滿大棗味甘溫去之則痞者消咸以軟之牡蠣味酸鹹寒加之而硬者軟若心下悸小便不利者去黃芩加茯苓四兩心下悸小便不利水蓄而不行也內經曰腎欲堅急食苦以堅之堅腎則水益黃芩味苦寒去之則蓄水浸行內經曰淡味滲泄為陽茯苓味甘淡加之則津液通流愚以津液通流則蓄水自行矣若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴則津液足去人參以人參為主內之物也外有微熱則表證多加桂以取汗發散表邪也愚以此邪必自太陽經傳來者若咳者去人參大棗生薑加五味子半升乾薑二兩肺氣逆則咳甘補中則肺氣愈逆故去人參大棗之甘五味子酸溫肺欲收急食酸以收之氣逆不收故加五味子之酸生薑乾薑一物也生者溫而乾者熱寒氣內淫則散以辛熱蓋諸咳皆本於寒故去生薑加乾薑是相假以正溫熱之功愚以如肺有邪熱而作咳恐五味子太斂乾薑又太熱不宜加也成氏又云識諸此者小小變通觸類而長則知以上加減法不可拘也琥按上柴胡湯方專治少陽經往來寒熱頭角痛耳聾口苦脅痛脈弦者倘其病初傷本經或初自太陽陽明二經傳來邪氣方盛人參一味斷不可用若其病過經不解或本經中有留邪未盡正氣已虛人參一味方可加之也琥又按加減法不但原方後所傳云云外有師傳加減者內臺金鏡云如發熱小便不利者和五苓散嘔惡者加橘紅胸中痞結者加枳實咳逆而發熱者加丁香柿蒂嘔吐者加竹茹據上師傳加減法云咳逆發熱咳逆當是厄逆厄逆候未必盡由於胃寒其加丁香不無所誤附例傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之此條系太陽風寒傳入少陽之證既曰傷寒復曰中風者成注引玉函云中風五六日傷寒往來寒熱此即是或中風或傷寒於五六日時太陽風寒之邪傳於少陽皆有此往來寒熱之證非是既傷於寒復中於風也胸脅者少陽經所行之部分邪傳少陽之經則胸脅苦滿也胸脅既滿則胃中之水穀亦不消以故默默不欲飲食也默默者尚論篇云即昏昏之意邪熱甚而神思不清也邪在胸膈上逼於心則煩犯於胃則嘔心煩喜嘔者成注云邪在表方傳裡也邪初入里未有定處則所傳不一故有或渴或痞等證總以小柴胡湯加減主之或胸中煩云云注已見上加減法中茲不復贅血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之此條病乃承上條中風所以往來寒熱之故而申言之也少陽本少血之經故云血弱中風者風傷氣至五六日之時則正氣漸消故云氣盡血弱氣盡則營中之陰既虛衛外之陽不固以故腠理開疏風邪之氣因入於裡與正氣相搏擊而結於脅下正當少陽之部分也正邪分爭者正氣與邪氣互相併爭是以往來寒熱也休作有時者此發明往來之意蓋言寒休則熱作熱休則寒作往來有時而不能止也默默不欲飲食注見上條五臟惟肝與膽府相連位近於下此即脈經云腎肝居沉之義故其痛亦必在脅之下也痛雖在下而病邪之氣必挾肝膽之火上而犯胃故使嘔也高字作上字解臟腑相連臟從腑治故與小柴胡湯以和解半表半裡之邪愚以湯中人參宜加用以此條病本血弱氣盡故也服柴胡湯已渴者屬陽明也以法治之未服柴胡湯而渴渴亦柴胡湯兼主之候今者服湯已而渴則邪傳陽明熱已入胃以法治之者蓋言白虎承氣各隨其宜而用之耳得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦此條系太陽陽明證居多醫人不可以其脅下滿痛而嘔全以為少陽之證而輕用柴胡湯也得病六七日而脈遲者當是陽明受病手足溫者系在太陰故醫家認以為可下之證殊不知脈雖遲而兼浮弱手足雖溫而惡風寒縱六七日其邪猶在太陽之經未入於府為不可下醫反二三下之為誤也誤下之則損其胃氣故不能食熱邪傳裡搏於少陽故脅下滿痛面目及身黃者胃氣損為熱所蒸故發黃色也頸項強者太陽陽明之證猶在也小便難者內亡津液膀胱之氣燥熱故小水澀也若此者醫人不可以其脅下滿痛而與小柴胡湯以柴胡湯中有半夏乃解肌兼燥津液之劑如誤與之則大便後必燥澀而下重也本渴而飲水嘔者水停心下也此非少陽證喜嘔之比故云柴胡不中與也食谷而噦者亦然噦者食入氣逆而嘔也凡此者皆輕用柴胡湯之所當禁也愚按此條論本太陽中篇移附於此曰脈浮弱曰惡風寒曰項強皆系太陽病醫人不識以六七日為可下而誤下之邪入少陽又不專在少陽故柴胡在所當禁本渴飲水而嘔者補亡論常器之云宜五苓散愚以身黃未退者加茵陳頸項強者還宜以葛根湯加減增入用之傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之此條系三陽經齊病當是少陽之邪居多太陽傷寒已至四五日之時不曰發熱惡風止曰身熱者此太陽之邪漸衰也其兼陽明證不曰鼻乾不得臥而止曰頸項強者此陽明之邪亦將衰也惟脅下滿為少陽經之專證況兼手足溫而又渴此為邪將傳裡之機成注云手足溫者知邪在表裡之間也故與小柴胡湯以和解表裡之邪尚論篇云此用小柴胡湯當從加減法去半夏加栝蔞根為是傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯此條乃少陽病兼挾裡虛之證傷寒脈弦者弦本少陽之脈宜與小柴胡湯茲但陰脈弦而陽脈則澀此陰陽以浮沉言脈浮取之則澀而不流利沉取之又弦而不和緩澀主氣血虛少弦又主痛法當腹中急痛與建中湯者以溫中補虛緩其痛而兼散其邪也先溫補矣而弦脈不除痛猶未止者為不瘥此為少陽經有留邪也後與小柴胡湯去黃芩加芍藥以和解之蓋腹中痛亦柴胡證中之一候也愚以先補後解乃仲景神妙之法然亦必少陽經氣虛無鬱熱者宜之小建中湯方見前第四卷太陽篇中傷寒中風有柴胡證但見一證便是不必悉具傷寒中風者謂或傷寒或中風不必拘也柴胡證者謂邪入少陽在半表半裡之間也但見一證謂或口苦或咽乾目眩或耳聾無聞或脅下硬滿或嘔不能食往來寒熱等便宜與柴胡湯治之不必待其證候全具也愚按此條系用柴胡湯之法兼總上文以申明之凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解凡柴胡湯病證而下之者誤下之也若柴胡證不罷以無變證故其病猶在也當復與柴胡湯以和解之得湯必蒸蒸而振振者戰也戰而後發熱故云蒸蒸互辭以見義也正氣與邪氣相爭正氣勝則邪氣還表故汗出而解愚以柴胡非發汗之藥然邪氣不因下而陷入於裡原因在裡之正氣勝藉藥力而祛邪欲出之表故必自汗出而解也上八條證俱自太陽中篇移附於此婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人中風與男子同惟熱入血室之證必從少陽主治故於此條復附及之成注云中風七八日乃邪氣傳裡之時發作有時者此言往來之狀也以其初無寒熱故云續得寒熱經水適斷者此值經水正來適遇邪熱壅其經而不行故云斷也此其病名為熱入血室其血必結以下文此申明經斷所以寒熱之義與小柴胡湯以解邪熱則所結之血必自行而愈矣愚按血室者即血海人身中衝脈是也經云衝脈者經脈之海言受納諸經之灌注營血於此而蓄藏故謂之海亦謂之室也或問云經云衝脈者為十二經之海當是血脈之所會聚男子婦人皆有之何以熱入血室之證仲景但指婦人不指男子也余答云然男女皆有此衝脈也但婦人陰類血亦屬陰經脈流通惟婦人易盈盈則必聚於衝脈之中故有熱入血室之證乃邪熱內入與血相結瘀而不行此為血有餘而邪實也其治以小柴胡湯者保命集云婦人天癸既行皆從厥陰厥陰與少陽相為表裡故下條治法云無犯胃氣及上二焦以膽經有三禁故止宜用小柴胡湯也又刺法熱入血室者當刺期門隨其實而瀉之期門者肝之募厥陰之經也其不用小柴胡湯即刺期門者二經可相通而治故也婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈此條言婦人傷寒者可見風寒之邪皆有熱入血室證也發熱者寒鬱而成熱也經水適來者蓋言經水適當其時而來過多不止則血室空虛邪熱乘虛而入也晝日明瞭云云者晝屬陽陽主氣暮屬陰陰主血今則熱邪入血室而為病以故晝日明瞭而病輕暮則譫語如見鬼狀而病劇也譫語者系胃家實醫人用下藥者多此非胃家實故云無犯胃氣言不可下也上二焦者營衛之所出也汗傷營血吐傷衛氣此言三法皆不可用也必也與小柴胡湯以和解邪熱斯不調其經而經血調譫語等證可不治而自愈按此條論仲景不言用小柴胡補亡論郭白雲云如不愈者服小柴胡湯則知其湯與證甚相對可無疑矣傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解此條系太陽病傳入少陽之證但其脈似少陰醫人所當審也傷寒五六日成注云邪當傳裡之時頭汗出微惡寒手足冷者此在表之邪未解也心下滿口不能食此在裡之邪方結也大便硬者此本陽明府證只因脈細有似乎陰邪入結於裡故云大便硬而脈細者此為陽邪微結成注云大便硬為陽結此邪熱雖傳於裡然以外帶表邪則熱結猶淺故曰陽微結必有表指頭汗出云云言復有里指心下滿云云言故言有表復有里也又脈不細而沉者亦為陽邪微結於裡何也以頭汗出故云陽微結蓋諸陽之經皆上於頭也假令純陰結純者真也諸陰之經皆至頸胸中而還不得復有頭汗出之外證其真陰之邪悉當入於裡矣此為陽微結邪當在半表半裡間也又脈雖沉而且緊者終不得為少陰寒證所以然者云云是重言以申明頭汗出為陽微之義可與小柴胡湯者乃和解半表半裡之邪也設不了了者言服湯後而病猶未愈也得屎而解者言少陽之表邪既除大便仍硬須用藥以微利之則愈按此條論仲景於小柴胡湯之外別無利大便之藥補亡論郭白雲云實者大柴胡虛者蜜煎導之其說甚是上三條證俱自太陽下篇移附於此陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之此條系陽明病傳入少陽之證陽明病發潮熱若似乎胃家實矣但胃實者大便必硬小便赤澀今則大便溏小便自可是熱雖潮邪猶在經非入府之證也更加胸脅滿不去者已傳入少陽也故與小柴胡湯以和解半表半裡之邪陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此條陽明病實少陽之證居多故從少陽例治脅下硬滿而嘔者此皆少陽證也惟不大便為陽明病兼之舌上白苔成注云為邪未入府在表裡之間故與小柴胡湯以和解之上焦得通者硬滿去而嘔止也津液得下者大便自行也胃氣和則陰陽升降而里邪平身汗出則內外通達而表邪散故云解也陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治此條病雖雲陽明中風觀其脈弦脅下痛時時噦耳前後腫少陽之證偏重故從柴胡例治其用麻黃湯者雖除太陽之邪而非專證也少陽脈弦太陽脈浮陽明脈大三陽之脈齊見而先曰弦者少陽之邪居多也短氣者風熱甚而氣壅逆也氣逆壅甚故雖以手按抑之而氣愈不能通也腹滿鼻乾嗜臥一身及面目悉黃潮熱者陽明風熱甚也惟小便難為太陽府證脅下及心痛者以本脅痛而連及於心胸之分此為少陽經主病兼之時時噦者噦即氣逆而嘔嘔亦少陽之兼證耳前後腫者少陽之脈上耳後其支者從耳後人耳中出走耳前當其既腫之時愚以縱有陽明風熱已傳入少陽之經矣條辨注耳前後腫為三陽見證殊不知太陽當腦後腫陽明當面腫此耳前後腫當是少陽經證無疑刺之小瘥者謂以針刺其腫處而腫少愈也外不解者謂短氣脅痛等證未除也邪傳少陽浮脈當去今者病過十日而脈續浮脈續浮者謂弦脈本在而仍得浮脈也脈雖續浮以過十日則邪不在表當從少陽例治故與小柴胡湯以和解表裡之邪若脈但浮無餘證者謂脈不弦而但浮且無短氣脅痛等證此邪氣欲出而還於表也故與麻黃湯以汗之否則少陽證不可汗豈有更用麻黃湯之理若不尿云云是承上短氣脅痛等證而言不尿則比之小便難更甚腹滿加噦則比之腹部滿時時噦亦更甚矣真氣已衰邪氣又盛謂非不治之證而何或云不尿者宜五苓散腹滿者宜大柴胡湯獨不思經云病深者其聲噦雖治之復何益哉上三條證俱自陽明篇移附於此嘔而發熱者小柴胡湯主之成注引經云嘔而發熱者柴胡證具愚以其嘔必兼口苦也此條病自厥陰篇移附於此見後例若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之少陽病有三禁醫若不知而妄行吐下發汗更加溫針損耗津液胃中乾燥以故譫語成注云此木邪干胃也最前條云若柴胡證不罷者復與柴胡湯今柴胡證罷此為壞病正文與注見後第十二卷救逆法中三陽合病脈浮大上關上但欲眠睡目合則汗此條雖系合病實則少陽之邪居多故從少陽篇例成注云關脈以候少陽之氣太陽之脈浮陽明之脈大脈浮大上關上則知太陽陽明之邪將並歸於少陽經矣經熱則膽亦熱故多眠睡目合則汗者月合目則欲寐寐屬陰寐則衛氣行於里邪在半表半裡故目暫合而汗即出也按此條論仲景無治法補亡論常器之云可柴胡桂枝湯龐安時云脈不言弦者隱於浮大也傷寒六七日無大熱其人躁煩者此為陽去入陰故也此條病乃少陽之邪欲傳入陰經也傷寒六七日為邪退正復之時其人身無熱而安靜者此為欲愈也今者身無大熱是熱未盡退也反加躁擾煩亂以邪去陽經而入於陰故躁煩也成注云表為陽里為陰少陽之邪居半表半裡之間邪去少陽則入三陰經矣醫者可不於六七日之間而預為調治以截其入陰之路乎傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也此承上條之病而言乃少陽之邪自解不傳入於陰經也傷寒三日者即素問相傳日數上條言六七日此止言三日可見日數不可拘也邪在少陽原嘔而不能食今反能食而不嘔可徵裡氣之和而少陽之邪自解也既里和而少陽邪解則其不傳三陰斷斷可必故云三陰不受邪也此條注本武陵陳亮斯語傷寒三日少陽脈小者欲已也此條以脈辨少陽病欲已之法也少陽傷寒以脈弦大為病進今者脈不弦而且小乃邪氣已退正氣將復也故云其病欲已已止也少陽病欲解時從寅至辰上注已見前第三卷太陽病欲解注中附例太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈此條系太陽病傳入少陽復入於胃之證太陽病過經十餘日知其時已傳入少陽矣故以二三下之為反也下之而四五日後更無他變前此之柴胡證仍在者其時縱有可下之證須先與小柴胡湯以和解半表半裡之邪如和解之而嘔止者表裡氣和為已解也若嘔不止兼之心下急鬱郁微煩心下者正當胃府之中急則滿悶已極郁煩為熱結於裡此為未解也後與大柴胡湯以下其裡熱則愈上條證並下湯自太陽中篇移附於此大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏半升洗生薑五兩切枳實四枚炙大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也許叔微云若不加大黃恐不為大柴胡此係王叔和語又大黃鬚酒洗生用有力成氏明理論云虛者補之實者瀉之此言所共知至如方有峻緩輕重又當臨時消息焉大滿大實堅有燥屎非駛劑則不能泄是以有大小承氣湯之峻也如不至大堅滿邪熱甚而須攻下者又非承氣湯之可投必也輕緩之劑攻之大柴胡湯用以逐邪熱為下劑之緩者也柴胡味苦平微寒傷寒至於可下則為熱氣有餘熱應火而歸心苦先入心折熱必以苦為主故以柴胡為君黃芩味苦寒王冰曰大熱之氣寒以取之推除邪熱必以寒為助故以黃芩為臣芍藥味酸苦微寒枳實味苦寒內經曰酸苦湧泄為陰泄實折熱必以酸苦故以枳實芍藥為佐半夏生薑味辛溫大棗味甘溫辛者散也散逆氣者必以辛甘者緩也緩正氣者必以甘故用半夏生薑大棗為之使也一方加大黃以大黃有將軍之號而功專於蕩滌不加大黃恐難攻下必應以大黃為使也用湯者審而行之十全之功可得矣王海藏云大柴胡湯治表裡內外俱熱之證治有表者或脈浮或頭痛或惡風或惡寒四證中或有一二尚在者乃十三日過經不解是也治有里者或譫語或妄語或擲手揚視此皆里之急者也若欲汗之則里證已急欲下之則表證尚在通宜大柴胡湯主之琥按上海藏言里證已急表證尚在用大柴胡湯極是但表證云脈浮頭痛惡風寒大抵系太陽經表邪居多吾恐大柴胡非對證之藥必也脈浮弦頭角痛或往來寒熱此方是大柴胡湯之表證也婁全善云傷寒至十餘日外用小柴胡不愈者若大便硬看證可下則用大柴胡下之以過經其人稍虛當下者用大柴胡湯則穩當恐承氣太緊病人不禁也琥按婁氏之意因論大柴胡證偶及承氣耳俗醫不察竟有畏承氣之太緊輒不敢用以大柴胡湯為穩當而代之者噫是又失仲景之旨矣或問大柴胡湯仲景用以治過經不解下證具而病人稍涉虛者宜之故大柴胡湯即小柴胡加減何為乎不留人參也余答云小柴胡湯中用人參者乃輔正氣以除邪氣也大柴胡湯證為邪實而正未虛云稍涉虛者後人之私議也故去人參而加大黃枳實並甘草亦恐其滿中而不用其留大棗者和諸藥之性也其加芍藥者非酸以湧泄之意取其和營而助陰也況病熱之人止虞陰虛勿慮陽損所以劉河間有當歸承氣湯方即仲景於此湯中用芍藥之意也陶節菴制黃龍湯而以人參加入承氣湯中此與仲景之意不大相悖謬歟傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之此條傷寒乃柴胡證與陷胸證並舉太陽之邪已傳少陽故併入少陽篇例傷寒十餘日熱結在裡里者胃府以內也結胸證邪結於胸未全入里此則熱結於裡為可下矣復往來寒熱者太陽之邪猶留於少陽半表半裡之分也止可與大柴胡湯以內下其實外解其邪曰但結胸者言結不在裡也無大熱者言表裡不甚熱也熱不甚故知是水結胸脅此太陽之邪連及少陽經也但頭汗出乃水氣上蒸使然故與大陷胸湯以逐其水並下其微熱此條證自原論中第四卷太陽下篇移附於此大陷胸湯方見前第五卷太陽篇中傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之此條亦太陽病傳於少陽兼入胃府之證傷寒發熱者寒已成熱也汗出不解其邪已進於表當在半表之間心下痞硬嘔吐下利其邪又進而入於腸胃之裡矣成注云吐利心腹軟軟為裡虛今者心下痞硬是裡實也與大柴胡湯以外解其半表之邪內攻其在裡之實上條證自太陽下篇移附於此傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之此條本系太陽傷寒過經不解邪留少陽兼入於胃之證傷寒十三日邪當解矣而不解胸脅滿而嘔者少陽之邪正盛也日晡所發潮熱者胃府之熱方結也邪熱方結何為熱已而即微利蓋此病本大柴胡兩解之證當其未熱時已經下之而不得利今潮熱後反得利者知醫以丸藥下之丸藥性緩以故利偏遲也況丸藥大都熱毒之物以熱攻熱故其利不通暢而甚微此非善治之法也夫潮熱者胃府熱結而實也然胸脅之邪未已故先宜小柴胡湯以解少陽之表邪後即以小柴胡加芒硝湯以下胃府之熱結或問醫以丸藥下之雖非其治然下之後大柴胡證仍在何以不用大柴胡湯余答云醫用丸藥此是許學士所云巴豆小丸子藥強迫溏糞而下夫巴豆辛烈大傷胃氣若仍用大柴胡則枳實大黃之峻胃中之氣已不堪受其削矣故易以小柴胡加芒硝湯用人參甘草以扶胃氣且微利之後溏者既去燥者自留加芒硝者能勝熱攻堅又其性速下而無礙胃氣乃一舉而兩得也柴胡加芒硝湯方此方自原論中第十卷採附於此小柴胡湯內加芒硝六兩余依前法服不解更服內臺方議問曰潮熱者實也即實且熱何不用大柴胡大小承氣湯下之卻用芒硝何也答曰潮熱雖實奈何先以丸藥傷動臟腑再用大黃下之則脾氣傷而覆成壞證只得用芒硝以浸潤之而取利也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之此條乃太陽病並於少陽兼入胃府之證傷寒八九日若似乎可下矣既下之後而胸滿云云者此下之不得其宜陽熱乘虛入里而客於胸中故煩滿也驚者心惡熱而神不安也小便不利者膀胱約而水不行也惟煩滿故熱入於胃而譫語惟小便不利故濕漬於脾脾困則四肢不健運而身重不可轉側與柴胡加龍骨牡蠣湯者外以解熱邪內以除水濕兼鎮浮越之氣而補其中州之虛也上二條證並下方自太陽中篇移附於此柴胡加龍骨牡蠣湯方半夏二合洗大棗六枚柴胡四兩生薑人參龍骨鉛丹桂枝去皮茯苓各一兩半大黃二兩牡蠣一兩半熬上十一味以水八升煮取四升內大黃切如棋子更煮一二沸去滓溫服一升琥按上方用柴胡為君專走少陽以解胸膈之煩滿用人參半夏薑棗茯苓為臣以健脾利小便而療身重用龍骨牡蠣鉛丹為佐以鎮心除驚熱輔以大黃者乃滌胃實而止譫語也使以桂枝者兼入太陽而外行肢體也要是方也表裡齊走補瀉兼施通澀並用恐非仲景之舊或系叔和採輯時有差錯者若臨是證而用是藥吾不敢也何也倘謂胸滿譫語是實證則當用大黃者不當用人參倘謂驚煩小便不利身重是虛證則當用人參大棗茯苓龍骨等藥者不當用大黃況龍骨牡蠣鉛丹皆系重墜收澀陰毒之品恐非小便不利身重所宜尚論篇稱此方有安內攘外補天浴日之功余實愚蒙不敢信以為是也傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之此條系太陽病傳入少陽之證少陽邪多太陽邪少故從少陽篇例傷寒六七日邪氣傳裡之時成注云支者散也謂邪氣之結雖起於心下而散於脅旁後條辨以支字解作撐若有物支撐在胸脅間其義甚明兼之微嘔者此係少陽之邪正盛也外證未去此指上文發熱惡寒支節煩疼而言夫寒熱而曰微支節疼而曰煩此可徵太陽之表邪已輕其勢漸趨於里矣故以柴胡合桂枝湯以兩解之柴胡桂枝湯方此方自原論中第十卷採附於此柴胡四兩桂枝去皮黃芩人參各一兩半甘草一兩炙半夏二合半洗芍藥一兩半大棗六枚擘生薑一兩半切上九味以水七升煮取三升去滓溫服琥按上方乃柴胡合桂枝湯兩方相合之復方其不曰桂枝柴胡湯者以柴胡為君也益可見少陽邪甚太陽邪微矣傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之此條亦太陽病傳入少陽之證傷寒五六日已發汗矣而復下之不無少誤惟誤下以故胸脅滿微結微結者言其邪不甚未入於府正當表裡之間也小便不利者此因汗下之後而津液少也惟津液少而非停飲以故渴而不嘔但頭汗出者此熱鬱於經不得外越故但升於頭而汗出也心煩者即胸煩往來寒熱胸煩者此為少陽之邪未解也故與柴胡桂枝幹薑湯以專解其半表之邪兼散其半里之結也上二條證並下湯方俱自太陽下篇移附於此柴胡桂枝幹薑湯方柴胡半斤桂枝三兩去皮乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈成注引內經曰熱淫於內以苦發之柴胡黃芩之苦以解傳裡之邪辛甘發散為陽桂枝甘草之辛甘以散在表之邪咸以軟之牡蠣之咸以消胸脅之滿辛以潤之乾薑之辛以固陽虛之汗津液不足而為渴苦以堅之栝蔞之苦以生津液琥按上成注云乾薑之辛以固陽虛之汗其說甚誤夫頭汗出者乃陽鬱於表非陽虛於上也如系陽虛不堪再汗豈有方後云復服使汗出之理況乾薑亦辛熱之品助以桂枝能散太陽未盡之表邪若云固汗吾不信矣琥按上方即小柴胡湯加減方也據原方加減法云胸中煩而不嘔者去半夏人參加栝蔞實若渴者去半夏茲者心煩渴而不嘔故去人參半夏加栝蔞根四兩若脅下痞硬去大棗加牡蠣茲者胸脅滿微結即痞硬也故去大棗加牡蠣二兩若心悸小便不利者去黃芩加茯苓茲者小便不利心不悸而但煩是為津液少而躁熱非水蓄也故留黃芩不加茯苓又云若咳者去人參大棗生薑加五味子乾薑茲不因咳而以乾薑易生薑者何也蓋乾薑味辛而氣熱其用有二一以辛散胸脅之微結一以熱濟黃芩栝蔞根之苦寒使陰陽和而寒熱已焉傷寒五六日嘔而發熱者柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯此條系少陽病誤下而成痞結之證成注云傷寒五六日邪在半表半裡之時嘔而發熱邪在半表半裡之證柴胡證具云云至汗出而解注已見前小柴胡湯附例之下心下滿云云乃復言下後之變以出其治然心下滿須有陰陽之分若下後邪氣傳裡陷於胸中成注云胸中為陽受氣之分邪結雖高而硬痛必下此為結胸證也與大陷胸湯以下其結若下後邪氣傳裡留於心下成注云心下為陰受氣之分痞塞雖下而氣逆則高此為痞證也宜半夏瀉心湯以通其痞柴胡不中與之者此言結胸痞氣皆系柴胡證罷故宜另與陷胸等湯也愚按此條可見少陽病誤下之亦有痞結之證前第五卷太陽下篇云太陽病誤下之因作結胸太陰病誤下之因作痞氣茲者少陽病誤下邪在半表半裡居陰陽之間故亦有痞結證也夫人身腹陰而背陽少陽行身之側居陰陽之間為半表裡然人身膈以下屬陰膈以上屬陽少陽居清道而協乎膈之間亦為半表裡此可徵少陽病誤下邪氣乘虛入里而結胸痞氣所由分矣大陷胸湯已見前第五卷太陽下篇半夏瀉心湯方半夏半升洗黃芩乾薑甘草炙人參以上各三兩黃連一兩大棗十二枚擘上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服成注云辛入肺而散氣半夏乾薑之辛以散結氣苦入心而泄熱黃連黃芩之苦以泄痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩之愚以結胸挾實痞氣挾虛故用人參甘草大棗之甘緩以補之也內臺方議曰病在半表半裡本屬柴胡湯反以他藥下之虛其腸胃邪無所歸故結於心下重者成結胸心下滿而硬痛也輕者為痞滿而不痛也若此痞結不散故以黃連為君苦入心以泄之黃芩為臣降陽而升陰也半夏乾薑之辛溫為使辛能散其結也人參甘草大棗之甘以緩其中而益其腸胃之不足使氣得平上下升降陰陽得和其邪之留結者散而已矣經曰辛入肺而散氣苦入心而泄熱甘以緩之三者是矣太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之此條雖系太少合病實則少陽之證居多故從少陽篇例成注云太陽陽明合病自下利為在表宜發汗陽明少陽合病自下利為在裡宜下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解半表半裡之邪嘔者胃氣逆也加半夏生薑以散逆氣愚意以此必是胃中有停飲而作嘔故宜加也黃芩湯方黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩原論中第十卷方用生薑止一兩半成注云虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以補固腸胃之弱琥按上黃芩湯成氏既云和解半表半裡之邪及其注方中藥味止云堅斂補固腸胃之氣弱而不及解表何也蓋太少合病而至自利則在表之寒邪悉鬱而為裡熱矣裡熱不實故與黃芩湯以清熱益陰使裡熱清而陰氣得復斯在表之陽熱自解所以此條病若太陽桂枝在所當禁並少陽柴胡亦不須用也內臺方議云上方用黃芩為君以解少陽之裡熱此言與成注之意相合又云用芍藥為臣以解太陽之表熱而行營氣吾恐芍藥無桂枝不能走表若云解太陽之熱而行營氣牽強鈕合殊悖於理上二條證並湯俱自原論中第四卷太陽下篇移附於此琥按上少陽病脈證並治法仲景原論中止十條列之第五卷陽明篇後其餘方論雜入太陽篇者居多愚因採附本篇復合下昔賢方論共為一卷斯醫人臨證揀方始為備而可據耳附昔賢治少陽病方論變法深師療傷寒六七日發汗不解嘔逆下利小便不利胸脅痞滿微熱而煩有黃芩湯方黃芩湯方黃芩桂心各三兩茯苓四兩前胡八兩半夏半升洗上五味切以水一斗二升煮取六升分為六服日三服夜三服間食生薑粥投取小便利為瘥琥按上主療云發汗不解邪入胸脅痞滿者少陽病也其曰嘔逆曰小便不利曰微熱而煩當是小柴胡加減之證但其曰下利又當是太少合病此方名黃芩湯與仲景黃芩湯大不相同然亦各盡其妙方中用黃芩前胡者治胸脅煩熱而痞滿也用半夏茯苓者止嘔逆而利小便也小便利而利自止矣其用桂心有二義焉一以佐前胡而散在表不解之寒邪一以導茯苓而通膀胱不利之水濕要之是方也亦不可執倘裡熱而陽盛宜去桂也愚以嘔逆甚者加橘紅痞滿甚者加枳實煩甚加栝蔞實下利腹痛加白芍藥臨證加減全在以意會之而已姚氏集驗療傷寒七八日不解默默煩悶腹中有干糞譫語大柴胡湯方柴胡半夏湯洗各八兩生薑四兩知母芍藥大黃葳蕤各二兩甘草炙一方加枳實四兩黃芩二兩上十味切以水一斗煮取三升去滓溫服一升日三服琥按上方即仲景大柴胡湯少變其制仲景方有大棗無甘草要之甘草與大棗同一甘溫也又按上主療云默默煩悶當即是仲景大柴胡湯證中雲鬱郁微煩義同但煩悶者其熱已極甚於微煩所以大柴胡湯中復加知母葳蕤之苦寒甘潤以清解之也千金療傷寒頭痛壯熱百節疼痛湯方柴胡芍藥梔子仁知母各四兩香豉一升綿裹石膏八兩碎黃芩大青升麻杏人去雙人皮尖各三兩上十味切以水九升煮取二升七合分三服若熱盛者加大黃四兩琥按上方乃療少陽陽明經中有鬱熱兼清肺胃燥熱之劑其曰頭痛乃火熱上攻而痛非寒邪中於經也曰百節疼痛乃熱蒸骨節而疼痛亦非寒邪束於表也據上方後云若熱盛者加大黃則知經中之熱盡入於胃矣此方與仲景大柴胡湯同義但大柴胡治裡實濕熱此湯治裡實燥熱為少異耳崔尚書療傷寒六七日不解寒熱往來胸脅苦滿默默不欲飲食心煩喜嘔寒疝腹痛小前胡湯方前胡八兩半夏半升洗生薑五兩黃芩人參甘草炙各三兩干棗十二枚擘上七味以水一斗煮取三升分四服琥按上方即仲景小柴胡湯去柴胡而易前胡也陶弘景雲前胡與柴胡同功愚以治證雖同然柴胡純陽而能上升此則陽中之陰其功長於下氣耳據上主療云云皆系少陽經病但其云寒疝腹痛病屬厥陰恐非上湯所能兼療也又療傷寒八九日不解心腹堅滿身體疼痛內外有熱煩嘔不安大前胡湯方前胡半斤半夏半升生薑五兩枳實八片當是八枚炙芍藥四兩黃芩三兩干棗十二枚擘上七味以水一斗煮取三升分四服日三夜一琥按上方又即仲景大柴胡湯方去柴胡而易前胡也仲景原方中本無大黃王叔和云若不加大黃恐不名大柴胡湯今崔氏名大前胡恐亦當加大黃二兩也況上主療云心腹堅滿煩嘔不安此即大柴胡湯證云心下急痞硬嘔不止鬱郁微煩同也表既不解里證又急其當加大黃無疑張文仲療晚發傷寒三月至年末為晚發方生地黃一斤打碎梔子二十枚擘升麻三兩柴胡石膏各五兩上五味以水八升煮取三升分五服頻頻服若不解更服若頭面赤去石膏用乾葛四兩無地黃用豉一升煮取三升分三服琥按上主療云三月至年末為晚發乃知四時皆有傷寒病也然年末系冬為正傷寒不得云晚發則晚發當自秋止矣上方乃治少陽陽明二經燥熱之劑活人柴胡半夏湯方治痰熱頭疼利膈除煩悶手足煩熱營衛不調肢節拘倦身體疼痛嗜臥少力飲食無味兼治五飲消痰癖柴胡八兩半夏二兩半洗白朮甘草炙人參黃芩麥門冬去心各三兩上銼如麻豆大每服鈔五錢匕水一盞半生薑五片棗子一枚煮至八分去滓溫服琥按上方即仲景小柴胡湯中加白朮麥門冬也推制方之意以白朮能燥脾而治痰之本麥冬能清肺而防熱所傷愚以痰熱雖甚方中既有黃芩則麥冬亦可以不用況濕熱之痰非麥冬所能清也據上主療云頭疼體痛膈間煩悶當是風寒外來熱鬱於少陽之經而生痰恐未必驟至於虛耳方中若人參白朮宜審用之或者病已久嗜臥少力能飲食而無味是為實證成虛如人參白朮不妨加用然亦須以枳實陳皮等相佐服之宣明柴胡飲子治傷寒發汗不解寒熱往來或中外諸邪熱口乾煩渴或下後熱未愈汗後勞復等證柴胡人參黃芩甘草大黃當歸芍藥各半兩上為末每服鈔三錢水一盞生薑三片煎至七分溫服日三病熱甚者加減之琥按上方即仲景大柴胡湯去半夏枳實大棗加人參當歸也以口乾煩渴故去半夏復去大棗者因煩渴一候必邪熱甚而氣上逆恐大棗之甘能壅氣也又以胃府但熱而不實故去枳實或問熱而不實何以不去大黃殊不知方中用大黃者止以除裡熱又恐有傷陰分之血所以方中用芍藥復加當歸也愚又以方中惟人參一味不宜與大黃並用有如中外邪熱或下後熱未愈則宜用大黃者不宜加人參恐人參甘溫反能助邪熱也又如汗後勞復則宜加人參者不宜用大黃以大黃苦寒徒以致裡虛也且方後原云病熱甚者加減之夫熱甚必實寒甚必虛若熱甚還當加大黃減人參也後人不原制方之意不知加減一概並用譬之陶氏黃龍湯流禍至今而未已也難知小柴胡湯方療傷寒少陽證胸脅痛往來寒熱而嘔或咳而耳聾脈尺寸俱弦忌發汗忌利小便忌過大便止宜和解故名三禁湯即仲景小柴胡湯七味分兩減半其原方加減法同復有新增加減法茲録於後如寒熱往來經水不調者去半夏加秦艽芍藥當歸知母地骨皮丹皮川芎白朮茯苓婦人虛勞發熱加蛤蚧赤茯苓如小柴胡湯與四物湯各半名調經湯愚以婦人傷寒或中風經水適來適斷寒熱發作如瘧者宜用此湯也無孕嘔者加半夏無汗者加柴胡惡寒者加桂有汗者加地骨皮嗽者加紫菀通經者加京三稜廣茂勞者加鱉甲按上加藥法系治婦人雜證法也琥按上湯名三禁而以利小便為一禁其說蓋自云岐子保命集始保命集云治少陽有三禁不可汗不可下不可利小便此為三禁獨不觀仲景辨少陽中風首云不可吐下辨少陽傷寒又云不可發汗成無己明理論亦云少陽病邪在半表半裡既非發汗所宜又非吐下所對止宜和解故云三禁若然則是汗下之禁雖同利小便與吐大異先聖後賢其說孰是孰非愚曾細思之而以仲景之言為是若利小便不在所禁也據少陽篇壞病云若已吐下發汗溫針譫語者柴胡證罷此為壞病未聞云利小便而至壞也又據柴胡湯後加減法云若心下悸小便不利者去黃芩加茯苓又內臺方加藥法云如發熱小便不利者和五苓散益可見利小便在所不禁矣或云膽有上竅宜吐木性曲直風寒鬱其經則屈而不升故宜用吐以升發之所以可吐篇云大法春宜吐膽屬少陽而時應乎春是吐在所不禁禁利小便者以膽無下竅且逆其性而導之也其說近是其理則非斷不可從戒之慎之寶鑑小柴胡加地黃湯方治婦人室女傷寒發熱經水適來適斷晝日明瞭夜則譫語如見鬼狀亦治産後惡露方來忽然斷絶欲死柴胡一兩二錢半人參半夏湯泡七次黃芩甘草炙生地黃酒洗各七錢云岐子方用牡丹皮二兩無生地黃上六味㕮咀每服五錢水二盞生薑三片棗子一個煎至一盞去渣溫服不拘時琥按上方即仲景小柴胡湯加生地黃也婦人熱入血室系血虛且瘀者宜此方必經水既來而適斷也若欲來而忽斷者為熱入而血實證還宜加當歸赤芍桃仁紅花等藥若熱入而經水過多者為血虛而不瘀又宜加川芎白芍發灰等藥此云岐子法也陶氏柴胡雙解飲治少陽膽經受證耳聾脅痛寒熱嘔而口苦脈來弦數屬半表半裡宜和解此經膽無出入有三禁不可汗下吐也止有小柴胡一湯隨病加減再無別湯柴胡黃芩半夏甘草人參陳皮芍藥近本上七味無分兩水二鍾姜一片棗二枚槌法入生艾汁三匙煎之溫服琥按上方即仲景小柴胡湯內加陳皮芍藥也方後入生艾汁三匙者以生艾氣溫味苦辛肘後方用以治時氣溫疫頭痛壯熱脈盛故陶氏加之耳若云加入上湯中如殺車槌之有力此亦甚形其功吾不信也附陶氏加減法本經證小便不利者加茯苓本經嘔者入薑汁竹茹脅痛加青皮痰多加瓜蔞仁貝母愚以貝母力緩不如改用枳實寒熱往來似瘧者加桂枝渴者加天花粉知母去半夏齒燥無津液加石膏嗽者加五味金沸草愚以五味宜用南産黃色者壞證加鱉甲本經證心下飽悶未經下者非結胸乃表邪傳至胸中未入於府證雖滿悶尚為在表只須小柴胡加枳桔未效就以本方對小陷胸加枳桔一服豁然其妙如神虛煩類傷寒證本方加竹葉炒粳米愚以方中無石膏粳米不須加也本經與陽明合病本方加葛根芍藥如拾芥言不須多用也婦人熱入血室加當歸紅花男子熱入血室加生地黃愚按血室義已見前小柴胡附例之後即血海也男子婦人皆有之但男子之血不能充於血室血不充則不盈不盈亦不去也不去則血無所虧無所虧則熱亦不能入所以在男子從無熱入血室之證今陶氏不讀書不明理止知男子之身亦有血室因取巧而造立病名令人噴飯老弱人傷寒無表證其熱勝者本方加大黃甚者加芒硝琥總按上古今諸名家治少陽病方論實與仲景之旨互相參合者醫人不可以不知也
