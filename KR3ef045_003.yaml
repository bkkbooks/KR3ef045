body:
  text: 卷之三辯太陽病脈證並治法上此係仲景原文王安道云仲景之書叔和所增入者辯脈平脈與可汗可下等諸篇而已其六經篇非叔和所能讚辭也緣注太陽上篇仍遵仲景之舊云爾太陽之為病脈浮頭項強痛而惡寒此言太陽之為病是總下文中風傷寒而立論也按黃仲理云太陽之為病脈浮頭項強痛而惡風寒寒字上又增一風字乃知惡寒二字不但指傷寒而言連中風之候亦在其中太陽之經主表故成注云此是太陽表病太陽病發熱汗出惡風脈緩者名為中風太陽病即上文云脈浮頭項強痛是也篇中凡言太陽病皆仿此夫太陽表病有營衛之分成注云風則傷衛寒則傷營風為陽邪故病即發熱汗出惡風者人受風邪所傷則皮腠疏氣不能衛固其外故也方氏條辯云風性柔和故脈見緩或云脈緩當作浮緩看浮是太陽病脈緩是中風脈下文云緊脈亦當仿此愚以上言中風非東垣所云中腑中臟中血脈之謂蓋中字與傷字同義仲景論中不直云傷風者恐後學不察以咳嗽鼻塞聲重之傷風混同立論故以中字別之也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒風傷衛之證上文已言之矣此特舉寒傷營之證而發明之經云人傷於寒則為病熱仲景云或未發熱者成注以寒為陰邪不能即熱鬱而方變熱也傷寒惡寒勢所必至體痛者寒傷營營主血血為寒氣所凝故作痛嘔逆者胃口亦受寒氣所郁而作嘔也脈經云寸口為陽尺中為陰傷寒之脈尺與寸俱緊者成注云寒性勁急故也愚按此條論於未發熱下當增無汗二字然云惡寒體痛則無汗之意即在其中又按體痛尚論篇誤注作體重且云仲景恐人見惡寒體重嘔逆又未發熱誤認為直中陰經之證故早揭此語於辯證之先獨不思仲景論太陽病開口便雲頭項強痛何至與陰經錯誤喻氏之言何懵懂之至邪傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也此言傷寒乃兼上中風之證而言下言二三日傷寒亦仿此脈靜者謂浮緊者不甚緊浮緩者不甚緩也以外來風寒之邪約略言之則一日太陽二日陽明三日少陽成注云陽明胃經受邪則喜吐頗欲吐者言不但乾嘔作逆直欲大吐乃病進之兆也躁煩者熱鬱之極脈數者一息五六至之謂急疾也言太陽病欲傳入陽明不惟脈緊者數而急疾即緩脈亦變而為數且疾也傷寒二三日陽明少陽證不見者為不傳也條辯云上言不傳乃是太陽病向愈之候此言不傳當兼太陽病不解之候成注亦云知邪不傳止在太陽經中此是不解之意附後例太陽病發熱而渴不惡寒者為溫病此條是陽明病溫而亦列於太陽篇者以初病起即頭項強痛故也然此條既系溫病不可與風寒同治因另立治溫法在後第十三卷中若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若彼下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期小便不利四字當在若被下者四字之上否則既云不利又曰失溲悖矣此即上條溫病誤發其汗變作風溫是為一逆復誤下或誤火是為再逆程氏後條辯云凡風溫身重多眠語言難出小便不利直視失溲發黃驚癇瘈瘲等此皆溫病中之壞病亦宜入治溫論正文與注詳見後第十三卷中病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也凡病有身發熱而外作惡寒之狀者此風寒之邪傷於陽經而發乃傷寒病也有身無熱而外作惡寒之狀者此風寒之邪直中陰經而發為中寒病也陽數奇故愈約以七日七者少陽之數也陰數偶故愈約以六日六者老陰之數也成注以火成數七水成數六為解亦通愚按條辯云無熱惡寒者乃傷寒或未發熱之時尚論篇云寒邪初受未郁成熱要之此言終是太陽病仲景云一二日發者烏得云病發於陰若以寒傷營營為陰作解牽強極矣張氏纘論云此條以有熱無熱證陽病陰病之大端乃陰陽寒熱關頭學者所當體認上論宜入前第二卷傷寒例中太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈欲作再經準繩作欲再傳經猶言再傳一經也太陽者巨陽也內經云七日巨陽病衰頭痛少愈行其經盡者謂寒邪之行只在太陽一經至七日則太陽之邪不外泄即內入故曰盡也凡諸經之邪必至七日為行經盡而自愈之時如陽明病身熱二日受者八日愈少陽病耳聾三日受者九日愈皆七日以上也欲作再經者謂太陽病邪之初鬱熱不散欲再傳經當是陽明受之非若成注云傷寒自一日至六日傳三陽三陰經盡至七日當愈不愈則太陽之邪再傳入陽明也仲景立此條是設一截病法云太陽病愈必至七日以上太陽病傳止在二三日間醫者宜及此時針足陽明迎而奪之以泄其熱則病邪之氣已衰縱使有經而不至於傳則其病自愈條辯云奪其傳路而遏之遏之之意猶未善解針足陽明穴詳後第十四卷刺熱法中愚按成氏此條注謬甚尚論篇承其謬云太陽之邪傳至厥陰六經盡矣至七日當愈設不愈則七日再傳太陽八日再傳陽明豈非謬中之謬邪考馬玄臺內經注云自太陽至厥陰猶人由戶升堂入室厥陰復出傳於太陽奈有少陰太陰少陽陽明以隔之豈有遽出而傳太陽之理此斥再傳之非實為千載定論太陽病欲解時從巳至未上太陽者盛陽也成注云巳午未太陽氣王故乘其時而病解後條辯云太陽病欲解必藉令未土土者陰陽之沖氣也緣病之發也非虛發必陰陽之乖氣有乘吾之經氣者病之解也不徒解必陰陽之沖氣有王吾之經氣者愚謂四時之氣如春溫夏熱秋燥冬寒皆遇土令而後得解六經之解各以三時太陽從巳至未未土也陽明從申至戌戌土也少陽從寅至辰辰亦土也太陰從亥至醜少陰從子至寅厥陰從醜至卯三陰之解亦以土也此為至當不易之理成注總解云陽行速陰行緩陽生於晝陰生於夜三陽經解時從寅至戌以陽道常饒也三陰經解時從亥至卯以陰道常乏也按此論亦有理風家表解而不了了者十二日愈成注云中風家發汗解後未全快暢此即是不了了必俟十二日六經行盡之時餘邪悉去不治自愈病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也身大熱者足太陽病已發熱之時也欲得近衣是表惡風寒也熱在皮膚是寒鬱而肌表蒸熱也寒在骨髓是風寒之氣束人肌骨間也凡人病外傷風寒則遍身骨節入髓疼痛而作惡寒之狀捫其皮膚則大熱烙手此係太陽表證故列入太陽上篇身大寒者謂病傳三陰邪已入腑表無熱也不欲近衣是內熱發煩躁也寒在皮膚謂內熱亢甚肌表反作冷也熱在骨髓是為鬱熱在裡深入臟腑間也凡人病外傷風寒表之不散傳入於府胃腑實熱久不得泄揚手擲足大作煩躁之狀捫其肢體間厥逆冰手此非太陽病例仲景舉此對代而言之耳愚以病人身熱欲得近衣者仲景法宜用麻黃湯以汗之身寒不欲近衣者宜用大柴胡湯或三承氣湯以下之按成注以皮膚骨髓有淺深內外表里之分後條辯不察其誤謂病人身大熱反欲得近衣者是沉陰內錮而虛陽外浮皮膚表熱是假骨髓裡寒是真悖謬極矣身寒不欲近衣注與上同義茲不盡述或云此條非仲景論系叔和所增入者詳其文義與陽盛陰虛汗之則死云云又桂枝下咽陽盛則斃云云同擀此危疑之辭以驚惑人耳例宜從刪太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之歷舉上十二條但論太陽中風傷寒溫病等脈證此條特舉治法而申言之也中風脈緩陽浮陰弱者脈緩之義也診脈之法有浮中沉三候浮取之為陽沉取之為陰陽以候衛陰以候營陽脈浮則衛氣虛而皮腠空疏風易透之風性本熱故不待閉鬱而熱自發也陰脈弱則營血虛而津液漏泄熱復蒸之熱氣迫血故不待覆蓋而汗自出也成注云嗇嗇者不足也惡寒之貌淅淅者灑淅也惡風之貌蓋人病外感之證未有惡風而不兼惡寒惡寒而不兼惡風者不可拘拘於傷風但惡風也翕翕者言如合羽所覆熱發在表故也鼻鳴者肺開竅於鼻又主皮毛皮毛失護風熱壅而氣喘作聲也乾嘔者諸陽受氣於胸中太陽之真氣不能外布故胸中逆塞而欲作嘔也與桂枝湯者成注云和營衛而散風邪也愚按成氏注太陽中風雲風並於衛則衛實而營虛又引經云太陽病發熱汗出者此為營弱衛強其言強實者乃風邪之氣入於衛中既強且實也如衛中之氣果系強實何由而外惡風寒邪予故於陽脈浮下竟注作衛氣虛也營血果系虛弱矣然此不過因其自汗出汗為血液故曰虛耳如營中之血果虛則仲景與桂枝湯後不當復云溫覆以出其汗矣大抵外感之病以驅邪為主風寒之邪入於營衛營衛中真氣總系虛弱但一時為邪所入必先用發散藥攻去其邪待邪氣去盡方可以虛弱立論成注所言不甚明暢因多削去以方喻程三家之注及鄙意以補之桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾歠熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促伇其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物小促伇言催促煮藥之人也宋版作少從容此係傳寫之誤成氏明理論云經曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也云云蓋桂枝湯本專主太陽中風其於腠理致密營衛邪實津液禁固寒邪所勝者則桂枝湯不能發散必也皮膚疏湊又自汗風邪干於衛氣者乃可投之也仲景以解肌為輕以發汗為重是以發汗吐下後身疼不休者津液內耗也雖有表邪而止可解肌故須桂枝湯少和之也桂味辛熱用之為君桂猶圭也宣導諸藥為之先聘是謂辛甘發散為陽之意蓋發散風邪必以辛為主故桂枝所以為君也芍藥味苦酸微寒甘草味甘平用以為臣佐者內經所謂風淫所勝平以辛佐以苦以甘緩之以酸收之是以芍藥為臣而甘草為佐也生薑味辛溫大棗味甘溫二物為使者內經所謂風淫於內以甘緩之以辛散之是用以為使也薑棗之味辛甘固能發散而此又不特專於發散以脾主為胃行其津液薑棗之用專行脾之津液而和營衛者也麻黃湯不用薑棗者謂專於發汗則不待行化而津液得通矣琥按上成論如此明暢則仲景立桂枝湯方似乎一味不可增損宜乎後人用之無不效矣予每見今醫執此方而准投於冬月太陽病一二日有汗之傷風及服之非徒無益反有害者何也愚以太陽傷風證未必盡人皆真正營弱者內臺方議云使其人稟質素壯氣血有餘壯熱不止脈卻陽浮而陰盛其外證仍自汗惡風本方中當用赤芍藥以瀉營中之邪實也世傳仲景桂枝湯方內用白芍藥者乃補營兼實衛之劑在病人必體虛不任風寒其脈浮緩微弱其熱翕翕然不甚其汗時出無有止時方可竟投桂枝否則風邪始盛於表而用白芍藥之酸以收之大棗炙甘草之甘溫以補之吾恐雖有桂枝之辛熱生薑之辛溫其風寒之邪何能盡由此二味而發散邪當日仲景設立此方必為正氣虛而表邪微者用耳今之治傷寒者必欲祖而行之其誤多矣琥又按中風發熱甚至鼻鳴乾嘔者此邪熱也邪熱之氣不能殺穀言不能勝穀氣也仲景於桂枝湯方後云服已須臾歠熱稀粥一升余必其人外雖病頭項強痛發熱自汗惡風寒內則飲食如故胸膈未嘗痞滿故令其歠熱稀粥且禁其勿食肉面等物也予每見今人病風寒必先挾食者多故非惟不敢歠熱稀粥並不敢投桂枝湯恐炙甘草大棗之甘溫反作脹滿故也後學如讀書不明理見證審脈不親切執一桂枝湯方以治太陽中風證差錯不少慎之慎之琥又按仲景於桂枝湯方下云溫覆令微汗若一服汗出不必盡劑若不汗更作服又不汗服至汗出則此是發汗藥也成氏明理論又引經云桂枝本為解肌若脈浮緊發熱汗不出者不可與之又似止汗之藥何也愚謂太陽傷風乃表虛為風寒所襲其自汗必有時而出有時又止出不能透所以發熱不休仲景用桂枝湯者以辛甘發散肌表之風邪使邪去則表密而汗自止熱自休乃發中有止之義太陽病頭痛發熱汗出惡風者桂枝湯主之此言太陽病同是頭痛發熱只要認其證必汗出惡風乃為中風方可投桂枝湯也太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之𠘧音殊𠘧𠘧者鳥飛羽短伸頸之貌太陽病項背強矣復𠘧𠘧然頸不得舒頸之經屬陽明項背與頸𠘧𠘧然其狀當無汗矣今反汗出惡風仲景法太陽病汗出惡風者桂枝湯主之今因其𠘧𠘧然故加葛根於桂枝湯中以兼祛陽明經之風也成氏不解此義而云藥味與桂枝湯同且疑其有麻黃為誤甚矣愚按此條當是太陽陽明中風證上桂枝句云云當作桂枝湯加葛根主之其義始明桂枝加葛根湯方此方自原論中第十卷採附於此葛根四兩芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘桂枝二兩去皮上六味以水一斗先煮葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須歠粥余如桂枝湯法琥按上方乃桂枝湯中加葛根一味藥也夫桂枝湯仲景用以治太陽中風汗出惡風之證今者項背強又復𠘧𠘧然而頸拘縮夫𠘧𠘧者本為寒甚寒甚者當無汗今則反汗出而惡風此係太陽傷風證因多𠘧𠘧然拘縮之狀故於桂枝湯中加葛根為君以祛風邪解肌表太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之此條是誤下未至大壞之證成注云太陽屬表而反下之則虛其里陽邪乘虛入里氣當下陷今者雖下而不至大壞裡氣未虛仍然上衝是猶之前條桂枝湯證風壅氣逆欲作乾嘔之狀也故云可與桂枝湯方用前法若不上衝者裡氣虛餒陽邪入里不復在表故云不可與桂枝湯方也按條辯及尚論篇注云可與桂枝湯方用前下藥法合表裡而兩解之如桂枝加大黃湯之類是也此言於義未合學者宜從成注為是附後例太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之此條是壞病正文與注見後第十二卷救逆論中仲景論於此條之下接桂枝本為解肌云云愚考桂枝證有雜入太陽中篇麻黃青龍湯內者因採附於下以便學者記習要於仲景原文不敢前後倒亂也附例太陽病外證未解脈浮弱者當以汗解宜桂枝湯外證未解謂頭痛項強惡寒等證猶在也脈浮弱者即陽浮陰弱之謂辯證據脈則不論日久猶當以微汗解肌故云宜桂枝湯也太陽病下之微喘者表未解故也桂枝加厚朴杏人湯主之下後氣奪於下呼吸不續而喘者是為虛喘今曰微喘此雖因誤下裡氣未奪反上逆而與表邪交錯於胸中故與桂枝湯以解表加厚朴杏人以下胸中之逆氣也尚論篇以喘為真氣虧乏復加厚朴杏人以泄氣利喘誤矣杏人之人與仁同外臺千金皆從人太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之外證未解者謂表證未全解也王宇泰云但有一毫頭痛惡寒即為在表表證未解雖有可下之證不可下也下之為逆逆者為病在外而反攻其內於治法為不順也若下之而外證仍未解者仍當解外故云宜桂枝湯主之也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之先發汗不解而復下之是粗工死守汗下之法不知脈理故也汗後脈浮者為不愈以脈浮為邪在外醫人反下其內故令病不愈也今止據脈浮知邪在外不論既汗且下須當以桂枝湯解其外邪則自愈愚按上文云先發汗當是太陽病脈浮緊無汗先用麻黃湯以發之緊脈去而浮脈存汗雖出而表不解所以不論誤下但據脈浮當須改用桂枝湯以解其肌也病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯此明中風病所以衛受風邪營反汗出之理病常自汗出者謂時時汗自出也傷寒無汗為營氣傷今既有汗則營氣無傷而得和矣營氣雖和於內而外不與衛氣相諧以衛中有客邪之氣所以不共營氣和諧故爾營行脈中為衛之守衛行脈外為營之護未有衛病而營不病者故汗亦營中之液非但衛疏而後出也病雖常汗治當復發其汗使衛中客邪之氣去斯營與衛自相和諧則愈故云宜桂枝湯病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之藏無他病者謂里和能食二便如常也時發熱自汗出者謂有時發熱有時不甚熱有時汗出有時汗不出也衛氣不和即前條云不共營氣和諧之意故自汗時出而久不得愈先其時者謂及其發熱自汗之時用桂枝湯以透發其汗則愈苟失其時則風邪入里病熱必深桂枝湯非所宜矣傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯六七日不大便明系在裡有熱故雖頭痛必是陽明熱蒸此可與承氣湯若其人小便清者知熱不在裡仍在表也雖不大便六七日當鬚髮其汗以解其在表之熱若頭痛不已者為風寒之邪上壅熱甚於經勢必至衄須乘其未衄之時宜用桂枝湯以汗解之或問此條乃傷寒頭痛有熱當鬚髮汗何以不用麻黃湯予曰若麻黃湯證當見身疼痛矣且也麻黃湯證表熱顯然雖不大便六七日何至欲與承氣湯大抵桂枝證有與承氣證相似者故仲景云桂枝下咽陽盛則斃承氣入胃陰盛以亡也二藥錯誤立至死亡所以驗小便實為仲景妙法傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之傷寒發汗者謂太陽傷寒服麻黃湯發汗身涼為已解至半日許復煩者身復發煩熱也脈浮數者脈轉浮數也尚論篇云此明系汗後表疏邪風襲入所致雖仲景法脈浮而數者可發汗宜麻黃湯然此條病已曾用過麻黃湯發汗矣故當更方以發其汗宜桂枝湯以主之也太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之營弱衛強者即前太陽中風桂枝湯說注云衛實而營虛之意後條辯云何以云弱正氣奪則虛故云弱也何以云強邪氣盛則實故云強也營中之陰既正虛而不守衛外之陽復邪實而失護故使汗出而發熱也欲救衛間之邪風者成注云與桂枝湯以解散風邪調和營衛桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也肌者膚肉之間也風邪傷衛衛行脈外正當膚肉之間方用桂枝湯以救解之若其人脈浮而緊發熱汗不出者此係太陽傷寒寒傷營乃麻黃湯證桂枝湯中有芍藥收斂寒邪是藥與病相反不可與也醫者常須識認此證勿令病家錯誤服之若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也成注云酒客內熱其於無病時熱氣熏蒸膚腠間固多汗矣及其病風寒之邪脈必浮緩而汗出可知醫人不可據脈驗證執一桂枝湯與之其得湯必作嘔而吐出何也以酒客既傷於酒又挾外邪胸中必滿而逆若食甘則愈滿故不喜也即一酒客病則凡太陽中風而挾食者桂枝亦在所當禁可類推矣喘家作桂枝湯加厚朴杏子佳佳坊本作仁此云喘家者乃太陽中風證自汗而增喘也喘為風甚氣壅故作桂枝湯必加厚朴杏人以泄利逆氣凡服桂枝湯吐者其後必吐膿血也桂枝之性本熱服湯之人如系酒客之類得之而吐者以其人胸膈中素有濕熱更服桂枝湯則兩熱相搏鬱蒸既久津液銷敗而為膿血此為肺胃受傷蓋風寒之來先傷肺服湯之誤覆敗胃故也愚按此條證仲景無治法補亡論常器之云可服類要芍藥地黃湯郭白雲云見膿血而後可服太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之此條乃風寒之邪始從太陽直中少陰其人肌表空疏衛外之陽本虛無熱可郁誤投麻黃湯大發其汗成注云亡陽脫液系真寒之證正文與注並湯詳見中寒論中太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之此條太陽病與上條太陽病同是真寒之證醫人不察漫以桂枝加大黃湯或以調胃承氣湯下之後成注云陽氣已虛故見脈促胸滿微惡寒此亦真寒證正文與注並湯詳見中寒論中太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯太陽病得之八九日者蓋言太陽經頭項強痛發熱惡寒之證雖日久而猶在也但其時熱多寒少漸漸變亂故云如瘧狀也趙嗣真云此是首一節為自初至今之證下文皆擬病防變之辭當分作三截看其人不嘔清便欲自可者言風寒之邪不傳於裡裡氣和而不作熱也一日二三度發者言寒熱如瘧之來而頻數邪氣淺而欲衰脈亦微緩此是向愈之證不須治也若其人脈氣微矣則知裡熱不甚又復惡寒此惡寒者乃四肢及肌表間微覺怕冷蓋病已八九日非比初時發熱惡寒之甚則知表邪亦微此為陰陽俱虛表裡無證故知不可更發汗及更吐下也此段論仲景本無方治活人釋疑雲宜溫之纘論云宜小建中湯加黃耆不在溫經之例若其人面反有熱色者乃陽邪之氣外薄故面作赤色雖八九日而表證尚在未欲解也陰寒之邪束其陽熱以故不得小汗營衛不和身必作癢成注云與桂枝麻黃各半湯小發其汗以除表邪桂枝麻黃各半湯方此方自原論中第十卷採附於此桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏人二十四個湯浸去皮尖及雙人者上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合琥按上方乃治太陽病得之八九日而病仍在太陽因作如瘧等狀內臺方議云如瘧狀者乃先發表不盡風寒之邪留滯於經不能即出故面反有熱色身必作癢用麻黃桂枝之複方減其劑以取小汗是總風寒而兩解之也或問傷寒八九日如瘧狀發熱惡寒熱多寒少其人不嘔則是病人前已作嘔過矣方其嘔時焉知非少陽柴胡證縱其人尚有太陽頭項強痛之候焉知其不與少陽合病邪若然則吾子於何證辯之予曰於寒熱時辯之少陽之寒熱必先寒而後熱或熱已而復寒方其寒之來也必手足厥冷面色青白背上粟起大作戰慄及其熱之來也必頭面手足四肢胸背蒸蒸然無處非熱或微汗出甚則欲揭去衣被熱來則寒往熱往則寒又來此方是少陽經病今則於發熱之時隨則惡寒又熱多於寒其寒不甚其人面上於惡寒時反作赤熱之色故知其為太陽病無疑尚論篇以寒熱往來作注大謬之極醫人倘遇此證於方藥中宜權變取用亦不可拘拘然但執一麻桂各半湯以投之也附後例太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈服桂枝湯反增煩熱此係風邪甚而湯藥之力不能以即解也故宜另用刺法刺法與穴圖俱見後第十四卷中服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯服桂枝湯汗大出者此出汗不得其法所以中風之脈本浮緩而反得洪大可見病不除而風熱愈盛必再與桂枝湯如前法服之溫覆令一時許遍身漐漐微似有汗則病自瘥也若其人病不瘥其形如瘧者大都是熱多寒少之證以其脈見洪大故也日再發者邪氣淺而欲散之候愚按此條是外寒束其風熱乃營衛俱傷之證但風邪多而寒氣少耳法當微發其汗汗出必解故成注云與桂枝二麻黃一湯以解散營衛之邪桂枝二麻黃一湯此方自原論中第十卷採附於此與前方藥味相同但分兩各別耳桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏人十六個去皮尖甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再琥按上方乃治太陽病服桂枝湯大汗出後其形如瘧之證內臺方議云是原發汗不盡餘邪在經所致然既大汗出矣何以猶有餘邪蓋取汗之法不可令如水流漓是不惟中風之候不除更襲以外寒之氣故以桂枝湯為主略加麻黃杏人以散輕寒也服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之桂枝湯從今從俗成注云大汗出脈洪大不渴邪氣猶在表也可更與桂枝湯茲則更增大煩渴不解是為風寒之邪盡鬱而為燥熱熱邪傳裡表裡皆熱故改用白虎湯以解表裡之煩熱更加人參以生津止渴也方見後第六卷陽明篇中愚按此條當是太陽證罷轉屬陽明之證因上條大汗出後脈洪大雖與桂枝湯已有傳入陽明之勢此增煩渴的系白虎證而非太陽病矣其不入陽明篇者以其服桂枝湯後之變證且與上條脈證相同但加煩渴用藥霄壤前賢著書欲使後學悉心體認即此二條中一為詳辯則用藥制方之道實非苟焉而已太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯發汗之發一作更太陽病發熱惡寒熱多寒少前已註明但前用麻黃桂枝各半湯以面有熱色身必發癢脈猶微緩而未弱也故云宜小汗之此則微而更加弱焉故云不可發汗此無陽也句成注缺解尚論篇云無陽二字乃仲景亡津液之通稱蓋無當作亡惟亡陽故脈微弱而不可發汗然病猶在太陽發熱惡寒之證不除仍當取桂枝之二以散風邪越婢之一以治鬱熱越婢云者取石膏之辛涼以化胃家之鬱熱則熱化津生而脾氣發越得以行其胃液故外臺方以婢改名脾也桂枝二越婢一湯方桂枝去皮芍藥甘草各十八銖生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹上七味㕮咀以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一成注云胃為十二經之主脾治水穀為卑藏若婢內經曰脾主為胃行其津液是湯所以謂之越婢者以發越脾氣通行津液外臺方一名越脾湯即此義也內臺方議問云湯名越婢其義何取答曰婢即脾也歲久傳寫之誤經注雖云脾為卑藏卑者若婢此非成無己之語乃後人穿鑿強注之耳所謂越婢湯者以石膏麻黃甘草發越脾之正氣以通行津液且散虛邪之留滯於經而不去者此因脈微弱無陽而不敢大汗者之所設也琥按上條論既云此無陽也不可發汗而湯中復用麻黃殊覺不解又按內臺方議云此方即上麻黃桂枝之合方減杏人加石膏謂杏人能發汗石膏能去虛熱愚謂彼議石膏之去熱故加之猶可議杏人之發汗故去之則非夫麻黃之發汗豈不更甚於杏人而獨留之乎吾恐即用二分之桂枝終是發汗之劑若雲和解吾不信矣或云石膏解肌又能制麻黃而發越脾氣且不使之汗出亦非正解愚反覆思之而知不可發汗四字當是不可大發汗因其人脈微弱無陽而津液少耳此方比上小發汗之方更輕服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之頭痛項強發熱無汗此因誤服桂枝而在表之寒猶未解也心下滿痛小便不利此復因誤下而寒邪入里水停心下不可認作結胸證也斯時而欲發表則表無寒邪可發故不惟不用麻黃湯止用桂枝湯而亦去桂也斯時而欲下里則里無實熱可下故不用陷胸承氣止加茯苓白朮以利小便燥停飲也成注云與桂枝湯以解外夫桂枝湯既去桂矣復云解外誤甚誤甚愚以或下之三字當在發熱無汗之下既下之後則頭痛發熱之候必去表而入於裡矣此條病愚於初時觀之滿擬再汗再下及細思之心下滿微痛小便不利此為停飲之證無疑故張兼善云此非桂枝證乃屬飲家也夫頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內蓄邪不在表故云去桂枝加茯苓白朮若得小便利水飲行腹滿減而熱自除則頭項強痛悉愈矣內臺方議問云心下滿微痛此乃結胸欲成何緣作停飲治之答曰餘證皆似結胸但取小便不利者知非結胸乃停飲也故此條證仲景止作停飲治之桂枝去桂加茯苓白朮湯方此方自原論中第十卷採附於此於桂枝湯方內去桂枝加茯苓白朮各三兩余依前法煎服小便利則愈琥按上湯後云小便利則愈乃知其為停飲之證無疑傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之此條系真寒證誤與桂枝湯攻其表而損其陽陰陽氣血俱虛故作甘草乾薑湯以復其陽氣更作芍藥甘草湯以益其陰血少與調胃承氣湯者此反治法也以四逆湯主之此為正治之法正文與注見中寒論中甘草乾薑湯方芍藥甘草湯方俱見中寒論中調胃承氣方見後第六卷陽明篇中四逆湯方見中寒論中問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈此條亦系真寒證以其證似陽旦故誤與桂枝湯陽旦者即桂枝湯之別名也咽中干煩躁譫語煩亂乃陰極似陽之證故以附子乾薑等湯劑治之正文與注俱見中寒論中
